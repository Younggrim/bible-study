now how he is now able to see, nor do we know who caused him to see. Ask him, he is a mature adult. He will speak for himself.”", "(His parents said these things because they were afraid of the Jewish religious leaders. For the Jewish leaders had already agreed that anyone who confessed Jesus to be the Christ would be put out of the synagogue.", "For this reason his parents said, “He is a mature adult, ask him.”)", "Then they summoned the man who used to be blind a second time and said to him, “Promise before God to tell the truth. We know that this man is a sinner.”", "He replied, “I do not know whether he is a sinner. I do know one thing—that although I was blind, now I can see.”", "Then they said to him, “What did he do to you? How did he cause you to see?”", "He answered, “I told you already and you didn’t listen. Why do you want to hear it again? You people don’t want to become his disciples too, do you?”", "They heaped insults on him, saying, “You are his disciple! We are disciples of Moses!", "We know that God has spoken to Moses! We do not know where this man comes from!”", "The man replied, “This is a remarkable thing that you don’t know where he comes from, and yet he caused me to see!", "We know that God doesn’t listen to sinners, but if anyone is devout and does his will, God listens to him.", "Never before has anyone heard of someone causing a man born blind to see.", "If this man were not from God, he could do nothing.”", "They replied, “You were born completely in sinfulness, and yet you presume to teach us?” So they threw him out.", "Jesus heard that they had thrown him out, so he found the man and said to him, “Do you believe in the Son of Man?”", "The man replied, “And who is he, sir, that I may believe in him?”", "Jesus told him, “You have seen him; he is the one speaking with you.” [", "He said, “Lord, I believe,” and he worshiped him.", "Jesus said,] “For judgment I have come into this world, so that those who do not see may gain their sight, and the ones who see may become blind.”", "Some of the Pharisees who were with him heard this and asked him, “We are not blind too, are we?”", "Jesus replied, “If you were blind, you would not be guilty of sin, but now because you claim that you can see, your guilt remains."], "WEB": ["As he passed by, he saw a man blind from birth.", "His disciples asked him, “Rabbi, who sinned, this man or his parents, that he was born blind?”", "Jesus answered, “Neither did this man sin, nor his parents; but, that the works of God might be revealed in him.", "I must work the works of him who sent me, while it is day. The night is coming, when no one can work.", "While I am in the world, I am the light of the world.”", "When he had said this, he spat on the ground, made mud with the saliva, anointed the blind man’s eyes with the mud,", "and said to him, “Go, wash in the pool of Siloam” (which means “Sent”). So he went away, washed, and came back seeing.", "The neighbors therefore, and those who saw that he was blind before, said, “Isn’t this he who sat and begged?”", "Others were saying, “It is he.” Still others were saying, “He looks like him.” He said, “I am he.”", "They therefore were asking him, “How were your eyes opened?”", "He answered, “A man called Jesus made mud, anointed my eyes, and said to me, ‘Go to the pool of Siloam, and wash.’ So I went away and washed, and I received sight.”", "Then they asked him, “Where is he?” He said, “I don’t know.”", "They brought him who had been blind to the Pharisees.", "It was a Sabbath when Jesus made the mud and opened his eyes.", "Again therefore the Pharisees also asked him how he received his sight. He said to them, “He put mud on my eyes, I washed, and I see.”", "Some therefore of the Pharisees said, “This man is not from God, because he doesn’t keep the Sabbath.” Others said, “How can a man who is a sinner do such signs?” There was division among them.", "Therefore they asked the blind man again, “What do you say about him, because he opened your eyes?” He said, “He is a prophet.”", "The Jews therefore did not believe concerning him, that he had been blind, and had received his sight, until they called the parents of him who had received his sight,", "and asked them, “Is this your son, whom you say was born blind? How then does he now see?”", "His parents answered them, “We know that this is our son, and that he was born blind;", "but how he now sees, we don’t know; or who opened his eyes, we don’t know. He is of age. Ask him. He will speak for himself.”", "His parents said these things because they feared the Jews; for the Jews had already agreed that if any man would confess him as Christ, he would be put out of the synagogue.", "Therefore his parents said, “He is of age. Ask him.”", "So they called the man who was blind a second time, and said to him, “Give glory to God. We know that this man is a sinner.”", "He therefore answered, “I don’t know if he is a sinner. One thing I do know: that though I was blind, now I see.”", "They said to him again, “What did he do to you? How did he open your eyes?”", "He answered them, “I told you already, and you didn’t listen. Why do you want to hear it again? You don’t also want to become his disciples, do you?”", "They insulted him and said, “You are his disciple, but we are disciples of Moses.", "We know that God has spoken to Moses. But as for this man, we don’t know where he comes from.”", "The man answered them, “How amazing! You don’t know where he comes from, yet he opened my eyes.", "We know that God doesn’t listen to sinners, but if anyone is a worshiper of God, and does his will, he listens to him.", "Since the world began it has never been heard of that anyone opened the eyes of someone born blind.", "If this man were not from God, he could do nothing.”", "They answered him, “You were altogether born in sins, and do you teach us?” They threw him out.", "Jesus heard that they had thrown him out, and finding him, he said, “Do you believe in the Son of God?”", "He answered, “Who is he, Lord, that I may believe in him?”", "Jesus said to him, “You have both seen him, and it is he who speaks with you.”", "He said, “Lord, I believe!” and he worshiped him.", "Jesus said, “I came into this world for judgment, that those who don’t see may see; and that those who see may become blind.”", "Those of the Pharisees who were with him heard these things, and said to him, “Are we also blind?”", "Jesus said to them, “If you were blind, you would have no sin; but now you say, ‘We see.’ Therefore your sin remains."]}, "studyNotes": "John - Chapter 9\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus heals a man born blind, sparking an investigation by the Pharisees who expel the man from the synagogue — while the healed man's faith grows from \"a man called Jesus\" to worshipping Him as Lord, Jesus declares the Pharisees' spiritual blindness.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 9 records the healing of a man born blind — the\nsixth sign miracle in John's Gospel. It is one of the most carefully structured\nnarratives in the New Testament, moving from physical blindness to spiritual\nsight, while the religious leaders move in the opposite direction — from physical\nsight to spiritual blindness.\n\nThe chapter unfolds in seven scenes: (1) the disciples' question, (2) the\nhealing, (3) the neighbors' reaction, (4) the first Pharisee interrogation,\n(5) the parents' testimony, (6) the second Pharisee interrogation, (7) Jesus\nfinding the man and revealing Himself.\n\nBlindness from Birth: In first-century Jewish thought, disability was often\nassumed to be divine punishment for sin. The disciples' question (v.2) reflects\nthis assumption. Jesus directly corrects it — this man's blindness was not\npunishment but preparation for a display of God's glory.\n\nExcommunication (v.22): The threat of being \"put out of the synagogue\" was\nserious — it meant social, religious, and economic exclusion from the community.\nThe parents' fear of this explains their evasive answers.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Jerusalem: The healing of the man born blind occurred in Jerusalem, still during the period around the Feast of Tabernacles.\n- The Pool of Siloam (v.7): Located at the southern end of the City of David in Jerusalem. Fed by the Gihon Spring through Hezekiah's tunnel. Jesus sent the blind man to wash here.\n\nKEY VERSES\n------------------------------------\nv.3  — \"It was not that this man sinned, or his parents, but that the works of\n        God might be displayed in him.\" (ESV) — Suffering is not always\n        punishment — sometimes it is the stage for God's glory.\n\nv.4  — \"We must work the works of him who sent me while it is day; night is\n        coming, when no one can work.\" (ESV) — The urgency of purposeful living.\n\nv.25 — \"Whether he is a sinner I do not know. One thing I do know, that though\n        I was blind, now I see.\" (ESV) — The power of personal testimony.\n\nv.35-38 — Jesus seeks out the man after his excommunication and reveals Himself.\n        The man's response: \"Lord, I believe.\" And he worshiped him. (ESV)\n\nv.41 — \"If you were blind, you would have no guilt; but now that you say, 'We\n        see,' your guilt remains.\" (ESV) — The danger of spiritual\n        self-sufficiency.\n\nCROSS-REFERENCES\n------------------------------------\nv.2   — Luke 13:1-5 — Jesus corrects the assumption that suffering = punishment.\nv.3   — 2 Corinthians 12:9 — God's power made perfect in weakness.\nv.4   — Ephesians 5:16 — \"Making the most of every opportunity.\"\nv.5   — John 8:12 — \"I am the light of the world.\"\nv.7   — Isaiah 8:6 — The pool of Siloam referenced in prophecy.\nv.22  — John 12:42-43 — Many leaders believed but feared excommunication.\nv.25  — 1 John 1:1 — \"That which we have seen and heard we declare to you.\"\nv.35  — John 5:27 — The Son of Man has authority to judge.\nv.38  — Matthew 28:17 — The disciples worshipped the risen Jesus.\nv.39  — Isaiah 6:9-10 — Seeing but not perceiving — spiritual blindness.\nv.41  — Romans 1:20-21 — Those who know God but refuse to honor Him.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-9/\n  Guzik examines the seven-scene structure of the chapter, the significance\n  of the Pool of Siloam, the man's growing understanding of Jesus (prophet →\n  Son of God), and the irony of the Pharisees' spiritual blindness.\n\nCharles Spurgeon:\n  Sermon: \"The Man Born Blind\" (MTP Vol. 35, No. 2094)\n  \"He was born blind that the works of God might be made manifest in him.\n  There are men and women in this world whose whole life seems to be one long\n  suffering — and the reason is not sin but glory. God is working something\n  in them and through them that could not be worked any other way.\"\n  Sermon: \"Personal Testimony\" on v.25 (MTP Vol. 20, No. 1172)\n  \"One thing I know — that is enough. You don't need a theology degree to\n  testify. You need a changed life. 'I was blind, now I see' — that is the\n  most powerful argument in the world.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.3  — KJV: \"that the works of God should be made manifest in him\" / ESV: \"that the works of God might be displayed in him\" — Greek \"phanerōthē\" — Both equivalent. KJV uses \"manifest\"; ESV uses \"displayed.\" Both convey that suffering can be the stage for God's glory.\n  [ASV/NET/WEB]: NET: \"Neither this man nor his parents sinned, but he\n       was born blind so that the acts of God may be revealed\n       through him\" — Jesus rejects the sin-causation framework\n       for suffering. WEB: \"that the works of God might be revealed\n       in him.\" Not punishment but platform for glory.\n\nv.4  — KJV: \"I must work the works of him that sent me\" / ESV: \"We must work the works of him who sent me\" — Some manuscripts read \"I\" (KJV); others read \"we\" (ESV). If \"we,\" Jesus is including His disciples in the urgency of the mission. Both readings are theologically consistent.\n\nv.5  — NET: \"As long as I am in the world, I am the light of the\n       world\" — \"as long as I am\" implies a limited time. WEB:\n       \"While I am in the world, I am the light of the world.\"\n       Connects to the works He \"must\" do while it is day (v.4).\n\nv.6  — KJV: \"he spat on the ground, and made clay of the spittle\" / ESV: \"he spit on the ground and made mud with the saliva\" — Greek \"pelon\" — KJV uses \"clay\"; ESV uses \"mud.\" Both refer to the same substance — dirt mixed with saliva.\n\nv.7  — KJV: \"the pool of Siloam, (which is by interpretation, Sent)\" / ESV: \"the pool of Siloam (which means Sent)\" — Both equivalent. John translates the Hebrew name for his Greek-speaking audience. \"Siloam\" = \"sent\" — a pointer to Jesus, who was also \"sent\" by the Father.\n\nv.22 — KJV: \"put out of the synagogue\" / ESV: \"put out of the synagogue\" — Greek \"aposunagōgos\" — Both identical. A technical term for formal excommunication — a severe social and religious penalty.\n\nv.25 — KJV: \"one thing I know, that, whereas I was blind, now I see\" / ESV: \"One thing I do know, that though I was blind, now I see\" — Both equivalent. The power of personal testimony — simple, undeniable, and unanswerable.\n  [ASV/NET/WEB]: NET: \"One thing I do know, that although I was blind, now\n       I can see\" — the healed man's testimony: simple, undeniable,\n       personal experience. WEB: \"One thing I know: that though I\n       was blind, now I see.\" KJV: \"one thing I know, that,\n       whereas I was blind, now I see.\" Theology can be debated;\n       experience cannot.\n\nv.35 — KJV: \"Dost thou believe on the Son of God?\" / ESV: \"Do you believe in the Son of Man?\" — Greek manuscripts vary between \"Son of God\" (huiou tou theou) and \"Son of Man\" (huiou tou anthrōpou). ESV follows older manuscripts reading \"Son of Man.\" Either way, the man's worship in v.38 confirms he understood Jesus' divine identity.\n  [ASV/NET/WEB]: NET: \"Do you believe in the Son of Man?\" — textual variant:\n       \"Son of Man\" (NET/ESV, earliest manuscripts) vs. \"Son of\n       God\" (KJV/WEB, later manuscripts). Both titles apply to\n       Jesus, but the original likely read \"Son of Man\" — Jesus'\n       preferred self-designation.\n\nv.39 — NET: \"For judgment I have come into this world, so that\n       those who do not see may gain their sight, and those who\n       see may become blind\" — the great reversal: physical\n       blindness cured, spiritual blindness exposed. WEB: \"that\n       those who don't see may see; and that those who see may\n       become blind.\" Irony as theology.\n\nv.41 — KJV: \"ye should have no sin: but now ye say, We see; therefore your sin remaineth\" / ESV: \"you would have no guilt; but now that you say, 'We see,' your guilt remains\" — Greek \"hamartia\" — KJV uses \"sin\"; ESV uses \"guilt.\" Both convey that claiming spiritual sight while rejecting Christ leaves one without excuse.\n\n\nGLOSSARY\n------------------------------------\nBorn blind    — Congenital blindness — present from birth, not acquired through\n               illness or injury. No medical cure existed in the ancient world.\n\nPool of Siloam — A reservoir in Jerusalem fed by the Gihon Spring through\n               Hezekiah's tunnel (2 Kings 20:20). Still exists today. The name\n               means \"sent.\"\n\nExcommunication — Formal exclusion from the synagogue community. In first-century\n               Judaism this meant loss of religious standing, social relationships,\n               and often economic livelihood.\n\nSynagogue     — The local Jewish assembly for worship, prayer, and Torah reading.\n               The center of Jewish community life outside the Temple.\n\nClay          — Jesus mixed dirt with saliva to make clay and applied it to the\n               man's eyes. The method was unusual — perhaps to test obedience,\n               perhaps to echo God forming man from dust (Genesis 2:7).\n\nManifest      — To make visible, to reveal, to display openly. God's works are\n               \"manifested\" — made visible — through human circumstances.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. The disciples assumed the man's blindness was punishment for sin (v.2). We\n   often make the same assumption about people's hardships. How does Jesus'\n   answer — \"that the works of God should be made manifest\" — change how you\n   view suffering in your own life or in the lives of people around you?\n\n2. The man's testimony was simple: \"I was blind, now I see\" (v.25). He didn't\n   have all the theology figured out — he just knew what had happened to him.\n   What is your personal testimony? Can you state it simply and clearly?\n\n3. The man's parents were afraid of excommunication and threw their son under\n   the bus (vv.21-23). Fear of social consequences silenced them. Where in your\n   life does fear of what others think silence your testimony or compromise your\n   integrity?\n\n4. After the man was cast out, Jesus went looking for him (v.35). When you are\n   rejected, excluded, or alone because of your faith, Jesus seeks you out. How\n   does that truth speak to where you are right now?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus said the man's blindness was \"that the works of God should be made\n   manifest in him\" (v.3). Is there a difficulty, limitation, or painful\n   circumstance in your life that God might be using as a stage for His glory?\n   What would it look like to embrace that perspective?\n\n2. The healed man's understanding of Jesus grew through the chapter: first \"a\n   man called Jesus\" (v.11), then \"a prophet\" (v.17), then \"Son of God\" (v.35-38).\n   How has your understanding of Jesus grown over time? Where are you in that\n   progression?\n\n3. The Pharisees were so committed to their position that they refused to accept\n   an undeniable miracle. What would it take for you to change your mind about\n   something you believe strongly? Are you open to being wrong?\n\n4. The man stood alone before the religious authorities and gave a courageous,\n   even sarcastic defense of Jesus (vv.27-33). He had everything to lose. What\n   does courage in the face of opposition look like for you in your specific\n   context — at work, in your family, in your community?\n\n5. Jesus said those who claim to see but are spiritually blind have no excuse\n   (v.41). Religious knowledge without genuine faith is more dangerous than\n   ignorance. How do you guard against the kind of spiritual pride that blinds\n   you to your own need?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 9:1-16 - Opposed by Blindness:\n    https://enduringword.com/media/john-9-opposed-blindness/\n  John 9:17-41 - Opposed by Ignorance:\n    https://enduringword.com/media/john-9-opposed-ignorance/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "10": {"translations": {"ESV": ["“Truly, truly, I say to you, he who does not enter the sheepfold by the door but climbs in by another way, that man is a thief and a robber.", "But he who enters by the door is the shepherd of the sheep.", "To him the gatekeeper opens. The sheep hear his voice, and he calls his own sheep by name and leads them out.", "When he has brought out all his own, he goes before them, and the sheep follow him, for they know his voice.", "A stranger they will not follow, but they will flee from him, for they do not know the voice of strangers.”", "This figure of speech Jesus used with them, but they did not understand what he was saying to them.", "So Jesus again said to them, “Truly, truly, I say to you, I am the door of the sheep.", "All who came before me are thieves and robbers, but the sheep did not listen to them.", "I am the door. If anyone enters by me, he will be saved and will go in and out and find pasture.", "The thief comes only to steal and kill and destroy. I came that they may have life and have it abundantly.", "I am the good shepherd. The good shepherd lays down his life for the sheep.", "He who is a hired hand and not a shepherd, who does not own the sheep, sees the wolf coming and leaves the sheep and flees, and the wolf snatches them and scatters them.", "He flees because he is a hired hand and cares nothing for the sheep.", "I am the good shepherd. I know my own and my own know me,", "just as the Father knows me and I know the Father; and I lay down my life for the sheep.", "And I have other sheep that are not of this fold. I must bring them also, and they will listen to my voice. So there will be one flock, one shepherd.", "For this reason the Father loves me, because I lay down my life that I may take it up again.", "No one takes it from me, but I lay it down of my own accord. I have authority to lay it down, and I have authority to take ed from their hands.", "He went away again across the Jordan to the place where John had been baptizing at first, and there he remained.", "And many came to him. And they said, “John did no sign, but everything that John said about this man was true.”", "And many believed in him there."], "KJV": ["Verily, verily, I say unto you, He that entereth not by the door into the sheepfold, but climbeth up some other way, the same is a thief and a robber.", "But he that entereth in by the door is the shepherd of the sheep.", "To him the porter openeth; and the sheep hear his voice: and he calleth his own sheep by name, and leadeth them out.", "And when he putteth forth his own sheep, he goeth before them, and the sheep follow him: for they know his voice.", "And a stranger will they not follow, but will flee from him: for they know not the voice of strangers.", "This parable spake Jesus unto them: but they understood not what things they were which he spake unto them.", "Then said Jesus unto them again, Verily, verily, I say unto you, I am the door of the sheep.", "All that ever came before me are thieves and robbers: but the sheep did not hear them.", "I am the door: by me if any man enter in, he shall be saved, and shall go in and out, and find pasture.", "The thief cometh not, but for to steal, and to kill, and to destroy: I am come that they might have life, and that they might have it more abundantly.", "I am the good shepherd: the good shepherd giveth his life for the sheep.", "But he that is an hireling, and not the shepherd, whose own the sheep are not, seeth the wolf coming, and leaveth the sheep, and fleeth: and the wolf catcheth them, and scattereth the sheep.", "The hireling fleeth, because he is an hireling, and careth not for the sheep.", "I am the good shepherd, and know my sheep, and am known of mine.", "As the Father knoweth me, even so know I the Father: and I lay down my life for the sheep.", "And other sheep I have, which are not of this fold: them also I em gods, unto whom the word of God came (and the scripture cannot be broken),", "say ye of him, whom the Father sanctified and sent into the world, Thou blasphemest; because I said, I am [the] Son of God?", "If I do not the works of my Father, believe me not.", "But if I do them, though ye believe not me, believe the works: that ye may know and understand that the Father is in me, and I in the Father.", "They sought again to take him: and he went forth out of their hand.", "And he went away again beyond the Jordan into the place where John was at the first baptizing; and there be abode.", "And many came unto him; and they said, John indeed did no sign: but all things whatsoever John spake of this man were true.", "And many believed on him there."], "NET": ["“I tell you the solemn truth, the one who does not enter the sheepfold by the door, but climbs in some other way, is a thief and a robber.", "The one who enters by the door is the shepherd of the sheep.", "The doorkeeper opens the door for him, and the sheep hear his voice. He calls his own sheep by name and leads them out.", "When he has brought all his own sheep out, he goes ahead of them, and the sheep follow him because they recognize his voice.", "They will never follow a stranger, but will run away from him because they do not recognize the stranger’s voice.”", "Jesus told them this parable, but they did not understand what he was saying to them.", "So Jesus said again, “I tell you the solemn truth, I am the door for the sheep.", "All who came before me were thieves and robbers, but the sheep did not listen to them.", "I am the door. If anyone enters through me, he will be saved, and will come in and go out, and find pasture.", "The thief comes only to steal and kill and destroy; I have come so that they may have life, and may have it abundantly.", "“I am the good shepherd. The good shepherd lays down his life for the sheep.", "The hired hand, who is not a shepherd and does not own sheep, sees the wolf coming and abandons the sheep and runs away. So the wolf attacks the sheep and scatters them.", "Because he is a hired hand and is not concerned about the sheep, he runs away.", "“I am the good shepherd. I know my own and my own know me—", "just as the Father knows me and I know the Father—and I lay down my life for the sheep.", "I have other sheep that do not come from this sheepfold. I must bring them too, and they will listen to my voice, so that there will be one flock and one shepherd.", "This is why the Father loves me—because I lay down my life, so that I may take it back again.", "No one takes it away from me, but I lay it down of my own free will. I have the authority to lay it down, and I have the authority to take it back again. This commandment I received from my Father.”", "Another sharp division took place among the Jewish people because of these words.", "Many of them were saying, “He is possessed by a demon and has lost his mind! Why do you listen to him?”", "Others said, “These are not the words of someone possessed by a demon. A demon cannot cause the blind to see, can it?”", "Then came the feast of the Dedication in Jerusalem.", "It was winter, and Jesus was walking in the temple area in Solomon’s Portico.", "The Jewish leaders surrounded him and asked, “How long will you keep us in suspense? If you are the Christ, tell us plainly.”", "Jesus replied, “I told you and you do not believe. The deeds I do in my Father’s name testify about me.", "But you refuse to believe because you are not my sheep.", "My sheep listen to my voice, and I know them, and they follow me.", "I give them eternal life, and they will never perish; no one will snatch them from my hand.", "My Father, who has given them to me, is greater than all, and no one can snatch them from my Father’s hand.", "The Father and I are one.”", "The Jewish leaders picked up rocks again to stone him to death.", "Jesus said to them, “I have shown you many good deeds from the Father. For which one of them are you going to stone me?”", "The Jewish leaders replied, “We are not going to stone you for a good deed but for blasphemy because you, a man, are claiming to be God.”", "Jesus answered, “Is it not written in your law, ‘I said, you are gods’?", "If those people to whom the word of God came were called ‘gods’ (and the scripture cannot be broken),", "do you say about the one whom the Father set apart and sent into the world, ‘You are blaspheming,’ because I said, ‘I am the Son of God’?", "If I do not perform the deeds of my Father, do not believe me.", "But if I do them, even if you do not believe me, believe the deeds, so that you may come to know and understand that I am in the Father and the Father is in me.”", "Then they attempted again to seize him, but he escaped their clutches.", "Jesus went back across the Jordan River again to the place where John had been baptizing at an earlier time, and he stayed there.", "Many came to him and began to say, “John performed no miraculous sign, but everything John said about this man was true!”", "And many believed in Jesus there."], "WEB": ["“Most certainly, I tell you, one who doesn’t enter by the door into the sheep fold, but climbs up some other way, the same is a thief and a robber.", "But one who enters in by the door is the shepherd of the sheep.", "The gatekeeper opens the gate for him, and the sheep listen to his voice. He calls his own sheep by name, and leads them out.", "Whenever he brings out his own sheep, he goes before them, and the sheep follow him, for they know his voice.", "They will by no means follow a stranger, but will flee from him; for they don’t know the voice of strangers.”", "Jesus spoke this parable to them, but they didn’t understand what he was telling them.", "Jesus therefore said to them again, “Most certainly, I tell you, I am the sheep’s door.", "All who came before me are thieves and robbers, but the sheep didn’t listen to them.", "I am the door. If anyone enters in by me, he will be saved, and will go in and go out, and will find pasture.", "The thief only comes to steal, kill, and destroy. I came that they may have life, and may have it abundantly.", "I am the good shepherd. The good shepherd lays down his life for the sheep.", "He who is a hired hand, and not a shepherd, who doesn’t own the sheep, sees the wolf coming, leaves the sheep, and flees. The wolf snatches the sheep, and scatters them.", "The hired hand flees because he is a hired hand, and doesn’t care for the sheep.", "I am the good shepherd. I know my own, and I’m known by my own;", "even as the Father knows me, and I know the Father. I lay down my life for the sheep.", "I have other sheep, which are not of this fold. I must bring them also, and they will hear my voice. They will become one flock with one shepherd.", "Therefore the Father loves me, because I lay down my life, that I may take it again.", "No one takes it away from me, but I lay it down by myself. I have power to lay it down, and I have power to take it again. I received this commandment from my Father.”", "Therefore a division arose again among the Jews because of these words.", "Many of them said, “He has a demon, and is insane! Why do you listen to him?”", "Others said, “These are not the sayings of one possessed by a demon. It isn’t possible for a demon to open the eyes of the blind, is it?”", "It was the Feast of the Dedication at Jerusalem.", "It was winter, and Jesus was walking in the temple, in Solomon’s porch.", "The Jews therefore came around him and said to him, “How long will you hold us in suspense? If you are the Christ, tell us plainly.”", "Jesus answered them, “I told you, and you don’t believe. The works that I do in my Father’s name, these testify about me.", "But you don’t believe, because you are not of my sheep, as I told you.", "My sheep hear my voice, and I know them, and they follow me.", "I give eternal life to them. They will never perish, and no one will snatch them out of my hand.", "My Father, who has given them to me, is greater than all. No one is able to snatch them out of my Father’s hand.", "I and the Father are one.”", "Therefore Jews took up stones again to stone him.", "Jesus answered them, “I have shown you many good works from my Father. For which of those works do you stone me?”", "The Jews answered him, “We don’t stone you for a good work, but for blasphemy: because you, being a man, make yourself God.”", "Jesus answered them, “Isn’t it written in your law, ‘I said, you are gods?’", "If he called them gods, to whom the word of God came (and the Scripture can’t be broken),", "do you say of him whom the Father sanctified and sent into the world, ‘You blaspheme,’ because I said, ‘I am the Son of God?’", "If I don’t do the works of my Father, don’t believe me.", "But if I do them, though you don’t believe me, believe the works; that you may know and believe that the Father is in me, and I in the Father.”", "They sought again to seize him, and he went out of their hand.", "He went away again beyond the Jordan into the place where John was baptizing at first, and there he stayed.", "Many came to him. They said, “John indeed did no sign, but everything that John said about this man is true.”", "Many believed in him there."]}, "studyNotes": "John - Chapter 10\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus declares \"I am the Good Shepherd\" who lays down His life for the sheep, claims unity with the Father (\"I and my Father are one\"), and the Jews take up stones accusing Him of blasphemy.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 10 contains Jesus' extended metaphor of the Good\nShepherd — one of the most beloved passages in Scripture. It was delivered in\nthe context of the Feast of Dedication (Hanukkah, v.22), which celebrated the\nrededication of the Temple after its desecration by Antiochus Epiphanes in 165 BC.\n\nShepherd Imagery: Deeply rooted in the Old Testament. God is called Israel's\nshepherd (Psalm 23, Ezekiel 34). The leaders of Israel were called shepherds\nwho had failed their flock (Ezekiel 34:1-10). Jesus presents Himself as the\nfulfillment of God's promise to come and shepherd His people Himself\n(Ezekiel 34:11-16).\n\nSheepfold: In first-century Palestine, sheep from multiple flocks were kept\novernight in a common stone enclosure with one entrance. Each shepherd would\ncall his own sheep by name in the morning, and they would follow him out —\nrecognizing his voice. Strangers' voices would cause the sheep to scatter.\n\nThe chapter contains two \"I AM\" statements: \"I am the door\" (v.7,9) and\n\"I am the good shepherd\" (v.11,14).\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Jerusalem / Solomon's Porch (v.23): Jesus walked in the Temple in Solomon's colonnade during the Feast of Dedication (Hanukkah, winter). This was a covered portico on the eastern side of the Temple.\n- Beyond the Jordan (v.40): After the Jews tried to stone Him, Jesus withdrew to \"the place where John at first baptized\" — Bethany beyond the Jordan (Perea). Many believed there.\n\nKEY VERSES\n------------------------------------\nv.10 — \"The thief comes only to steal and kill and destroy. I came that they\n        may have life and have it abundantly.\" (ESV) — The contrast between\n        Satan's agenda and Christ's.\n\nv.11 — \"I am the good shepherd. The good shepherd lays down his life for the\n        sheep.\" (ESV) — The third \"I AM\" statement — the defining characteristic\n        of the Good Shepherd is self-sacrifice.\n\nv.27-28 — \"My sheep hear my voice, and I know them, and they follow me. I give\n        them eternal life, and they will never perish, and no one will snatch\n        them out of my hand.\" (ESV) — The security of the believer — eternal\n        life and eternal security.\n\nv.30 — \"I and the Father are one.\" (ESV) — The clearest statement of the unity\n        of the Trinity in John's Gospel.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Ezekiel 34:1-10 — God's indictment of Israel's false shepherds.\nv.3   — Isaiah 43:1 — \"I have called you by name; you are mine.\"\nv.9   — John 14:6 — \"I am the way, the truth, and the life.\"\nv.10  — John 3:16 — God gave His Son so we might have life.\nv.11  — Isaiah 53:6-7 — \"The Lord has laid on him the iniquity of us all.\"\nv.11  — 1 Peter 2:25 — \"You were like sheep going astray, but now you have\n        returned to the Shepherd.\"\nv.14  — Psalm 23:1 — \"The Lord is my shepherd.\"\nv.16  — Ephesians 2:14-16 — Jew and Gentile united in one body.\nv.28  — Romans 8:38-39 — Nothing can separate us from the love of God.\nv.30  — John 17:21-22 — The unity of Father and Son.\nv.34  — Psalm 82:6 — \"I said, 'You are gods'\" — the passage Jesus quotes.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-10/\n  Guzik examines the sheepfold imagery, the distinction between the door and\n  the shepherd metaphors, the meaning of \"other sheep\" in v.16 (Gentiles),\n  and the eternal security of believers in vv.27-29.\n\nCharles Spurgeon:\n  Sermon: \"The Good Shepherd\" on v.11 (MTP Vol. 15, No. 855)\n  \"He is good in His nature — He is the essentially good One. He is good in\n  His office — He tends, He feeds, He leads, He protects. And He is good in\n  His sacrifice — He gave His life. No hireling ever did that. Only love\n  lays down its life.\"\n  Sermon: \"Eternal Security\" on vv.27-29 (MTP Vol. 38, No. 2257)\n  \"Neither shall any man pluck them out of my hand. And then, as if that\n  were not enough — My Father's hand holds them too. Two hands. The hand\n  of the Son and the hand of the Father. Who is strong enough to break\n  that grip?\"\n\nTRANSLATION NOTES\n------------------------------------\nv.7  — NET: \"I am the door for the sheep\" — the third \"I AM\"\n       statement. WEB: \"I am the sheep's door.\" KJV: \"I am the\n       door of the sheep.\" ASV: \"I am the door of the sheep.\"\n       Jesus is both the entrance (v.7) and the shepherd (v.11) —\n       He is everything the sheep need.\n\nv.9  — KJV: \"shall go in and out, and find pasture\" / ESV: \"will go in and out and find pasture\" — Both identical. A Hebrew idiom for complete freedom of movement and provision. The image is of a sheep freely moving in and out of the fold with full access to pasture — security and abundance together.\n\nv.10 — KJV: \"I am come that they might have life, and that they might have it more abundantly\" / ESV: \"I came that they may have life and have it abundantly\" — Greek \"perissos\" — Both equivalent. \"Abundantly\" means overflowing, exceeding, beyond measure.\n  [ASV/NET/WEB]: NET: \"I have come so that they may have life, and may have\n       it abundantly\" — \"abundantly\" (perisson = exceedingly,\n       overflowing, more than enough). WEB: \"may have life, and\n       may have it abundantly.\" KJV: \"have it more abundantly.\"\n       Not mere survival but overflow.\n\nv.11 — KJV: \"the good shepherd giveth his life for the sheep\" / ESV: \"the good shepherd lays down his life for the sheep\" — Greek \"tithēsin\" — Both equivalent. \"Lays down\" emphasizes the voluntary nature of Christ's sacrifice.\n  [ASV/NET/WEB]: NET: \"I am the good shepherd. The good shepherd lays down\n       his life for the sheep\" — \"good\" (kalos = noble, beautiful,\n       ideal). WEB: \"I am the good shepherd.\" The fourth \"I AM\"\n       statement. Not just adequate but the ideal, model shepherd.\n\nv.16 — KJV: \"one fold, and one shepherd\" / ESV: \"one flock, one shepherd\" — Greek \"poimnē\" — KJV uses \"fold\" (an enclosure); ESV uses \"flock\" (a group of sheep). ESV is more accurate. The point is one unified people under one shepherd, not one building.\n  [ASV/NET/WEB]: NET: \"I have other sheep that do not come from this sheep\n       pen. I must bring them too\" — \"other sheep\" = Gentile\n       believers. WEB: \"I have other sheep, which are not of this\n       fold.\" KJV: \"other sheep I have, which are not of this\n       fold.\" The universal scope of Christ's shepherding.\n\nv.28 — KJV: \"neither shall any man pluck them out of my hand\" / ESV: \"no one will snatch them out of my hand\" — Greek \"harpazō\" — Both equivalent. The verb means to seize by force — no power can forcibly remove a believer from Christ's grip.\n\nv.29 — KJV: \"My Father, which gave them me, is greater than all\" / ESV: \"My Father, who has given them to me, is greater than all\" — Some manuscripts read \"What my Father has given me is greater than all\" (ESV footnote). The meaning is similar — the Father's gift and the Father Himself are the ultimate guarantee of security.\n\nv.30 — KJV: \"I and my Father are one\" / ESV: \"I and the Father are one\" — Greek \"hen\" (neuter) — Both equivalent. \"One\" in essence/nature, not one person. This affirms unity of being while maintaining distinction of persons — the foundation of Trinitarian theology.\n  [ASV/NET/WEB]: NET: \"The Father and I are one\" — \"one\" (hen) is neuter,\n       not masculine — one in essence/nature, not one person. WEB:\n       \"I and the Father are one.\" KJV: \"I and my Father are one.\"\n       The Jews immediately recognize this as a claim to deity and\n       pick up stones (v.31).\n\nv.34 — KJV: \"Is it not written in your law, I said, Ye are gods?\" / ESV: \"Is it not written in your Law, 'I said, you are gods'?\" — Both identical. Jesus quotes Psalm 82:6 — an argument from the lesser to the greater.\n\n\nGLOSSARY\n------------------------------------\nSheepfold     — A stone enclosure with a single entrance where sheep were kept\n               overnight for protection from predators and thieves.\n\nPorter        — KJV term for the gatekeeper or doorkeeper of the sheepfold.\n               He controlled access to the fold.\n\nHireling      — A hired worker with no personal stake in the sheep. Contrasted\n               with the shepherd who owns and loves the flock.\n\nFeast of Dedication — Hanukkah (Hebrew: \"dedication\"). An 8-day festival in\n               winter (November/December) celebrating the Maccabean rededication\n               of the Temple in 165 BC after its desecration by Antiochus IV.\n\nSolomon's Porch — A covered colonnade on the eastern side of the Temple Mount,\n               a common gathering place for teaching and discussion.\n\nSanctified    — Set apart, consecrated for a holy purpose. Jesus says the Father\n               \"sanctified\" Him — set Him apart and sent Him into the world.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. \"The thief comes to steal, kill, and destroy\" (v.10). The enemy's agenda\n   for your life is destruction. Jesus' agenda is abundant life. As a man,\n   where are you experiencing theft — of your joy, your purpose, your\n   relationships, your integrity? And are you going to the right source to\n   recover it?\n\n2. The Good Shepherd \"calls his own sheep by name\" (v.3). God knows you\n   personally — not as a number in a crowd but by name. How does being\n   personally known by God change how you approach Him in prayer?\n\n3. \"My sheep hear my voice\" (v.27). Are you hearing His voice? Through\n   Scripture, through prayer, through the Spirit's prompting? What would\n   you need to change in your daily life to hear Him more clearly?\n\n4. \"Neither shall any man pluck them out of my hand\" (v.28). If you are\n   in Christ, your salvation is held by His grip, not yours. Does that\n   truth bring you peace, or do you still live with uncertainty about\n   your standing with God? What would it take to rest in that security?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus contrasts the Good Shepherd with the hireling (vv.12-13). The hireling\n   runs when things get dangerous. In what areas of your life — as a husband,\n   father, leader, friend — are you tempted to be a hireling rather than a\n   shepherd? What does it look like to stay when it's costly?\n\n2. \"I am come that they might have life, and that they might have it more\n   abundantly\" (v.10). What does abundant life look like to you? Is what you're\n   pursuing actually the abundant life Jesus offers, or a counterfeit?\n\n3. Jesus said \"other sheep I have, which are not of this fold\" (v.16) — referring\n   to Gentiles. God's plan was always bigger than one nation. How does the global\n   scope of the Gospel affect your view of people who are different from you?\n\n4. \"I and my Father are one\" (v.30) caused the crowd to pick up stones. The\n   claim of Christ's deity is still the most divisive claim in history. How do\n   you respond when people challenge or deny the deity of Christ?\n\n5. The sheep follow the shepherd because they know his voice (v.4). Knowing\n   someone's voice requires time spent listening. How much time do you spend\n   in God's Word and in prayer — enough to recognize His voice when He speaks?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 10:1-21 - Opposed by Wolves:\n    https://enduringword.com/media/john-10-opposed-wolves/\n  John 10:22-42 - Opposed by Stoning:\n    https://enduringword.com/media/john-10-opposed-stoning/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n--
