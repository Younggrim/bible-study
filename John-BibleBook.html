 the Word was with God, and the Word was fully God.", "The Word was with God in the beginning.", "All things were created by him, and apart from him not one thing was created that has been created.", "In him was life, and the life was the light of mankind.", "And the light shines on in the darkness, but the darkness has not mastered it.", "A man came, sent from God, whose name was John.", "He came as a witness to testify about the light, so that everyone might believe through him.", "He himself was not the light, but he came to testify about the light.", "The true light, who gives light to everyone, was coming into the world.", "He was in the world, and the world was created by him, but the world did not recognize him.", "He came to what was his own, but his own people did not receive him.", "But to all who have received him—those who believe in his name—he has given the right to become God’s children—", "children not born by human parents or by human desire or a husband’s decision, but by God.", "Now the Word became flesh and took up residence among us. We saw his glory—the glory of the one and only, full of grace and truth, who came from the Father.", "John testified about him and shouted out, “This one was the one about whom I said, ‘He who comes after me is greater than I am, because he existed before me.’”", "For we have all received from his fullness one gracious gift after another.", "For the law was given through Moses, but grace and truth came about through Jesus Christ.", "No one has ever seen God. The only one, himself God, who is in closest fellowship with the Father, has made God known.", "Now this was John’s testimony when the Jewish leaders sent priests and Levites from Jerusalem to ask him, “Who are you?”", "He confessed—he did not deny but confessed—“I am not the Christ!”", "So they asked him, “Then who are you? Are you Elijah?” He said, “I am not!” “Are you the Prophet?” He answered, “No!”", "Then they said to him, “Who are you? Tell us so that we sus.", "He first found his own brother Simon and told him, “We have found the Messiah!” (which is translated Christ).", "Andrew brought Simon to Jesus. Jesus looked at him and said, “You are Simon, the son of John. You will be called Cephas” (which is translated Peter).", "On the next day Jesus wanted to set out for Galilee. He found Philip and said to him, “Follow me.”", "(Now Philip was from Bethsaida, the town of Andrew and Peter.)", "Philip found Nathanael and told him, “We have found the one Moses wrote about in the law, and the prophets also wrote about—Jesus of Nazareth, the son of Joseph.”", "Nathanael replied, “Can anything good come out of Nazareth?” Philip replied, “Come and see.”", "Jesus saw Nathanael coming toward him and exclaimed, “Look, a true Israelite in whom there is no deceit!”", "Nathanael asked him, “How do you know me?” Jesus replied, “Before Philip called you, when you were under the fig tree, I saw you.”", "Nathanael answered him, “Rabbi, you are the Son of God; you are the king of Israel!”", "Jesus said to him, “Because I told you that I saw you under the fig tree, do you believe? You will see greater things than these.”", "He continued, “I tell all of you the solemn truth—you will see heaven opened and the angels of God ascending and descending on the Son of Man.”"], "WEB": ["In the beginning was the Word, and the Word was with God, and the Word was God.", "The same was in the beginning with God.", "All things were made through him. Without him was not anything made that has been made.", "In him was life, and the life was the light of men.", "The light shines in the darkness, and the darkness hasn’t overcome it.", "There came a man, sent from God, whose name was John.", "The same came as a witness, that he might testify about the light, that all might believe through him.", "He was not the light, but was sent that he might testify about the light.", "The true light that enlightens everyone was coming into the world.", "He was in the world, and the world was made through him, and the world didn’t recognize him.", "He came to his own, and those who were his own didn’t receive him.", "But as many as received him, to them he gave the right to become God’s children, to those who believe in his name:", "who were born not of blood, nor of the will of the flesh, nor of the will of man, but of God.", "The Word became flesh, and lived among us. We saw his glory, such glory as of the one and only Son of the Father, full of grace and truth.", "John testified about him. He cried out, saying, “This was he of whom I said, ‘He who comes after me has surpassed me, for he was before me.’”", "From his fullness we all received grace upon grace.", "For the law was given through Moses. Grace and truth were realized through Jesus Christ.", "No one has seen God at any time. The one and only Son, who is in the bosom of the Father, he has declared him.", "This is John’s testimony, when the Jews sent priests and Levites from Jerusalem to ask him, “Who are you?”", "He declared, and didn’t deny, but he declared, “I am not the Christ.”", "They asked him, “What then? Are you Elijah?” He said, “I am not.” “Are you the prophet?” He answered, “No.”", "They said therefore to him, “Who are you? Give us an answer to take back to those who sent us. What do you say about yourself?”", "He said, “I am the voice of one crying in the wilderness, ‘Make straight the way of the Lord,’ as Isaiah the prophet said.”", "The ones who had been sent were from the Pharisees.", "They asked him, “Why then do you baptize, if you are not the Christ, nor Elijah, nor the prophet?”", "John answered them, “I baptize in water, but among you stands one whom you don’t know.", "He is the one who comes after me, who is preferred before me, whose sandal strap I’m not worthy to loosen.”", "These things were done in Bethany beyond the Jordan, where John was baptizing.", "The next day, he saw Jesus coming to him, and said, “Behold, the Lamb of God, who takes away the sin of the world!", "This is he of whom I said, ‘After me comes a man who is preferred before me, for he was before me.’", "I didn’t know him, but for this reason I came baptizing in water: that he would be revealed to Israel.”", "John testified, saying, “I have seen the Spirit descending like a dove out of heaven, and it remained on him.", "I didn’t recognize him, but he who sent me to baptize in water, he said to me, ‘On whomever you will see the Spirit descending, and remaining on him, the same is he who baptizes in the Holy Spirit.’", "I have seen, and have testified that this is the Son of God.”", "Again, the next day, John was standing with two of his disciples,", "and he looked at Jesus as he walked, and said, “Behold, the Lamb of God!”", "The two disciples heard him speak, and they followed Jesus.", "Jesus turned, and saw them following, and said to them, “What are you looking for?” They said to him, “Rabbi” (which is to say, being interpreted, Teacher), “where are you staying?”", "He said to them, “Come, and see.” They came and saw where he was staying, and they stayed with him that day. It was about the tenth hour.", "One of the two who heard John, and followed him, was Andrew, Simon Peter’s brother.", "He first found his own brother, Simon, and said to him, “We have found the Messiah!” (which is, being interpreted, Christ).", "He brought him to Jesus. Jesus looked at him, and said, “You are Simon the son of Jonah. You shall be called Cephas” (which is by interpretation, Peter).", "On the next day, he was determined to go out into Galilee, and he found Philip. Jesus said to him, “Follow me.”", "Now Philip was from Bethsaida, of the city of Andrew and Peter.", "Philip found Nathanael, and said to him, “We have found him, of whom Moses in the law, and the prophets, wrote: Jesus of Nazareth, the son of Joseph.”", "Nathanael said to him, “Can any good thing come out of Nazareth?” Philip said to him, “Come and see.”", "Jesus saw Nathanael coming to him, and said about him, “Behold, an Israelite indeed, in whom is no deceit!”", "Nathanael said to him, “How do you know me?” Jesus answered him, “Before Philip called you, when you were under the fig tree, I saw you.”", "Nathanael answered him, “Rabbi, you are the Son of God! You are King of Israel!”", "Jesus answered him, “Because I told you, ‘I saw you underneath the fig tree,’ do you believe? You will see greater things than these!”", "He said to him, “Most certainly, I tell you all, hereafter you will see heaven opened, and the angels of God ascending and descending on the Son of Man.”"]}, "studyNotes": "John - Chapter 1\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nThe eternal Word who was with God and was God becomes flesh — John the Baptist bears witness, and Jesus calls His first disciples, who begin to recognize Him as Messiah, Son of God, and King of Israel.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John, son of Zebedee, one of the twelve disciples and part\nof Jesus' inner circle (with Peter and James). Early church tradition unanimously\nattributes this Gospel to John.\n\nDate Written: Approximately AD 85–95, making it the last of the four Gospels written.\n\nAudience: Written for both Jewish and Gentile believers, with a strong theological\npurpose stated in John 20:31 — \"that you may believe that Jesus is the Christ,\nthe Son of God.\"\n\nHistorical Context: John wrote during a time when early heresies (particularly\nGnosticism) were beginning to challenge the full humanity and divinity of Christ.\nHis opening prologue directly counters these false teachings by establishing Jesus\nas the eternal Word (Logos) who became flesh.\n\nPurpose of Chapter 1: This chapter serves as the theological foundation of the\nentire Gospel. It establishes who Jesus is (the eternal Word, the Son of God, the\nLamb of God), introduces John the Baptist as His forerunner, and records the\ncalling of the first disciples.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Bethany beyond the Jordan (v.28): The location where John baptized, east of the Jordan River near Jericho. Not the Bethany near Jerusalem.\n- Nazareth (v.46): Philip tells Nathanael about Jesus of Nazareth. Nathanael's skeptical response (\"Can any good thing come out of Nazareth?\") reflects the town's insignificance.\n- Galilee (v.43): Jesus called Philip and Nathanael in Galilee.\n\nKEY VERSES\n------------------------------------\nv.1  — \"In the beginning was the Word, and the Word was with God, and the Word\n        was God.\" (ESV) — Establishes the pre-existence and deity of Christ.\n\nv.14 — \"And the Word became flesh and dwelt among us, and we have seen his\n        glory, glory as of the only Son from the Father, full of grace and\n        truth.\" (ESV) — The Incarnation — God becoming man.\n\nv.12 — \"But to all who did receive him, who believed in his name, he gave the\n        right to become children of God.\" (ESV) — The offer of salvation\n        to all who believe.\n\nv.29 — \"Behold, the Lamb of God, who takes away the sin of the world!\" (ESV) —\n        John the Baptist's declaration of Jesus as the atoning sacrifice.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Genesis 1:1 (\"In the beginning...\") — John intentionally echoes Genesis,\n        showing Christ was present at creation.\nv.1   — Colossians 1:16-17 — \"All things were created by him and for him.\"\nv.3   — Hebrews 1:2 — God made the universe through His Son.\nv.4   — John 8:12 — \"I am the light of the world.\"\nv.12  — Romans 8:15-17 — Adoption as sons of God through faith.\nv.14  — Philippians 2:6-8 — Christ emptying Himself, taking on human form.\nv.17  — Romans 6:14 — Grace vs. the law.\nv.23  — Isaiah 40:3 — The prophecy John the Baptist fulfills.\nv.29  — Isaiah 53:7 — \"He was led as a lamb to the slaughter.\"\nv.51  — Genesis 28:12 — Jacob's ladder, now fulfilled in Christ as the connection\n        between heaven and earth.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-1/\n  Guzik provides verse-by-verse analysis of the Logos concept, the role of John\n  the Baptist, and the calling of the first disciples. Highly recommended for\n  deep theological insight on vv.1-18.\n\nCharles Spurgeon:\n  Sermon: \"The Word Made Flesh\" (MTP Vol. 37, No. 2200)\n  \"The Word was made flesh — here is the miracle of miracles, the mystery of\n  mysteries. He who was God became man; He who was in the bosom of the Father\n  came to the bosom of a woman. He who was adored by angels became a servant\n  of servants.\"\n  Sermon: \"Behold the Lamb of God\" (MTP Vol. 5, No. 249)\n  Spurgeon on v.29: \"John points away from himself entirely. He does not say\n  'Behold my baptism' or 'Behold my ministry' — he says Behold the Lamb. The\n  whole purpose of a true minister is to point men to Christ.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — Greek \"Logos\" (Word)\n  KJV: \"the Word\" — identical across translations\n  ESV: \"the Word\"\n  ASV: \"the Word\"\n  NET: \"the Word was fully God\" — uniquely adds \"fully\" to emphasize complete deity, countering any subordinationist reading\n  WEB: \"the Word was God\"\n  Note: The Logos concept carries rich meaning — in Greek philosophy it meant reason/logic; in Jewish thought it connected to God's creative speech in Genesis 1.\n\nv.3  — KJV/ESV: \"without him was not any thing made that was made\" — Both identical.\n\nv.5  — Greek \"katelaben\" — Can mean both \"to understand/comprehend\" AND \"to overcome/seize\"\n  KJV: \"the darkness comprehended it not\" — chose the intellectual meaning\n  ESV: \"the darkness has not overcome it\" — chose the conquering meaning\n  ASV: \"the darkness apprehended it not\" — similar to KJV (grasped/understood)\n  NET: \"the darkness has not mastered it\" — emphasizes the conquering aspect\n  WEB: \"the darkness hasn't overcome it\" — aligns with ESV\n  Note: Both meanings are theologically valid — the darkness neither understood nor defeated the Light.\n\nv.9  — KJV: \"which lighteth every man that cometh into the world\"\n  ESV: \"which gives light to everyone, was coming into the world\"\n  Note: ESV clarifies that it is the Light (Christ) who was coming into the world, not every man.\n\nv.11 — KJV: \"his own received him not\"\n  ESV: \"his own people did not receive him\"\n  Note: Both equivalent. ESV adds \"people\" for clarity.\n\nv.12 — Greek \"exousian\"\n  KJV: \"gave he power to become the sons of God\" — uses \"power\" (authority)\n  ESV: \"he gave the right to become children of God\" — uses \"right\"\n  Note: Both convey the idea of granted authority/privilege.\n\nv.14 — Greek \"monogenes\" and \"eskenosen\"\n  KJV: \"the only begotten of the Father\" — reflects older theological tradition of eternal generation\n  ESV: \"the only Son from the Father\" — conveys uniqueness without implying a time of origin\n  ASV: \"the only begotten from the Father\"\n  NET: \"took up residence among us\" — uniquely vivid rendering of \"eskenosen\" (tabernacled), capturing tent imagery connecting to God's dwelling with Israel in the wilderness\n  WEB: \"lived among us\"\n\nv.16 — Greek \"charin anti charitos\"\n  KJV: \"grace for grace\"\n  ESV: \"grace upon grace\"\n  Note: Both equivalent. The idea is grace replacing grace in continuous abundance.\n\nv.18 — Greek \"monogenes theos\" vs. \"monogenes huios\" — significant textual variant\n  KJV: \"the only begotten Son, which is in the bosom of the Father\"\n  ESV: \"God the only Son, who is at the Father's side\" — follows the \"God\" (theos) reading based on older manuscripts\n  ASV: \"the only begotten Son, who is in the bosom of the Father\"\n  NET: \"The only one, himself God, who is in closest fellowship with the Father\" — follows \"monogenes theos\" AND adds \"closest fellowship\" for \"eis ton kolpon.\" Most theologically explicit rendering.\n  WEB: \"The one and only Son, who is in the bosom of the Father\"\n\nv.34 — Significant textual variant\n  KJV: \"the Son of God\" (Greek \"huios\")\n  ESV: \"the Son of God\"\n  ASV: \"the Son of God\"\n  NET: \"the Chosen One of God\" (Greek \"eklektos\") — follows a different manuscript reading\n  WEB: \"the Son of God\"\n\nv.39 — Time reckoning\n  KJV: \"about the tenth hour\"\n  ESV: \"about the tenth hour\"\n  ASV: \"about the tenth hour\"\n  NET: \"about four o'clock in the afternoon\" — converts to modern time, assuming Jewish counting from 6 AM\n  WEB: \"about the tenth hour\"\n\nv.42 — KJV: \"Cephas, which is by interpretation, A stone\"\n  ESV: \"You shall be called Cephas (which means Peter)\"\n  ASV: \"thou shalt be called Cephas (which is by interpretation, Peter)\"\n  NET: \"You will be called Cephas (which is translated Peter)\"\n  WEB: \"You are Simon the son of Jonah\" — reads \"Jonah\" where KJV/ESV/NET read \"John\" (textual variant reflecting WEB's Majority Text base)\n  Note: Cephas is Aramaic for Peter (Greek: Petros = rock/stone).\n\nv.51 — Greek \"Amen, amen\"\n  KJV: \"Verily, verily, I say unto you\"\n  ESV: \"Truly, truly, I say to you\"\n  ASV: \"Verily, verily, I say unto you\"\n  NET: \"I tell all of you the solemn truth\" — captures the weight of Jesus' double-amen formula\n  WEB: \"Most certainly, I tell you all\"\n\n\nGLOSSARY\n------------------------------------\nLogos       — Greek word translated \"Word.\" Refers to the divine reason, the\n               creative and revelatory expression of God. John uses it to identify\n               Jesus as the eternal, personal expression of God.\n\nIncarnation — The theological term for God becoming human in the person of Jesus\n               Christ. From Latin \"in carne\" meaning \"in flesh.\" See v.14.\n\nMessias     — Aramaic form of \"Messiah,\" meaning \"Anointed One.\" Greek equivalent\n               is \"Christ.\" See v.41.\n\nCephas      — Aramaic name meaning \"rock\" or \"stone.\" The name Jesus gave Simon\n               Peter. See v.42.\n\nBethabara   — (also Bethany beyond the Jordan) — The location where John was\n               baptizing, east of the Jordan River. See v.28.\n\nLevites     — Members of the tribe of Levi, assistants to the priests in the\n               Temple. They were sent to question John the Baptist. See v.19.\n\nPharisees   — A prominent Jewish religious sect known for strict observance of\n               the Law and oral traditions. They sent the delegation to John. v.24.\n\nRabbi       — Hebrew/Aramaic title of respect meaning \"my teacher\" or \"master.\"\n               Used by disciples addressing Jesus. See v.38.\n\nGuile       — Deceit, cunning, or craftiness. Jesus says Nathanael has none in\n               him — a man of complete honesty. See v.47.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. The Word became flesh (v.14) — Jesus did not stay at a distance. He entered\n   our world, our pain, our humanity. In your own life, where do you need to\n   experience God not as a distant concept but as Emmanuel — God with us?\n\n2. John the Baptist's entire purpose was to point others to Jesus (v.29). He\n   had crowds following him, influence, and a platform — and he used it all to\n   say \"look at Him, not me.\" As a man, consider where your life is pointing\n   people. Are your words, your work, your reputation pointing toward Christ?\n\n3. \"He came unto his own, and his own received him not\" (v.11). Rejection is\n   one of the deepest human pains. Jesus experienced it fully. How does knowing\n   Christ understands rejection change how you handle it in your own life?\n\n4. Andrew's first response after meeting Jesus was to find his brother Simon and\n   bring him to Christ (vv.40-42). Who in your life — a brother, a friend, a\n   coworker — needs you to say \"We have found the Messiah\"?\n\n5. \"What seek ye?\" (v.38) — The first words Jesus speaks in John's Gospel are a\n   question directed at those following Him. What are you truly seeking right now?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. John 1:1 declares Jesus was \"in the beginning\" with God and was God. What does\n   the eternal nature of Christ mean to you personally? How does it change how you\n   pray or relate to Him?\n\n2. Verse 12 says that to all who received Him and believed in His name, He gave\n   the right to become children of God. Have you personally received Him? What\n   does it mean in your daily life to live as a son of God?\n\n3. John the Baptist said \"I am not the Christ\" (v.20) and consistently deflected\n   attention away from himself. In what areas of your life do you struggle with\n   wanting credit or recognition? How can John's example challenge you?\n\n4. Jesus saw Nathanael under the fig tree before Philip called him (v.48). Jesus\n   sees you fully — your private moments, your doubts, your struggles. How does\n   being fully known by Christ bring you comfort or conviction?\n\n5. The chapter ends with Jesus promising Nathanael he will see \"heaven open, and\n   the angels of God ascending and descending upon the Son of man\" (v.51). Jesus\n   is the ladder between heaven and earth. What does it mean to you that access\n   to God is only through Him?\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — Gospel of John Overview (Part 1: Chapters 1-12):\n  https://bibleproject.com/explore/video/john/\n  Animated overview showing the literary structure of John's Gospel, the\n  seven signs, the \"I AM\" statements, and how John presents Jesus as the\n  Word become flesh. Excellent introduction. (Approx. 8 minutes)\n\nThe Bible Project — John 1 Visual Commentary:\n  https://www.bibleproject.com/videos/john-1/\n  Explores how John 1 incorporates Genesis creation language to present\n  Jesus as God's Word taking human form — the new creation beginning in\n  the person of Christ. (Approx. 5 minutes)\n\nVoddie Baucham — The Gospel of John:\n  Search YouTube: \"Voddie Baucham John 1 Word became flesh\"\n  Baucham's exposition of John 1 emphasizes the deity of Christ, the\n  incarnation, and the exclusive claims of Christ as the only way to\n  the Father.\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 1:1-18 - God the Son Presented to Us:\n    https://enduringword.com/media/john-1-god-son-presented-us/\n  John 1:19-51 - Revealed to John the Baptist:\n    https://enduringword.com/media/john-119-51-revealed-john-baptist/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — John 1 Verse-by-Verse Teaching (Enduring Word Podcast):\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n  Search \"Enduring Word\" on your podcast app and look for the John series.\n  Guzik's teaching covers the Logos theology, John the Baptist's witness,\n  and the calling of the first disciples.\n\nBibleProject Podcast — \"In the Beginning\" (John 1 Series):\n  https://bibleproject.com/podcasts/beginning/\n  Multi-episode deep dive into John 1, exploring how John incorporates\n  Genesis and Exodus narratives to portray how God responds to rebellious\n  people through the incarnate Word. (Multiple episodes, 45-60 min each)\n\nNOTE: Links may change over time. Search the title and speaker name if a\nlink no longer works.\n\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "2": {"translations": {"ESV": ["On the third day there was a wedding at Cana in did not trust himself unto them, for that he knew all men,", "and because he needed not that any one should bear witness concerning man; for he himself knew what was in man."], "NET": ["Now on the third day there was a wedding at Cana in Galilee. Jesus’ mother was there,", "and Jesus and his disciples were also invited to the wedding.", "When the wine ran out, Jesus’ mother said to him, “They have no wine left.”", "Jesus replied, “Woman, why are you saying this to me? My time has not yet come.”", "His mother told the servants, “Whatever he tells you, do it.”", "Now there were six stone water jars there for Jewish ceremonial washing, each holding 20 or 30 gallons.", "Jesus told the servants, “Fill the water jars with water.” So they filled them up to the very top.", "Then he told them, “Now draw some out and take it to the head steward,” and they did.", "When the head steward tasted the water that had been turned to wine, not knowing where it came from (though the servants who had drawn the water knew), he called the bridegroom", "and said to him, “Everyone serves the good wine first, and then the cheaper wine when the guests are drunk. You have kept the good wine until now!”", "Jesus did this as the first of his miraculous signs, in Cana of Galilee. In this way he revealed his glory, and his disciples believed in him.", "After this he went down to Capernaum with his mother and brothers and his disciples, and they stayed there a few days.", "Now the Jewish Feast of Passover was near, so Jesus went up to Jerusalem.", "He found in the temple courts those who were selling oxen and sheep and doves, and the money changers sitting at tables.", "So he made a whip of cords and drove them all out of the temple courts, with the sheep and the oxen. He scattered the coins of the money changers and overturned their tables.", "To those who sold the doves he said, “Take these things away from here! Do not make my Father’s house a marketplace!”", "His disciples remembered that it was written, “Zeal for your house will devour me.”", "So then the Jewish leaders responded, “What sign can you show us, since you are doing these things?”", "Jesus replied, “Destroy this temple and in three days I will raise it up again.”", "Then the Jewish leaders said to him, “This temple has been under construction for 46 years, and are you going to raise it up in three days?”", "But Jesus was speaking about the temple of his body.", "So after he was raised from the dead, his disciples remembered that he had said this, and they believed the scripture and the saying that Jesus had spoken.", "Now while Jesus was in Jerusalem at the Feast of the Passover, many people believed in his name because they saw the miraculous signs he was doing.", "But Jesus would not entrust himself to them because he knew all people.", "He did not need anyone to testify about man, for he knew what was in man."], "WEB": ["The third day, there was a marriage in Cana of Galilee. Jesus’ mother was there.", "Jesus also was invited, with his disciples, to the marriage.", "When the wine ran out, Jesus’ mother said to him, “They have no wine.”", "Jesus said to her, “Woman, what does that have to do with you and me? My hour has not yet come.”", "His mother said to the servants, “Whatever he says to you, do it.”", "Now there were six water pots of stone set there after the Jews’ way of purifying, containing two or three metretes apiece.", "Jesus said to them, “Fill the water pots with water.” They filled them up to the brim.", "He said to them, “Now draw some out, and take it to the ruler of the feast.” So they took it.", "When the ruler of the feast tasted the water now become wine, and didn’t know where it came from (but the servants who had drawn the water knew), the ruler of the feast called the bridegroom,", "and said to him, “Everyone serves the good wine first, and when the guests have drunk freely, then that which is worse. You have kept the good wine until now!”", "This beginning of his signs Jesus did in Cana of Galilee, and revealed his glory; and his disciples believed in him.", "After this, he went down to Capernaum, he, and his mother, his brothers, and his disciples; and they stayed there a few days.", "The Passover of the Jews was at hand, and Jesus went up to Jerusalem.", "He found in the temple those who sold oxen, sheep, and doves, and the changers of money sitting.", "He made a whip of cords, and threw all out of the temple, both the sheep and the oxen; and he poured out the changers’ money, and overthrew their tables.", "To those who sold the doves, he said, “Take these things out of here! Don’t make my Father’s house a marketplace!”", "His disciples remembered that it was written, “Zeal for your house will eat me up.”", "The Jews therefore answered him, “What sign do you show us, seeing that you do these things?”", "Jesus answered them, “Destroy this temple, and in three days I will raise it up.”", "The Jews therefore said, “It took forty-six years to build this temple! Will you raise it up in three days?”", "But he spoke of the temple of his body.", "When therefore he was raised from the dead, his disciples remembered that he said this, and they believed the Scripture, and the word which Jesus had said.", "Now when he was in Jerusalem at the Passover, during the feast, many believed in his name, observing his signs which he did.", "But Jesus didn’t entrust himself to them, because he knew everyone,", "and because he didn’t need for anyone to testify concerning man; for he himself knew what was in man."]}, "studyNotes": "John - Chapter 2\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus performs His first sign by turning water into wine at the wedding in Cana, then cleanses the temple in Jerusalem and speaks of raising \"this temple\" in three days — pointing to His resurrection.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 2 contains two pivotal events — the first miracle at\nthe wedding in Cana, and the first cleansing of the Temple in Jerusalem. Both\nevents reveal Jesus' authority: over nature (water to wine) and over worship\n(purifying the Temple). John places these early in his Gospel to establish\nimmediately that Jesus is no ordinary teacher.\n\nWedding at Cana: Weddings in first-century Jewish culture were major community\nevents lasting 7 days. Running out of wine was a serious social disgrace for the\nhost family. Mary's request to Jesus shows her confidence in His ability to act.\n\nTemple Cleansing: The outer courts of the Temple (Court of the Gentiles) had\nbecome a marketplace where money changers and animal sellers operated, often\nexploiting worshippers. Jesus' response was not passive — He made a whip and\ndrove them out, demonstrating righteous anger at the corruption of His Father's\nhouse.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Cana of Galilee (v.1): A village in Galilee (exact location debated — possibly Kefr Kenna, 4 miles northeast of Nazareth). Jesus performed His first miracle here.\n- Jerusalem / the Temple (v.13): Jesus went up to Jerusalem for Passover and cleansed the Temple. John places this early in Jesus' ministry (the Synoptics record a later cleansing).\n\nKEY VERSES\n------------------------------------\nv.5  — \"Do whatever he tells you.\" (ESV) — Mary's instruction to the\n        servants. One of the most practical statements of faith in Scripture.\n\nv.11 — \"This, the first of his signs, Jesus did at Cana in Galilee, and\n        manifested his glory. And his disciples believed in him.\" (ESV) — The\n        purpose of miracles: to reveal Christ's glory and produce faith.\n\nv.16 — \"Do not make my Father's house a house of trade.\" (ESV) — Jesus' zeal for\n        pure worship and His claim of unique relationship with God (\"my Father\").\n\nv.19 — \"Destroy this temple, and in three days I will raise it up.\" (ESV) — A veiled\n        prophecy of His death and resurrection, misunderstood by His hearers.\n\nv.25 — \"He himself knew what was in man.\" (ESV) — Jesus' omniscience — He sees through\n        superficial belief to the heart.\n\nCROSS-REFERENCES\n------------------------------------\nv.5   — Genesis 41:55 — Pharaoh tells the Egyptians \"Go to Joseph; do whatever\n        he tells you.\" A parallel to Mary's instruction to trust and obey.\nv.11  — John 20:30-31 — Signs are recorded so that we may believe.\nv.16  — Psalm 69:9 — \"Zeal for your house has consumed me\" — quoted in v.17.\nv.17  — Psalm 69:9 — Fulfilled in Jesus' passion for the Temple.\nv.19  — Matthew 26:61 — This statement used against Jesus at His trial.\nv.19  — 1 Corinthians 3:16 — Believers are now the temple of God.\nv.21  — John 10:17-18 — Jesus lays down His life and takes it up again.\nv.24  — Jeremiah 17:9-10 — God knows the heart of man.\nv.25  — Psalm 139:1-4 — God searches and knows us completely.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-2/\n  Guzik addresses the meaning of \"mine hour is not yet come\" (v.4), the\n  significance of the six stone waterpots, and the two Temple cleansings\n  (John's early cleansing vs. the synoptic Gospels' later one).\n\nCharles Spurgeon:\n  Sermon: \"Obedience to Christ\" on v.5 (MTP Vol. 12, No. 680)\n  \"Whatever He says to you, do it — not part of it, not a modified version of\n  it, not what you think He probably means — but what He says. This is the\n  secret of blessing: simple, prompt, complete obedience.\"\n  Sermon: \"The Zeal of Thine House\" (MTP Vol. 9, No. 496)\n  Spurgeon on the Temple cleansing: \"Christ's anger was not the anger of\n  wounded pride but of wounded love — love for His Father's honor, love for\n  the worshippers being robbed, love for the Gentiles whose court had been\n  turned into a market.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.4  — KJV: \"Woman, what have I to do with thee?\" / ESV: \"Woman, what does this have to do with me?\" — Greek \"ti emoi kai soi\" — A Hebrew idiom meaning \"what is that to us?\" or \"that is not our concern.\" It is not disrespectful — \"Woman\" (gune) was a respectful address in Greek. Jesus is gently indicating His actions are governed by the Father's timing, not family requests.\n  [ASV/NET/WEB]: NET: \"Woman, why are you saying this to me? My time has\n       not yet come\" — \"Woman\" (gynai) is respectful address in\n       Greek (not rude). KJV: \"Woman, what have I to do with thee?\"\n       WEB: \"Woman, what does that have to do with you and me?\"\n       ASV: \"Woman, what have I to do with thee?\"\n\nv.6  — KJV: \"two or three firkins apiece\" / ESV: \"twenty or thirty gallons\" — Greek \"metretas\" — KJV uses the archaic \"firkins\"; ESV converts to modern gallons. Each pot held 20-30 gallons, meaning Jesus created 120-180 gallons of wine — an extravagant abundance, a picture of God's generosity.\n  [ASV/NET/WEB]: NET: \"six stone water jars were sitting there, meant for\n       Jewish ceremonial washing\" — \"meant for\" explains their\n       purpose. WEB: \"for the Jews' purification.\" KJV: \"after\n       the manner of the purifying of the Jews.\" Jesus transforms\n       vessels of ritual law into vessels of celebratory wine.\n\nv.10 — KJV: \"when men have well drunk\" / ESV: \"when people have drunk freely\" — Greek \"methusthosin\" — Can mean drunk or simply having drunk freely. The point is that the best wine was saved for last — opposite of human custom.\n\nv.11 — KJV: \"This beginning of miracles\" / ESV: \"This, the first of his signs\" — Greek \"semeion\" — KJV uses \"miracles\"; ESV uses \"signs.\" John consistently uses \"signs\" to indicate miracles that point to deeper truth about Jesus' identity.\n  [ASV/NET/WEB]: NET: \"Jesus did this as the first of his miraculous signs\"\n       — John calls miracles \"signs\" (sēmeia) — they point beyond\n       themselves to who Jesus is. WEB: \"the first of his signs.\"\n       KJV: \"This beginning of miracles.\" John's theology of signs\n       is distinctive.\n\nv.15 — KJV: \"a scourge of small cords\" / ESV: \"a whip of cords\" — Both equivalent. Jesus deliberately made the whip — this was not an impulsive act but a deliberate, righteous response.\n\nv.16 — KJV: \"make not my Father's house an house of merchandise\" / ESV: \"do not make my Father's house a house of trade\" — Both equivalent. Jesus claims unique relationship with God (\"my Father\") and zeal for pure worship.\n\nv.19 — KJV: \"Destroy this temple, and in three days I will raise it up\" / ESV: \"Destroy this temple, and in three days I will raise it up\" — Both identical.\n  [ASV/NET/WEB]: NET: \"Destroy this temple and in three days I will raise\n       it up\" — \"I will raise it\" — Jesus claims to raise Himself.\n       WEB: \"Destroy this temple, and in three days I will raise\n       it up.\" All versions preserve the ambiguity that confused\n       His hearers but was clarified by His resurrection (v.22).\n\nv.24 — KJV: \"Jesus did not commit himself unto them\" / ESV: \"Jesus on his part did not entrust himself to them\" — Greek \"episteusen\" — Same root as \"believe\" (pisteuo). The wordplay is intentional: they \"believed\" in Him (v.23), but He did not \"believe in/entrust\" Himself to them.\n  [ASV/NET/WEB]: NET: \"Jesus would not entrust himself to them, because he\n       knew all people\" — \"entrust himself\" (episteusen) — same\n       Greek word as \"believe.\" They believed in Him (v.23) but He\n       didn't believe/entrust Himself to them. WEB: \"didn't trust\n       himself to them.\" The wordplay is deliberate.\n\n\nGLOSSARY\n------------------------------------\nCana          — A small village in Galilee, about 9 miles north of Nazareth.\n               Site of Jesus' first miracle.\n\nFirkins       — An old English unit of liquid measure, approximately 9 gallons.\n               Each stone pot held 2-3 firkins (18-27 gallons).\n\nPassover      — The annual Jewish feast commemorating Israel's deliverance from\n               Egypt (Exodus 12). One of three feasts requiring pilgrimage to\n               Jerusalem. Jesus attended multiple Passovers during His ministry.\n\nScourge       — A whip made of twisted cords or leather strips, used for driving\n               animals. Jesus fashioned one to drive out the Temple merchants.\n\nMoney changers — Men who exchanged foreign currency for the Temple shekel required\n               for the Temple tax. They often charged excessive exchange rates,\n               exploiting worshippers.\n\nManifested    — To make visible or reveal. John uses this word to describe how\n               miracles reveal the true nature and glory of Christ.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Mary's instruction — \"Whatever He says to you, do it\" (v.5) — is the simplest\n   and most complete description of the Christian life. Where are you currently\n   hearing something from Christ that you haven't fully acted on yet?\n\n2. Jesus saved the best wine for last (v.10). God's provision often exceeds our\n   expectations and comes at the right time, not our time. Where in your life\n   are you struggling to trust God's timing?\n\n3. Jesus' zeal for His Father's house (v.17) shows that righteous anger has a\n   place — when God's honor is at stake. As a man, are there things in your home,\n   workplace, or community that should stir righteous anger in you? What would\n   it look like to act on that?\n\n4. \"He knew what was in man\" (v.25). Jesus doesn't need your resume or your\n   reputation — He sees exactly who you are. That can be humbling or freeing\n   depending on where you stand with Him. How does being fully known by Christ\n   affect how you approach Him?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. The servants obeyed Jesus' instruction to fill the pots with water before\n   they saw any miracle. They acted in faith before they saw results. What step\n   of obedience is God asking you to take right now, before you see the outcome?\n\n2. Jesus' first miracle was at a wedding — an ordinary social event. What does\n   it say about God that He cares about the everyday details and potential\n   embarrassments of our lives?\n\n3. Jesus drove out the money changers with a whip He made Himself. This was\n   deliberate, not impulsive. What is the difference between righteous anger and\n   sinful anger? How do you tell the difference in your own life?\n\n4. Many believed in Jesus because of His miracles (v.23), but Jesus didn't\n   entrust Himself to them because He knew their hearts (v.24-25). What is the\n   difference between being impressed by Jesus and truly trusting Him?\n\n5. The disciples didn't fully understand Jesus' words about the Temple until\n   after the resurrection (v.22). Is there something in Scripture you don't\n   fully understand yet that you're trusting God to make clear in time?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 2:1-12 - Revealed at Cana:\n    https://enduringword.com/media/john-2-revealed-cana/\n  John 2:13-25 - Revealed in the Temple:\n    https://enduringword.com/media/john-2-revealed-temple/\n\nThe Chosen — John 2, The Wedding at Cana:\n  https://youtu.be/MhjvAAkXbj0?si=xELkvvF2ifW0Uxqi\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n .’", "He who has the bride is the bridegroom; but the friend of the bridegroom, who stands and hears him, rejoices greatly because of the bridegroom’s voice. This, my joy, therefore is made full.", "He must increase, but I must decrease.", "He who comes from above is above all. He who is from the earth belongs to the earth, and speaks of the earth. He who comes from heaven is above all.", "What he has seen and heard, of that he testifies; and no one receives his witness.", "He who has received his witness has set his seal to this, that God is true.", "For he whom God has sent speaks the words of God; for God gives the Spirit without measure.", "The Father loves the Son, and has given all things into his hand.", "One who believes in the Son has eternal life, but one who disobeys the Son won’t see life, but the wrath of God remains on him.”"]}, "studyNotes": "John - Chapter 3\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus tells Nicodemus that no one can see the kingdom of God unless born again of water and the Spirit, declares \"God so loved the world that He gave His only begotten Son,\" and John the Baptist testifies \"He must increase, but I must decrease.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 3 contains one of the most famous conversations in\nScripture — Jesus and Nicodemus — and one of the most quoted verses in the Bible\n(John 3:16). Nicodemus was a Pharisee and a member of the Sanhedrin, the Jewish\nruling council of 70 men. He came to Jesus at night, likely to avoid public\nscrutiny from his peers.\n\nThe chapter also records John the Baptist's final testimony about Jesus, including\nhis famous statement \"He must increase, but I must decrease\" (v.30) — a model of\nhumility and God-centered purpose.\n\nTheological Significance: This chapter introduces the doctrine of regeneration\n(being \"born again\") — the supernatural work of the Holy Spirit that transforms\na person from the inside. Jesus makes clear that religious position, education,\nand moral effort cannot earn entrance into God's kingdom. New birth is required.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Jerusalem (v.1): Nicodemus came to Jesus in Jerusalem — he was a Pharisee and member of the Sanhedrin.\n- Aenon near Salim (v.23): John was baptizing at Aenon (\"springs\") near Salim, because \"there was much water there.\" The exact location is debated — possibly in Samaria or the Jordan Valley.\n\nKEY VERSES\n------------------------------------\nv.3  — \"Truly, truly, I say to you, unless one is born again he cannot see the\n        kingdom of God.\" (ESV) — The necessity of spiritual rebirth — Jesus'\n        non-negotiable requirement.\n\nv.16 — \"For God so loved the world, that he gave his only Son, that whoever\n        believes in him should not perish but have eternal life.\" (ESV)\n        — The Gospel in one verse.\n\nv.17 — \"For God did not send his Son into the world to condemn the world, but\n        in order that the world might be saved through him.\" (ESV) — God's\n        motive: salvation, not condemnation.\n\nv.30 — \"He must increase, but I must decrease.\" (ESV) — John the Baptist's\n        defining statement of God-centered humility.\n\nv.36 — \"Whoever believes in the Son has eternal life; whoever does not obey the\n        Son shall not see life, but the wrath of God remains on him.\" (ESV) —\n        The two eternal destinies plainly stated.\n\nCROSS-REFERENCES\n------------------------------------\nv.3   — Ezekiel 36:26-27 — God promises a new heart and new spirit — the OT\n        foundation for regeneration.\nv.5   — Titus 3:5 — \"Renewing of the Holy Ghost\" — regeneration by the Spirit.\nv.8   — 1 Corinthians 2:11 — The Spirit's work is beyond human comprehension.\nv.14  — Numbers 21:8-9 — Moses lifting up the bronze serpent in the wilderness,\n        the type that Jesus fulfills.\nv.16  — Romans 5:8 — \"God demonstrates His love for us in this: while we were\n        still sinners, Christ died for us.\"\nv.16  — 1 John 4:9-10 — God sent His Son as an atoning sacrifice.\nv.17  — Luke 19:10 — \"The Son of Man came to seek and save the lost.\"\nv.19  — John 1:5 — Light came into the world and darkness did not overcome it.\nv.30  — Philippians 1:21 — \"For me to live is Christ.\"\nv.36  — John 5:24 — Whoever hears and believes has eternal life.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-3/\n  Guzik provides excellent analysis of \"born again\" (Greek: anothen — meaning\n  both \"again\" and \"from above\"), the bronze serpent typology in v.14, and\n  John the Baptist's response to his disciples' jealousy in vv.26-30.\n\nCharles Spurgeon:\n  Sermon: \"The Necessity of Regeneration\" on v.7 (MTP Vol. 1, No. 53)\n  \"You must be born again — not reformed, not educated, not improved — born\n  again. The old nature cannot be patched up. God does not renovate; He\n  regenerates. He does not repair the old man; He creates a new one.\"\n  Sermon: \"God So Loved the World\" on v.16 (MTP Vol. 26, No. 1531)\n  \"These words are not the words of a man trying to persuade you — they are\n  the words of God Himself declaring the motive behind the cross. So loved.\n  Not so pitied. Not so tolerated. So loved.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.3  — KJV: \"born again\" / ESV: \"born again\" — Greek \"anothen\" — Both identical in rendering, though \"anothen\" carries both meanings simultaneously — born again (a second time) AND born from above (from God). Nicodemus understood it as \"again\" (v.4); Jesus meant \"from above.\" The double meaning is intentional.\n  [ASV/NET/WEB]: NET: \"unless a person is born from above, he cannot see\n       the kingdom of God\" — \"from above\" (anōthen) — a word with\n       double meaning: \"again\" (KJV/WEB) AND \"from above.\" NET\n       chooses \"from above\"; Nicodemus hears \"again\" (v.4). The\n       ambiguity is intentional in the Greek.\n\nv.5  — KJV: \"born of water and of the Spirit\" / ESV: \"born of water and the Spirit\" — Both equivalent. \"Water\" is debated — interpretations include: (1) physical birth (amniotic fluid), (2) baptism, (3) the Word of God (Ephesians 5:26), (4) John's baptism of repentance. Most commentators favor either physical birth or the cleansing work of the Spirit (Ezekiel 36:25-27).\n\nv.8  — KJV: \"The wind bloweth where it listeth\" / ESV: \"The wind blows where it wishes\" — Greek \"pneuma\" — Both equivalent. The same Greek word means both \"wind\" and \"spirit\" — Jesus uses the wordplay intentionally.\n  [ASV/NET/WEB]: NET: \"The wind blows wherever it will, and you hear the\n       sound it makes, but do not know where it comes from and\n       where it is going\" — \"wind\" and \"Spirit\" are the same Greek\n       word (pneuma). WEB: \"The wind blows where it wants to.\"\n       The wordplay is untranslatable — the Spirit/wind is\n       sovereign and mysterious.\n\nv.14 — KJV: \"even so must the Son of man be lifted up\" / ESV: \"so must the Son of Man be lifted up\" — Greek \"hupsothenai\" — Both equivalent. \"Lifted up\" carries double meaning: physically on the cross and exalted in glory.\n\nv.16 — KJV: \"only begotten Son\" / ESV: \"only Son\" — Greek \"monogenes\" — KJV's \"only begotten\" emphasizes eternal generation; ESV's \"only\" emphasizes uniqueness. \"Monogenes\" means one-of-a-kind — Jesus is the unique Son of God, unlike any other.\n  [ASV/NET/WEB]: NET: \"For this is the way God loved the world: He gave his\n       one and only Son\" — \"one and only\" (monogenē) vs. KJV \"only\n       begotten.\" WEB: \"his one and only Son.\" ASV: \"his only\n       begotten Son.\" NET avoids \"begotten\" since monogenēs means\n       \"unique/one of a kind\" rather than \"generated/begotten.\"\n\nv.18 — KJV: \"he that believeth not is condemned already\" / ESV: \"whoever does not believe is condemned already\" — Both equivalent. Greek \"kekritai\" (perfect tense) — condemnation is a present state, not merely a future event.\n\nv.30 — NET: \"He must become more important while I become less\n       important\" — \"more important/less important\" vs. KJV's\n       elegant \"He must increase, but I must decrease.\" WEB: \"He\n       must increase, but I must decrease.\" ASV: \"He must increase,\n       but I must decrease.\" KJV's phrasing remains superior here.\n\nv.36 — KJV: \"he that believeth not the Son\" / ESV: \"whoever does not obey the Son\" — Greek \"apeithon\" — Means both \"disbelieve\" and \"disobey.\" KJV chose the belief aspect; ESV chose the obedience aspect. True belief and obedience are inseparable in John's theology.\n  [ASV/NET/WEB]: NET: \"the one who does not obey the Son will not see life,\n       but God's wrath remains on him\" — \"does not obey\" (ho\n       apeithōn) vs. KJV \"believeth not.\" WEB: \"doesn't obey the\n       Son.\" The Greek word means both \"disbelieve\" and \"disobey\"\n       — unbelief IS disobedience.\n\n\nGLOSSARY\n------------------------------------\nPharisee      — Member of a strict Jewish religious sect emphasizing exact\n               observance of the Law and oral traditions. Nicodemus was both\n               a Pharisee and a member of the Sanhedrin.\n\nSanhedrin     — The supreme Jewish council of 70 elders plus the high priest,\n               responsible for religious and civil matters. Nicodemus was a\n               \"ruler of the Jews\" — a member of this body.\n\nBorn again    — Greek \"anothen\" — to be born from above, by the Spirit of God.\n               A supernatural transformation of the inner person, not a\n               physical or moral reformation.\n\nRegeneration  — The theological term for the new birth — God's act of giving\n               spiritual life to a person who was spiritually dead.\n\nAenon         — A location near Salim where John was baptizing, noted for\n               having \"much water.\" Likely in the Jordan Valley.\n\nCondemnation  — Greek \"krisis\" — judgment. Those who reject Christ are already\n               under judgment because they have rejected the only remedy for sin.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Nicodemus came to Jesus at night — perhaps out of fear of what others would\n   think. Many men live their faith privately, afraid of peer judgment. Is there\n   an area of your faith you're keeping in the dark? What would it look like to\n   bring it into the light?\n\n2. Jesus told a highly educated, religiously accomplished man that he needed to\n   start over — be born again. Religious activity, moral effort, and good\n   reputation cannot substitute for genuine spiritual transformation. Have you\n   experienced the new birth, or are you relying on your own goodness?\n\n3. John the Baptist said \"He must increase, but I must decrease\" (v.30). This\n   is the posture of a man who knows his purpose. As a man — in your career,\n   your family, your ministry — are you building your own name or pointing to\n   Christ? What would it look like to decrease in a specific area this week?\n\n4. John 3:16 is the most memorized verse in the Bible, but familiarity can dull\n   its impact. Read it slowly: God SO loved — the world — that He GAVE. What\n   does it mean to you personally that God gave His Son for you specifically?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Nicodemus was a religious expert who didn't understand the most basic truth\n   about entering God's kingdom. What does this say about the danger of\n   substituting religious knowledge for genuine relationship with God?\n\n2. Jesus compared the new birth to the wind — you can't see it, but you see its\n   effects (v.8). What evidence of the Spirit's work do you see in your own life?\n   What evidence would others see?\n\n3. The bronze serpent in Numbers 21 — those who were bitten by snakes were healed\n   by looking at the bronze serpent Moses lifted up. Jesus says He must be \"lifted\n   up\" the same way (v.14). What does it mean to \"look to\" Christ for salvation?\n   Is that a one-time act or ongoing?\n\n4. Verse 19 says men loved darkness rather than light because their deeds were\n   evil. Honesty check: Is there an area of your life you're keeping in the dark\n   because you don't want it exposed? What would it take to bring it to the light?\n\n5. John the Baptist's disciples were upset that people were leaving them to follow\n   Jesus (v.26). John's response was joy, not jealousy (v.29). How do you respond\n   when someone else gets the credit or the following you feel you deserve?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 3:1-21 - Revealed in Secret:\n    https://enduringword.com/media/john-3-revealed-secret/\n  John 3:22-26 - Revealed as Greater:\n    https://enduringword.com/media/john-3-revealed-greater/\n\nThe Chosen — John 3, Jesus and Nicodemus:\n  https://youtu.be/_p2XIUK9VgA?si=kHNfUGGAUpB9_H3x\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "4": {"translations": {"ESV": ["Now when Jesus learned that the Pharisees had heard that Jesus was making and baptizing more disciples than John", "(although Jesus himself did not baptize, but only his disciples),", "he left Judea and departed again for Galilee.", "And he had to pass through Samaria.", "So he came to a town of Samaria called Sychar, near the field that Jacob had given to his son Joseph.", "Jacob’s well was there; so Jesus, wearied as he was from his journey, was sitting beside the well. It was about the sixth hour.", "A woman from Samaria came to draw water. Jesus said to her, “Give me a drink.”", "(For his disciples had gone away into the city to buy food.)", "The Samaritan woman said to him, “How is it that you, a Jew, ask for a drink from me, a woman of Samaria?” (For Jews have no dealings with Samaritans.)", "Jesus answered her, “If you knew the gift of God, and who it is that is saying to you, ‘Give me a drink,’ you would have asked him, and he would have given you living water.”", "The woman said to him, “Sir, you have nothing to draw water with, and the well is deep. Where do you get that living water?", "Are you greater than our father Jacob? He gave us the well and drank from it himself, as did his sons and his livestock.”", "Jesus said to her, “Everyone who drinks of this water will be thirsty again,", "but whoever drinks of the water that I will give him will never be thirsty again. The water that I will give him will become in him a spring of water welling up to eternal life.”", "The woman said to him, “Sir, give me this water, so that I will not be thirsty or have to come here to draw water.”", "Jesus said to her, “Go, call your husband, and come here.”", "The woman answered him, “I have no husband.” Jesus said to her, “You are right in saying, ‘I have no husband’;", "for you have had five husbands, and the one you now have is not your husband. What you have said is true.”", "The woman s
