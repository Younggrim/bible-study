re;", "about judgment, because the prince of this world has been judged.", "“I have yet many things to tell you, but you can’t bear them now.", "However when he, the Spirit of truth, has come, he will guide you into all truth, for he will not speak from himself; but whatever he hears, he will speak. He will declare to you things that are coming.", "He will glorify me, for he will take from what is mine, and will declare it to you.", "All things whatever the Father has are mine; therefore I said that he takes of mine, and will declare it to you.", "A little while, and you will not see me. Again a little while, and you will see me.”", "Some of his disciples therefore said to one another, “What is this that he says to us, ‘A little while, and you won’t see me, and again a little while, and you will see me;’ and, ‘Because I go to the Father’?”", "They said therefore, “What is this that he says, ‘A little while’? We don’t know what he is saying.”", "Therefore Jesus perceived that they wanted to ask him, and he said to them, “Do you inquire among yourselves concerning this, that I said, ‘A little while, and you won’t see me, and again a little while, and you will see me?’", "Most certainly I tell you, that you will weep and lament, but the world will rejoice. You will be sorrowful, but your sorrow will be turned into joy.", "A woman, when she gives birth, has sorrow, because her time has come. But when she has delivered the child, she doesn’t remember the anguish any more, for the joy that a human being is born into the world.", "Therefore you now have sorrow, but I will see you again, and your heart will rejoice, and no one will take your joy away from you.", "“In that day you will ask me no questions. Most certainly I tell you, whatever you may ask of the Father in my name, he will give it to you.", "Until now, you have asked nothing in my name. Ask, and you will receive, that your joy may be made full.", "I have spoken these things to you in figures of speech. But the time is coming when I will no more speak to you in figures of speech, but will tell you plainly about the Father.", "In that day you will ask in my name; and I don’t say to you, that I will pray to the Father for you,", "for the Father himself loves you, because you have loved me, and have believed that I came from God.", "I came from the Father, and have come into the world. Again, I leave the world, and go to the Father.”", "His disciples said to him, “Behold, now you are speaking plainly, and using no figures of speech.", "Now we know that you know all things, and don’t need for anyone to question you. By this we believe that you came from God.”", "Jesus answered them, “Do you now believe?", "Behold, the time is coming, yes, and has now come, that you will be scattered, everyone to his own place, and you will leave me alone. Yet I am not alone, because the Father is with me.", "I have told you these things, that in me you may have peace. In the world you have oppression; but cheer up! I have overcome the world.”"]}, "studyNotes": "John - Chapter 16\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus prepares His disciples for His departure, promises the Spirit of Truth who will convict the world and guide them into all truth, and assures them that their grief will turn to joy — \"In the world ye shall have tribulation: but be of good cheer; I have overcome the world.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 16 concludes the Upper Room Discourse before Jesus'\nHigh Priestly Prayer in chapter 17. Jesus prepares His disciples for three\nrealities: persecution (vv.1-4), His departure and the Spirit's coming (vv.5-15),\nand the transformation of their sorrow into joy (vv.16-33).\n\n\"It is expedient for you that I go away\" (v.7): One of the most counterintuitive\nstatements in Scripture. The disciples could not imagine anything better than\nhaving Jesus physically present. But Jesus says His departure is to their\nadvantage — because it makes way for the Holy Spirit, who would be in every\nbeliever simultaneously, not limited to one physical location.\n\nThe Spirit's Threefold Work (vv.8-11): The Spirit convicts the world of sin\n(unbelief), righteousness (Christ's vindication), and judgment (Satan's defeat).\nThis is the Spirit's evangelistic work — creating the conditions in which people\ncan respond to the Gospel.\n\n\"In the world ye shall have tribulation\" (v.33): Jesus does not promise an easy\nlife. He promises His presence and His peace in the middle of tribulation — and\nthe ultimate victory: \"I have overcome the world.\"\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Upper Room / en route to Gethsemane: Jesus continues speaking to His disciples on the night of His arrest — either still in the Upper Room or walking toward the Kidron Valley and the Mount of Olives.\n- \"In the world\" (v.33): Jesus speaks of the world as the environment where the disciples will face tribulation — the whole created order under sin.\n\nKEY VERSES\n------------------------------------\nv.7  — \"Nevertheless, I tell you the truth: it is to your advantage that I go\n        away, for if I do not go away, the Helper will not come to you. But if\n        I go, I will send him to you.\" (ESV) — The Spirit's coming is better\n        than Jesus' physical presence.\n\nv.13 — \"When the Spirit of truth comes, he will guide you into all the\n        truth.\" (ESV) — The Spirit's role in illuminating Scripture and guiding\n        believers.\n\nv.24 — \"Until now you have asked nothing in my name. Ask, and you will receive,\n        that your joy may be full.\" (ESV) — Prayer in Jesus' name — a new\n        privilege of the new covenant.\n\nv.33 — \"In the world you will have tribulation. But take heart; I have overcome\n        the world.\" (ESV) — The foundation of Christian courage.\n\nCROSS-REFERENCES\n------------------------------------\nv.2   — Acts 8:1-3 — Saul persecuting the church, thinking he served God.\nv.7   — Acts 1:4-5 — Jesus commanding the disciples to wait for the Spirit.\nv.8   — Romans 3:19-20 — The law convicting of sin.\nv.11  — Colossians 2:15 — Christ disarming the powers at the cross.\nv.13  — 1 Corinthians 2:10-13 — The Spirit searching and revealing God's depths.\nv.13  — 2 Peter 1:21 — Scripture given by men moved by the Holy Spirit.\nv.20  — Psalm 30:5 — \"Weeping may stay for the night, but rejoicing comes\n        in the morning.\"\nv.21  — Isaiah 66:7-8 — The birth pangs imagery for new creation.\nv.23  — Matthew 7:7-8 — \"Ask and it will be given to you.\"\nv.33  — Romans 8:37 — \"We are more than conquerors through him who loved us.\"\nv.33  — 1 John 5:4 — \"Everyone born of God overcomes the world.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-16/\n  Guzik examines why Jesus' departure is better than His presence, the\n  Spirit's threefold conviction, the meaning of \"a little while,\" and\n  the nature of prayer in Jesus' name.\n\nCharles Spurgeon:\n  Sermon: \"The Comforter\" on v.7 (MTP Vol. 1, No. 5)\n  \"The Holy Spirit is not an influence, not a power, not an energy — He\n  is a Person. And He comes to dwell in you — not to visit, not to pass\n  through — to dwell. He is the Comforter, and He is with you always.\"\n  Sermon: \"Good Cheer for Troubled Hearts\" on v.33 (MTP Vol. 37, No. 2210)\n  \"In the world ye shall have tribulation — He does not say 'you might'\n  or 'some of you will.' He says 'ye shall.' It is certain. But then —\n  be of good cheer. Not because the tribulation is not real, but because\n  I have overcome the world. His victory is your victory.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — KJV: \"that ye should not be offended\" / ESV: \"to keep you from falling away\" — Greek \"skandalisthēte\" — KJV uses \"offended\" (archaic meaning: caused to stumble); ESV uses \"falling away.\" The idea is being tripped up or caused to abandon faith when persecution comes.\n\nv.7  — KJV: \"the Comforter will not come unto you\" / ESV: \"the Helper will not come to you\" — Greek \"Paraklētos\" — KJV uses \"Comforter\"; ESV uses \"Helper.\" All are valid translations. \"Comforter\" emphasizes consolation; \"Helper\" emphasizes assistance; the Spirit fulfills both roles.\n  [ASV/NET/WEB]: NET: \"it is to your advantage that I am going away. For\n       if I do not go away, the Advocate will not come to you\" —\n       \"to your advantage\" (sympherei hymin) — the Spirit's\n       indwelling presence is BETTER than Jesus' physical proximity.\n       WEB: \"it is to your advantage.\" KJV: \"it is expedient for\n       you.\" A staggering claim.\n\nv.8  — KJV: \"he will reprove the world of sin\" / ESV: \"he will convict the world concerning sin\" — Greek \"elegchō\" — KJV uses \"reprove\"; ESV uses \"convict.\" The Spirit's work is not merely to make people feel bad but to expose the truth about sin, righteousness, and judgment.\n  [ASV/NET/WEB]: NET: \"he will prove the world wrong concerning sin and\n       righteousness and judgment\" — \"prove wrong\" (elengxei =\n       convict/expose). KJV: \"reprove.\" WEB: \"convict.\" ASV:\n       \"convict.\" The Spirit's three-fold work toward the\n       unbelieving world.\n\nv.13 — KJV: \"he will guide you into all truth\" / ESV: \"he will guide you into all the truth\" — Both equivalent. This refers primarily to the apostles and the inspiration of Scripture, not a promise that every individual believer will receive new revelation. The Spirit illuminates Scripture for all believers but gave new revelation to the apostles.\n  [ASV/NET/WEB]: NET: \"he will guide you into all truth\" — \"guide\" (hodēgēsei\n       = lead along the way). WEB: \"guide you into all truth.\"\n       KJV: \"guide you into all truth.\" The Spirit doesn't dump\n       all truth at once but GUIDES — a progressive, relational\n       leading into understanding.\n\nv.21 — KJV: \"A woman when she is in travail hath sorrow\" / ESV: \"When a woman is giving birth, she has sorrow\" — Both equivalent. KJV uses archaic \"travail\"; ESV uses modern \"giving birth.\" The analogy: present pain produces future joy.\n\nv.24 — NET: \"Ask and you will receive it, so that your joy may be\n       complete\" — \"so that your joy may be complete\" (hina hē\n       chara hymōn ē peplērōmenē). WEB: \"that your joy may be\n       made full.\" KJV: \"that your joy may be full.\" Prayer's\n       purpose isn't just getting — it's fullness of joy.\n\nv.33 — KJV: \"be of good cheer; I have overcome the world\" / ESV: \"take heart; I have overcome the world\" — Greek \"tharseite\" — KJV uses \"be of good cheer\"; ESV uses \"take heart.\" A command to be courageous, confident, bold — not a suggestion to feel better but a command to act with courage based on Christ's victory.\n  [ASV/NET/WEB]: NET: \"In the world you have trouble and suffering, but take\n       courage — I have conquered the world\" — \"conquered\"\n       (nenikēka = perfect tense — already accomplished victory).\n       KJV: \"I have overcome the world.\" WEB: \"I have overcome\n       the world.\" The perfect tense: the victory is complete\n       before the cross even occurs.\n\n\nGLOSSARY\n------------------------------------\nExpedient     — Advantageous, beneficial. Jesus says His departure is to the\n               disciples' advantage — a statement that required faith to believe.\n\nReprove/Convict — Greek \"elegcho\" — to expose, bring to light, convince of\n               guilt. The Spirit's work of making people aware of their sin,\n               God's righteousness, and coming judgment.\n\nTribulation   — Greek \"thlipsis\" — pressure, affliction, distress. Not merely\n               inconvenience but genuine suffering and opposition.\n\nOvercome      — Greek \"nikao\" — to conquer, prevail, be victorious. Jesus has\n               already won the decisive victory over sin, death, and Satan.\n               Believers share in that victory.\n\nProverbs      — KJV translation of Greek \"paroimia\" — figurative speech,\n               veiled sayings, illustrations. Jesus had been speaking in\n               metaphors; He promises to speak plainly after the resurrection.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus said it was better for the disciples that He go away (v.7). They\n   couldn't see it at the time. Is there something in your life that God has\n   taken away or changed that you're still grieving — but that He may be\n   using to bring something better? Can you trust His \"expedient\" even when\n   you can't see it?\n\n2. The Spirit convicts of sin — specifically the sin of unbelief (v.9). At\n   the root of every sin is a failure to trust God. Where in your life is\n   unbelief driving your behavior? What are you not trusting God with?\n\n3. \"Ask, and ye shall receive, that your joy may be full\" (v.24). Jesus\n   connects answered prayer directly to full joy. How is your prayer life?\n   Are you asking boldly in Jesus' name, or are you living below the\n   privilege He has given you?\n\n4. \"In the world ye shall have tribulation: but be of good cheer; I have\n   overcome the world\" (v.33). The courage Jesus commands is not based on\n   circumstances improving — it's based on His victory. What tribulation\n   are you facing right now? How does His victory change how you face it?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus told the disciples about coming persecution so they would not be\n   \"offended\" (v.1) — not caught off guard. How does knowing that suffering\n   and opposition are part of the Christian life change how you respond when\n   they come?\n\n2. The disciples were so focused on their own sorrow that none of them asked\n   Jesus where He was going (v.5). Grief can make us self-focused. Is there\n   a situation in your life where your own pain is preventing you from seeing\n   what God is doing?\n\n3. The Spirit guides into \"all truth\" (v.13). How are you cooperating with\n   the Spirit's work of illuminating Scripture in your life? What would it\n   look like to be more attentive to His teaching as you read the Bible?\n\n4. Jesus said \"your sorrow shall be turned into joy\" (v.20) — not removed,\n   but transformed. The same event that caused the sorrow (the cross) became\n   the source of the greatest joy. Is there a painful experience in your past\n   that God has transformed into something fruitful? What does that tell you\n   about how He works?\n\n5. \"I have overcome the world\" (v.33). Jesus said this before the cross —\n   speaking of it as already accomplished. How does living from the perspective\n   of Christ's already-accomplished victory change how you face daily battles?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 16:5-33 - Prepared for Advantage:\n    https://enduringword.com/media/john-16-prepared-advantage/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "17": {"translations": {"ESV": ["When Jesus had spoken these words, he lifted up his eyes to heaven, and said, “Father, the hour has come; glorify your Son that the Son may glorify you,", "since you have given him authority over all flesh, to give eternal life to all whom you have given him.", "And this is eternal life, that they know you, the only true God, and Jesus Christ whom you have sent.", "I glorified you on earth, having accomplished the work that you gave me to do.", "And now, Father, glorify me in your own presence with the glory that I had with you before the world existed.", "“I have manifested your name to the people whom you gave me out of the world. Yours they were, and you gave them to me, and they have kept your word.", "Now they know that everything that you have given me is from you.", "For I have given them the words that you gave me, and they have received them and have come to know in truth that I came from you; and they have believed that you sent me.", "I am praying for them. I am not praying for the world but for those whom you have given me, for they are yours.", "All mine are yours, and yours are mine, and I am glorified in them.", "And I am no longer in the world, but they are in the world, and I am coming to you. Holy Father, keep them in your name, which you have given me, that they may be one, even as we are one.", "While I was with them, I kept them in your name, which you have given me. I have guarded them, and not one of them has been lost except the son of destruction, that the Scripture might be fulfilled.", "But now I am coming to you, and these things I speak in the world, that they may have my joy fulfilled in themselves.", "I have given them your word, and the world has hated them because they are not of the world, just as I am not of the world.", "I do not ask that you take them out of the world, but that you keep them from the evil one.", "They are not of the world, just as I am not of the world.", "Sanctify them in the truth; your word is truth.", "As you sent me into the world, so I have sent them into the world.", "And for their sake I consecrate myself, that they also may be sanctified in truth.", "“I do not ask for these only, but also for those who will believe in me through their word,", "that they may all be one, just as you, Father, are in me, and I in you, that they also may be in us, so that the world may believe that you have sent me.", "The glory that you have given me I have given to them, that they may be one even as we are one,", "I in them and you in me, that they may become perfectly one, so that the world may know that you sent me and loved them even as you loved me.", "Father, I desire that they also, whom you have given me, may be with me where I am, to see my glory that you have given me because you loved me before the foundation of the world.", "O righteous Father, even though the world does not know you, I know you, and these know that you have sent me.", "I made known to them your name, and I will continue to make it known, that the love with which you have loved me may be in them, and I in them.”"], "KJV": ["These words spake Jesus, and lifted up his eyes to heaven, and said, Father, the hour is come; glorify thy Son, that thy Son also may glorify thee:", "As thou hast given him power over all flesh, that he should give eternal life to as many as thou hast given him.", "And this is life eternal, that they might know thee the only true God, and Jesus Christ, whom thou hast sent.", "I have glorified thee on the earth: I have finished the work which thou gavest me to do.", "And now, O Father, glorify thou me with thine own self with the glory which I had with thee before the world was.", "I have manifested thy name unto the men which thou gavest me out of the world: thine they were, and thou gavest them me; and they have kept thy word.", "Now they have known that all things whatsoever thou hast given me are of thee.", "For I have given unto them the words which thou gavest me; and they have received them, and have known surely that I came out from thee, and they have believed that thou didst send me.", "I pray for them: I pray not for the world, but for them which thou hast given me; for they are thine.", "And all mine are thine, and thine are mine; and I am glorified in them.", "And now I am no more in the world, but these are in the world, and I come to thee. Holy Father, keep through thine own name those whom thou hast given me, that they may be one, as we are.", "While I was with them in the world, I kept them in thy name: those that thou gavest me I have kept, and none of them is lost, but the son of perdition; that the scripture might be fulfilled.", "And now come I to thee; and these things I speak in the world, that they might have my joy fulfilled in themselves.", "I have given them thy word; and the world hath hated them, because they are not of the world, even as I am not of the world.", "I pray not that thou shouldest take them out of the world, but that thou shouldest keep them from the evil.", "They are not of the world, even as I am not of the world.", "Sanctify them through thy truth: thy word is truth.", "As thou hast sent me into the world, even so have I also sent them into the world.", "And for their sakes I sanctify myself, that they also might be sanctified through the truth.", "Neither pray I for these alone, but for them also which shall believe on me through their word;", "That they all may be one; as thou, Father, art in me, and I in thee, that they also may be one in us: that the world may believe that thou hast sent me.", "And the glory which thou gavest me I have given them; that they may be one, even as we are one:", "I in them, and thou in me, that they may be made perfect in one; and that the world may know that thou hast sent me, and hast loved them, as thou hast loved me.", "Father, I will that they also, whom thou hast given me, be with me where I am; that they may behold my glory, which thou hast given me: for thou lovedst me before the foundation of the world.", "O righteous Father, the world hath not known thee: but I have known thee, and these have known that thou hast sent me.", "And I have declared unto them thy name, and will declare it: that the love wherewith thou hast loved me may be in them, and I in them."], "ASV": ["These things spake Jesus; and lifting up his eyes to heaven, he said, Father, the hour is come; glorify thy Son, that the son may glorify thee:", "even as thou gavest him authority over all flesh, that to all whom thou hast given him, he should give eternal life.", "And this is life eternal, that they should know thee the only true God, and him whom thou didst send, [even] Jesus Christ.", "I glorified thee on the earth, having accomplished the work which thou hast given me to do.", "And now, Father, glorify thou me with thine own self with the glory which I had with thee before the world was.", "I manifested thy name unto the men whom thou gavest me out of the world: thine they were, and thou gavest them to me; and they have kept thy word.", "Now they know that all things whatsoever thou hast given me are from thee:", "for the words which thou gavest me I have given unto them; and they received [them], and knew of a truth that I came forth from thee, and they believed that thou didst send me.", "I pray for them: I pray not for the world, but for those whom thou hast given me; for they are thine:", "and all things that are mine are thine, and thine are mine: and I am glorified in them.", "And I am no more in the world, and these are in the world, and I come to thee. Holy Father, keep them in thy name which thou hast given me, that they may be one, even as we [are].", "While I was with them, I kept them in thy name which thou hast given me: and I guarded them, and not one of them perished, but the son of perdition; that the scripture might be fulfilled.", "But now I come to thee; and these things I speak in the world, that they may have my joy made full in themselves.", "I have given them thy word; and the world hated them, because they are not of the world, even as I am not of the world.", "I pray not that thou shouldest take them from the world, but that thou shouldest keep them from the evil [one].", "They are not of the world even as I am not of the world.", "Sanctify them in the truth: thy word is truth.", "As thou didst send me into the world, even so sent I them into the world.", "And for their sakes I sanctify myself, that they themselves also may be sanctified in truth.", "Neither for these only do I pray, but for them also that believe on me through their word;", "that they may all be one; even as thou, Father, [art] in me, and I in thee, that they also may be in us: that the world may believe that thou didst send me.", "And the glory which thou hast given me I have given unto them; that they may be one, even as we [are] one;", "I in them, and thou in me, that they may be perfected into one; that the world may know that thou didst send me, and lovedst them, even as thou lovedst me.", "Father, I desire that they also whom thou hast given me be with me where I am, that they may behold my glory, which thou hast given me: for thou lovedst me before the foundation of the world.", "O righteous Father, the world knew thee not, but I knew thee; and these knew that thou didst send me;", "and I made known unto them thy name, and will make it known; that the love wherewith thou lovedst me may be in them, and I in them."], "NET": ["When Jesus had finished saying these things, he looked upward to heaven and said, “Father, the time has come. Glorify your Son, so that your Son may glorify you—", "just as you have given him authority over all humanity, so that he may give eternal life to everyone you have given him.", "Now this is eternal life—that they know you, the only true God, and Jesus Christ, whom you sent.", "I glorified you on earth by completing the work you gave me to do.", "And now, Father, glorify me at your side with the glory I had with you before the world was created.", "“I have revealed your name to the men you gave me out of the world. They belonged to you, and you gave them to me, and they have obeyed your word.", "Now they understand that everything you have given me comes from you,", "because I have given them the words you have given me. They accepted them and really understand that I came from you, and they believed that you sent me.", "I am praying on behalf of them. I am not praying on behalf of the world, but on behalf of those you have given me because they belong to you.", "Everything I have belongs to you, and everything you have belongs to me, and I have been glorified by them.", "I am no longer in the world, but they are in the world, and I am coming to you. Holy Father, keep them safe in your name that you have given me, so that they may be one just as we are one.", "When I was with them I kept them safe and watched over them in your name that you have given me. Not one of them was lost except the one destined for destruction, so that the scripture could be fulfilled.", "But now I am coming to you, and I am saying these things in the world, so they may experience my joy completed in themselves.", "I have given them your word, and the world has hated them because they do not belong to the world, just as I do not belong to the world.", "I am not asking you to take them out of the world, but that you keep them safe from the evil one.", "They do not belong to the world just as I do not belong to the world.", "Set them apart in the truth; your word is truth.", "Just as you sent me into the world, so I sent them into the world.", "And I set myself apart on their behalf, so that they too may be truly set apart.", "“I am not praying only on their behalf, but also on behalf of those who believe in me through their testimony,", "that they will all be one, just as you, Father, are in me and I am in you. I pray that they will be in us, so that the world will believe that you sent me.", "The glory you gave to me I have given to them, that they may be one just as we are one—", "I in them and you in me—that they may be completely one, so that the world will know that you sent me, and you have loved them just as you have loved me.", "“Father, I want those you have given me to be with me where I am, so that they can see my glory that you gave me because you loved me before the creation of the world.", "Righteous Father, even if the world does not know you, I know you, and these men know that you sent me.", "I made known your name to them, and I will continue to make it known, so that the love you have loved me with may be in them, and I may be in them.”"], "WEB": ["Jesus said these things, and lifting up his eyes to heaven, he said, “Father, the time has come. Glorify your Son, that your Son may also glorify you;", "even as you gave him authority over all flesh, so he will give eternal life to all whom you have given him.", "This is eternal life, that they should know you, the only true God, and him whom you sent, Jesus Christ.", "I glorified you on the earth. I have accomplished the work which you have given me to do.", "Now, Father, glorify me with your own self with the glory which I had with you before the world existed.", "I revealed your name to the people whom you have given me out of the world. They were yours, and you have given them to me. They have kept your word.", "Now they have known that all things whatever you have given me are from you,", "for the words which you have given me I have given to them, and they received them, and knew for sure that I came from you, and they have believed that you sent me.", "I pray for them. I don’t pray for the world, but for those whom you have given me, for they are yours.", "All things that are mine are yours, and yours are mine, and I am glorified in them.", "I am no more in the world, but these are in the world, and I am coming to you. Holy Father, keep them through your name which you have given me, that they may be one, even as we are.", "While I was with them in the world, I kept them in your name. Those whom you have given me I have kept. None of them is lost, except the son of destruction, that the Scripture might be fulfilled.", "But now I come to you, and I say these things in the world, that they may have my joy made full in themselves.", "I have given them your word. The world hated them, because they are not of the world, even as I am not of the world.", "I pray not that you would take them from the world, but that you would keep them from the evil one.", "They are not of the world even as I am not of the world.", "Sanctify them in your truth. Your word is truth.", "As you sent me into the world, even so I have sent them into the world.", "For their sakes I sanctify myself, that they themselves also may be sanctified in truth.", "Not for these only do I pray, but for those also who will believe in me through their word,", "that they may all be one; even as you, Father, are in me, and I in you, that they also may be one in us; that the world may believe that you sent me.", "The glory which you have given me, I have given to them; that they may be one, even as we are one;", "I in them, and you in me, that they may be perfected into one; that the world may know that you sent me, and loved them, even as you loved me.", "Father, I desire that they also whom you have given me be with me where I am, that they may see my glory, which you have given me, for you loved me before the foundation of the world.", "Righteous Father, the world hasn’t known you, but I knew you; and these knew that you sent me.", "I made known to them your name, and will make it known; that the love with which you loved me may be in them, and I in them.”"]}, "studyNotes": "John - Chapter 17\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus prays His High Priestly Prayer — for His own glorification, for His disciples' sanctification and protection, and for all future believers' unity — \"that they may be one, even as we are one.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 17 is Jesus' High Priestly Prayer — the longest\nrecorded prayer of Jesus in Scripture, prayed on the night of His arrest. It\nis sometimes called the \"Lord's Prayer\" in the truest sense — the prayer Jesus\nHimself prayed, as opposed to the model prayer He gave His disciples (Matthew 6).\n\nStructure: The prayer has three movements:\n  (1) Jesus prays for Himself — for glorification (vv.1-5)\n  (2) Jesus prays for His disciples — for protection, joy, and sanctification (vv.6-19)\n  (3) Jesus prays for all future believers — for unity (vv.20-26)\n\nThis means Jesus prayed for you personally in this prayer (v.20). He prayed\nfor your unity with other believers, your protection from evil, and that you\nwould be with Him in glory.\n\nTheological Significance: This chapter reveals the inner life of the Trinity —\nthe love between Father and Son before creation (v.24), the shared glory (v.5),\nand the mission of the Son to make the Father known (v.26).\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- En route to Gethsemane: Jesus prayed this High Priestly Prayer on the night of His arrest — possibly while walking toward the Mount of Olives or already in the garden.\n- \"The world\" and \"out of the world\" (vv.11,15): Jesus speaks of the world as the environment of the disciples' mission — they are sent INTO it but kept FROM its evil.\n\nKEY VERSES\n------------------------------------\nv.3  — \"And this is eternal life, that they know you, the only true God, and\n        Jesus Christ whom you have sent.\" (ESV) — Eternal life defined not as\n        a destination but as a relationship — knowing God.\n\nv.15 — \"I do not ask that you take them out of the world, but that you keep\n        them from the evil one.\" (ESV) — In the world but not of it.\n\nv.17 — \"Sanctify them in the truth; your word is truth.\" (ESV) — The instrument\n        of sanctification — God's Word.\n\nv.20-21 — \"I do not ask for these only, but also for those who will believe in\n        me through their word, that they may all be one.\" (ESV) — Jesus\n        prayed for you specifically.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Hebrews 5:7 — Jesus offered prayers with loud cries and tears.\nv.3   — Jeremiah 9:23-24 — \"Let him who boasts boast about this: that he\n        understands and knows me.\"\nv.3   — Philippians 3:10 — \"I want to know Christ.\"\nv.5   — John 1:1-2 — The Word was with God in the beginning.\nv.11  — 1 Peter 1:5 — Believers shielded by God's power.\nv.15  — 1 John 5:18-19 — The evil one cannot touch those born of God.\nv.17  — Psalm 119:160 — \"All your words are true.\"\nv.17  — 2 Timothy 3:16-17 — Scripture for training in righteousness.\nv.21  — Ephesians 4:3-6 — The unity of the Spirit.\nv.24  — John 1:14 — \"We beheld his glory.\"\nv.26  — Romans 5:5 — \"God's love has been poured out into our hearts through\n        the Holy Spirit.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-17/\n  Guzik examines the three sections of the prayer, the meaning of eternal\n  life as knowing God (v.3), the nature of sanctification through truth,\n  and the unity Jesus prays for in vv.20-23.\n\nCharles Spurgeon:\n  Sermon: \"The High Priestly Prayer\" on v.20 (MTP Vol. 56, No. 3213)\n  \"He prayed for them also which shall believe on Me through their word.\n  That means you. Before you were born, before you believed, before you\n  even heard the Gospel — Jesus prayed for you by name. You were on His\n  heart in the upper room.\"\n  Sermon: \"Sanctification by the Truth\" on v.17 (MTP Vol. 27, No. 1584)\n  \"Sanctify them through thy truth. Not through experience alone, not\n  through suffering alone, not through service alone — through truth.\n  The Word of God is the primary instrument of making us holy.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.2  — KJV: \"thou hast given him power over all flesh\" / ESV: \"you have given him authority over all flesh\" — Greek \"exousian\" — KJV uses \"power\"; ESV uses \"authority.\" \"Authority\" is more precise — it refers to delegated right to act, not merely raw power.\n\nv.3  — KJV: \"that they might know thee the only true God\" / ESV: \"that they know you, the only true God\" — Greek \"ginōskō\" — Both equivalent. Experiential, relational knowledge, not merely intellectual knowledge. The same word used for intimate knowledge between husband and wife. Eternal life is knowing God personally, not knowing about Him.\n  [ASV/NET/WEB]: NET: \"Now this is eternal life — that they know you, the\n       only true God, and Jesus Christ, whom you sent\" — eternal\n       life DEFINED as knowing God — relational, not merely\n       durational. WEB: \"This is eternal life, that they should\n       know you.\" KJV: \"this is life eternal, that they might\n       know thee.\" Knowledge here is intimate, covenantal knowing.\n\nv.5  — NET: \"glorify me at your side with the glory I had with\n       you before the world was created\" — \"before the world was\n       created\" — pre-existence claim. WEB: \"with the glory which\n       I had with you before the world existed.\" KJV: \"before the\n       world was.\" Jesus prays to resume eternal glory temporarily\n       veiled in incarnation.\n\nv.11 — KJV: \"keep through thine own name those whom thou hast given me\" / ESV: \"keep them in your name, which you have given me\" — Both equivalent. The Father's name is the sphere of protection. To be kept \"in His name\" means to be kept within the reality of who God is.\n  [ASV/NET/WEB]: NET: \"Holy Father, keep them safe in your name\" — \"keep\n       them safe\" (tērēson autous) — preservation/guarding. WEB:\n       \"keep them in your name.\" KJV: \"keep through thine own name\n       those whom thou hast given me.\" Protection through the\n       power of God's name/character.\n\nv.12 — KJV: \"the son of perdition\" / ESV: \"the son of destruction\" — Greek \"apōleias\" — KJV uses \"perdition\" (archaic); ESV uses \"destruction.\" Both refer to Judas Iscariot — the only one of the twelve who was lost.\n\nv.15 — KJV: \"keep them from the evil\" / ESV: \"keep them from the evil one\" — Greek \"tou ponērou\" — Can be translated \"evil\" (abstract) or \"the evil one\" (Satan). ESV specifies Satan; KJV leaves it ambiguous. Both are theologically valid.\n\nv.17 — KJV: \"Sanctify them through thy truth: thy word is truth\" / ESV: \"Sanctify them in the truth; your word is truth\" — Greek \"en tē alētheia\" — KJV uses \"through\"; ESV uses \"in.\" Both convey that the Word of God is the instrument of sanctification.\n  [ASV/NET/WEB]: NET: \"Set them apart in the truth; your word is truth\" —\n       \"set apart\" (hagiason = sanctify/consecrate). WEB: \"Sanctify\n       them in your truth.\" KJV: \"Sanctify them through thy truth.\"\n       Truth is the instrument of sanctification — God's word\n       separates and consecrates.\n\nv.21 — KJV: \"that they all may be one; as thou, Father, art in me, and I in thee\" / ESV: \"that they may all be one, just as you, Father, are in me, and I in you\" — Both equivalent. The unity Jesus prays for is modeled on the unity of the Trinity — not organizational uniformity but deep relational oneness rooted in shared life and love.\n  [ASV/NET/WEB]: NET: \"that they will all be one, just as you, Father, are\n       in me and I am in you\" — the unity Jesus prays for is\n       modeled on Trinitarian unity. WEB: \"that they may all be\n       one.\" KJV: \"That they all may be one.\" Not organizational\n       uniformity but organic, relational oneness.\n\nv.24 — KJV: \"that they may behold my glory\" / ESV: \"to see my glory that you have given me\" — Greek \"theōrōsin\" — Both equivalent. Jesus' ultimate desire for His people is that they see Him in His full glory — the glory He shared with the Father before creation.\n\n\nGLOSSARY\n------------------------------------\nSanctify      — To set apart, make holy, consecrate. In v.17, it refers to\n               the ongoing process of being made more like Christ through\n               the truth of God's Word.\n\nGlorify       — To display the full weight and worth of someone. Jesus asks\n               the Father to glorify Him so that He can glorify the Father —\n               the cross and resurrection as the ultimate display of God's glory.\n\nEternal life  — Defined in v.3 not as endless existence but as knowing God —\n               a present, ongoing, relational experience that begins now and\n               continues forever.\n\nSon of perdition — Judas Iscariot. \"Perdition\" means destruction or ruin.\n               The only one of the twelve who was lost — fulfilling Scripture\n               (Psalm 41:9).\n\nManifest      — To make known, reveal, display. Jesus manifested the Father's\n               name — made God's character and nature visible through His life.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. \"This is life eternal, that they might know thee\" (v.3). Eternal life is\n   not primarily about going to heaven — it is about knowing God. How would\n   you describe your knowledge of God right now? Is it growing? Is it personal\n   and relational, or mostly intellectual?\n\n2. Jesus prayed for you in this prayer (v.20). Before you were born, He\n   interceded for you. He is still interceding for you now (Hebrews 7:25).\n   How does knowing that Jesus is actively praying for you right now change\n   how you face your current struggles?\n\n3. \"I pray not that thou shouldest take them out of the world, but that thou\n   shouldest keep them from the evil\" (v.15). God's plan is not to remove\n   you from difficulty but to protect you in it. Where are you asking God\n   to remove you from a situation when He may be calling you to be kept\n   in it for His purposes?\n\n4. \"Sanctify them through thy truth: thy word is truth\" (v.17). The primary\n   instrument of your growth in holiness is the Word of God. How much time\n   are you spending in Scripture? Is it changing you — your thinking, your\n   desires, your behavior?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus said \"I have finished the work which thou gavest me to do\" (v.4) —\n   before the cross. He lived with such clarity of purpose that He could say\n   His work was done. What is the work God has given you to do? Are you doing\n   it, or are you distracted by things that aren't your assignment?\n\n2. Jesus prayed that His joy would be fulfilled in His disciples (v.13). His\n   joy — not a manufactured happiness but the deep joy of living in the Father's\n   will. Is that the kind of joy you're experiencing? What is the difference\n   between Christ's joy and the happiness the world offers?\n\n3. Jesus prayed for the unity of all believers (vv.20-23) — and said that\n   unity is the evidence to the world that God sent Him. How does division\n   among Christians damage the witness of the Gospel? What is your role in\n   pursuing unity with other believers, even those you disagree with?\n\n4. \"The love wherewith thou hast loved me may be in them\" (v.26). The Father's\n   love for the Son — the eternal, infinite love within the Trinity — is the\n   same love He has for you. Does that feel real to you? What would it look\n   like to live from that love rather than constantly seeking love and approval\n   from other sources?\n\n5. Jesus prayed \"that they may behold my glory\" (v.24) — His ultimate desire\n   for His people is that they see Him in His full glory. What does it mean\n   to you that the goal of your entire life is to see and know Jesus more\n   fully — and that this will be completed in eternity?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 17:1-10 - Prepared by Prayer:\n    https://enduringword.com/media/john-17-prepared-prayer/\n  John 17:11-19 - Prepared for Preservation:\n    https://enduringword.com/media/john-17-prepared-preservation/\n  John 17:20-26 - Prepared to Proclaim:\n    https://enduringword.com/media/john-17-prepared-proclaim/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "18": {"translations": {"ESV": ["When Jesus had spoken these words, he went out with his disciples across the brook Kidron, where there was a garden, which he and his disciples entered.", "Now Judas, who betrayed him, also knew the place, for Jesus often met there with his disciples.", "So Judas, having procured a band of soldiers and some officers from the chief priests and the Pharisees, went there with lanterns and torches and weapons.", "Then Jesus, knowing all that would happen to him, came forward and said to them, “Whom do you seek?”", "They answered him, “Jesus of Nazareth.” Jesus said to them, “I am he.” ad said these things, one of the officers standing by struck Jesus with his hand, saying, “Is that how you answer the high priest?”", "Jesus answered him, “If what I said is wrong, bear witness about the wrong; but if what I said is right, why do you strike me?”", "Annas then sent him bound to Caiaphas the high priest.", "Now Simon Peter was standing and warming himself. So they said to him, “You also are not one of his disciples, are you?” He denied it and said, “I am not.”", "One of the servants of the high priest, a relative of the man whose ear Peter had cut off, asked, “Did I not see you in the garden with him?”", "Peter again denied it, and at once a rooster crowed.", "Then they led Jesus from the house of Caiaphas to the governor’s headquarters. It was early morning. They themselves did not enter the governor’s headquarters, so that they would not be defiled, but could eat the Passover.", "So Pilate went outside to them and said, “What accusation do you bring against this man?”", "They answered him, “If this man were not doing evil, we would not have delivered him over to you.”", "Pilate said to them, “Take him yourselves and judge him by your own law.” The Jews said to him, “It is not lawful for us to put anyone to death.”", "This was to fulfill the word that Jesus had spoken to show by what kind of death he was going to die.", "So Pilate entered his headquarters again and called Jesus and said to him, “Are you the King of the Jews?”", "Jesus answered, “Do you say this of your own accord, or did others say it to you about me?”", "Pilate answered, “Am I a Jew? Your own nation and the chief priests have delivered you over to me. What have you done?”", "Jesus answered, “My kingdom is not of this world. If my kingdom were of this world, my servants would have been fighting, that I might not be delivered over to the Jews. But my kingdom is not from the world.”", "Then Pilate said to him, “So you are a king?” Jesus answered, “You say that I am a king. For this purpose I was born and for this purpose I have come into the world—to bear witness to the truth. Everyone who is of the truth listens to my voice.”", "Pilate said to him, “What is truth?” After he had said this, he went back outside to the Jews and told them, “I find no guilt in him.", "But you have a custom that I should release one man for you at the Passover. So do you want me to release to you the King of the Jews?”", "They cried out again, “Not this man, but Barabbas!” Now Barabbas was a robber."], "KJV": ["When Jesus had spoken these words, he went forth with his disciples over the brook Cedron, where was a garden, into the which he entered, and his disciples.", "And Judas also, which betrayed him, knew the place: for Jesus ofttimes resorted thither with his disciples.", "Judas then, having received a band of men and officers from the chief priests and Pharisees, cometh thither with lanterns and torches and weapons.", "Jesus therefore, knowing all things that should come upon him, went forth, and said unto them, Whom seek ye?", "They answered him, Jesus of Nazareth. Jesus saith unto them, I amhe. And Judas also, which betrayed him, stood with them.", "As soon then as he had said unto them, I am he, they went backward, and fell to the ground.", "Then asked he them again, Whom seek ye? And they said, Jesus of Nazareth.", "Jesus answered, I have told you that I am he: if therefore ye seek me, let these go their way:", "That the saying might be fulfilled, which he spake, Of them which thou gavest me have I lost none.", "Then Simon Peter having a sword drew it, and smote the high priest’s servant, and cut off his right ear. The servant’s name was Malchus.", "Then said Jesus unto Peter, Put up thy sword into the sheath: the cup which my Father hath given me, shall I not drink it?", "Then the band and the captain and officers of the Jews took Jesus, and bound him,", "And led him away to Annas first; for he was father in law to Caiaphas, which was the high priest that sa
