y Father, and your Father; and to my God, and your God.", "Mary Magdalene came and told the disciples that she had seen the Lord, and that he had spoken these things unto her.", "Then the same day at evening, being the first day of the week, when the doors were shut where the disciples were assembled for fear of the Jews, came Jesus and stood in the midst, and saith unto them, Peace be unto you.", "And when he had so said, he shewed unto them his hands and his side. Then were the disciples glad, when they saw the Lord.", "Then said Jesus to them again, Peace be unto you: as my Father hath sent me, even so send I you.", "And when he had said this, he breathed on them, and saith unto them, Receive ye the Holy Ghost:", "Whose soever sins ye remit, they are remitted unto them; and whose soever sins ye retain, they are retained.", "But Thomas, one of the twelve, called Didymus, was not with them when Jesus came.", "The other disciples therefore said unto him, We have seen the Lord. But he said unto them, Except I shall see in his hands the print of the nails, and put my finger into the print of the nails, and thrust my hand into his side, I will not believe.", "And after eight days again his disciples were within, and Thomas with them: then came Jesus, the doors being shut, and stood in the midst, and said, Peace be unto you.", "Then saith he to Thomas, reach hither thy finger, and behold my hands; and reach hither thy hand, and thrust it into my side: and be not faithless, but believing.", "And Thomas answered and said unto him, My Lord and my God.", "Jesus saith unto him, Thomas, because thou hast seen me, thou hast believed: blessed are they that have not seen, and yet have believed.", "And many other signs truly did Jesus in the presence of his disciples, which are not written in this book:", "But these are written, that ye might believe that Jesus is the Christ, the Son of God; and that believing ye might have life through his name."], "ASV": ["Now on the first [day] of the week cometh Mary Magdalene early, while it was yet dark, unto the tomb, and seeth the stone taken away from the tomb.", "She runneth therefore, and cometh to Simon Peter, and to the other disciple whom Jesus loved, and saith unto them, They have taken away the Lord out of the tomb, and we know not where they have laid him.", "Peter therefore went forth, and the other disciple, and they went toward the tomb.", "And they ran both together: and the other disciple outran Peter, and came first to the tomb;", "and stooping and looking in, he seeth the linen cloths lying; yet entered he not in.", "Simon Peter therefore also cometh, following him, and entered into the tomb; and he beholdeth the linen cloths lying,", "and the napkin, that was upon his head, not lying with the linen cloths, but rolled up in a place by itself.", "Then entered in therefore the other disciple also, who came first to the tomb, and he saw, and believed.", "For as yet they knew not the scripture, that he must rise from the dead.", "So the disciples went away again unto their own home.", "But Mary was standing without at the tomb weeping: so, as she wept, she stooped and looked into the tomb;", "and she beholdeth two angels in white sitting, one at the head, and one at the feet, where the body of Jesus had lain.", "And they say unto her, Woman, why weepest thou? She saith unto them, Because they have taken away my Lord, and I know not where they have laid him.", "When she had thus said, she turned herself back, and beholdeth Jesus standing, and knew not that it was Jesus.", "Jesus saith unto her, Woman, why weepest thou? whom seekest thou? She, supposing him to be the gardener, saith unto him, Sir, if thou hast borne him hence, tell me where thou hast laid him, and I will take him away.", "Jesus saith unto her, Mary. She turneth herself, and saith unto him in Hebrew, Rabboni; which is to say, Teacher.", "Jesus saith to her, Touch me not; for I am not yet ascended unto the Father: but go unto my brethren, and say to them, I ascend unto my Father and your Father, and my God and your God.", "Mary Magdalene cometh and telleth the disciples, I have seen the Lord; and [that] he had said these things unto her.", "When therefore it was evening, on that day, the first [day] of the week, and when the doors were shut where the disciples were, for fear of the Jews, Jesus came and stood in the midst, and saith unto them, Peace [be] unto you.", "And when he had said this, he showed unto them his hands and his side. The disciples therefore were glad, when they saw the Lord.", "Jesus therefore said to them again, Peace [be] unto you: as the Father hath sent me, even so send I you.", "And when he had said this, he breathed on them, and saith unto them, Receive ye the Holy Spirit:", "whose soever sins ye forgive, they are forgiven unto them; whose soever [sins] ye retain, they are retained.", "But Thomas, one of the twelve, called Didymus, was not with them when Jesus came.", "The other disciples therefore said unto him, We have seen the Lord. But he said unto them, Except I shall see in his hands the print of the nails, and put my hand into his side, I will not believe.", "And after eight days again his disciples were within, and Thomas with them. Jesus cometh, the doors being shut, and stood in the midst, and said, Peace [be] unto you.", "Then saith he to Thomas, Reach hither thy finger, and see my hands; and reach [hither] thy hand, and put it into my side: and be not faithless, but believing.", "Thomas answered and said unto him, My Lord and my God.", "Jesus saith unto him, Because thou hast seen me, thou hast believed: blessed [are] they that have not seen, and [yet] have believed.", "Many other signs therefore did Jesus in the presence of the disciples, which are not written in this book:", "but these are written, that ye may believe that Jesus is the Christ, the Son of God; and that believing ye may have life in his name."], "NET": ["Now very early on the first arly, while it was still dark, to the tomb, and saw the stone taken away from the tomb.", "Therefore she ran and came to Simon Peter, and to the other disciple whom Jesus loved, and said to them, “They have taken away the Lord out of the tomb, and we don’t know where they have laid him!”", "Therefore Peter and the other disciple went out, and they went toward the tomb.", "They both ran together. The other disciple outran Peter, and came to the tomb first.", "Stooping and looking in, he saw the linen cloths lying, yet he didn’t enter in.", "Then Simon Peter came, following him, and entered into the tomb. He saw the linen cloths lying,", "and the cloth that had been on his head, not lying with the linen cloths, but rolled up in a place by itself.", "So then the other disciple who came first to the tomb also entered in, and he saw and believed.", "For as yet they didn’t know the Scripture, that he must rise from the dead.", "So the disciples went away again to their own homes.", "But Mary was standing outside at the tomb weeping. So, as she wept, she stooped and looked into the tomb,", "and she saw two angels in white sitting, one at the head, and one at the feet, where the body of Jesus had lain.", "They told her, “Woman, why are you weeping?” She said to them, “Because they have taken away my Lord, and I don’t know where they have laid him.”", "When she had said this, she turned around and saw Jesus standing, and didn’t know that it was Jesus.", "Jesus said to her, “Woman, why are you weeping? Who are you looking for?” She, supposing him to be the gardener, said to him, “Sir, if you have carried him away, tell me where you have laid him, and I will take him away.”", "Jesus said to her, “Mary.” She turned and said to him, “Rabboni!” which is to say, “Teacher!”", "Jesus said to her, “Don’t hold me, for I haven’t yet ascended to my Father; but go to my brothers, and tell them, ‘I am ascending to my Father and your Father, to my God and your God.’”", "Mary Magdalene came and told the disciples that she had seen the Lord, and that he had said these things to her.", "When therefore it was evening, on that day, the first day of the week, and when the doors were locked where the disciples were assembled, for fear of the Jews, Jesus came and stood in the middle, and said to them, “Peace be to you.”", "When he had said this, he showed them his hands and his side. The disciples therefore were glad when they saw the Lord.", "Jesus therefore said to them again, “Peace be to you. As the Father has sent me, even so I send you.”", "When he had said this, he breathed on them, and said to them, “Receive the Holy Spirit!", "If you forgive anyone’s sins, they have been forgiven them. If you retain anyone’s sins, they have been retained.”", "But Thomas, one of the twelve, called Didymus, wasn’t with them when Jesus came.", "The other disciples therefore said to him, “We have seen the Lord!” But he said to them, “Unless I see in his hands the print of the nails, put my finger into the print of the nails, and put my hand into his side, I will not believe.”", "After eight days again his disciples were inside, and Thomas was with them. Jesus came, the doors being locked, and stood in the middle, and said, “Peace be to you.”", "Then he said to Thomas, “Reach here your finger, and see my hands. Reach here your hand, and put it into my side. Don’t be unbelieving, but believing.”", "Thomas answered him, “My Lord and my God!”", "Jesus said to him, “Because you have seen me, you have believed. Blessed are those who have not seen, and have believed.”", "Therefore Jesus did many other signs in the presence of his disciples, which are not written in this book;", "but these are written, that you may believe that Jesus is the Christ, the Son of God, and that believing you may have life in his name."]}, "studyNotes": "John - Chapter 20\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nMary Magdalene finds the empty tomb, the risen Jesus appears to her (\"Mary!\"), then to the disciples (breathing the Holy Spirit on them), and finally to doubting Thomas who confesses \"My Lord and my God!\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John — an eyewitness to the empty tomb (v.3-8).\n\nHistorical Context: Chapter 20 records the resurrection of Jesus — the central\nevent of the Christian faith. Without the resurrection, Paul writes, \"your faith\nis futile; you are still in your sins\" (1 Corinthians 15:17). John records four\nresurrection appearances: to Mary Magdalene (vv.11-18), to the ten disciples\n(vv.19-23), to Thomas (vv.24-29), and the purpose statement of the Gospel (vv.30-31).\n\nThe Empty Tomb: John notes specific details that argue for the historicity of\nthe resurrection: the linen cloths lying in place (v.6) and the face cloth\n\"wrapped together in a place by itself\" (v.7). A body that had been stolen would\nnot have been unwrapped; grave robbers would not have neatly folded the burial\ncloths. The arrangement of the cloths was evidence of resurrection, not theft.\n\nThomas: Often called \"Doubting Thomas,\" but more accurately \"Honest Thomas.\"\nHe stated his condition for belief plainly. Jesus met him exactly where he was —\nnot with rebuke but with evidence. His confession \"My Lord and my God\" (v.28)\nis the highest declaration of Christ's deity in the Gospel.\n\nPurpose Statement (vv.30-31): John explicitly states why he wrote his Gospel —\n\"that ye might believe that Jesus is the Christ, the Son of God; and that\nbelieving ye might have life through his name.\" Everything in John's Gospel\nserves this purpose.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The tomb near Golgotha (v.1): Mary Magdalene came to the tomb \"while it was yet dark\" on the first day of the week. The tomb was in a garden near Golgotha.\n- The room where the disciples gathered (v.19): A room in Jerusalem where the disciples locked themselves in for fear of the Jews. Jesus appeared to them here.\n\nKEY VERSES\n------------------------------------\nv.17 — \"I am ascending to my Father and your Father, to my God and your\n        God.\" (ESV) — The resurrection changes the relationship — God is now\n        \"our Father\" through Christ.\n\nv.21 — \"As the Father has sent me, even so I am sending you.\" (ESV) — The\n        mission of the church flows directly from the mission of the Son.\n\nv.28 — \"My Lord and my God!\" (ESV) — Thomas' confession — the climax of\n        John's Gospel, the highest declaration of Christ's deity.\n\nv.29 — \"Blessed are those who have not seen and yet have believed.\" (ESV) — A\n        beatitude for every believer who has come to faith without physical\n        sight — including you.\n\nv.31 — \"These are written so that you may believe that Jesus is the Christ,\n        the Son of God, and that by believing you may have life in his\n        name.\" (ESV) — The stated purpose of John's Gospel.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Matthew 28:1-10 — The parallel resurrection account.\nv.7   — John 11:44 — Lazarus came out still bound; Jesus' cloths were left\n        behind — He passed through them in resurrection power.\nv.17  — Romans 8:15-17 — Adoption as sons — God as our Father.\nv.19  — Luke 24:36-43 — Jesus appearing to the disciples.\nv.21  — Matthew 28:18-20 — The Great Commission.\nv.22  — Genesis 2:7 — God breathing life into Adam — a new creation moment.\nv.23  — Matthew 16:19 — The keys of the kingdom.\nv.28  — John 1:1 — \"The Word was God\" — Thomas confirms what John declared\n        at the beginning.\nv.29  — Hebrews 11:1 — \"Now faith is the assurance of things hoped for, the\n        conviction of things not seen.\"\nv.31  — 1 John 5:13 — \"I write these things so that you may know that you\n        have eternal life.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-20/\n  Guzik examines the evidence of the empty tomb, Mary's encounter with the\n  risen Jesus, the significance of \"Do not cling to me\" (v.17), Thomas'\n  doubt and confession, and the purpose statement of the Gospel.\n\nCharles Spurgeon:\n  Sermon: \"Mary Magdalene's Tears\" on vv.11-16 (MTP Vol. 9, No. 503)\n  \"She stood weeping — and Jesus was standing right behind her. How often\n  we weep in the presence of the risen Christ without knowing He is there.\n  He called her by name — Mary. One word, and everything changed. He knows\n  your name too.\"\n  Sermon: \"Doubting Becomes Believing\" on vv.24-29 (MTP Vol. 37, No. 2187)\n  \"Thomas said 'My Lord and my God' — the most complete confession of faith\n  in the New Testament. His doubt, honestly faced and honestly answered,\n  produced the deepest faith. God is not afraid of your honest questions.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — NET: \"Now very early on the first day of the week,\n       while it was still dark, Mary Magdalene came to the tomb\" —\n       \"while it was still dark\" — John's literal AND theological\n       detail. WEB: \"while it was still dark.\" KJV: \"when it was\n       yet dark.\" Darkness (physical and spiritual) about to be\n       shattered by resurrection.\n\nv.7  — KJV: \"the napkin, that was about his head, not lying with the linen clothes, but wrapped together in a place by itself\" / ESV: \"the face cloth, which had been on Jesus' head, not lying with the linen cloths but folded up in a place by itself\" — Greek \"soudarion\" — KJV uses \"napkin\" (archaic); ESV uses \"face cloth.\" The orderly arrangement was evidence of resurrection, not theft.\n\nv.16 — KJV: \"Rabboni; which is to say, Master\" / ESV: \"Rabboni! (which means Teacher)\" — Greek/Aramaic \"Rabbouni\" — KJV uses \"Master\"; ESV uses \"Teacher.\" \"Rabboni\" is a more personal, intimate form of \"Rabbi\" — Mary's word of recognition and devotion.\n  [ASV/NET/WEB]: NET: \"Jesus said to her, 'Mary.' She turned and said to\n       him in Aramaic, 'Rabboni'\" — recognition through His voice\n       speaking her name (cf. 10:3 — the sheep know the shepherd's\n       voice). WEB: \"Rabboni!\" KJV: \"Rabboni.\" One word from Him\n       changes everything.\n\nv.17 — KJV: \"Touch me not; for I am not yet ascended to my Father\" / ESV: \"Do not cling to me, for I have not yet ascended to the Father\" — Greek \"mē mou haptou\" — KJV's \"Touch me not\" is misleading; ESV's \"Do not cling to me\" is more accurate. The present imperative means \"stop clinging\" — Mary was embracing Jesus; He was redirecting her from clinging to His physical presence to trusting His ascension.\n  [ASV/NET/WEB]: NET: \"Do not touch me, for I have not yet ascended to my\n       Father\" — \"do not touch\" (mē mou haptou) — present\n       imperative: \"stop clinging to me.\" WEB: \"Don't hold me.\"\n       KJV: \"Touch me not.\" Not a prohibition of contact but of\n       clinging — the old relationship is being transformed.\n\nv.22 — KJV: \"he breathed on them, and saith unto them, Receive ye the Holy Ghost\" / ESV: \"he breathed on them and said to them, 'Receive the Holy Spirit'\" — Greek \"enephusēsen\" — Both equivalent. The same word used in Genesis 2:7 (LXX) when God breathed life into Adam — a new creation moment. This is a foretaste of Pentecost, not the full outpouring.\n  [ASV/NET/WEB]: NET: \"he breathed on them and said, 'Receive the Holy\n       Spirit'\" — \"breathed on\" (enephysēsen) — same verb as\n       Genesis 2:7 (God breathing life into Adam). WEB: \"he\n       breathed on them.\" A new creation moment. John's Pentecost\n       is intimate, not spectacular.\n\nv.23 — KJV: \"Whose soever sins ye remit, they are remitted unto them\" / ESV: \"If you forgive the sins of any, they are forgiven them\" — Both equivalent. This refers to the church's authority to declare forgiveness (through the Gospel) or withhold it (through church discipline), not a priestly power to personally absolve sins.\n\nv.28 — KJV: \"My Lord and my God\" / ESV: \"My Lord and my God!\" — Greek \"ho kurios mou kai ho theos mou\" — Both identical. The highest declaration of Christ's deity in the Gospel — Thomas uses the definite article with both \"Lord\" and \"God.\"\n  [ASV/NET/WEB]: NET: \"Thomas replied to him, 'My Lord and my God!'\" — the\n       highest Christological confession in the Gospels. WEB: \"My\n       Lord and my God!\" KJV: \"My Lord and my God.\" Jesus accepts\n       the worship without correction. Thomas moves from \"unless I\n       see\" to \"my God\" — doubt resolved into devotion.\n\nv.31 — KJV: \"that ye might believe that Jesus is the Christ, the Son of God\" / ESV: \"that you may believe that Jesus is the Christ, the Son of God\" — Both equivalent. The stated purpose of John's Gospel — everything serves this aim.\n\n\nGLOSSARY\n------------------------------------\nSepulchre     — The tomb where Jesus was buried. A rock-cut tomb sealed with\n               a large stone.\n\nLinen clothes — The burial wrappings. Their orderly arrangement in the empty\n               tomb was evidence of resurrection, not theft.\n\nNapkin        — The face cloth (Greek: soudarion). Found \"wrapped together in\n               a place by itself\" — a detail John specifically notes as\n               significant.\n\nRabboni       — Aramaic for \"my teacher\" or \"my master\" — a more personal,\n               intimate form of \"Rabbi.\" Mary's word of recognition and\n               devotion when she realized it was Jesus.\n\nDidymus       — Greek for \"twin.\" Thomas' Greek name. His Aramaic name\n               \"Thomas\" also means twin.\n\nBeatitude     — A declaration of blessing. \"Blessed are they that have not\n               seen, and yet have believed\" — a beatitude for all believers\n               who come to faith through the testimony of Scripture.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Mary was weeping at the empty tomb — and Jesus was standing right behind\n   her (v.14). She was looking for a dead Jesus in the wrong place. Are you\n   looking for Jesus in the wrong places — in past experiences, in religious\n   routine, in what He used to do? He is risen and present now.\n\n2. Jesus called Mary by name (v.16) and everything changed. He knows your\n   name. He knows your grief, your confusion, your searching. How does being\n   personally known by the risen Christ change how you bring your pain to Him?\n\n3. \"As my Father hath sent me, even so send I you\" (v.21). You are sent —\n   not just invited to attend church but sent into the world with a mission.\n   Where specifically has God sent you? Your workplace, your neighborhood,\n   your family — these are your mission field.\n\n4. Thomas' honest doubt led to the deepest confession of faith in the Gospel\n   (v.28). God is not threatened by your honest questions. What doubts or\n   questions are you carrying that you haven't brought honestly to Christ?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. John saw the burial cloths and \"believed\" (v.8) — even before he fully\n   understood the resurrection (v.9). What was it about the evidence that\n   produced faith in him? What evidence of the resurrection is most compelling\n   to you personally?\n\n2. Jesus appeared first to Mary Magdalene — a woman, a former demoniac, a\n   social outcast. Why do you think Jesus chose her as the first witness to\n   the resurrection? What does that tell you about who Jesus values and\n   chooses to use?\n\n3. The disciples were behind locked doors \"for fear of the Jews\" (v.19) when\n   Jesus appeared. Fear had paralyzed them. Then Jesus said \"Peace be unto\n   you\" and showed them His wounds. What is it about seeing the risen Christ\n   that transforms fear into peace? How do you access that peace when fear\n   grips you?\n\n4. Thomas said \"Unless I see... I will not believe\" (v.25). Jesus gave him\n   exactly what he asked for. Does God meet us in our specific doubts and\n   conditions? What does it mean that Jesus didn't rebuke Thomas but engaged\n   his doubt directly?\n\n5. \"Blessed are they that have not seen, and yet have believed\" (v.29). That\n   blessing is for you. You have not seen the risen Christ physically, yet\n   you believe. What is the basis of your faith? What evidence — historical,\n   personal, scriptural — grounds your belief in the resurrection?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 20:1-18 - Resurrection Glory:\n    https://enduringword.com/media/john-20-resurrection-glory/\n  John 20:19-31 - Glory Believed:\n    https://enduringword.com/media/john-20-glory-believed/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "21": {"translations": {"ESV": ["After this Jesus revealed himself again to the disciples by the Sea of Tiberias, and he revealed himself in this way.", "Simon Peter, Thomas (called the Twin), Nathanael of Cana in Galilee, the sons of Zebedee, and two others of his disciples were together.", "Simon Peter said to them, “I am going fishing.” They said to him, “We will go with you.” They went out and got into the boat, but that night they caught nothing.", "Just as day was breaking, Jesus stood on the shore; yet the disciples did not know that it was Jesus.", "Jesus said to them, “Children, do you have any fish?” They answered him, “No.”", "He said to them, “Cast the net on the right side of the boat, and you will find some.” So they cast it, and now they were not able to haul it in, because of the quantity of fish.", "That disciple whom Jesus loved therefore said to Peter, “It is the Lord!” When Simon Peter heard that it was the Lord, he put on his outer garment, for he was stripped for work, and threw himself into the sea.", "The other disciples came in the boat, dragging the net full of fish, for they were not far from the land, but about a hundred yards off.", "When they got out on land, they saw a charcoal fire in place, with fish laid out on it, and bread.", "Jesus said to them, “Bring some of the fish that you have just caught.”", "So Simon Peter went aboard and hauled the net ashore, full of large fish, 153 of them. And although there were so many, the net was not torn.", "Jesus said to them, “Come and have breakfast.” Now none of the disciples dared ask him, “Who are you?” They knew it was the Lord.", "Jesus came and took the bread and gave it to them, and so with the fish.", "This was now the third time that Jesus was revealed to the disciples after he was raised from the dead.", "When they had finished breakfast, Jesus said to Simon Peter, “Simon, son of John, do you love me more than these?” He said to him, “Yes, Lord; you know that I love you.” He said to him, “Feed my lambs.”", "He said to him a second time, “Simon, son of John, do you love me?” He said to him, “Yes, Lord; you know that I love you.” He said to him, “Tend my sheep.”", "He said to him the third time, “Simon, son of John, do you love me?” Peter was grieved because he said to him the third time, “Do you love me?” and he said to him, “Lord, you know everything; you know that I love you.” Jesus said to him, “Feed my sheep.", "Truly, truly, I say to you, when you were young, you used to dress yourself and walk wherever you wanted, but when you are old, you will stretch out your hands, and another will dress you and carry you where you do not want to go.”", "(This he said to show by what kind of death he was to glorify God.) And after saying this he said to him, “Follow me.”", "Peter turned and saw the disciple whom Jesus loved following them, the one who also had leaned back against him during the supper and had said, “Lord, who is it that is going to betray you?”", "When Peter saw him, he said to Jesus, “Lord, what about this man?”", "Jesus said to him, “If it is my will that he remain until I come, what is that to you? You follow me!”", "So the saying spread abroad among the brothers that this disciple was not to die; yet Jesus did not say to him that he was not to die, but, “If it is my will that he remain until I come, what is that to you?”", "This is the disciple who is bearing witness about these things, and who has written these things, and we know that his testimony is true.", "Now there are also many other things that Jesus did. Were every one of them to be written, I suppose that the world itself could not contain the books that would be written."], "KJV": ["After these things Jesus shewed himself again to the disciples at the sea of Tiberias; and on this wise shewed he himself.", "There were together Simon Peter, and Thomas called Didymus, and Nathanael of Cana in Galilee, and the sons of Zebedee, and two other of his disciples.", "Simon Peter saith unto them, I go a fishing. They say unto him, We also go with thee. They went forth, and entered into a ship immediately; and that night they caught nothing.", "But when the morning was now come, Jesus stood on the shore: but the disciples knew not that it was Jesus.", "Then Jesus saith unto them, Children, have ye any meat? They answered him, No.", "And he said unto them, Cast the net on the right side of the ship, and ye shall find. They cast therefore, and now they were not able to draw it for the multitude of fishes.", "Therefore that disciple whom Jesus loved saith unto Peter, It is the Lord. Now when Simon Peter heard that it was the Lord, he girt his fisher’s coat unto him, (for he was naked,) and did cast himself into the sea.", "And the other disciples came in a little ship; (for they were not far from land, but as it were two hundred cubits,) dragging the net with fishes.", "As soon then as they were come to land, they saw a fire of coals there, and fish laid thereon, and bread.", "Jesus saith unto them, Bring of the fish which ye have now caught.", "Simon Peter went up, and drew the net to land full of great fishes, and hundred and fifty and three: and for all there were so many, yet was not the net broken.", "Jesus saith unto them, Come and dine. And none of the disciples durst ask him, Who art thou? knowing that it was the Lord.", "Jesus then cometh, and taketh bread, and giveth them, and fish likewise.", "This is now the third time that Jesus shewed himself to his disciples, after that he was risen from the dead.", "So when they had dined, Jesus saith to Simon Peter, Simon, son of Jonas, lovest thou me more than these? He saith unto him, Yea, Lord; thou knowest that I love thee. He saith unto him, Feed my lambs.", "He saith to him again the second time, Simon, son of Jonas, lovest thou me? He saith unto him, Yea, Lord; thou knowest that I love thee. He saith unto him, Feed my sheep.", "He saith unto him the third time, Simon, son of Jonas, lovest thou me? Peter was grieved because he said unto him the third time, Lovest thou me? And he said unto him, Lord, thou knowest all things; thou knowest that I love thee. Jesus saith unto him, Feed my sheep.", "Verily, verily, I say unto thee, When thou wast young, thou girdedst thyself, and walkedst whither thou wouldest: but when thou shalt be old, thou shalt stretch forth thy hands, and another shall gird thee, and carry thee whither thou wouldest not.", "This spake he, signifying by what death he should glorify God. And when he had spoken this, he saith unto him, Follow me.", "Then Peter, turning about, seeth the disciple whom Jesus loved following; which also leaned on his breast at supper, and said, Lord, which is he that betrayeth thee?", "Peter seeing him saith to Jesus, Lord, and what shall this man do?", "Jesus saith unto him, If I will that he tarry till I come, what is that to thee? follow thou me.", "Then went this saying abroad among the brethren, that that disciple should not die: yet Jesus said not unto him, He shall not die; but, If I will that he tarry till I come, what is that to thee?", "This is the disciple which testifieth of these things, and wrote these things: and we know that his testimony is true.", "And there are also many other things which Jesus did, the which, if they should be written every one, I suppose that even the world itself could not contain the books that should be written. Amen."], "ASV": ["After these things Jesus manifested himself again to the disciples at the sea of Tiberias; and he manifested [himself] on this wise.", "There was together Simon Peter, and Thomas called Didymus, and Nathanael of Cana in Galilee, and the [sons] of Zebedee, and two other of his disciples.", "Simon Peter saith unto them, I go a fishing. They say unto him, We also come with thee. They went forth, and entered into the boat; and that night they took nothing.", "But when day was now breaking, Jesus stood on the beach: yet the disciples knew not that it was Jesus.", "Jesus therefore saith unto them, Children, have ye aught to eat? They answered him, No.", "And he said unto them, Cast the net on the right side of the boat, and ye shall find. They cast therefore, and now they were not able to draw it for the multitude of fishes.", "That disciple therefore whom Jesus loved saith unto Peter, It is the Lord. So when Simon Peter heard that it was the Lord, he girt his coat about him (for he was naked), and cast himself into the sea.", "But the other disciples came in the little boat (for they were not far from the land, but about two hundred cubits off), dragging the net [full] of fishes.", "So when they got out upon the land, they see a fire of coals there, and fish laid thereon, and bread.", "Jesus saith unto them, Bring of the fish which ye have now taken.", "Simon Peter therefore went up, and drew the net to land, full of great fishes, a hundred and fifty and three: and for all there were so many, the net was not rent.", "Jesus saith unto them, Come [and] break your fast. And none of the disciples durst inquire of him, Who art thou? knowing that it was the Lord.", "Jesus cometh, and taketh the bread, and giveth them, and the fish likewise.", "This is now the third time that Jesus was manifested to the disciples, after that he was risen from the dead.", "So when they had broken their fast, Jesus saith to Simon Peter, Simon, [son] of John, lovest thou me more than these? He saith unto him, Yea, Lord; thou knowest that I love thee. He saith unto him, Feed my lambs.", "He saith to him again a second time, Simon, [son] of John, lovest thou me? He saith unto him, Yea, Lord; thou knowest that I love thee. He saith unto him, Tend my sheep.", "He saith unto him the third time, Simon, [son] of John, lovest thou me? Peter was grieved because he said unto him the third time, Lovest thou me? And he said unto him, Lord, thou knowest all things; thou knowest that I love thee. Jesus saith unto him, Feed my sheep.", "Verily, verily, I say unto thee, When thou wast young, thou girdedst thyself, and walkedst whither thou wouldest: but when thou shalt be old, thou shalt stretch forth thy hands, and another shall gird thee, and carry thee whither thou wouldest not.", "Now this he spake, signifying by what manner of death he should glorify God. And when he had spoken this, he saith unto him, Follow me.", "Peter, turning about, seeth the disciple whom Jesus loved following; who also leaned back on his breast at the supper, and said, Lord, who is he that betrayeth thee?", "Peter therefore seeing him saith to Jesus, Lord, and what shall this man do?", "Jesus saith unto him, If I will that he tarry till I come, what [is that] to thee? Follow thou me.", "This saying therefore went forth among the brethren, that that disciple should not die: yet Jesus said not unto him, that he should not die; but, If I will that he tarry till I come, what [is that] to thee?", "This is the disciple that beareth witness of these things, and wrote these things: and we know that his witness is true.", "And there are also many other things which Jesus did, the which if they should be written every one, I suppose that even the world itself would not contain the books that should be written."], "NET": ["After this Jesus revealed himself again to the disciples by the Sea of Tiberias. Now this is how he did so.", "Simon Peter, Thomas (called Didymus), Nathanael (who was from Cana in Galilee), the sons of Zebedee, and two other disciples of his were together.", "Simon Peter told them, “I am going fishing.” “We will go with you,” they replied. They went out and got into the boat, but that night they caught nothing.", "When it was already very early morning, Jesus stood on the beach, but the disciples did not know that it was Jesus.", "So Jesus said to them, “Children, you don’t have any fish, do you?” They replied, “No.”", "He told them, “Throw your net on the right side of the boat, and you will find some.” So they threw the net and were not able to pull it in because of the large number of fish.", "Then the disciple whom Jesus loved said to Peter, “It is the Lord!” So Simon Peter, when he heard that it was the Lord, tucked in his outer garment (for he had nothing on underneath it), and plunged into the sea.", "Meanwhile the other disciples came with the boat, dragging the net full of fish, for they were not far from land, only about a hundred yards.", "When they got out on the beach, they saw a charcoal fire ready with a fish placed on it, and bread.", "Jesus said, “Bring some of the fish you have just now caught.”", "So Simon Peter went aboard and pulled the net to shore. It was full of large fish, 153, but although there were so many, the net was not torn.", "“Come, have breakfast,” Jesus said. But none of the disciples dared to ask him, “Who are you?” because they knew it was the Lord.", "Jesus came and took the bread and gave it to them, and did the same with the fish.", "This was now the third time Jesus was revealed to the disciples after he was raised from the dead.", "Then when they had finished breakfast, Jesus said to Simon Peter, “Simon, son of John, do you love me more than these do?” He replied, “Yes, Lord, you know I love you.” Jesus told him, “Feed my lambs.”", "Jesus said a second time, “Simon, son of John, do you love me?” He replied, “Yes, Lord, you know I love you.” Jesus told him, “Shepherd my sheep.”", "Jesus said a third time, “Simon, son of John, do you love me?” Peter was distressed that Jesus asked him a third time, “Do you love me?” and said, “Lord, you know everything. You know that I love you.” Jesus replied, “Feed my sheep.", "I tell you the solemn truth, when you were young, you tied your clothes around you and went wherever you wanted, but when you are old, you will stretch out your hands, and others will tie you up and bring you where you do not want to go.”", "(Now Jesus said this to indicate clearly by what kind of death Peter was going to glorify God.) After he said this, Jesus told Peter, “Follow me.”", "Peter turned around and saw the disciple whom Jesus loved following them. (This was the disciple who had leaned back against Jesus’ chest at the meal and asked, “Lord, who is the one who is going to betray you?”)", "So when Peter saw him, he asked Jesus, “Lord, what about him?”", "Jesus replied, “If I want him to live until I come back, what concern is that of yours? You follow me!”", "So the saying circulated among the brothers and sisters that this disciple was not going to die. But Jesus did not say to him that he was not going to die, but rather, “If I want him to live until I come back, what concern is that of yours?”", "This is the disciple who testifies about these things and has written these things, and we know that his testimony is true.", "There are many other things that Jesus did. If every one of them were written down, I suppose the whole world would not have room for the books that would be written."], "WEB": ["After these things, Jesus revealed himself again to the disciples at the sea of Tiberias. He revealed himself this way.", "Simon Peter, Thomas called Didymus, Nathanael of Cana in Galilee, and the sons of Zebedee, and two others of his disciples were together.", "Simon Peter said to them, “I’m going fishing.” They told him, “We are also coming with you.” They immediately went out, and entered into the boat. That night, they caught nothing.", "But when day had already come, Jesus stood on the beach, yet the disciples didn’t know that it was Jesus.", "Jesus therefore said to them, “Children, have you anything to eat?” They answered him, “No.”", "He said to them, “Cast the net on the right side of the boat, and you will find some.” They cast it therefore, and now they weren’t able to draw it in for the multitude of fish.", "That disciple therefore whom Jesus loved said to Peter, “It’s the Lord!” So when Simon Peter heard that it was the Lord, he wrapped his coat around him (for he was naked), and threw himself into the sea.", "But the other disciples came in the little boat (for they were not far from the land, but about two hundred cubits away), dragging the net full of fish.", "So when they got out on the land, they saw a fire of coals there, and fish laid on it, and bread.", "Jesus said to them, “Bring some of the fish which you have just caught.”", "Simon Peter went up, and drew the net to land, full of great fish, one hundred fifty-three; and even though there were so many, the net wasn’t torn.", "Jesus said to them, “Come and eat breakfast.” None of the disciples dared inquire of him, “Who are you?” knowing that it was the Lord.", "Then Jesus came and took the bread, gave it to them, and the fish likewise.", "This is now the third time that Jesus was revealed to his disciples, after he had risen from the dead.", "So when they had eaten their breakfast, Jesus said to Simon Peter, “Simon, son of Jonah, do you love me more than these?” He said to him, “Yes, Lord; you know that I have affection for you.” He said to him, “Feed my lambs.”", "He said to him again a second time, “Simon, son of Jonah, do you love me?” He said to him, “Yes, Lord; you know that I have affection for you.” He said to him, “Tend my sheep.”", "He said to him the third time, “Simon, son of Jonah, do you have affection for me?” Peter was grieved because he asked him the third time, “Do you have affection for me?” He said to him, “Lord, you know everything. You know that I have affection for you.” Jesus said to him, “Feed my sheep.", "Most certainly I tell you, when you were young, you dressed yourself, and walked where you wanted to. But when you are old, you will stretch out your hands, and another will dress you, and carry you where you don’t want to go.”", "Now he said this, signifying by what kind of death he would glorify God. When he had said this, he said to him, “Follow me.”", "Then Peter, turning around, saw a disciple following. This was the disciple whom Jesus loved, the one who had also leaned on Jesus’ breast at the supper and asked, “Lord, who is going to betray You?”", "Peter seeing him, said to Jesus, “Lord, what about this man?”", "Jesus said to him, “If I desire that he stay until I come, what is that to you? You follow me.”", "This saying therefore went out among the brothers, that this disciple wouldn’t die. Yet Jesus didn’t say to him that he wouldn’t die, but, “If I desire that he stay until I come, what is that to you?”", "This is the disciple who testifies about these things, and wrote these things. We know that his witness is true.", "There are also many other things which Jesus did, which if they would all be written, I suppose that even the world itself wouldn’t have room for the books that would be written."]}, "studyNotes": "John - Chapter 21\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nThe risen Jesus appears at the Sea of Galilee, provides a miraculous catch of fish, restores Peter with three questions (\"Do you love me? Feed my sheep\"), and prophesies Peter's death — the disciple whom Jesus loved bears witness to these things.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John — the \"disciple whom Jesus loved\" (v.20,24).\n\nHistorical Context: Chapter 21 is an epilogue to John's Gospel, recording a\npost-resurrection appearance of Jesus by the Sea of Galilee (also called the\nSea of Tiberias). It focuses on two things: the miraculous catch of fish and\nthe restoration of Peter.\n\nPeter's Restoration: Peter had denied Jesus three times around a charcoal fire\n(John 18:18,25-27). Now Jesus meets him at another charcoal fire (v.9) and asks\nhim three times \"Do you love me?\" — one question for each denial. This is not\npunishment but restoration — Jesus publicly reinstating Peter to his calling\nbefore the other disciples.\n\nThe Greek Words for Love: In vv.15-17, Jesus uses \"agapao\" (unconditional,\nsacrificial love) in His first two questions. Peter responds with \"phileo\"\n(brotherly affection, friendship love). In the third question, Jesus uses\n\"phileo\" — meeting Peter where he is. This is not Peter lowering the standard;\nit is Jesus graciously accepting Peter's honest answer and working with it.\n\n153 Fish (v.11): The exact number has fascinated scholars for centuries. Various\nexplanations: (1) the number of known species of fish at the time, (2) a\nsymbolic number, (3) simply an eyewitness detail. The net did not break — a\npicture of the church holding all who come to Christ.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Sea of Tiberias (Sea of Galilee, v.1): The post-resurrection appearance occurred on the shore of the Sea of Galilee. The disciples had returned to fishing in Galilee.\n- Galilee: Jesus had told the disciples to meet Him in Galilee (Matt. 28:10). This chapter records that meeting — back where their journey with Jesus first began.\n\nKEY VERSES\n------------------------------------\nv.6  — \"Cast the net on the right side of the boat, and you will find\n        some.\" (ESV) — Obedience to Christ's specific direction produces\n        abundance.\n\nv.15 — \"Simon, son of John, do you love me more than these?\" (ESV) — The\n        question that restores Peter — and the question Jesus asks every man.\n\nv.17 — \"Lord, you know everything; you know that I love you.\" (ESV) —\n        Peter's appeal to Christ's omniscience — the most honest prayer a\n        man can pray.\n\nv.19 — \"Follow me.\" (ESV) — The same two words Jesus spoke when He first\n        called Peter (Matthew 4:19). After failure, the call is the same.\n\nv.22 — \"What is that to you? You follow me!\" (ESV) — The answer to every\n        comparison and distraction from our own calling.\n\nCROSS-REFERENCES\n------------------------------------\nv.3   — Luke 5:5 — \"We've worked hard all night and haven't caught anything.\"\n        — The same situation as Peter's original call.\nv.6   — Luke 5:6-7 — The miraculous catch at the original calling.\nv.9   — John 18:18 — The charcoal fire where Peter denied Jesus — now a\n        charcoal fire of restoration.\nv.15  — Luke 22:31-32 — Jesus praying for Peter that his faith would not fail.\nv.15  — Matthew 16:18 — \"On this rock I will build my church.\"\nv.17  — Psalm 139:1-4 — \"You have searched me, Lord, and you know me.\"\nv.18  — 2 Peter 1:14 — Peter's own reference to his coming death.\nv.19  — Acts 12:3-4 — Peter's arrest; tradition says he was crucified upside\n        down in Rome under Nero.\nv.22  — 1 Corinthians 4:3-4 — \"I care very little if I am judged by you or\n        by any human court.\"\nv.25  — Ecclesiastes 12:12 — \"Of making many books there is no end.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-21/\n  Guzik examines the significance of the charcoal fire, the Greek words\n  for love in vv.15-17, the meaning of \"Feed my sheep,\" Peter's martyrdom\n  prophecy, and the closing statement of the Gospel.\n\nCharles Spurgeon:\n  Sermon: \"Peter's Restoration\" on vv.15-17 (MTP Vol. 37, No. 2205)\n  \"Three times denied — three times restored. Jesus did not ignore the\n  failure; He addressed it directly. He did not minimize it; He healed it.\n  He asked the question that needed to be asked, and He asked it in front\n  of the others — because Peter's restoration needed to be as public as\n  his denial.\"\n  Sermon: \"Follow Thou Me\" on v.19 (MTP Vol. 20, No. 1163)\n  \"After all the failure, after the denial, after the shame — Follow Me.\n  Not 'go away and prove yourself first.' Not 'earn your way back.' Just\n  Follow Me. The call of Christ is always forward, never backward.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.6  — NET: \"Throw your net on the right side of the boat, and\n       you will find some\" — the catch of 153 fish (v.11). WEB:\n       \"Cast the net on the right side of the boat.\" KJV: \"Cast\n       the net on the right side.\" The specific number 153 has\n       generated much speculation; Jerome said it represented every\n       known species of fish — universal mission.\n\nv.7  — NET: \"It is the Lord!\" — the beloved disciple recognizes\n       Him first (perception); Peter jumps in immediately (action).\n       WEB: \"It's the Lord!\" KJV: \"It is the Lord.\" The two\n       disciples represent two responses to the risen Christ —\n       contemplation and impulsive devotion.\n\nvv.15-17 — KJV: \"lovest thou me\" (all three questions) / ESV: \"do you love me\" (all three questions) — Both obscure the Greek distinction in English. In vv.15-16, Jesus uses \"agapaō\" (unconditional love); Peter responds with \"phileō\" (friendship/affection). In v.17, Jesus switches to \"phileō\" — meeting Peter at his level. ESV/NET footnotes note this distinction. The shift is significant — Jesus accepts Peter's honest answer rather than demanding what Peter cannot yet give.\n  KJV: \"more than these\" / ESV: \"more than these\" — Both identical. Could mean: (1) more than the other disciples love Jesus, (2) more than Peter loves these other disciples, or (3) more than Peter loves these things (fishing, his former life). Most scholars favor (1) — recalling Peter's boast \"Even if all fall away, I will not\" (Matthew 26:33).\n  KJV: \"Feed my lambs... Feed my sheep... Feed my sheep\" / ESV: \"Feed my lambs... Tend my sheep... Feed my sheep\" — Greek uses different words: \"boske\" (feed/nourish) and \"poimaine\" (shepherd/tend). ESV distinguishes them; KJV uses \"feed\" for all three. The commission includes both nourishing and leading.\n  [ASV/NET/WEB]: NET: \"Simon son of John, do you love me more than these?\"\n       — \"love\" — the famous interchange between agapaō and phileō.\n       Jesus asks agapas (self-sacrificial love); Peter answers\n       philō (friendship love). WEB: \"do you love me?\" The\n       significance of the word shift is debated but noticeable.\n\nv.18 — KJV: \"thou shalt stretch forth thy hands, and another shall gird thee\" / ESV: \"you will stretch out your hands, and another will dress you and carry you where you do not want to go\" — Both equivalent. A clear reference to crucifixion. John confirms this in v.19: \"This he said to show by what kind of death he was to glorify God.\" Peter was crucified in Rome, tradition says upside down, around AD 64-68.\n  [ASV/NET/WEB]: NET: \"when you are old, you will stretch out your hands,\n       and others will tie you up and bring you where you do not\n       want to go\" — \"stretch out your hands\" = crucifixion. WEB:\n       \"you will stretch out your hands.\" KJV: \"thou shalt stretch\n       forth thy hands.\" John notes this signified Peter's death\n       (v.19) — tradition says crucified upside-down.\n\nv.19 — KJV: \"Follow me\" / ESV: \"Follow me\" — Both identical. The same two words Jesus spoke when He first called Peter (Matthew 4:19). After failure, the call is the same.\n\nv.22 — KJV: \"If I will that he tarry till I come, what is that to thee? follow thou me\" / ESV: \"If it is my will that he remain until I come, what is that to you? You follow me!\" — Both equivalent. KJV uses archaic \"tarry\"; ESV uses \"remain.\" The answer to every comparison and distraction from our own calling.\n\nv.25 — KJV: \"the world itself could not contain the books that should be written\" / ESV: \"the world itself could not contain the books that would be written\" — Both equivalent. A hyperbolic statement emphasizing the inexhaustible nature of Christ's works and words.\n  [ASV/NET/WEB]: NET: \"There are many other things that Jesus did. If every\n       one of them were written down, I suppose the whole world\n       would not have room for the books that would be written\" —\n       hyperbole expressing the inexhaustible richness of Christ.\n       WEB: \"I suppose that even the world itself wouldn't have\n       room for the books.\" The Gospel closes with overflow.\n\n\nGLOSSARY\n------------------------------------\nSea of Tiberias — Another name for the Sea of Galilee, named after the Roman\n               city of Tiberias on its western shore. A freshwater lake in\n               northern Israel, about 13 miles long and 8 miles wide.\n\nCharcoal fire — Greek \"anthrakia\" — the same word used in John 18:18 for the\n               fire where Peter warmed himself when he denied Jesus. The\n               deliberate echo connects the restoration to the failure.\n\nAgapao        — Greek for unconditional, sacrificial, self-giving love. The\n               love of God. Jesus uses this word in His first two questions\n               to Peter.\n\nPhileo        — Greek for brotherly affection, friendship love, warm personal\n               attachment. Peter uses this word in all three of his responses.\n\nFeed my sheep — Jesus' commission to Peter — pastoral care of God's people.\n               \"Feed\" (Greek: boske/poimaine) means to provide nourishment\n               and to shepherd/lead. Peter's calling was to care for Christ's\n               flock.\n\n153           — The exact number of fish caught. John records it as an\n               eyewitness detail. The net did not break despite the number —\n               a picture of the church's capacity to hold all who come.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Peter went back to fishing after the resurrection — back to what he knew,\n   back to his old life. When you've failed or feel disqualified, do you go\n   back to your old life? Jesus came to find Peter there — and He comes to\n   find you where you've retreated to as well.\n\n2. Jesus asked Peter \"Do you love me?\" three times — once for each denial.\n   He didn't ignore the failure or pretend it didn't happen. He addressed it\n   directly and specifically. Is there a failure in your past that you need\n   Jesus to address directly — not to condemn you but to restore you?\n\n3. \"Lord, thou knowest all things; thou knowest that I love thee\" (v.17).\n   Peter stopped defending himself and appealed to Christ's knowledge of his\n   heart. That is the most honest prayer a man can pray — \"Lord, you know.\"\n   What do you need to bring to Jesus with that kind of honesty?\n\n4. \"Follow me\" — after all the failure, the same call. Jesus doesn't give\n   Peter a new, reduced calling. He gives him the same one. What calling has\n   God placed on your life that failure or shame has caused you to step back\n   from? Is it time to hear \"Follow me\" again?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. The disciples fished all night and caught nothing — then obeyed Jesus'\n   specific instruction and caught 153 fish. Where in your life are you\n   working hard in your own strength and coming up empty? What specific\n   instruction from Christ are you not following?\n\n2. Jesus prepared breakfast for His disciples (v.9-13). The risen Lord of\n   the universe made them breakfast. What does this tell you about the kind\n   of God you serve — His attention to ordinary needs, His care for the\n   practical details of your life?\n\n3. Jesus asked Peter \"Do you love me more than these?\" (v.15). What are the\n   \"these\" in your life — the things that compete with your love for Christ?\n   Career, comfort, reputation, relationships? How would you honestly answer\n   Jesus' question right now?\n\n4. Peter asked about John — \"Lord, and what shall this man do?\" Jesus said\n   \"What is that to thee? Follow thou me\" (vv.21-22). We often compare our\n   calling, our suffering, our path to others'. How does Jesus' answer to\n   Peter speak to your tendency to compare yourself to others?\n\n5. John closes by saying the world itself could not contain the books that\n   could be written about Jesus (v.25). The Gospel accounts are a selection —\n   the most important things, chosen to produce faith. What does it mean to\n   you that the infinite God has been made knowable through the finite words\n   of Scripture?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 21:1-14 - Glory at Breakfast:\n    https://enduringword.com/media/john-21-glory-breakfast/\n  John 21:15-25 - Glory's Restoration:\n    https://enduringword.com/media/john-21-glorys-restoration/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}};
    const translationNames = {
        "ESV": "English Standard Version",
        "KJV": "King James Version",
        "ASV": "American Standard Version",
        "NET": "NET Bible",
        "WEB": "World English Bible"
    };
    function getCurrentChapter() { return document.getElementById('chapter').value; }
    function getCurrentTranslation() { return document.getElementById('translation').value; }
    function changeChapter() { currentSpread = 0; render(); }

    function render() {
        const ch = getCurrentChapter();
        const trans = getCurrentTranslation();
        const chData = bookData[ch];
        if (!chData) return;

        const verses = chData.translations[trans] || [];
        document.getElementById('chapter-heading').innerHTML =
            `Chapter ${ch}<span id="translation-label">${translationNames[trans]}</span>`;

        totalSpreads = Math.max(1, Math.ceil(verses.length / (VERSES_PER_PAGE * 2)));
        const startIndex = currentSpread * VERSES_PER_PAGE * 2;
        const leftVerses = verses.slice(startIndex, startIndex + VERSES_PER_PAGE);
        const rightVerses = verses.slice(startIndex + VERSES_PER_PAGE, startIndex + VERSES_PER_PAGE * 2);

        let leftHTML = '';
        leftVerses.forEach((verse, i) => {
            const verseNum = startIndex + i + 1;
            leftHTML += `<p class="verse"><span class="verse-number">${verseNum}</span>${verse}</p>`;
        });

        let rightHTML = '';
        rightVerses.forEach((verse, i) => {
            const verseNum = startIndex + VERSES_PER_PAGE + i + 1;
            rightHTML += `<p class="verse"><span class="verse-number">${verseNum}</span>${verse}</p>`;
        });

        document.getElementById('verses-left').innerHTML = leftHTML;
        document.getElementById('verses-right').innerHTML = rightHTML;

        const leftPageNum = currentSpread * 2 + 1;
        const rightPageNum = currentSpread * 2 + 2;
        document.getElementById('page-num-left').textContent = leftPageNum;
        document.getElementById('page-num-right').textContent = rightPageNum;
        document.getElementById('page-indicator').textContent =
            `Pages ${leftPageNum}\u2013${rightPageNum} of ${totalSpreads * 2}`;

        document.getElementById('prev-btn').disabled = (currentSpread === 0);
        document.getElementById('next-btn').disabled = (currentSpread >= totalSpreads - 1);

        renderStudyNotes(chData.studyNotes);
    }

    function renderStudyNotes(rawNotes) {
        const container = document.getElementById('study-notes-content');
        if (!rawNotes || rawNotes.trim() === '') {
            container.innerHTML = '<p class="no-notes">No study notes available for this chapter.</p>';
            return;
        }
        let html = rawNotes;
        // Remove header lines up to first ====
        html = html.replace(/^[\s\S]*?={5,}\n/, '');
        // Remove PERSONAL NOTES section and everything after it
        html = html.replace(/\nPERSONAL NOTES[\s\S]*$/, '');
        // Remove PERSONAL REFLECTION & APPLICATION section
        html = html.replace(/\nPERSONAL REFLECTION[^\n]*\n-{4,}[\s\S]*?(?=\n[A-Z]{3,}[^\n]*\n-{4,}|$)/g, '');
        // Remove REFLECTION QUESTIONS section
        html = html.replace(/\nREFLECTION QUESTIONS[^\n]*\n-{4,}[\s\S]*?(?=\n[A-Z]{3,}[^\n]*\n-{4,}|$)/g, '');
        // Remove KEY VERSES section
        html = html.replace(/\nKEY VERSES[^\n]*\n-{4,}[\s\S]*?(?=\n[A-Z]{3,}[^\n]*\n-{4,}|$)/g, '');
        // Remove "ADDITIONAL TRANSLATION NOTES" header (merge into TRANSLATION NOTES)
        html = html.replace(/\nADDITIONAL TRANSLATION NOTES[^\n]*\n-{4,}/g, '');
        // Remove trailing ==== footer and "Study Notes generated..." text
        html = html.replace(/\n={5,}[\s\S]*$/, '');
        // Remove "NOTE: Links may change..." lines
        html = html.replace(/\nNOTE: Links may change[^\n]*\n?/g, '');
        // Convert section headers (ALL CAPS followed by dashes) - centered
        html = html.replace(/^([A-Z][A-Z &(),'\d]+)\n-{4,}/gm, '<span class="ornament">\u271a</span><h2>$1</h2>');
        // Convert URLs to clickable links
        html = html.replace(/(https?:\/\/[^\s<)]+)/g, '<a href="$1" target="_blank">$1</a>');
        // Make "Enduring Word" text a clickable link using the nearby URL, and hide the raw URL line
        html = html.replace(/Enduring Word \(David Guzik\):\n\s*<a href="([^"]+)"[^>]*>[^<]*<\/a>/g, '<a href="$1" target="_blank" style="color:#6b1c2a;font-weight:600;">Enduring Word (David Guzik)</a>');
        // Color and bold category labels (Author:, Date Written:, Audience:, etc.)
        html = html.replace(/^((?:Author|Date Written|Audience|Historical Context|Purpose[^:]*|Roman Crucifixion|Fulfilled Prophecy|Peter's Restoration|The Greek Words[^:]*|153 Fish[^:]*|Thomas|Purpose Statement|The Empty Tomb)[^:]*:)/gm, '<strong style="color:#6b1c2a;">$1</strong>');
        // Also color verse references at start of lines (v.1, v.14, vv.15-17, etc.)
        html = html.replace(/^(v{1,2}\.?[\d\-,\s]+\s*—)/gm, '<span style="color:#6b1c2a;font-weight:600;">$1</span>');
        // Replace key verse quotes with the actual verse text from the selected translation
        const trans = getCurrentTranslation();
        const verses = bookData[getCurrentChapter()].translations[trans] || [];
        html = html.replace(/^(v\.?(\d+)\s*—\s*)"[^"]*"[^"]*"[^"]*"/gm, function(match, prefix, vNum) {
            const idx = parseInt(vNum) - 1;
            if (idx >= 0 && idx < verses.length) {
                return prefix + '"' + verses[idx] + '"';
            }
            return match;
        });
        html = html.replace(/^(v\.?(\d+)\s*—\s*)"([^"]+)"/gm, function(match, prefix, vNum, quote) {
            const idx = parseInt(vNum) - 1;
            if (idx >= 0 && idx < verses.length) {
                return prefix + '"' + verses[idx] + '"';
            }
            return match;
        });
        // Trim trailing whitespace
        html = html.trimEnd();
        container.innerHTML = html;

        // Convert TRANSLATION NOTES into a table layout
        const transSection = container.querySelector('h2');
        let transH2 = null;
        const allH2s = container.querySelectorAll('h2');
        allH2s.forEach(h2 => { if (h2.textContent.trim() === 'TRANSLATION NOTES') transH2 = h2; });

        if (transH2) {
            // Find content between TRANSLATION NOTES h2 and the next h2 or ornament
            let contentNodes = [];
            let node = transH2.nextSibling;
            while (node && !(node.nodeType === 1 && (node.tagName === 'H2' || (node.className && node.className.includes('ornament'))))) {
                contentNodes.push(node);
                node = node.nextSibling;
            }
            // Get the raw text of translation notes
            let rawText = '';
            contentNodes.forEach(n => { rawText += n.textContent || ''; });

            // Parse verse entries
            const verseBlocks = rawText.split(/\n(?=v{1,2}\.?\s*\d)/);
            let tableHTML = '';

            verseBlocks.forEach(block => {
                block = block.trim();
                if (!block) return;

                // Extract verse ref
                const refMatch = block.match(/^(v{1,2}\.?\s*[\d\-,]+)\s*[—\-]?\s*(.*)/s);
                if (!refMatch) return;

                const verseRef = refMatch[1].trim();
                const content = refMatch[2];

                // Extract each translation line
                const translations = ['KJV', 'ESV', 'ASV', 'NET', 'WEB'];
                let rows = {};
                let noteText = '';
                let greekTerm = '';

                // Check for Greek term at start
                const greekMatch = content.match(/^Greek\s+"([^"]+)"/);
                if (greekMatch) greekTerm = greekMatch[1];

                translations.forEach(t => {
                    const regex = new RegExp(t + ':\s*(.+?)(?=\n\s*(?:KJV|ESV|ASV|NET|WEB|Note):|$)', 's');
                    const m = content.match(regex);
                    if (m) rows[t] = m[1].trim().replace(/\n\s*/g, ' ');
                });

                // Extract Note:
                const noteMatch = content.match(/Note:\s*(.+?)$/s);
                if (noteMatch) noteText = noteMatch[1].trim().replace(/\n\s*/g, ' ');

                // Build table for this verse
                tableHTML += '<div style="margin-bottom:20px;border:1px solid rgba(26,39,68,0.15);border-radius:8px;overflow:hidden;">';
                tableHTML += '<div style="background:rgba(26,39,68,0.06);padding:8px 12px;font-weight:600;color:#1a2744;">' + verseRef + (greekTerm ? ' — Greek: <em>' + greekTerm + '</em>' : '') + '</div>';
                tableHTML += '<table style="width:100%;border-collapse:collapse;font-size:0.95rem;">';

                translations.forEach(t => {
                    if (rows[t]) {
                        tableHTML += '<tr style="border-top:1px solid rgba(26,39,68,0.08);">';
                        tableHTML += '<td style="padding:6px 12px;width:50px;font-weight:600;color:#6b1c2a;vertical-align:top;white-space:nowrap;">' + t + '</td>';
                        tableHTML += '<td style="padding:6px 12px;">' + rows[t] + '</td>';
                        tableHTML += '</tr>';
                    }
                });

                if (noteText) {
                    tableHTML += '<tr style="border-top:1px solid rgba(26,39,68,0.08);background:rgba(107,28,42,0.03);">';
                    tableHTML += '<td colspan="2" style="padding:6px 12px;font-style:italic;color:#444;">' + noteText + '</td>';
                    tableHTML += '</tr>';
                }

                tableHTML += '</table></div>';
            });

            // Replace the raw text with the table
            if (tableHTML) {
                contentNodes.forEach(n => { if (n.parentNode) n.parentNode.removeChild(n); });
                const wrapper = document.createElement('div');
                wrapper.style.whiteSpace = 'normal';
                wrapper.innerHTML = tableHTML;
                transH2.parentNode.insertBefore(wrapper, transH2.nextSibling);
            }
        }
    }

    function nextPage() { if (currentSpread < totalSpreads - 1) { currentSpread++; render(); } }
    function prevPage() { if (currentSpread > 0) { currentSpread--; render(); } }

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'SELECT') return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
        else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
    });

    render();
    </script>
</body>
</html>
