t unto them, and said, What accusation bring ye against this man?", "They answered and said unto him, If he were not a malefactor, we would not have delivered him up unto thee.", "Then said Pilate unto them, Take ye him, and judge him according to your law. The Jews therefore said unto him, It is not lawful for us to put any man to death:", "That the saying of Jesus might be fulfilled, which he spake, signifying what death he should die.", "Then Pilate entered into the judgment hall again, and called Jesus, and said unto him, Art thou the King of the Jews?", "Jesus answered him, Sayest thou this thing of thyself, or did others tell it thee of me?", "Pilate answered, Am I a Jew? Thine own nation and the chief priests have delivered thee unto me: what hast thou done?", "Jesus answered, My kingdom is not of this world: if my kingdom were of this world, then would my servants fight, that I should not be delivered to the Jews: but now is my kingdom not from hence.", "Pilate therefore said unto him, Art thou a king then? Jesus answered, Thou sayest that I am a king. To this end was I born, and for this cause came I into the world, that I should bear witness unto the truth. Every one that is of the truth heareth my voice.", "Pilate saith unto him, What is truth? And when he had said this, he went out again unto the Jews, and saith unto them, I find in him no fault at all.", "But ye have a custom, that I should release unto you one at the passover: will ye therefore that I release unto you the King of the Jews?", "Then cried they all again, saying, Not this man, but Barabbas. Now Barabbas was a robber."], "ASV": ["When Jesus had spoken these words, he went forth with his disciples over the brook Kidron, where was a garden, into which he entered, himself and his disciples.", "Now Judas also, who betrayed him, knew the place: for Jesus oft-times resorted thither with his disciples.", "Judas then, having received the band [of soldiers], and officers from the chief priests and the Pharisees, cometh thither with lanterns and torches and weapons.", "Jesus therefore, knowing all the things that were coming upon him, went forth, and saith unto them, Whom seek ye?", "They answered him, Jesus of Nazareth. Jesus saith unto them, I am [he]. And Judas also, who betrayed him, was standing with them.", "When therefore he said unto them, I am [he], they went backward, and fell to the ground.", "Again therefore he asked them, Whom seek ye? And they said, Jesus of Nazareth.", "Jesus answered, I told you that I am [he]; if therefore ye seek me, let these go their way:", "that the word might be fulfilled which he spake, Of those whom thou hast given me I lost not one.", "Simon Peter therefore having a sword drew it, and struck the high priest`s servant, and cut off his right ear. Now the servant`s name was Malchus.", "Jesus therefore said unto Peter, Put up the sword into the sheath: the cup which the Father hath given me, shall I not drink it?", "So the band and the chief captain, and the officers of the Jews, seized Jesus and bound him,", "and led him to Annas first; for he was father in law to Caiaphas, who was high priest that year.", "Now Caiaphas was he that gave counsel to the Jews, that it was expedient that one man should die for the people.", "And Simon Peter followed Jesus, and [so did] another disciple. Now that disciple was known unto the high priest, and entered in with Jesus into the court of the high priest;", "but Peter was standing at the door without. So the other disciple, who was known unto the high priest, went out and spake unto her that kept the door, and brought in Peter.", "The maid therefore that kept the door saith unto Peter, Art thou also [one] of this man`s disciples? He saith, I am not.", "Now the servants and the officers were standing [there], having made a fire of coals; for it was cold; and they were warming themselves: and Peter also was with them, standing and warming himself.", "The high priest therefore asked Jesus of his disciples, and of his teaching.", "Jesus answered him, I have spoken openly to the world; I ever taught in synagogues, and in the temple, where all the Jews come together; and in secret spake I nothing.", "Why askest thou me? Ask them that have heard [me], what I spake unto them: behold, these know the things which I said.", "And when he had said this, one of the officers standing by struck Jesus with his hand, saying, Answerest thou the high priest so?", "Jesus answered him, If I have spoken evil, bear witness of the evil: but if well, why smitest thou me?", "Annas therefore sent him bound unto Caiaphas the high priest.", "Now Simon Peter was standing and warming himself. They said therefore unto him, Art thou also [one] of his disciples? He denied, and said, I am not.", "One of the servants of the high priest, being a kinsman of him whose ear Peter cut off, saith, Did not I see thee in the garden with him?", "Peter therefore denied again: and straightway the cock crew.", "They lead Jesus therefore from Caiaphas into the Praetorium: and it was early; and they themselves entered not into the Praetorium, that they might not be defiled, but might eat the passover.", "Pilate therefore went out unto them, and saith, What accusation bring ye against this man?", "They answered and said unto him, If this man were not an evildoer, we should not have delivered him up unto thee.", "Pilate therefore said unto them, Take him yourselves, and judge him according to your law. The Jews said unto him, It is not lawful for us to put any man to death:", "that the word of Jesus might be fulfilled, which he spake, signifying by what manner of death he should die.", "Pilate therefore entered again into the Praetorium, and called Jesus, and said unto him, Art thou the King of the Jews?", "Jesus answered, Sayest thou this of thyself, or did others tell it thee concerning me?", "Pilate answered, Am I a Jew? Thine own nation and the chief priests delivered thee unto me: what hast thou done?", "Jesus answered, My kingdom is not of this world: if my kingdom were of this world, then would my servants fight, that I should not be delivered to the Jews: but now is my kingdom not from hence.", "Pilate therefore said unto him, Art thou a king then? Jesus answered, Thou sayest that I am a king. To this end have I been born, and to this end am I come into the world, that I should bear witness unto the truth. Every one that is of the truth heareth my voice.", "Pilate saith unto him, What is truth? And when he had said this, he went out again unto the Jews, and saith unto them, I find no crime in him.", "But ye have a custom, that I should release unto you one at the passover: will ye therefore that I release unto you the King of the Jews?", "They cried out therefore again, saying, Not this man, but Barabbas. Now Barabbas was a robber.)"], "NET": ["When he had said these things, Jesus went out with his disciples across the Kidron Valley. There was an orchard there, and he and his disciples went into it.", "(Now Judas, the one who betrayed him, knew the place too, because Jesus had met there many times with his disciples.)", "So Judas obtained a squad of soldiers and some officers of the chief priests and Pharisees. They came to the orchard with lanterns and torches and weapons.", "Then Jesus, because he knew everything that was going to happen to him, came and asked them, “Who are you looking for?”", "They replied, “Jesus the Nazarene.” He told them, “I am he.” (Now Judas, the one who betrayed him, was standing there with them.)", "So when Jesus said to them, “I am he,” they retreated and fell to the ground.", "Then Jesus asked them again, “Who are you looking for?” And they said, “Jesus the Nazarene.”", "Jesus replied, “I told you that I am he. If you are looking for me, let these men go.”", "He said this to fulfill the word he had spoken, “I have not lost a single one of those whom you gave me.”", "Then Simon Peter, who had a sword, pulled it out and struck the high priest’s slave, cutting off his right ear. (Now the slave’s name was Malchus.)", "But Jesus said to Peter, “Put your sword back into its sheath! Am I not to drink the cup that the Father has given me?”", "Then the squad of soldiers with their commanding officer and the officers of the Jewish leaders arrested Jesus and tied him up.", "They brought him first to Annas, for he was the father-in-law of Caiaphas, who was high priest that year.", "(Now it was Caiaphas who had advised the Jewish leaders that it was to their advantage that one man die for the people.)", "Simon Peter and another disciple followed them as they brought Jesus to Annas. (Now the other disciple was acquainted with the high priest, and he went with Jesus into the high priest’s courtyard.)", "But Peter was left standing outside by the door. So the other disciple who was acquainted with the high priest came out and spoke to the slave girl who watched the door, and brought Peter inside.", "The girl who was the doorkeeper said to Peter, “You’re not one of this man’s disciples too, are you?” He replied, “I am not.”", "(Now the slaves and the guards were standing around a charcoal fire they had made, warming themselves because it was cold. Peter also was standing with them, warming himself.)", "While this was happening, the high priest questioned Jesus about his disciples and about his teaching.", "Jesus replied, “I have spoken publicly to the world. I always taught in the synagogues and in the temple courts, where all the Jewish people assemble together. I have said nothing in secret.", "Why do you ask me? Ask those who heard what I said. They know what I said.”", "When Jesus had said this, one of the high priest’s officers who stood nearby struck him on the face and said, “Is that the way you answer the high priest?”", "Jesus replied, “If I have said something wrong, confirm what is wrong. But if I spoke correctly, why strike me?”", "Then Annas sent him, still tied up, to Caiaphas the high priest.", "Meanwhile Simon Peter was standing in the courtyard warming himself. They said to him, “You aren’t one of his disciples too, are you?” Peter denied it: “I am not!”", "One of the high priest’s slaves, a relative of the man whose ear Peter had cut off, said, “Did I not see you in the orchard with him?”", "Then Peter denied it again, and immediately a rooster crowed.", "Then they brought Jesus from Caiaphas to the Roman governor’s residence. (Now it was very early morning.) They did not go into the governor’s residence so they would not be ceremonially defiled, but could eat the Passover meal.", "So Pilate came outside to them and said, “What accusation do you bring against this man?”", "They replied, “If this man were not a criminal, we would not have handed him over to you.”", "Pilate told them, “Take him yourselves and pass judgment on him according to your own law!” The Jewish leaders replied, “We cannot legally put anyone to death.”", "(This happened to fulfill the word Jesus had spoken when he indicated what kind of death he was going to die.)", "So Pilate went back into the governor’s residence, summoned Jesus, and asked him, “Are you the king of the Jews?”", "Jesus replied, “Are you saying this on your own initiative, or have others told you about me?”", "Pilate answered, “I am not a Jew, am I? Your own people and your chief priests handed you over to me. What have you done?”", "Jesus replied, “My kingdom is not from this world. If my kingdom were from this world, my servants would be fighting to keep me from being handed over to the Jewish authorities. But as it is, my kingdom is not from here.”", "Then Pilate said, “So you are a king!” Jesus replied, “You say that I am a king. For this reason I was born, and for this reason I came into the world—to testify to the truth. Everyone who belongs to the truth listens to my voice.”", "Pilate asked, “What is truth?” When he had said this he went back outside to the Jewish leaders and announced, “I find no basis for an accusation against him.", "But it is your custom that I release one prisoner for you at the Passover. So do you want me to release for you the king of the Jews?”", "Then they shouted back, “Not this man, but Barabbas!” (Now Barabbas was a revolutionary.)"], "WEB": ["When Jesus had spoken these words, he went out with his disciples over the brook Kidron, where there was a garden, into which he and his disciples entered.", "Now Judas, who betrayed him, also knew the place, for Jesus often met there with his disciples.", "Judas then, having taken a detachment of soldiers and officers from the chief priests and the Pharisees, came there with lanterns, torches, and weapons.", "Jesus therefore, knowing all the things that were happening to him, went out, and said to them, “Who are you looking for?”", "They answered him, “Jesus of Nazareth.” Jesus said to them, “I am he.” Judas also, who betrayed him, was standing with them.", "When therefore he said to them, “I am he,” they went backward, and fell to the ground.", "Again therefore he asked them, “Who are you looking for?” They said, “Jesus of Nazareth.”", "Jesus answered, “I told you that I am he. If therefore you seek me, let these go their way,”", "that the word might be fulfilled which he spoke, “Of those whom you have given me, I have lost none.”", "Simon Peter therefore, having a sword, drew it, and struck the high priest’s servant, and cut off his right ear. The servant’s name was Malchus.", "Jesus therefore said to Peter, “Put the sword into its sheath. The cup which the Father has given me, shall I not surely drink it?”", "So the detachment, the commanding officer, and the officers of the Jews, seized Jesus and bound him,", "and led him to Annas first, for he was father-in-law to Caiaphas, who was high priest that year.", "Now it was Caiaphas who advised the Jews that it was expedient that one man should perish for the people.", "Simon Peter followed Jesus, as did another disciple. Now that disciple was known to the high priest, and entered in with Jesus into the court of the high priest;", "but Peter was standing at the door outside. So the other disciple, who was known to the high priest, went out and spoke to her who kept the door, and brought in Peter.", "Then the maid who kept the door said to Peter, “Are you also one of this man’s disciples?” He said, “I am not.”", "Now the servants and the officers were standing there, having made a fire of coals, for it was cold. They were warming themselves. Peter was with them, standing and warming himself.", "The high priest therefore asked Jesus about his disciples, and about his teaching.", "Jesus answered him, “I spoke openly to the world. I always taught in synagogues, and in the temple, where the Jews always meet. I said nothing in secret.", "Why do you ask me? Ask those who have heard me what I said to them. Behold, these know the things which I said.”", "When he had said this, one of the officers standing by slapped Jesus with his hand, saying, “Do you answer the high priest like that?”", "Jesus answered him, “If I have spoken evil, testify of the evil; but if well, why do you beat me?”", "Annas sent him bound to Caiaphas, the high priest.", "Now Simon Peter was standing and warming himself. They said therefore to him, “You aren’t also one of his disciples, are you?” He denied it, and said, “I am not.”", "One of the servants of the high priest, being a relative of him whose ear Peter had cut off, said, “Didn’t I see you in the garden with him?”", "Peter therefore denied it again, and immediately the rooster crowed.", "They led Jesus therefore from Caiaphas into the Praetorium. It was early, and they themselves didn’t enter into the Praetorium, that they might not be defiled, but might eat the Passover.", "Pilate therefore went out to them, and said, “What accusation do you bring against this man?”", "They answered him, “If this man weren’t an evildoer, we wouldn’t have delivered him up to you.”", "Pilate therefore said to them, “Take him yourselves, and judge him according to your law.” Therefore the Jews said to him, “It is not lawful for us to put anyone to death,”", "that the word of Jesus might be fulfilled, which he spoke, signifying by what kind of death he should die.", "Pilate therefore entered again into the Praetorium, called Jesus, and said to him, “Are you the King of the Jews?”", "Jesus answered him, “Do you say this by yourself, or did others tell you about me?”", "Pilate answered, “I’m not a Jew, am I? Your own nation and the chief priests delivered you to me. What have you done?”", "Jesus answered, “My Kingdom is not of this world. If my Kingdom were of this world, then my servants would fight, that I wouldn’t be delivered to the Jews. But now my Kingdom is not from here.”", "Pilate therefore said to him, “Are you a king then?” Jesus answered, “You say that I am a king. For this reason I have been born, and for this reason I have come into the world, that I should testify to the truth. Everyone who is of the truth listens to my voice.”", "Pilate said to him, “What is truth?” When he had said this, he went out again to the Jews, and said to them, “I find no basis for a charge against him.", "But you have a custom, that I should release someone to you at the Passover. Therefore, do you want me to release to you the King of the Jews?”", "Then they all shouted again, saying, “Not this man, but Barabbas!” Now Barabbas was a robber."]}, "studyNotes": "John - Chapter 18\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus is betrayed in Gethsemane (declaring \"I AM\" and causing soldiers to fall), arrested, tried before Annas and Caiaphas, denied by Peter, and brought before Pilate — telling him \"My kingdom is not of this world.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 18 records the arrest of Jesus in Gethsemane, His\ntrials before Annas and Caiaphas, Peter's three denials, and the beginning of\nHis trial before Pontius Pilate. John's account is eyewitness testimony — he\nwas present at the high priest's courtyard (v.15-16) and at the cross (19:26).\n\nThe Garden of Gethsemane: Located across the Kidron Valley from Jerusalem on\nthe western slope of the Mount of Olives. Jesus had gone there regularly with\nHis disciples (v.2), which is why Judas knew where to find Him. The name means\n\"oil press\" — fitting for the place where Jesus was crushed under the weight\nof what lay ahead.\n\nThe Trials: Jesus faced six trials — three Jewish (Annas, Caiaphas, Sanhedrin)\nand three Roman (Pilate, Herod, Pilate again). Every trial found Him innocent.\nHe was condemned not by evidence but by political pressure and religious hatred.\n\nPilate's Question (v.38): \"What is truth?\" — One of the most haunting questions\nin Scripture. Pilate asked it and walked away without waiting for an answer —\nthe posture of a man who doesn't really want to know.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Gethsemane / the Kidron Valley (v.1): Jesus crossed the Kidron Brook (east of Jerusalem) and entered a garden on the western slope of the Mount of Olives. He was arrested here.\n- Annas' and Caiaphas' house (vv.13-24): Jesus was taken first to Annas, then to Caiaphas the high priest. Peter denied Jesus in the courtyard.\n- The Praetorium (v.28): The Roman governor's headquarters in Jerusalem where Jesus was tried before Pilate.\n\nKEY VERSES\n------------------------------------\nv.4  — \"Jesus, knowing all that would happen to him, came forward.\" (ESV) —\n        Jesus walked into His arrest with full knowledge and full\n        willingness. No one took His life — He gave it.\n\nv.11 — \"Shall I not drink the cup that the Father has given me?\" (ESV) —\n        Jesus' submission to the Father's will — even the cup of suffering.\n\nv.36 — \"My kingdom is not of this world.\" (ESV) — The nature of Christ's\n        kingdom — not political, not military, but spiritual and eternal.\n\nv.38 — \"What is truth?\" (ESV) — Pilate's question to the One who said \"I am\n        the truth\" — the tragic irony of the trial.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Matthew 26:36-46 — The Gethsemane prayer (not recorded in John).\nv.6   — Psalm 27:2 — \"When evil men advance against me... they will stumble.\"\nv.9   — John 6:39 — \"I shall lose none of all that he has given me.\"\nv.10  — Luke 22:51 — Jesus heals Malchus' ear.\nv.11  — Matthew 26:39 — \"Not my will, but yours be done.\"\nv.20  — John 7:14,26 — Jesus taught openly in the Temple.\nv.28  — Exodus 12:43-49 — The Passover regulations — ironic that they\n        avoided defilement while condemning the Passover Lamb.\nv.36  — Daniel 7:13-14 — The Son of Man receiving an eternal kingdom.\nv.37  — John 14:6 — \"I am the truth.\"\nv.40  — Isaiah 53:6 — \"We all, like sheep, have gone astray.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-18/\n  Guzik examines the significance of Jesus saying \"I AM\" in the garden,\n  Peter's sword vs. Jesus' submission, the Jewish trial process, and\n  Pilate's tragic question about truth.\n\nCharles Spurgeon:\n  Sermon: \"The Arrest of Jesus\" on vv.4-8 (MTP Vol. 37, No. 2193)\n  \"He went forth — not dragged, not surprised, not overwhelmed. He went\n  forth knowing all things. He met them. He identified Himself. He\n  protected His disciples. Every step of the arrest was under His control.\n  They did not take Him — He gave Himself.\"\n  Sermon: \"What Is Truth?\" on v.38 (MTP Vol. 34, No. 2039)\n  \"Pilate asked the question and turned away. That is the tragedy of\n  unbelief — not that men cannot find truth, but that they will not wait\n  for the answer. Truth was standing before him. He walked away.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — KJV: \"the brook Cedron\" / ESV: \"the brook Kidron\" — Greek \"Kedron\" — KJV uses the Anglicized \"Cedron\"; ESV uses the more accurate transliteration \"Kidron.\" Both refer to the same valley between Jerusalem and the Mount of Olives.\n\nv.3  — KJV: \"a band of men and officers\" / ESV: \"a band of soldiers and some officers\" — Greek \"speira\" — A Roman cohort (potentially 200-600 soldiers). ESV adds \"soldiers\" for clarity. The size of the arresting party reveals how seriously the authorities took Jesus.\n\nv.5  — KJV: \"I am he\" / ESV: \"I am he\" — Greek \"ego eimi\" — Both add \"he\" for English clarity, but the raw Greek is simply \"I AM\" — the divine name. This explains why the soldiers fell backward (v.6) — they encountered the power of the divine name.\n  [ASV/NET/WEB]: NET: \"I am he\" — Greek egō eimi (\"I AM\"). When Jesus\n       says this, they \"drew back and fell to the ground\" (v.6).\n       WEB: \"I am he.\" KJV: \"I am he.\" The divine name causes\n       physical collapse — even at His arrest, His power is\n       unmistakable. He is taken because He allows it.\n\nv.11 — KJV: \"the cup which my Father hath given me, shall I not drink it?\" / ESV: \"shall I not drink the cup that the Father has given me?\" — Both equivalent. The \"cup\" is a metaphor for suffering and divine wrath (Isaiah 51:17, Psalm 75:8).\n  [ASV/NET/WEB]: NET: \"Put your sword back into its sheath! Am I not to\n       drink the cup that the Father has given me?\" — \"the cup\" —\n       John's version of Gethsemane's prayer. WEB: \"the cup which\n       the Father has given me.\" KJV: \"the cup which my Father\n       hath given me.\" John assumes readers know the Synoptic\n       agony; he focuses on Jesus' resolve.\n\nv.28 — KJV: \"lest they should be defiled; but that they might eat the passover\" / ESV: \"so that they would not be defiled, but could eat the Passover\" — Both equivalent. The irony John highlights: the religious leaders were scrupulous about ritual purity while engineering the murder of an innocent man.\n  [ASV/NET/WEB]: NET: \"Then they brought Jesus from Caiaphas to the Roman\n       governor's residence. (Now it was very early morning.) They\n       did not go into the governor's residence so they would not\n       be ceremonially defiled\" — the irony: they won't enter a\n       Gentile building for purity reasons while plotting murder.\n       WEB: \"that they might not be defiled.\"\n\nv.36 — KJV: \"My kingdom is not of this world\" / ESV: \"My kingdom is not of this world\" — Both identical. \"Of this world\" means \"originating from this world\" — not that it has no relevance to this world, but that its source and nature are heavenly.\n  [ASV/NET/WEB]: NET: \"My kingdom is not from this world\" — \"from\" (ek =\n       out of/originating from) not merely \"in.\" WEB: \"My Kingdom\n       is not of this world.\" KJV: \"My kingdom is not of this\n       world.\" His kingdom exists IN the world but doesn't\n       originate FROM it — different source, different methods.\n\nv.38 — KJV: \"What is truth?\" / ESV: \"What is truth?\" — Both identical. Greek \"ti estin alētheia\" — Pilate's haunting question, asked of the One who said \"I am the truth\" (14:6). He walked away without waiting for an answer.\n  [ASV/NET/WEB]: NET: \"What is truth?\" — Pilate's question. WEB: \"What is\n       truth?\" KJV: \"What is truth?\" Ironic: truth incarnate\n       stands before him and he asks the question philosophically\n       rather than personally. He doesn't wait for an answer.\n\nv.40 — KJV: \"Barabbas... was a robber\" / ESV: \"Barabbas was a robber\" — Greek \"lēstēs\" — Can mean robber, bandit, or insurrectionist. The guilty freed, the innocent condemned — a picture of substitutionary atonement.\n\n\nGLOSSARY\n------------------------------------\nCedron/Kidron — The valley between Jerusalem and the Mount of Olives, with\n               a seasonal stream. Jesus crossed it to reach Gethsemane.\n\nGethsemane    — \"Oil press\" in Hebrew/Aramaic. A garden on the Mount of Olives\n               where Jesus regularly prayed with His disciples.\n\nAnnas         — Former high priest (AD 6-15), still highly influential. Father-\n               in-law of Caiaphas. Jesus was brought to him first.\n\nCaiaphas      — The reigning high priest (AD 18-36). He had already determined\n               Jesus must die (John 11:50). His trial of Jesus was illegal\n               under Jewish law (held at night, verdict predetermined).\n\nPraetorium    — The Roman governor's official residence and judgment hall in\n               Jerusalem. Pilate conducted Jesus' Roman trial here.\n\nBarabbas      — A convicted robber and insurrectionist. The crowd chose to\n               release him rather than Jesus — the guilty freed, the innocent\n               condemned. A picture of substitutionary atonement.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus \"went forth\" to meet His arresters — He was not surprised or\n   overwhelmed. He walked into suffering with full knowledge and full\n   willingness. When you face suffering, do you see it as something happening\n   to you, or as something you can walk into with Christ's strength?\n\n2. Peter drew his sword to fight — Jesus told him to put it away (v.11).\n   Peter's instinct was to protect Jesus through force. Jesus' way was\n   submission to the Father's will. Where in your life are you fighting\n   battles with the wrong weapons?\n\n3. Peter warmed himself at the enemy's fire (v.18) — and denied Jesus three\n   times. Compromise often begins with small decisions to be comfortable in\n   the wrong company. Where are you warming yourself at fires that are pulling\n   you away from Christ?\n\n4. Pilate asked \"What is truth?\" and walked away (v.38). He had Truth standing\n   in front of him and chose political convenience over it. Where in your life\n   are you walking away from truth because acting on it would cost you something?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. When Jesus said \"I AM,\" the soldiers fell backward (v.6). Even in His\n   arrest, His divine power was evident — He chose not to use it. What does\n   it mean to you that Jesus had the power to escape but chose to submit?\n   How does that shape your understanding of the cross?\n\n2. Peter cut off Malchus' ear — an act of misguided loyalty. Jesus healed\n   it (Luke 22:51). Jesus cleaned up Peter's mess even on the way to the\n   cross. Has Jesus ever cleaned up a mess you made? How does that grace\n   affect your loyalty to Him?\n\n3. Peter denied Jesus three times — the man who had said \"I will lay down\n   my life for you.\" What does Peter's failure tell you about the danger of\n   self-confidence in spiritual matters? How do you guard against it?\n\n4. The religious leaders were careful not to defile themselves ritually while\n   they were murdering an innocent man (v.28). Religious scrupulousness can\n   coexist with profound moral blindness. Where might you be careful about\n   religious externals while missing something more important?\n\n5. Jesus told Pilate \"My kingdom is not of this world\" (v.36). How does\n   living as a citizen of a heavenly kingdom change how you relate to earthly\n   power, politics, and authority?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 18:1-18 - Glory Under Arrest:\n    https://enduringword.com/media/john-18-glory-arrest/\n  John 18:19-40 - Glory On Trial:\n    https://enduringword.com/media/john-18-glory-trial/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "19": {"translations": {"ESV": ["Then Pilate took Jesus and flogged him.", "And the soldiers twisted together a crown of thorns and put it on his head and arrayed him in a purple robe.", "They came up to him, saying, “Hail, King of the Jews!” and struck him with their hands.", "Pilate went out again and said to them, “See, I am bringing him out to you that you may know that I find no guilt in him.”", "So Jesus came out, wearing the crown of thorns and the purple robe. Pilate said to them, “Behold the man!”", "When the chief priests and the officers saw him, they cried out, “Crucify him, crucify him!” Pilate said to them, “Take him yourselves and crucify him, for I find no guilt in him.”", "The Jews answered him, “We have a law, and according to that law he ought to die because he has made himself the Son of God.”", "When Pilate heard this statement, he was even more afraid.", "He entered his headquarters again and said to Jesus, “Where are you from?” But Jesus gave him no answer.", "So Pilate said to him, “You will not speak to me? Do you not know that I have authority to release you and authority to crucify you?”", "Jesus answered him, “You would have no authority over me at all unless it had been given you from above. Therefore he who delivered me over to you has the greater sin.”", "From then on Pilate sought to release him, but the Jews cried out, “If you release this man, you are not Caesar’s friend. Everyone who makes himself a king opposes Caesar.”", "So when Pilate heard these words, he brought Jesus out and sat down on the judgment seat at a place called The Stone Pavement, and in Aramaic Gabbatha.", "Now it was the day of Preparation of the Passover. It was about the sixth hour. He said to the Jews, “Behold your King!”", "They cried out, “Away with him, away with him, crucify him!” Pilate said to them, “Shall I crucify your King?” The chief priests answered, “We have no king but Caesar.”", "So he delivered him over to them to be crucified. So they took Jesus,", "and he went out, bearing his own cross, to the place called The Place of a Skull, which in Aramaic is called Golgotha.", "There they crucified him, and with him two others, one on either side, and Jesus between them.", "Pilate also wrote an inscription and put it on the cross. It read, “Jesus of Nazareth, the King of the Jews.”", "Many of the Jews read this inscription, for the place where Jesus was crucified was near the city, and it was written in Aramaic, in Latin, and in Greek.", "So the chief priests of the Jews said to Pilate, “Do not write, ‘The King of the Jews,’ but rather, ‘This man said, I am King of the Jews.’”", "Pilate answered, “What I have written I have written.”", "When the soldiers had crucified Jesus, they took his garments and divided them into four parts, one part for each soldier; also his tunic. But the tunic was seamless, woven in one piece from top to bottom,", "so they said to one another, “Let us not tear it, but cast lots for it to see whose it shall be.” This was to fulfill the Scripture which says, “They divided my garments among them, and for my clothing they cast lots.” So the soldiers did these things,", "but standing by the cross of Jesus were his mother and his mother’s sister, Mary the wife of Clopas, and Mary Magdalene.", "When Jesus saw his mother and the disciple whom he loved standing nearby, he said to his mother, “Woman, behold, your son!”", "Then he said to the disciple, “Behold, your mother!” And from that hour the disciple took her to his own home.", "After this, Jesus, knowing that all was now finished, said (to fulfill the Scripture), “I thirst.”", "A jar full of sour wine stood there, so they put a sponge full of the sour wine on a hyssop branch and held it to his mouth.", "When Jesus had received the sour wine, he said, “It is finished,” and he bowed his head and gave up his spirit.", "Since it was the day of Preparation, and so that the bodies would not remain on the cross on the Sabbath (for that Sabbath was a high day), the Jews asked Pilate that their legs might be broken and that they might be taken away.", "So the soldiers came and broke the legs of the first, and of the other who had been crucified with him.", "But when they came to Jesus and saw that he was already dead, they did not break his legs.", "But one of the soldiers pierced his side with a spear, and at once there came out blood and water.", "He who saw it has borne witness—his testimony is true, and he knows that he is telling the truth—that you also may believe.", "For these things took place that the Scripture might be fulfilled: “Not one of his bones will be broken.”", "And again another Scripture says, “They will look on him whom they have pierced.”", "After these things Joseph of Arimathea, who was a disciple of Jesus, but secretly for fear of the Jews, asked Pilate that he might take away the body of Jesus, and Pilate gave him permission. So he came and took away his body.", "Nicodemus also, who earlier had come to Jesus by night, came bringing a mixture of myrrh and aloes, about seventy-five pounds in weight.", "So they took the body of Jesus and bound it in linen cloths with the spices, as is the burial custom of the Jews.", "Now in the place where he was crucified there was a garden, and in the garden a new tomb in which no one had yet been laid.", "So because of the Jewish day of Preparation, since the tomb was close at hand, they laid Jesus there."], "KJV": ["Then Pilate therefore took Jesus, and scourged him.", "And the soldiers platted a crown of thorns, and put it on his head, and they put on him a purple robe,", "And said, Hail, King of the Jews! and they smote him with their hands.", "Pilate therefore went forth again, and saith unto them, Behold, I bring him forth to you, that ye may know that I find no fault in him.", "Then came Jesus forth, wearing the crown of thorns, and the purple robe. And Pilate saith unto them, Behold the man!", "When the chief priests therefore and officers saw him, they cried out, saying, Crucify him, crucify him. Pilate saith unto them, Take ye him, and crucify him: for I find no fault in him.", "The Jews answered him, We have a law, and by our law he ought to die, because he made himself the Son of God.", "When Pilate therefore heard that saying, he was the more afraid;", "And went again into the judgment hall, and saith unto Jesus, Whence art thou? But Jesus gave him no answer.", "Then saith Pilate unto him, Speakest thou not unto me? knowest thou not that I have power to crucify thee, and have power to release thee?", "Jesus answered, Thou couldest have no power at all against me, except it were given thee from above: therefore he that delivered me unto thee hath the greater sin.", "And from thenceforth Pilate sought to release him: but the Jews cried out, saying, If thou let this man go, thou art not Caesar’s friend: whosoever maketh himself a king speaketh against Caesar.", "When Pilate therefore heard that saying, he brought Jesus forth, and sat down in the judgment seat in a place that is called the Pavement, but in the Hebrew, Gabbatha.", "And it was the preparation of the passover, and about the sixth hour: and he saith unto the Jews, Behold your King!", "But they cried out, Away with him, away with him, crucify him. Pilate saith unto them, Shall I crucify your King? The chief priests answered, We have no king but Caesar.", "Then delivered he him therefore unto them to be crucified. And they took Jesus, and led him away.", "And he bearing his cross went forth into a place called the place of a skull, which is called in the Hebrew Golgotha:", "Where they crucified him, and two others with him, on either side one, and Jesus in the midst.", "And Pilate wrote a title, and put it on the cross. And the writing was, JESUS OF NAZARETH THE KING OF THE JEWS.", "This title then read many of the Jews: for the place where Jesus was crucified was nigh to the city: and it was written in Hebrew, and Greek, and Latin.", "Then said the chief priests of the Jews to Pilate, Write not, The King of the Jews; but that he said, I am King of the Jews.", "Pilate answered, What I have written I have written.", "Then the soldiers, when they had crucified Jesus, took his garments, and made four parts, to every soldier a part; and also his coat: now the coat was without seam, woven from the top throughout.", "They said therefore among themselves, Let us not rend it, but cast lots for it, whose it shall be: that the scripture might be fulfilled, which saith, They parted my raiment among them, and for my vesture they did cast lots. These things therefore the soldiers did.", "Now there stood by the cross of Jesus his mother, and his mother’s sister, Mary the wife of Cleophas, and Mary Magdalene.", "When Jesus therefore saw his mother, and the disciple standing by, whom he loved, he saith unto his mother, Woman, behold thy son!", "Then saith he to the disciple, Behold thy mother! And from that hour that disciple took her unto his own home.", "After this, Jesus knowing that all things were now accomplished, that the scripture might be fulfilled, saith, I thirst.", "Now there was set a vessel full of vinegar: and they filled a spunge with vinegar, and put it upon hyssop, and put it to his mouth.", "When Jesus therefore had received the vinegar, he said, It is finished: and he bowed his head, and gave up the ghost.", "The Jews therefore, because it was the preparation, that the bodies should not remain upon the cross on the sabbath day, (for that sabbath day was an high day,) besought Pilate that their legs might be broken, and that they might be taken away.", "Then came the soldiers, and brake the legs of the first, and of the other which was crucified with him.", "But when they came to Jesus, and saw that he was dead already, they brake not his legs:", "But one of the soldiers with a spear pierced his side, and forthwith came there out blood and water.", "And he that saw it bare record, and his record is true: and he knoweth that he saith true, that ye might believe.", "For these things were done, that the scripture should be fulfilled, A bone of him shall not be broken.", "And again another scripture saith, They shall look on him whom they pierced.", "And after this Joseph of Arimathaea, being a disciple of Jesus, but secretly for fear of the Jews, besought Pilate that he might take away the body of Jesus: and Pilate gave him leave. He came therefore, and took the body of Jesus.", "And there came also Nicodemus, which at the first came to Jesus by night, and brought a mixture of myrrh and aloes, about an hundred pound weight.", "Then took they the body of Jesus, and wound it in linen clothes with the spices, as the manner of the Jews is to bury.", "Now in the place where he was crucified there was a garden; and in the garden a new sepulchre, wherein was never man yet laid.", "There laid they Jesus therefore because of the Jews’ preparation day; for the sepulchre was nigh at hand."], "ASV": ["Then Pilate therefore took Jesus, and scourged him.", "And the soldiers platted a crown of thorns, and put it on his head, and arrayed him in a purple garment;", "and they came unto him, and said, Hail, King of the Jews! and they struck him with their hands.", "And Pilate went out again, and saith unto them, Behold, I bring him out to you, that ye may know that I find no crime in him.", "Jesus therefore came out, wearing the crown of thorns and the purple garment. And [Pilate] saith unto them, Behold, the man!", "When therefore the chief priests and the officers saw him, they cried out, saying, Crucify [him], crucify [him]! Pilate saith unto them, Take him yourselves, and crucify him: for I find no crime in him.", "The Jews answered him, We have a law, and by that law he ought to die, because he made himself the Son of God.", "When Pilate therefore heard this saying, he was the more afraid;", "and he entered into the Praetorium again, and saith unto Jesus, Whence art thou? But Jesus gave him no answer.", "Pilate therefore saith unto him, Speakest thou not unto me? Knowest thou not that I have power to release thee, and have power to crucify thee?", "Jesus answered him, Thou wouldest have no power against me, except it were given thee from above: therefore he that delivered me unto thee hath greater sin.", "Upon this Pilate sought to release him: but the Jews cried out, saying, If thou release this man, thou art not Caesar`s friend: every one that maketh himself a king speaketh against Caesar.", "When Pilate therefore heard these words, he brought Jesus out, and sat down on the judgment-seat at a place called The Pavement, but in Hebrew, Gabbatha.", "Now it was the Preparation of the passover: it was about the sixth hour. And he saith unto the Jews, Behold, your King!", "They therefore cried out, Away with [him], away with [him], crucify him! Pilate saith unto them, Shall I crucify your King? The chief priests answered, We have no king but Caesar.", "Then therefore he delivered him unto them to be crucified.", "They took Jesus therefore: and he went out, bearing the cross for himself, unto the place called The place of a skull, which is called in Hebrew, Golgotha:", "where they crucified him, and with him two others, on either side one, and Jesus in the midst.", "And Pilate wrote a title also, and put it on the cross. And there was written, JESUS OF NAZARETH, THE KING OF THE JEWS.", "This title therefore read many of the Jews, for the place where Jesus was crucified was nigh to the city; and it was written in Hebrew, [and] in Latin, [and] in Greek.", "The chief priests of the Jews therefore said to Pilate, Write not, The King of the Jews; but that he said, I am King of the Jews.", "Pilate answered, What I have written I have written.", "The soldiers therefore, when they had crucified Jesus, took his garments and made four parts, to every soldier a part; and also the coat: now the coat was without seam, woven from the top throughout.", "They said therefore one to another, Let us not rend it, but cast lots for it, whose it shall be: that the scripture might be fulfilled, which saith, They parted my garments among them, And upon my vesture did they cast lots.", "These things therefore the soldiers did. But there were standing by the cross of Jesus his mother, and his mother`s sister, Mary the [wife] of Clopas, and Mary Magdalene.", "When Jesus therefore saw his mother, and the disciple standing by whom he loved, he saith unto his mother, Woman, behold thy son!", "Then saith he to the disciple, Behold, thy mother! And from that hour the disciple took her unto his own [home].", "After this Jesus, knowing that all things are now finished, that the scripture might be accomplished, saith, I thirst.", "There was set there a vessel full of vinegar: so they put a sponge full of the vinegar upon hyssop, and brought it to his mouth.", "When Jesus therefore had received the vinegar, he said, It is finished: and he bowed his head, and gave up his spirit.", "The Jews therefore, because it was the Preparation, that the bodies should not remain on the cross upon the sabbath (for the day of that sabbath was a high [day]), asked of Pilate that their legs might be broken, and [that] they might be taken away.", "The soldiers therefore came, and brake the legs of the first, and of the other that was crucified with him:", "but when they came to Jesus, and saw that he was dead already, they brake not his legs:", "howbeit one of the soldiers with a spear pierced his side, and straightway there came out blood and water.", "And he that hath seen hath borne witness, and his witness is true: and he knoweth that he saith true, that ye also may believe.", "For these things came to pass, that the scripture might be fulfilled, A bone of him shall not be broken.", "And again another scripture saith, They shall look on him whom they pierced.", "And after these things Joseph of Arimathaea, being a disciple of Jesus, but secretly for fear of the Jews, asked of Pilate that he might take away the body of Jesus: and Pilate gave [him] leave. He came therefore, and took away his body.", "And there came also Nicodemus, he who at the first came to him by night, bringing a mixture of myrrh and aloes, about a hundred pounds.", "So they took the body of Jesus, and bound it in linen cloths with the spices, as the custom of the Jews is to bury.", "Now in the place where he was crucified there was a garden; and in the garden a new tomb wherein was never man yet laid.", "There then because of the Jews` Preparation (for the tomb was nigh at hand) they laid Jesus."], "NET": ["Then Pilate took Jesus and had him flogged severely.", "The soldiers braided a crown of thorns and put it on his head, and they clothed him in a purple robe.", "They came up to him again and again and said, “Hail, king of the Jews!” And they struck him repeatedly in the face.", "Again Pilate went out and said to the Jewish leaders, “Look, I am bringing him out to you, so that you may know that I find no reason for an accusation against him.”", "So Jesus came outside, wearing the crown of thorns and the purple robe. Pilate said to them, “Look, here is the man!”", "When the chief priests and their officers saw him, they shouted out, “Crucify him! Crucify him!” Pilate said, “You take him and crucify him! Certainly I find no reason for an accusation against him!”", "The Jewish leaders replied, “We have a law, and according to our law he ought to die because he claimed to be the Son of God!”", "When Pilate heard what they said, he was more afraid than ever,", "and he went back into the governor’s residence and said to Jesus, “Where do you come from?” But Jesus gave him no answer.", "So Pilate said, “Do you refuse to speak to me? Don’t you know I have the authority to release you and to crucify you?”", "Jesus replied, “You would have no authority over me at all, unless it was given to you from above. Therefore the one who handed me over to you is guilty of greater sin.”", "From this point on, Pilate tried to release him. But the Jewish leaders shouted out, “If you release this man, you are no friend of Caesar! Everyone who claims to be a king opposes Caesar!”", "When Pilate heard these words he brought Jesus outside and sat down on the judgment seat in the place called “The Stone Pavement” (Gabbatha in Aramaic).", "(Now it was the day of preparation for the Passover, about noon.) Pilate said to the Jewish leaders, “Look, here is your king!”", "Then they shouted out, “Away with him! Away with him! Crucify him!” Pilate asked, “Shall I crucify your king?” The high priests replied, “We have no king except Caesar!”", "Then Pilate handed him over to them to be crucified.So they took Jesus,", "and carrying his own cross he went out to the place called “The Place of the Skull” (called in Aramaic Golgotha).", "There they crucified him along with two others, one on each side, with Jesus in the middle.", "Pilate also had a notice written and fastened to the cross, which read: “Jesus the Nazarene, the king of the Jews.”", "Thus many of the Jewish residents of Jerusalem read this notice because the place where Jesus was crucified was near the city, and the notice was written in Aramaic, Latin, and Greek.", "Then the chief priests of the Jews said to Pilate, “Do not write, ‘The king of the Jews,’ but rather, ‘This man said, I am king of the Jews.’”", "Pilate answered, “What I have written, I have written.”", "Now when the soldiers crucified Jesus, they took his clothes and made four shares, one for each soldier, and the tunic remained. (Now the tunic was seamless, woven from top to bottom as a single piece.)", "So the soldiers said to one another, “Let’s not tear it, but throw dice to see who will get it.” This took place to fulfill the scripture that says, “They divided my garments among them, and for my clothing they threw dice.” So the soldiers did these things.", "Now standing beside Jesus’ cross were his mother, his mother’s sister, Mary the wife of Clopas, and Mary Magdalene.", "So when Jesus saw his mother and the disciple whom he loved standing there, he said to his mother, “Woman, look, here is your son!”", "He then said to his disciple, “Look, here is your mother!” From that very time the disciple took her into his own home.", "After this Jesus, realizing that by this time everything was completed, said (in order to fulfill the scripture), “I am thirsty!”", "A jar full of sour wine was there, so they put a sponge soaked in sour wine on a branch of hyssop and lifted it to his mouth.", "When he had received the sour wine, Jesus said, “It is completed!” Then he bowed his head and gave up his spirit.", "Then because it was the day of preparation, so that the bodies should not stay on the crosses on the Sabbath (for that Sabbath was an especially important one), the Jewish leaders asked Pilate to have the victims’ legs broken and the bodies taken down.", "So the soldiers came and broke the legs of the two men who had been crucified with Jesus, first the one and then the other.", "But when they came to Jesus and saw that he was already dead, they did not break his legs.", "But one of the soldiers pierced his side with a spear, and blood and water flowed out immediately.", "And the person who saw it has testified (and his testimony is true, and he knows that he is telling the truth), so that you also may believe.", "For these things happened so that the scripture would be fulfilled, “Not a bone of his will be broken.”", "And again another scripture says, “They will look on the one whom they have pierced.”", "After this, Joseph of Arimathea, a disciple of Jesus (but secretly because he feared the Jewish leaders), asked Pilate if he could remove the body of Jesus. Pilate gave him permission, so he went and took the body away.", "Nicodemus, the man who had previously come to Jesus at night, accompanied Joseph, carrying a mixture of myrrh and aloes weighing about 75 pounds.", "Then they took Jesus’ body and wrapped it, with the aromatic spices, in strips of linen cloth according to Jewish burial customs.", "Now at the place where Jesus was crucified there was a garden, and in the garden was a new tomb where no one had yet been buried.", "And so, because it was the Jewish day of preparation and the tomb was nearby, they placed Jesus’ body there."], "WEB": ["So Pilate then took Jesus, and flogged him.", "The soldiers twisted thorns into a crown, and put it on his head, and dressed him in a purple garment.", "They kept saying, “Hail, King of the Jews!” and they kept slapping him.", "Then Pilate went out again, and said to them, “Behold, I bring him out to you, that you may know that I find no basis for a charge against him.”", "Jesus therefore came out, wearing the crown of thorns and the purple garment. Pilate said to them, “Behold, the man!”", "When therefore the chief priests and the officers saw him, they shouted, saying, “Crucify! Crucify!” Pilate said to them, “Take him yourselves, and crucify him, for I find no basis for a charge against him.”", "The Jews answered him, “We have a law, and by our law he ought to die, because he made himself the Son of God.”", "When therefore Pilate heard this saying, he was more afraid.", "He entered into the Praetorium again, and said to Jesus, “Where are you from?” But Jesus gave him no answer.", "Pilate therefore said to him, “Aren’t you speaking to me? Don’t you know that I have power to release you, and have power to crucify you?”", "Jesus answered, “You would have no power at all against me, unless it were given to you from above. Therefore he who delivered me to you has greater sin.”", "At this, Pilate was seeking to release him, but the Jews cried out, saying, “If you release this man, you aren’t Caesar’s friend! Everyone who makes himself a king speaks against Caesar!”", "When Pilate therefore heard these words, he brought Jesus out, and sat down on the judgment seat at a place called “The Pavement”, but in Hebrew, “Gabbatha.”", "Now it was the Preparation Day of the Passover, at about the sixth hour. He said to the Jews, “Behold, your King!”", "They cried out, “Away with him! Away with him! Crucify him!” Pilate said to them, “Shall I crucify your King?” The chief priests answered, “We have no king but Caesar!”", "So then he delivered him to them to be crucified. So they took Jesus and led him away.", "He went out, bearing his cross, to the place called “The Place of a Skull”, which is called in Hebrew, “Golgotha”,", "where they crucified him, and with him two others, on either side one, and Jesus in the middle.", "Pilate wrote a title also, and put it on the cross. There was written, “JESUS OF NAZARETH, THE KING OF THE JEWS.”", "Therefore many of the Jews read this title, for the place where Jesus was crucified was near the city; and it was written in Hebrew, in Latin, and in Greek.", "The chief priests of the Jews therefore said to Pilate, “Don’t write, ‘The King of the Jews,’ but, ‘he said, “I am King of the Jews.”’”", "Pilate answered, “What I have written, I have written.”", "Then the soldiers, when they had crucified Jesus, took his garments and made four parts, to every soldier a part; and also the coat. Now the coat was without seam, woven from the top throughout.", "Then they said to one another, “Let’s not tear it, but cast lots for it to decide whose it will be,” that the Scripture might be fulfilled, which says, “They parted my garments among them. For my cloak they cast lots.” Therefore the soldiers did these things.", "But there were standing by the cross of Jesus his mother, and his mother’s sister, Mary the wife of Clopas, and Mary Magdalene.", "Therefore when Jesus saw his mother, and the disciple whom he loved standing there, he said to his mother, “Woman, behold, your son!”", "Then he said to the disciple, “Behold, your mother!” From that hour, the disciple took her to his own home.", "After this, Jesus, seeing that all things were now finished, that the Scripture might be fulfilled, said, “I am thirsty.”", "Now a vessel full of vinegar was set there; so they put a sponge full of the vinegar on hyssop, and held it at his mouth.", "When Jesus therefore had received the vinegar, he said, “It is finished.” He bowed his head, and gave up his spirit.", "Therefore the Jews, because it was the Preparation Day, so that the bodies wouldn’t remain on the cross on the Sabbath (for that Sabbath was a special one), asked of Pilate that their legs might be broken, and that they might be taken away.", "Therefore the soldiers came, and broke the legs of the first, and of the other who was crucified with him;", "but when they came to Jesus, and saw that he was already dead, they didn’t break his legs.", "However one of the soldiers pierced his side with a spear, and immediately blood and water came out.", "He who has seen has testified, and his testimony is true. He knows that he tells the truth, that you may believe.", "For these things happened, that the Scripture might be fulfilled, “A bone of him will not be broken.”", "Again another Scripture says, “They will look on him whom they pierced.”", "After these things, Joseph of Arimathaea, being a disciple of Jesus, but secretly for fear of the Jews, asked of Pilate that he might take away Jesus’ body. Pilate gave him permission. He came therefore and took away his body.", "Nicodemus, who at first came to Jesus by night, also came bringing a mixture of myrrh and aloes, about a hundred Roman pounds.", "So they took Jesus’ body, and bound it in linen cloths with the spices, as the custom of the Jews is to bury.", "Now in the place where he was crucified there was a garden. In the garden was a new tomb in which no man had ever yet been laid.", "Then because of the Jews’ Preparation Day (for the tomb was near at hand) they laid Jesus there."]}, "studyNotes": "John - Chapter 19\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nPilate scourges Jesus and presents Him (\"Behold the man!\"), delivers Him to crucifixion under the inscription \"King of the Jews,\" Jesus commits His mother to John, declares \"It is finished,\" and is buried in Joseph's garden tomb.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John — an eyewitness to the crucifixion (v.26,35).\n\nHistorical Context: Chapter 19 records the crucifixion and burial of Jesus.\nJohn's account is the most detailed of the four Gospels, written by someone\nwho stood at the foot of the cross. He records seven statements Jesus made\nfrom the cross (the \"Seven Last Words\"), though John records only three of them.\n\nRoman Crucifixion: One of the most brutal forms of execution ever devised.\nThe condemned was first scourged — beaten with a flagellum (leather whip\nembedded with bone and metal) that tore flesh to the bone. Then forced to\ncarry the crossbeam to the execution site. Nailed through the wrists and feet,\nthe victim died of asphyxiation as the body's weight made breathing impossible.\nDeath could take hours or days.\n\n\"It Is Finished\" (v.30): Greek \"tetelestai\" — a single word meaning \"paid in\nfull,\" \"accomplished,\" \"completed.\" The same word was stamped on paid bills in\nthe ancient world. Jesus' final word from the cross was not a cry of defeat\nbut a declaration of victory — the work of redemption was complete.\n\nFulfilled Prophecy: John notes multiple Old Testament prophecies fulfilled at\nthe crucifixion: the soldiers casting lots for His garment (Psalm 22:18), no\nbones broken (Exodus 12:46, Numbers 9:12, Psalm 34:20), and the piercing\n(Zechariah 12:10).\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Praetorium (v.9): Pilate's judgment hall in Jerusalem where Jesus was scourged and sentenced.\n- Gabbatha / the Pavement (v.13): The stone pavement where Pilate rendered his verdict. A raised platform for public judgment.\n- Golgotha (v.17): \"The place of a skull\" — outside Jerusalem's walls. John preserves the Hebrew/Aramaic name.\n- A garden near Golgotha (v.41): Joseph of Arimathea's tomb was in a garden near the crucifixion site — a new tomb where Jesus was buried.\n\nKEY VERSES\n------------------------------------\nv.5  — \"Behold the man!\" (ESV) (Ecce Homo) — Pilate's presentation of the\n        beaten Jesus — intended to evoke pity, but the crowd demanded\n        crucifixion.\n\nv.11 — \"You would have no authority over me at all unless it had been given\n        you from above.\" (ESV) — All human authority is derived from God. Even\n        Pilate's power over Jesus was given by the Father.\n\nv.26-27 — Jesus caring for His mother from the cross — even in agony, He\n        fulfilled His responsibility as a son.\n\nv.30 — \"It is finished.\" (ESV) — Tetelestai — paid in full. The greatest three\n        words in human history.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Isaiah 53:5 — \"By his wounds we are healed.\"\nv.2   — Matthew 27:29 — The crown of thorns.\nv.17  — Genesis 22:6 — Isaac carrying the wood for his own sacrifice —\n        a type of Christ.\nv.23-24 — Psalm 22:18 — \"They divide my garments among them and cast lots.\"\nv.28  — Psalm 22:15 — \"My tongue sticks to the roof of my mouth.\"\nv.30  — Hebrews 9:12 — \"He entered the Most Holy Place once for all.\"\nv.30  — Hebrews 10:14 — \"By one sacrifice he has made perfect forever those\n        who are being made holy.\"\nv.34  — Zechariah 12:10 — \"They will look on me, the one they have pierced.\"\nv.36  — Exodus 12:46 — \"Do not break any of the bones\" — the Passover lamb.\nv.38-39 — Isaiah 53:9 — \"He was assigned a grave with the wicked, and with\n        the rich in his death.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-19/\n  Guzik examines the scourging, the \"Ecce Homo\" moment, the title on the\n  cross in three languages, Jesus' care for His mother, the meaning of\n  \"tetelestai,\" and the significance of the blood and water from His side.\n\nCharles Spurgeon:\n  Sermon: \"It Is Finished\" on v.30 (MTP Vol. 4, No. 173)\n  \"Tetelestai — it is finished. The debt is paid. The law is satisfied.\n  The prophecies are fulfilled. The sacrifice is complete. Sin is atoned\n  for. Death is conquered. Hell is defeated. It is finished — and because\n  it is finished, you and I may be saved.\"\n  Sermon: \"The Pierced One\" on v.34 (MTP Vol. 37, No. 2197)\n  \"Blood and water from His side — the blood of atonement and the water\n  of cleansing. Everything we need for salvation and sanctification flowed\n  from the wounded side of Christ.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — KJV: \"Pilate therefore took Jesus, and scourged him\" / ESV: \"Then Pilate took Jesus and flogged him\" — Greek \"emastigōsen\" — KJV uses \"scourged\"; ESV uses \"flogged.\" Both refer to the brutal Roman flagellum — a whip with multiple leather thongs embedded with bone and metal.\n\nv.5  — KJV: \"Behold the man!\" / ESV: \"Behold the man!\" — Latin \"Ecce Homo\" — Both identical. Pilate's words have become one of the most famous phrases in history.\n  [ASV/NET/WEB]: NET: \"Behold, the man!\" — \"the man\" (ho anthrōpos).\n       WEB: \"Behold, the man!\" KJV: \"Behold the man!\" Latin: Ecce\n       homo. Pilate presents Jesus beaten, crowned with thorns —\n       perhaps hoping for pity. Unwittingly, he declares a\n       theological truth: behold what a man truly is.\n\nv.11 — KJV: \"Thou couldest have no power at all against me, except it were given thee from above\" / ESV: \"You would have no authority over me at all unless it had been given you from above\" — Greek \"exousian\" / \"anōthen\" — KJV uses \"power\"; ESV uses \"authority.\" \"From above\" (anōthen) — the same word used in John 3:3 for being \"born from above.\" All authority is derived from God.\n\nv.14 — KJV: \"about the sixth hour\" / ESV: \"about the sixth hour\" — Both identical. John's timing differs from Mark 15:25 (\"the third hour\"). This is one of the most discussed chronological questions in the Gospels. Possible explanations: different time-reckoning systems (Roman vs. Jewish), or John rounding differently.\n\nv.17 — NET: \"carrying his own cross he went out to the place\n       called 'The Place of the Skull'\" — \"carrying his own cross\"\n       (bastazōn heautō ton stauron). WEB: \"carrying his cross.\"\n       John doesn't mention Simon of Cyrene — he emphasizes Jesus\n       bearing His own burden. Theologicaly: no one else carries\n       His cross for Him.\n\nv.26 — NET: \"Woman, look, here is your son! ... Look, here is\n       your mother!\" — Jesus provides for His mother from the cross.\n       WEB: \"Woman, behold, your son! ... Behold, your mother!\"\n       KJV: \"Woman, behold thy son!\" Even in agony, He fulfills\n       the command to honor His mother.\n\nv.30 — KJV: \"It is finished: and he bowed his head, and gave up the ghost\" / ESV: \"It is finished, and he bowed his head and gave up his spirit\" — Greek \"tetelestai\" / \"paredōken to pneuma\" — KJV uses \"gave up the ghost\" (archaic); ESV uses \"gave up his spirit.\" He handed over His spirit — an act of will, not passive death.\n  [ASV/NET/WEB]: NET: \"It is completed!\" — \"completed\" (tetelestai = paid\n       in full, finished, accomplished). KJV: \"It is finished.\"\n       WEB: \"It is finished!\" A single Greek word — perfect tense.\n       The work of redemption is not in progress but DONE. An\n       accounting term: the debt is paid.\n\nv.34 — KJV: \"one of the soldiers with a spear pierced his side, and forthwith came there out blood and water\" / ESV: \"one of the soldiers pierced his side with a spear, and at once there came out blood and water\" — Both equivalent. Medically significant — the blood and water indicate pericardial effusion, confirming death. Theologically: blood of atonement and water of cleansing.\n  [ASV/NET/WEB]: NET: \"one of the soldiers pierced his side with a spear,\n       and blood and water flowed out immediately\" — \"blood and\n       water\" — medically consistent with pericardial effusion\n       (confirming death). WEB: \"blood and water came out.\" John\n       emphasizes his eyewitness testimony (v.35). Luke the\n       physician would appreciate this detail from the non-\n       physician John.\n\nv.39 — KJV: \"about an hundred pound weight\" / ESV: \"about seventy-five pounds in weight\" — Greek \"litras hekaton\" — KJV uses Roman pounds (100 litrai ≈ 75 modern pounds). ESV converts to modern measurement. An extravagant amount — fit for a king's burial.\n\n\nGLOSSARY\n------------------------------------\nScourge       — A Roman flagellum — a whip with multiple leather thongs\n               embedded with bone, metal, or glass. Designed to tear flesh.\n               Many died from scourging alone.\n\nGolgotha      — Aramaic for \"place of a skull.\" Latin: Calvary. The site of\n               the crucifixion, just outside Jerusalem's walls.\n\nTetelestai    — Greek: \"It is finished\" / \"paid in full.\" A commercial term\n               stamped on receipts when a debt was fully paid. Jesus' final\n               declaration from the cross.\n\nHyssop        — A plant used in Jewish purification rituals (Exodus 12:22,\n               Psalm 51:7). Used to lift the vinegar to Jesus' lips — a\n               detail connecting His death to the Passover.\n\nGabbatha      — Aramaic for \"elevated place\" or \"pavement.\" The stone\n               pavement where Pilate's judgment seat was located.\n\nSepulchre     — A tomb, burial place. Joseph of Arimathea's new tomb, cut\n               from rock, was used for Jesus' burial.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. \"It is finished\" (v.30). The work of your salvation is complete — not\n   in progress, not dependent on your performance. Jesus paid the full debt.\n   Are you living in the freedom of a finished salvation, or are you still\n   trying to add to what Christ has already completed?\n\n2. Even while dying on the cross, Jesus made sure His mother was cared for\n   (vv.26-27). In the middle of His greatest suffering, He was thinking of\n   others. As a man, how do you care for the people who depend on you even\n   when you are under pressure or in pain?\n\n3. Joseph of Arimathea was a secret disciple \"for fear of the Jews\" (v.38).\n   But at the moment of greatest risk — after the crucifixion, when following\n   Jesus seemed most dangerous — he came forward. What is it that finally\n   moves a man from secret faith to public faith? What is holding you back\n   from being more open about your faith?\n\n4. Nicodemus, who came to Jesus by night in chapter 3, now brings 100 pounds\n   of spices to honor Jesus' body. His faith grew quietly but surely. How is\n   your faith growing? Are you moving toward Christ or staying in the same\n   place you were a year ago?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Pilate declared Jesus innocent three times (18:38, 19:4, 19:6) and still\n   condemned Him. He knew the truth and chose political safety. Where in your\n   life are you choosing safety or comfort over what you know is right?\n\n2. The soldiers cast lots for Jesus' garment while He hung dying above them\n   (v.23-24). They were indifferent to the greatest event in human history.\n   Is it possible to be physically present at religious events while being\n   spiritually indifferent? How do you guard against that in your own life?\n\n3. \"Tetelestai — It is finished.\" What does it mean to you personally that\n   your salvation is complete? How does a finished salvation change how you\n   relate to God — in prayer, in guilt, in confidence?\n\n4. Jesus was crucified between two criminals (v.18). He died in the place of\n   sinners, surrounded by sinners, identified with sinners. What does it mean\n   to you that the Son of God chose to be numbered with transgressors?\n\n5. John stood at the cross (v.26) while most of the disciples had fled. What\n   does it cost to stand with Christ when standing with Him is dangerous or\n   unpopular? When have you stood, and when have you fled?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 19:1-16 - Glory Mocked and Condemned:\n    https://enduringword.com/media/john-19-glory-mocked-condemned/\n  John 19:17-30 - Glory Crucified:\n    https://enduringword.com/media/john-19-glory-crucified/\n  John 19:31-42 - Glory Buried:\n    https://enduringword.com/media/john-19-glory-buried/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "20": {"translations": {"ESV": ["Now on the first day of the week Mary Magdalene came to the tomb early, while it was still dark, and saw that the stone had been taken away from the tomb.", "So she ran and went to Simon Peter and the other disciple, the one whom Jesus loved, and said to them, “They have taken the Lord out of the tomb, and we do not know where they have laid him.”", "So Peter went out with the other disciple, and they were going toward the tomb.", "Both of them were running together, but the other disciple outran Peter and reached the tomb first.", "And stooping to look in, he saw the linen cloths lying there, but he did not go in.", "Then Simon Peter came, following him, and went into the tomb. He saw the linen cloths lying there,", "and the face cloth, which had been on Jesus’ head, not lying with the linen cloths but folded up in a place by itself.", "Then the other disciple, who had reached the tomb first, also went in, and he saw and believed;", "for as yet they did not understand the Scripture, that he must rise from the dead.", "Then the disciples went back to their homes.", "But Mary stood weeping outside the tomb, and as she wept she stooped to look into the tomb.", "And she saw two angels in white, sitting where the body of Jesus had lain, one at the head and one at the feet.", "They said to her, “Woman, why are you weeping?” She said to them, “They have taken away my Lord, and I do not know where they have laid him.”", "Having said this, she turned around and saw Jesus standing, but she did not know that it was Jesus.", "Jesus said to her, “Woman, why are you weeping? Whom are you seeking?” Supposing him to be the gardener, she said to him, “Sir, if you have carried him away, tell me where you have laid him, and I will take him away.”", "Jesus said to her, “Mary.” She turned and said to him in Aramaic, “Rabboni!” (which means Teacher).", "Jesus said to her, “Do not cling to me, for I have not yet ascended to the Father; but go to my brothers and say to them, ‘I am ascending to my Father and your Father, to my God and your God.’”", "Mary Magdalene went and announced to the disciples, “I have seen the Lord”—and that he had said these things to her.", "On the evening of that day, the first day of the week, the doors being locked where the disciples were for fear of the Jews, Jesus came and stood among them and said to them, “Peace be with you.”", "When he had said this, he showed them his hands and his side. Then the disciples were glad when they saw the Lord.", "Jesus said to them again, “Peace be with you. As the Father has sent me, even so I am sending you.”", "And when he had said this, he breathed on them and said to them, “Receive the Holy Spirit.", "If you forgive the sins of any, they are forgiven them; if you withhold forgiveness from any, it is withheld.”", "Now Thomas, one of the twelve, called the Twin, was not with them when Jesus came.", "So the other disciples told him, “We have seen the Lord.” But he said to them, “Unless I see in his hands the mark of the nails, and place my finger into the mark of the nails, and place my hand into his side, I will never believe.”", "Eight days later, his disciples were inside again, and Thomas was with them. Although the doors were locked, Jesus came and stood among them and said, “Peace be with you.”", "Then he said to Thomas, “Put your finger here, and see my hands; and put out your hand, and place it in my side. Do not disbelieve, but believe.”", "Thomas answered him, “My Lord and my God!”", "Jesus said to him, “Have you believed because you have seen me? Blessed are those who have not seen and yet have believed.”", "Now Jesus did many other signs in the presence of the disciples, which are not written in this book;", "but these are written so that you may believe that Jesus is the Christ, the Son of God, and that by believing you may have life in his name."], "KJV": ["The first day of the week cometh Mary Magdalene early, when it was
