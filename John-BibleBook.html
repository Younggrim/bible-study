 life.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 6 is the longest chapter in John's Gospel and\ncontains two of Jesus' most dramatic miracles — feeding 5,000 men (plus women\nand children) and walking on water — followed by His most controversial teaching:\nthe Bread of Life discourse. The chapter ends with mass defection from His\nfollowers and Peter's great confession.\n\nFeeding the 5,000: The only miracle (besides the resurrection) recorded in all\nfour Gospels. It took place near the Sea of Galilee (also called the Sea of\nTiberias) shortly before Passover. The crowd's response — wanting to make Jesus\nking by force (v.15) — reveals they wanted a political messiah who would feed\nthem and overthrow Rome, not a spiritual Savior who would die for their sins.\n\nThe Bread of Life Discourse: Delivered in the synagogue at Capernaum (v.59),\nthis teaching was so hard for many followers that they left (v.66). Jesus\ndeliberately did not soften it to keep the crowd. He was separating those who\nfollowed for bread from those who followed in genuine faith.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Sea of Galilee / Sea of Tiberias (v.1): The feeding of the 5,000 occurred on the northeast shore near Bethsaida. Jesus walked on the water crossing to Capernaum.\n- Capernaum / the synagogue (v.59): The Bread of Life discourse was delivered in the synagogue at Capernaum.\n- Tiberias (v.23): A city on the western shore of the Sea of Galilee, built by Herod Antipas. Boats from Tiberias came near where the miracle occurred.\n\nKEY VERSES\n------------------------------------\nv.35 — \"I am the bread of life; whoever comes to me shall not hunger, and\n        whoever believes in me shall never thirst.\" (ESV) — The first of seven\n        \"I AM\" statements in John's Gospel.\n\nv.37 — \"All that the Father gives me will come to me, and whoever comes to me\n        I will never cast out.\" (ESV) — The security of the believer —\n        Jesus will never reject anyone who comes to Him.\n\nv.44 — \"No one can come to me unless the Father who sent me draws him.\" (ESV)\n        — The sovereignty of God in salvation.\n\nv.63 — \"It is the Spirit who gives life; the flesh is no help at all. The words\n        that I have spoken to you are spirit and life.\" (ESV)\n\nv.68 — \"Lord, to whom shall we go? You have the words of eternal life.\" (ESV) —\n        Peter's confession — the only reasonable response to Christ.\n\nCROSS-REFERENCES\n------------------------------------\nv.9   — 2 Kings 4:42-44 — Elisha feeds 100 men with 20 loaves — a smaller\n        miracle that foreshadows this one.\nv.11  — Matthew 14:19 — The parallel account of the feeding.\nv.14  — Deuteronomy 18:15 — The prophet Moses promised was coming.\nv.20  — Exodus 3:14 — \"I AM\" — Jesus uses the divine name.\nv.31  — Exodus 16:4 — God raining bread (manna) from heaven.\nv.35  — Isaiah 55:1-2 — \"Come, buy and eat... why spend money on what does\n        not satisfy?\"\nv.37  — John 10:28-29 — No one can snatch them from His hand.\nv.44  — Romans 8:29-30 — The golden chain of salvation.\nv.51  — Isaiah 53:10 — His life as an offering for sin.\nv.68  — Acts 4:12 — \"There is no other name under heaven by which we must\n        be saved.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-6/\n  Guzik addresses the meaning of eating Jesus' flesh and drinking His blood\n  (spiritual participation vs. literal), the doctrine of election in vv.37-44,\n  and the significance of Peter's confession in the context of mass desertion.\n\nCharles Spurgeon:\n  Sermon: \"The Bread of Life\" on v.35 (MTP Vol. 27, No. 1597)\n  \"He that cometh to Me shall never hunger. Never — not sometimes, not usually,\n  not in most cases — never. The soul that has truly come to Christ has found\n  that which satisfies every craving of the human spirit. Nothing else will do\n  it. Everything else has been tried and found wanting.\"\n  Sermon: \"Sovereign Grace and Man's Responsibility\" on v.37 (MTP Vol. 10)\n  \"All that the Father gives Me shall come — sovereignty. Him that comes I will\n  not cast out — free invitation. Both truths stand. Hold them both.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.7  — KJV: \"Two hundred pennyworth of bread\" / ESV: \"Two hundred denarii worth of bread\" — Greek \"denarion\" — KJV uses archaic \"pennyworth\"; ESV uses the actual coin name \"denarii.\" A denarius was one day's wage — 200 denarii = approximately 8 months' wages.\n  [ASV/NET/WEB]: NET: \"Two hundred silver coins worth of bread would not\n       be enough for each one to get a little\" — \"silver coins\"\n       (dēnariōn = denarii, about 8 months' wages). KJV: \"two\n       hundred pennyworth.\" WEB: \"Two hundred denarii worth.\"\n       Philip calculates impossibility; Jesus has already decided\n       what He will do (v.6).\n\nv.10 — KJV: \"Make the men sit down\" / ESV: \"Have the people sit down\" — Greek \"anthropous\" — Can mean people generally. John notes \"the men sat down, in number about five thousand\" — the Greek \"andres\" (men specifically) is used for the count. Matthew 14:21 adds \"besides women and children\" — total crowd likely 15,000-20,000.\n\nv.19 — KJV: \"five and twenty or thirty furlongs\" / ESV: \"about three or four miles\" — Greek \"stadious\" — KJV uses the literal Greek measurement; ESV converts to modern miles for clarity.\n\nv.20 — KJV: \"It is I; be not afraid\" / ESV: \"It is I; do not be afraid\" — Greek \"ego eimi\" — Both equivalent. The phrase \"It is I\" is literally \"I AM\" — an echo of the divine name (Exodus 3:14).\n  [ASV/NET/WEB]: NET: \"It is I. Do not be afraid\" — \"It is I\" (egō eimi =\n       I AM). WEB: \"It is I. Don't be afraid.\" KJV: \"It is I; be\n       not afraid.\" The phrase functions both as identification and\n       as a divine name claim — \"I AM\" walks on water.\n\nv.27 — KJV: \"Labour not for the meat which perisheth\" / ESV: \"Do not work for the food that perishes\" — Both equivalent. KJV's \"meat\" means food generally (archaic); \"labour\" becomes \"work.\" Jesus is not condemning honest work but redirecting ultimate priorities.\n\nv.35 — NET: \"I am the bread of life. The one who comes to me will\n       never go hungry, and the one who believes in me will never\n       be thirsty\" — the first of John's seven \"I AM\" statements\n       with predicates. WEB: \"I am the bread of life.\" All\n       versions — the offer is absolute and unconditional.\n\nv.44 — KJV: \"except the Father which hath sent me draw him\" / ESV: \"unless the Father who sent me draws him\" — Greek \"helkuo\" — Both identical in meaning. \"Draw\" means to drag or pull with force — the same word used for hauling in a fishing net (John 21:6). This is not a gentle invitation but an irresistible drawing.\n\nv.53 — NET: \"unless you eat the flesh of the Son of Man and drink\n       his blood, you have no life in yourselves\" — the most\n       debated verse in John. WEB: \"Unless you eat the flesh of\n       the Son of Man and drink his blood, you don't have life in\n       yourselves.\" Eucharistic? Metaphorical? All translations\n       preserve the shocking language without softening it.\n\nv.54 — KJV: \"Whoso eateth my flesh, and drinketh my blood\" / ESV: \"Whoever feeds on my flesh and drinks my blood\" — Greek \"trogon\" — KJV uses \"eateth\"; ESV uses \"feeds on.\" The Greek word means to munch or gnaw — a vivid, physical word used to emphasize the reality of spiritual participation in Christ.\n\nv.63 — KJV: \"the flesh profiteth nothing\" / ESV: \"the flesh is no help at all\" — Both equivalent. Jesus is not denigrating His physical body but clarifying that a literal, physical eating of His flesh is not what He means. The spiritual reality is what gives life.\n\nv.68 — NET: \"Lord, to whom would we go? You have the words of\n       eternal life\" — Peter's confession when many leave. WEB:\n       \"Lord, to whom would we go? You have the words of eternal\n       life.\" KJV: \"Lord, to whom shall we go? thou hast the words\n       of eternal life.\" Not \"we understand\" but \"where else could\n       we possibly go?\n\nv.69 — KJV: \"thou art that Christ, the Son of the living God\" / ESV: \"you are the Holy One of God\" — Greek \"ho hagios tou theou\" — ESV follows older manuscripts reading \"Holy One of God\"; KJV follows manuscripts reading \"Christ, the Son of the living God.\" Both affirm Peter's confession of Jesus' divine identity.\n\n\nGLOSSARY\n------------------------------------\nPennyworth    — A denarius, a Roman silver coin representing one day's wage\n               for a laborer. 200 denarii = approximately 8 months' wages.\n\nBarley loaves — Barley bread was the food of the poor. Five small loaves and\n               two fish — a child's lunch — became the raw material for a\n               miracle feeding thousands.\n\nFurlongs      — A unit of distance, approximately 1/8 of a mile. 25-30 furlongs\n               = about 3-4 miles across the Sea of Galilee.\n\nManna         — Hebrew for \"what is it?\" — the miraculous bread God provided\n               for Israel in the wilderness for 40 years (Exodus 16). Jesus\n               presents Himself as the true manna from heaven.\n\nI AM          — The divine name God revealed to Moses (Exodus 3:14). Jesus'\n               \"I am the bread of life\" is the first of seven \"I AM\" statements\n               in John, each claiming divine identity.\n\nMurmured      — To grumble or complain under one's breath. The same word used\n               of Israel's complaints against God in the wilderness — John\n               draws the parallel deliberately.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. The crowd followed Jesus because He fed them (v.26), not because of who He\n   was. It's easy to follow Jesus when He's giving you what you want. What\n   happens to your faith when He doesn't? What are you really following Him for?\n\n2. Jesus said \"him that cometh to me I will in no wise cast out\" (v.37). No\n   matter what you've done, no matter how far you've wandered — if you come to\n   Him, He will not turn you away. Do you believe that for yourself?\n\n3. Many disciples walked away when the teaching got hard (v.66). Jesus didn't\n   chase them or soften the message. He turned to the twelve and asked \"Will\n   you also go away?\" As a man, when following Christ costs you something —\n   relationships, reputation, comfort — what is your answer to that question?\n\n4. Peter said \"Lord, to whom shall we go? You have the words of eternal life\"\n   (v.68). This is not blind loyalty — it's reasoned conviction. Peter had\n   looked at every alternative and concluded there was none. Have you reached\n   that same conclusion? What would it take?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus tested Philip by asking where they would buy bread, \"for he himself\n   knew what he would do\" (v.6). God often allows us to face impossible\n   situations He already has a plan for. How does knowing God tests us with\n   problems He already has answers to change how you face difficulties?\n\n2. The boy gave his five loaves and two fish — everything he had — and Jesus\n   multiplied it. What small, seemingly insufficient thing do you have that\n   God might want you to place in His hands?\n\n3. After the feeding, the crowd wanted to make Jesus king by force (v.15).\n   They wanted a Jesus who served their agenda. In what ways are you tempted\n   to shape Jesus into the kind of Savior you want rather than accepting Him\n   as He is?\n\n4. Jesus said \"No man can come to me, except the Father draw him\" (v.44).\n   If you are a believer, God drew you to Christ. How does that truth affect\n   your gratitude, your humility, and your confidence in your salvation?\n\n5. When many disciples left, Jesus asked the twelve \"Will you also go away?\"\n   Peter answered for himself — not for the group. Your faith is personal.\n   If Jesus asked you that question today, what would your honest answer be?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 6:1-13 - Opposed by the Impossible:\n    https://enduringword.com/media/john-6-opposed-impossible/\n  John 6:14-21 - Opposed by the Storm:\n    https://enduringword.com/media/john-6-opposed-storm/\n  John 6:22-46 - Opposed by Sign-Seekers:\n    https://enduringword.com/media/john-6-opposed-sign-seekers/\n  John 6:47-71 - Opposed by Word-Twisters:\n    https://enduringword.com/media/john-6-opposed-word-twisters/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "7": {"translations": {"ESV": ["After this Jesus went about in Galilee. He would not go about in Judea, because the Jews were seeking to kill him.", "Now the Jews’ Feast of Booths was at hand.", "So his brothers said to him, “Leave here and go to Judea, that your disciples also may see the works you are doing.", "For no one works in secret if he seek u are doing these things, show yourself to the world.”", "(For not even his own brothers believed in him.)", "So Jesus replied, “My time has not yet arrived, but you are ready at any opportunity!", "The world cannot hate you, but it hates me because I am testifying about it that its deeds are evil.", "You go up to the feast yourselves. I am not going up to this feast because my time has not yet fully arrived.”", "When he had said this, he remained in Galilee.", "But when his brothers had gone up to the feast, then Jesus himself also went up, not openly but in secret.", "So the Jewish leaders were looking for him at the feast, asking, “Where is he?”", "There was a lot of grumbling about him among the crowds. Some were saying, “He is a good man,” but others, “He deceives the common people.”", "However, no one spoke openly about him for fear of the Jewish leaders.", "When the feast was half over, Jesus went up to the temple courts and began to teach.", "Then the Jewish leaders were astonished and said, “How does this man know so much when he has never had formal instruction?”", "So Jesus replied, “My teaching is not from me, but from the one who sent me.", "If anyone wants to do God’s will, he will know about my teaching, whether it is from God or whether I speak from my own authority.", "The person who speaks on his own authority desires to receive honor for himself; the one who desires the honor of the one who sent him is a man of integrity, and there is no unrighteousness in him.", "Hasn’t Moses given you the law? Yet not one of you keeps the law! Why do you want to kill me?”", "The crowd answered, “You’re possessed by a demon! Who is trying to kill you?”", "Jesus replied, “I performed one miracle and you are all amazed.", "However, because Moses gave you the practice of circumcision (not that it came from Moses, but from the forefathers), you circumcise a male child on the Sabbath.", "But if a male child is circumcised on the Sabbath so that the law of Moses is not  were going to receive, for the Spirit had not yet been given because Jesus was not yet glorified.)", "When they heard these words, some of the crowd began to say, “This really is the Prophet!”", "Others said, “This is the Christ!” But still others said, “No, for the Christ doesn’t come from Galilee, does he?", "Don’t the scriptures say that the Christ is a descendant of David and comes from Bethlehem, the village where David lived?”", "So there was a division in the crowd because of Jesus.", "Some of them were wanting to seize him, but no one laid a hand on him.", "Then the officers returned to the chief priests and Pharisees, who said to them, “Why didn’t you bring him back with you?”", "The officers replied, “No one ever spoke like this man!”", "Then the Pharisees answered, “You haven’t been deceived too, have you?", "None of the members of the ruling council or the Pharisees have believed in him, have they?", "But this rabble who do not know the law are accursed!”", "Nicodemus, who had gone to Jesus before and who was one of the rulers, said,", "“Our law doesn’t condemn a man unless it first hears from him and learns what he is doing, does it?”", "They replied, “You aren’t from Galilee too, are you? Investigate carefully and you will see that no prophet comes from Galilee!”", "[[And each one departed to his own house."], "WEB": ["After these things, Jesus was walking in Galilee, for he wouldn’t walk in Judea, because the Jews sought to kill him.", "Now the feast of the Jews, the Feast of Booths, was at hand.", "His brothers therefore said to him, “Depart from here, and go into Judea, that your disciples also may see your works which you do.", "For no one does anything in secret, and himself seeks to be known openly. If you do these things, reveal yourself to the world.”", "For even his brothers didn’t believe in him.", "Jesus therefore said to them, “My time has not yet come, but your time is always ready.", "The world can’t hate you, but it hates me, because I  "The officers therefore came to the chief priests and Pharisees, and they said to them, “Why didn’t you bring him?”", "The officers answered, “No man ever spoke like this man!”", "The Pharisees therefore answered them, “You aren’t also led astray, are you?", "Have any of the rulers believed in him, or of the Pharisees?", "But this multitude that doesn’t know the law is accursed.”", "Nicodemus (he who came to him by night, being one of them) said to them,", "“Does our law judge a man, unless it first hears from him personally and knows what he does?”", "They answered him, “Are you also from Galilee? Search, and see that no prophet has arisen out of Galilee.”", "Everyone went to his own house,"]}, "studyNotes": "John - Chapter 7\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nAt the Feast of Tabernacles, Jesus teaches in the temple amid growing division — some call Him a prophet, others the Christ — and on the last day He cries out, \"If anyone thirsts, let him come to me and drink.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 7 takes place at the Feast of Tabernacles\n(Sukkot) in Jerusalem — one of the three great pilgrimage feasts of Israel.\nTabernacles was a week-long celebration commemorating Israel's 40 years of\nwilderness wandering, during which the people lived in temporary shelters\n(booths/sukkot). It was also associated with prayers for rain and the\npouring out of water at the Temple altar.\n\nJesus' brothers (v.3-5) — likely sons of Joseph and Mary born after Jesus —\ndid not believe in Him at this point. Their challenge to \"show yourself to\nthe world\" echoes Satan's temptation in the wilderness (Matthew 4:6).\n\nThe Feast of Tabernacles Context: On the last and greatest day of the feast\n(v.37), the high priest would pour water from the Pool of Siloam over the\naltar — a ceremony praying for rain and recalling the water from the rock in\nthe wilderness. It is against this dramatic backdrop that Jesus stood and\ncried out \"If any man thirst, let him come unto me and drink.\"\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Jerusalem / the Temple (v.14): Jesus went up to Jerusalem for the Feast of Tabernacles (a major pilgrimage feast) and taught in the Temple courts.\n- Galilee (v.1): Jesus had been staying in Galilee, avoiding Judea because the Jews there sought to kill Him.\n- The Pool of Siloam (implied, cf. 9:7): The water-pouring ceremony during Tabernacles drew water from the Pool of Siloam — the backdrop for Jesus' \"rivers of living water\" declaration.\n\nKEY VERSES\n------------------------------------\nv.17 — \"If anyone's will is to do God's will, he will know whether the teaching\n        is from God or whether I am speaking on my own authority.\" (ESV) —\n        Obedience is the pathway to spiritual understanding.\n\nv.24 — \"Do not judge by appearances, but judge with right judgment.\" (ESV)\n        — A call to look beneath the surface and evaluate rightly.\n\nv.37-38 — \"If anyone thirsts, let him come to me and drink. Whoever believes in\n        me, as the Scripture has said, 'Out of his heart will flow rivers of\n        living water.'\" (ESV) — The open invitation of the Gospel.\n\nv.46 — \"No one ever spoke like this man!\" (ESV) — The temple officers sent to\n        arrest Jesus return empty-handed, undone by His words.\n\nCROSS-REFERENCES\n------------------------------------\nv.2   — Leviticus 23:33-43 — The institution of the Feast of Tabernacles.\nv.5   — Mark 3:21 — Jesus' family thought He was out of His mind.\nv.17  — Psalm 25:14 — \"The Lord confides in those who fear Him.\"\nv.24  — Isaiah 11:3-4 — The Messiah judges not by appearances.\nv.37  — Isaiah 55:1 — \"Come, all you who are thirsty.\"\nv.37  — Revelation 22:17 — \"Let the one who is thirsty come.\"\nv.38  — Ezekiel 47:1-12 — The river flowing from the Temple.\nv.38  — Zechariah 14:8 — Living water flowing from Jerusalem.\nv.39  — Acts 2:1-4 — The fulfillment — the Spirit poured out at Pentecost.\nv.42  — Micah 5:2 — The Messiah born in Bethlehem.\nv.50  — John 3:1-2 — Nicodemus' earlier night visit to Jesus.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-7/\n  Guzik examines the significance of the Feast of Tabernacles water ceremony,\n  the meaning of \"rivers of living water\" (v.38), and Nicodemus' courageous\n  defense of Jesus before the Sanhedrin (vv.50-51).\n\nCharles Spurgeon:\n  Sermon: \"The Invitation\" on v.37 (MTP Vol. 7, No. 367)\n  \"Jesus stood — He rose to His feet on the greatest day of the feast, when\n  all eyes were on the ceremony, and He cried — not whispered, not suggested —\n  He cried with a loud voice: If any man thirst, let him come unto Me. The\n  invitation is universal. Any man. Not any good man, not any prepared man —\n  any man.\"\n  Sermon: \"Righteous Judgment\" on v.24 (MTP Vol. 35, No. 2094)\n  \"We are quick to judge by what we see — by reputation, by appearance, by\n  what others say. Christ calls us to judge righteously — to look at the\n  substance, not the surface.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.2  — KJV: \"the Jews' feast of tabernacles\" / ESV: \"the Jews' Feast of Booths\" — Greek \"skenopegia\" — KJV uses \"tabernacles\" (Latin-derived); ESV uses \"Booths\" (more literal translation of the Hebrew \"sukkot\"). Both refer to the same feast.\n\nv.5  — NET: \"For not even his own brothers believed in him\" —\n       a striking detail. WEB: \"For even his brothers didn't\n       believe in him.\" KJV: \"For neither did his brethren believe\n       in him.\" Jesus' own family doubted until after the\n       resurrection (cf. Acts 1:14, James as leader).\n\nv.8  — KJV: \"I go not up yet unto this feast\" / ESV: \"I am not going up to this feast, for my time has not yet fully come\" — Some manuscripts omit \"yet\" (ESV footnote). If \"yet\" is original, Jesus is saying His time hasn't fully come; if omitted, it creates an apparent contradiction with v.10. Most scholars favor including \"yet\" as original.\n\nv.17 — NET: \"If anyone wants to do God's will, he will know about\n       my teaching, whether it is from God or whether I speak from\n       my own authority\" — obedience precedes understanding. WEB:\n       \"if anyone desires to do his will, he will know about the\n       teaching.\" KJV: \"If any man will do his will, he shall know\n       of the doctrine.\"\n\nv.24 — KJV: \"Judge not according to the appearance, but judge righteous judgment\" / ESV: \"Do not judge by appearances, but judge with right judgment\" — Both equivalent. Jesus calls for discernment based on substance, not surface.\n\nv.37 — KJV: \"If any man thirst, let him come unto me, and drink\" / ESV: \"If anyone thirsts, let him come to me and drink\" — Both equivalent. The open invitation of the Gospel, spoken against the backdrop of the water-pouring ceremony.\n  [ASV/NET/WEB]: NET: \"If anyone is thirsty, let him come to me, and let\n       the one who believes in me drink\" — punctuation debated:\n       does \"rivers of living water\" flow from Christ or from the\n       believer? WEB: \"If anyone is thirsty, let him come to me\n       and drink.\" NET's punctuation links drinking to believing.\n\nv.38 — KJV: \"out of his belly shall flow rivers of living water\" / ESV: \"Out of his heart will flow rivers of living water\" — Greek \"koilia\" — Literally means belly/stomach but is used idiomatically for the innermost being. ESV's \"heart\" captures the meaning better for modern readers.\n\nv.39 — KJV: \"the Holy Ghost was not yet given\" / ESV: \"the Spirit had not been given\" — Both equivalent. The Spirit existed eternally but had not yet been poured out in the new covenant fullness that came at Pentecost (Acts 2).\n\nv.46 — NET: \"No one ever spoke like this man!\" — the officers'\n       report when they return empty-handed. WEB: \"No man ever\n       spoke like this man!\" KJV: \"Never man spake like this man.\"\n       Even those sent to arrest Him were disarmed by His words.\n\nv.53–8:11 — KJV: includes the story of the woman caught in adultery as part of the text / ESV: brackets the passage with a note that the earliest manuscripts do not include it — The passage is absent from the oldest manuscripts. Most modern translations include it but note its uncertain textual history. It is consistent with Jesus' character.\n  [ASV/NET/WEB]: NET: \"So each one departed to his own home\" — this verse\n       and 7:53-8:11 (the woman caught in adultery) are absent\n       from the earliest manuscripts. NET includes them with\n       brackets. WEB includes them. The passage is likely authentic\n       tradition, though not originally part of John's Gospel.\n\n\nGLOSSARY\n------------------------------------\nFeast of Tabernacles — Hebrew \"Sukkot.\" A 7-day harvest festival in the fall\n               commemorating Israel's wilderness wandering. One of three\n               annual pilgrimage feasts requiring attendance in Jerusalem.\n\nSukkot        — Hebrew plural of \"sukkah\" (booth/shelter). Temporary structures\n               built during the feast to recall Israel's wilderness dwellings.\n\nJewry         — KJV term for Judea, the southern region of Israel centered on\n               Jerusalem. Jesus avoided it because the leaders there sought\n               to kill Him.\n\nDispersed     — The Diaspora — Jews living outside of Israel scattered throughout\n               the Roman Empire and beyond.\n\nTabernacles   — The temporary shelters (booths) built during the feast. Also\n               the name of the feast itself.\n\nRivers of living water — A metaphor for the Holy Spirit's work in and through\n               a believer — not a trickle but an overflowing abundance.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus' own brothers didn't believe in Him (v.5). Even those closest to us\n   may not understand or support our faith. How do you handle skepticism or\n   lack of support from family members regarding your faith?\n\n2. Jesus said \"If any man will do his will, he shall know\" (v.17). Spiritual\n   understanding comes through obedience, not just study. Is there something\n   God has already shown you that you haven't acted on? Could that be blocking\n   deeper understanding?\n\n3. The officers sent to arrest Jesus came back saying \"Never man spake like\n   this man\" (v.46). They were undone by His words. When did the words of\n   Jesus last stop you in your tracks? Are you reading His words with that\n   kind of openness?\n\n4. Nicodemus — a member of the Sanhedrin — spoke up for Jesus at personal risk\n   (vv.50-51). He didn't fully commit publicly yet, but he took a step. What\n   step of courage is God asking you to take in standing for what is right,\n   even when it costs you socially or professionally?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus' brothers challenged Him to \"show yourself to the world\" (v.4) — to\n   use His power for public recognition. Jesus refused. How do you handle the\n   pressure to prove yourself, to perform, or to seek public validation?\n\n2. Jesus said the world hates Him because He testifies that its works are evil\n   (v.7). If you are living like Christ, you should expect some level of the\n   world's hostility. Are you experiencing any friction with the world because\n   of your faith? Or has your faith become too comfortable and accommodating?\n\n3. Verse 17 says that willingness to do God's will leads to knowing whether\n   Jesus' teaching is from God. Is your approach to Scripture \"show me and\n   I'll obey\" or \"I'll obey and you'll show me\"? What's the difference?\n\n4. The crowd was divided about Jesus (v.43) — some said prophet, some said\n   Christ, some said He was deceiving people. The same divisions exist today.\n   How do you respond when people around you have wrong views of Jesus?\n\n5. \"Never man spake like this man\" (v.46). The officers couldn't arrest Jesus\n   because His words arrested them first. When you read the Gospels, do you\n   read them with that kind of expectation — that His words will stop you,\n   challenge you, change you?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 7:1-13 - Opposed by His Family:\n    https://enduringword.com/media/john-7-opposed-family/\n  John 7:14-36 - Opposed at the Temple:\n    https://enduringword.com/media/john-7-opposed-temple/\n  John 7:37-52 - Opposed by the Religious Rulers:\n    https://enduringword.com/media/john-7-opposed-religious-rulers/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "8": {"translations": {"ESV": ["but Jesus went to the Mount of Olives.", "Early in the morning he came again to the temple. All the people came to him, and he sat down and taught them.", "The scribes and the Pharisees brought a woman who had been caught in adultery, and placing her in the midst", "they said to him, “Teacher, this woman has been caught in the act of adultery.", "Now in the Law, Moses commanded us to stone such women. So what do you say?”", "This they said to test him, that they might have some charge to bring against him. Jesus bent down and wrote with his finger on the ground.", "And as they continued to ask him, he stood up and said to them, “Let him who is without sin among you be the first to throw a stone at her.”", "And once more he bent down and wrote on the ground.", "But when they heard it, they went away one by one, beginning with the older ones, and Jesus was left alone with the woman standing before him.", "Jesus stood up and said to her, “Woman, where are they? Has no one condemned you?”", "She said, “No one, Lord.” And Jesus said, “Neither do I condemn you; go, and from now on sin no more.”]]", "Again Jesus spoke to them, saying, “I am the light of the world. Whoever follows me will not walk in darkness, but will have the light of life.”", "So the Pharisees said to him, “You are bearing witness about yourself; your testimony is not true.”", "Jesus answered, “Even if I do bear witness about myself, my testimony is true, for I know where I came from and where I am going, but you do not know where I come from or where I am going.", "You judge according to the flesh; I judge no one.", "Yet even if I do judge, my judgment is true, for it is not I alone who judge, but I and the Father who sent me.", "In your Law it is written that the testimony of two people is true.", "I am the one who bears witness about myself, and the Father who sent me bears witness about me.”", "They said to him therefore, “Where is your Father?” Jesus answered, “You know neither me nor my Father. If you knew me, you would know my Father also.”", "These words he spoke in the treasury, as he taught in the temple; but no one arrested him, because his hour had not yet come.", "So he said to them again, “I am going away, and you will seek me, and you will die in your sin. Where I am going, you cannot come at they could bring charges against him.) Jesus bent down and wrote on the ground with his finger.", "When they persisted in asking him, he stood up straight and replied, “Whoever among you is guiltless may be the first to throw a stone at her.”", "Then he bent over again and wrote on the ground.", "Now when they heard this, they began to drift away one at a time, starting with the older ones, until Jesus was left alone with the woman standing before him.", "Jesus stood up straight and said to her, “Woman, where are they? Did no one condemn you?”", "She replied, “No one, Lord.” And Jesus said, “I do not condemn you either. Go, and from now on do not sin any more.”]]", "Then Jesus spoke out again, “I am the light of the world! The one who follows me will never walk in darkness but will have the light of life.”", "So the Pharisees objected, “You testify about yourself; your testimony is not true!”", "Jesus answered, “Even if I testify about myself, my testimony is true because I know where I came from and where I am going. But you people do not know where I came from or where I am going.", "You people judge by outward appearances; I do not judge anyone.", "But if I judge, my evaluation is accurate because I am not alone when I judge, but I and the Father who sent me do so together.", "It is written in your law that the testimony of two men is true.", "I testify about myself and the Father who sent me testifies about me.”", "Then they began asking him, “Who is your father?” Jesus answered, “You do not know either me or my Father. If you knew me you would know my Father too.”", "(Jesus spoke these words near the offering box while he was teaching in the temple courts. No one seized him because his time had not yet come.)", "Then Jesus said to them again, “I am going away, and you will look for me but will die in your sin. Where I am going you cannot come.”", "So the Jewish leaders began to say, “Perhaps he is going to kill himself because he says, ‘Where I am going you cannot come.’”", "Jesus replied, “You people are from below; I am from above. You people are from this world; I am not from this world.", "Thus I told you that you will die in your sins. For unless you believe that I am he, you will die in your sins.”", "So they said to him, “Who are you?” Jesus replied, “What I have told you from the beginning.", "I have many things to say and to judge about you, but the Father who sent me is truthful, and the things I have heard from him I speak to the world.”", "(They did not understand that he was telling them about his Father.)", "Then Jesus said, “When you lift up the Son of Man, then you will know that I am he, and I do nothing on my own initiative, but I speak just what the Father taught me.", "And the one who sent me is with me. He has not left me alone because I always do those things that please him.”", "While he was saying these things, many people believed in him.", "Then Jesus said to those Judeans who had believed him, “If you continue to follow my teaching, you are really my disciples", "and you will know the truth, and the truth will set you free.”", "“We are descendants of Abraham,” they replied, “and have never been anyone’s slaves! How can you say, ‘You will become free’?”", "Jesus answered them, “I tell you the solemn truth, everyone who practices sin is a slave of sin.", "The slave does not remain in the family forever, but the son remains forever.", "So if the son sets you free, you will be really free.", "I know that you are Abraham’s descendants. But you want to kill me because my teaching makes no progress among you.", "I am telling you the things I have seen while with the Father; as for you, practice the things you have heard from the Father!”", "They answered him, “Abraham is our father!” Jesus replied, “If you are Abraham’s children, you would be doing the deeds of Abraham.", "But now you are trying to kill me, a man who has told you the truth I heard from God. Abraham did not do this!", "You people are doing the deeds of your father.”Then they said to Jesus, “We were not born as a result of immorality! We have only one Father, God himself.”", "Jesus replied, “If God were your Father, you would love me, for I have come from God and am now here. I have not come on my own initiative, but he sent me.", "Why don’t you understand what I am saying? It is because you cannot accept my teaching.", "You people are from your father the devil, and you want to do what your father desires. He was a murderer from the beginning, and does not uphold the truth because there is no truth in him. Whenever he lies, he speaks according to his own nature because he is a liar and the father of lies.", "But because I am telling you the truth, you do not believe me.", "Who among you can prove me guilty of any sin? If I am telling you the truth, why don’t you believe me?", "The one who belongs to God listens and responds to God’s words. You don’t listen and respond because you don’t belong to God.”", "The Judeans replied, “Aren’t we correct in saying that you are a Samaritan and are possessed by a demon?”", "Jesus answered, “I am not possessed by a demon, but I honor my Father—and yet you dishonor me.", "I am not trying to get praise for myself. There is one who demands it, and he also judges.", "I tell you the solemn truth, if anyone obeys my teaching, he will never see death.”", "Then the Judeans responded, “Now we know you’re possessed by a demon! Both Abraham and the prophets died, and yet you say, ‘If anyone obeys my teaching, he will never experience death.’", "You aren’t greater than our father Abraham who died, are you? And the prophets died too! Who do you claim to be?”", "Jesus replied, “If I glorify myself, my glory is worthless. The one who glorifies me is my Father, about whom you people say, ‘He is our God.’", "Yet you do not know him, but I know him. If I were to say that I do not know him, I would be a liar like you. But I do know him, and I obey his teaching.", "Your father r where I am going.", "You judge according to the flesh. I judge no one.", "Even if I do judge, my judgment is true, for I am not alone, but I am with the Father who sent me.", "It’s also written in your law that the testimony of two people is valid.", "I am one who testifies about myself, and the Father who sent me testifies about me.”", "They said therefore to him, “Where is your Father?” Jesus answered, “You know neither me, nor my Father. If you knew me, you would know my Father also.”", "Jesus spoke these words in the treasury, as he taught in the temple. Yet no one arrested him, because his hour had not yet come.", "Jesus said therefore again to them, “I am going away, and you will seek me, and you will die in your sins. Where I go, you can’t come.”", "The Jews therefore said, “Will he kill himself, because he says, ‘Where I am going, you can’t come’?”", "He said to them, “You are from beneath. I am from above. You are of this world. I am not of this world.", "I said therefore to you that you will die in your sins; for unless you believe that I am he, you will die in your sins.”", "They said therefore to him, “Who are you?” Jesus said to them, “Just what I have been saying to you from the beginning.", "I have many things to speak and to judge concerning you. However he who sent me is true; and the things which I heard from him, these I say to the world.”", "They didn’t understand that he spoke to them about the Father.", "Jesus therefore said to them, “When you have lifted up the Son of Man, then you will know that I am he, and I do nothing of myself, but as my Father taught me, I say these things.", "He who sent me is with me. The Father hasn’t left me alone, for I always do the things that are pleasing to him.”", "As he spoke these things, many believed in him.", "Jesus therefore said to those Jews who had believed him, “If you remain in my word, then you are truly my disciples.", "You will know the truth, and the truth will make you free.”", "They answered rson keeps my word, he will never see death.”", "Then the Jews said to him, “Now we know that you have a demon. Abraham died, and the prophets; and you say, ‘If a man keeps my word, he will never taste of death.’", "Are you greater than our father, Abraham, who died? The prophets died. Who do you make yourself out to be?”", "Jesus answered, “If I glorify myself, my glory is nothing. It is my Father who glorifies me, of whom you say that he is our God.", "You have not known him, but I know him. If I said, ‘I don’t know him,’ I would be like you, a liar. But I know him, and keep his word.", "Your father Abraham rejoiced to see my day. He saw it, and was glad.”", "The Jews therefore said to him, “You are not yet fifty years old, and have you seen Abraham?”", "Jesus said to them, “Most certainly, I tell you, before Abraham came into existence, I AM.”", "Therefore they took up stones to throw at him, but Jesus was hidden, and went out of the temple, having gone through the middle of them, and so passed by."]}, "studyNotes": "John - Chapter 8\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus forgives the woman caught in adultery, declares \"I am the light of the world,\" engages in fierce debate with the Pharisees about His identity and Abraham, and stuns them with \"Before Abraham was, I AM.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 8 contains some of the most intense confrontations\nbetween Jesus and the religious leaders in all of Scripture. It opens with the\nfamous account of the woman caught in adultery (vv.1-11) — a passage with\ncomplex textual history — and escalates through a series of debates about\nidentity, freedom, and fatherhood, culminating in Jesus' most explosive claim:\n\"Before Abraham was, I AM\" (v.58), which caused the leaders to pick up stones.\n\nThe Woman Caught in Adultery (vv.1-11): This passage is absent from the oldest\nGreek manuscripts and is placed in brackets in most modern translations. However,\nit is consistent with Jesus' character and has been part of the church's Bible\nfor centuries. The trap was designed to force Jesus to either contradict Moses\n(who commanded stoning) or contradict Roman law (which reserved the death penalty\nfor Rome). Jesus' response dismantled the trap entirely.\n\n\"I AM\" (v.58): When Jesus said \"Before Abraham was, I AM,\" He used the divine\nname God revealed to Moses at the burning bush (Exodus 3:14). The crowd\nunderstood exactly what He was claiming — hence the immediate attempt to stone\nHim for blasphemy.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Jerusalem / the Temple (v.2): Jesus was teaching in the Temple courts during or after the Feast of Tabernacles. The woman caught in adultery was brought to Him here.\n- The treasury (v.20): Jesus spoke \"in the treasury\" — an area in the Court of Women where offering boxes were kept and teaching often occurred.\n\nKEY VERSES\n------------------------------------\nv.11 — \"Neither do I condemn you; go, and from now on sin no more.\" (ESV) —\n        Grace and truth together — Jesus neither excuses sin nor condemns the\n        sinner without offering a way forward.\n\nv.12 — \"I am the light of the world. Whoever follows me will not walk in\n        darkness, but will have the light of life.\" (ESV) — The second \"I AM\"\n        statement in John.\n\nv.31-32 — \"If you abide in my word, you are truly my disciples, and you will\n        know the truth, and the truth will set you free.\" (ESV) — True\n        discipleship defined: continuing in His word.\n\nv.36 — \"So if the Son sets you free, you will be free indeed.\" (ESV)\n        — The only true freedom — freedom from sin's mastery.\n\nv.58 — \"Truly, truly, I say to you, before Abraham was, I am.\" (ESV) — The\n        most direct claim to deity Jesus makes in John's Gospel.\n\nCROSS-REFERENCES\n------------------------------------\nv.7   — Romans 3:23 — \"All have sinned and fall short of the glory of God.\"\nv.11  — Romans 8:1 — \"No condemnation for those in Christ Jesus.\"\nv.12  — John 1:4-5 — \"In him was life, and the life was the light of men.\"\nv.12  — Isaiah 9:2 — \"The people walking in darkness have seen a great light.\"\nv.32  — John 17:17 — \"Sanctify them by the truth; your word is truth.\"\nv.34  — Romans 6:16-18 — Slavery to sin vs. slavery to righteousness.\nv.36  — Galatians 5:1 — \"It is for freedom that Christ has set us free.\"\nv.44  — Genesis 3:1-5 — The devil's first lie in the Garden.\nv.44  — 1 John 3:8 — \"The devil has been sinning from the beginning.\"\nv.58  — Exodus 3:14 — \"I AM WHO I AM\" — God's name revealed to Moses.\nv.58  — Colossians 1:17 — \"He is before all things.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-8/\n  Guzik addresses the textual history of the adultery passage, the meaning\n  of Jesus writing on the ground, the nature of true freedom in vv.31-36,\n  and the significance of \"I AM\" in v.58.\n\nCharles Spurgeon:\n  Sermon: \"Neither Do I Condemn Thee\" on v.11 (MTP Vol. 26, No. 1544)\n  \"He does not say 'I overlook thy sin' or 'thy sin is not so bad.' He says\n  'Neither do I condemn thee' — and then immediately 'go and sin no more.'\n  Grace never minimizes sin. It forgives it and then calls us away from it.\"\n  Sermon: \"The Truth That Makes Men Free\" on v.32 (MTP Vol. 34, No. 2007)\n  \"The truth that makes free is not philosophical truth or scientific truth —\n  it is the truth about Jesus Christ. Know Him, and you know the truth that\n  breaks every chain.\"\n\nTRANSLATION NOTES\n------------------------------------\nvv.1-11 — KJV: includes the adultery passage as part of the text / ESV: places it in double brackets with a note — The passage is absent from the oldest manuscripts (Papyrus 66, Papyrus 75, Codex Sinaiticus, Codex Vaticanus). Most scholars believe it is a genuine historical account preserved in oral tradition before being added to manuscripts.\n\nv.7  — NET: \"Whoever among you is without sin, let him be the\n       first to throw a stone at her\" — Jesus doesn't deny the\n       Law's penalty; He exposes the accusers' disqualification.\n       WEB: \"He who is without sin among you, let him throw the\n       first stone at her.\" KJV similar. No one qualifies.\n\nv.11 — KJV: \"Neither do I condemn thee: go, and sin no more\" / ESV: \"Neither do I condemn you; go, and from now on sin no more\" — Both equivalent. ESV adds \"from now on\" for clarity — the command is forward-looking.\n\nv.12 — KJV: \"I am the light of the world\" / ESV: \"I am the light of the world\" — Both identical.\n  [ASV/NET/WEB]: NET: \"I am the light of the world. The one who follows me\n       will never walk in darkness, but will have the light of\n       life\" — the second \"I AM\" statement. WEB: \"I am the light\n       of the world.\" Spoken at Tabernacles when giant menorahs\n       illuminated the temple courts — Jesus claims to BE what\n       they symbolize.\n\nv.24 — KJV: \"if ye believe not that I am he, ye shall die in your sins\" / ESV: \"unless you believe that I am he you will die in your sins\" — Greek \"ego eimi\" — Both equivalent. The \"he\" is supplied by translators; the Greek simply reads \"I AM\" — an echo of the divine name.\n\nv.25 — KJV: \"Even the same that I said unto you from the beginning\" / ESV: \"Just what I have been telling you from the beginning\" — One of the most difficult verses to translate in John. The Greek is genuinely ambiguous.\n\nv.32 — NET: \"you will know the truth, and the truth will set you\n       free\" — one of the most quoted verses in Scripture. WEB:\n       \"the truth will make you free.\" KJV: \"the truth shall make\n       you free.\" ASV: \"the truth shall make you free.\" Freedom\n       through truth, not ignorance.\n\nv.34 — KJV: \"Whosoever committeth sin is the servant of sin\" / ESV: \"everyone who practices sin is a slave to sin\" — Greek \"doulos\" — KJV uses \"servant\"; ESV uses \"slave.\" \"Slave\" is more accurate — a doulos had no freedom or rights.\n\nv.44 — KJV: \"the lusts of your father ye will do\" / ESV: \"your will is to do your father's desires\" — Greek \"epithumias\" — KJV's \"lusts\" means strong desires generally, not specifically sexual. ESV's \"desires\" is clearer for modern readers.\n  [ASV/NET/WEB]: NET: \"You people are from your father the devil, and you\n       want to do what your father desires\" — \"your father the\n       devil\" — Jesus' most direct and confrontational statement.\n       WEB: \"You are of your father, the devil.\" The children of\n       Abraham can be children of the devil. Lineage alone saves\n       no one.\n\nv.58 — KJV: \"Before Abraham was, I am\" / ESV: \"before Abraham was, I am\" — Greek \"ego eimi\" — Both identical. Present tense, not \"I was.\" Jesus does not say \"I was before Abraham\" but \"I AM\" — claiming the eternal present tense of God's own name (Exodus 3:14).\n  [ASV/NET/WEB]: NET: \"before Abraham came into existence, I am!\" — \"I am\"\n       (egō eimi) — unmistakable divine name claim (Exodus 3:14).\n       WEB: \"Before Abraham came into existence, I AM.\" KJV:\n       \"Before Abraham was, I am.\" Present tense for past existence\n       = eternal being. They picked up stones (v.59) — they\n       understood the claim perfectly.\n\n\nGLOSSARY\n------------------------------------\nAdultery      — Sexual relations between a married person and someone other\n               than their spouse. Under Mosaic law, both parties were to be\n               stoned (Deuteronomy 22:22) — the absence of the man in this\n               account reveals the trap's injustice.\n\nTreasury      — The area in the Temple where offerings were deposited and\n               where Jesus taught (v.20). Located in the Court of Women.\n\nAbide         — To remain, continue, dwell. A key word in John — true disciples\n               abide in Christ's word; true freedom comes from abiding in truth.\n\nBondage       — Slavery, servitude. Jesus uses it to describe the condition of\n               everyone who sins — enslaved to sin's power and pattern.\n\nBlasphemy     — Speaking against God or claiming divine attributes that belong\n               only to God. The charge the leaders brought against Jesus for\n               saying \"I AM.\"\n\nI AM          — The divine name (Hebrew: YHWH) revealed to Moses in Exodus 3:14.\n               Jesus' use of it in v.58 is a direct claim to be the eternal God.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus said to the woman \"Neither do I condemn thee: go, and sin no more\"\n   (v.11). He offered grace without excusing sin. Is there an area of your life\n   where you've received God's forgiveness but haven't truly turned away from\n   the sin? Grace is not a license to continue — it's power to stop.\n\n2. \"If ye continue in my word, then are ye my disciples indeed\" (v.31). The test\n   of genuine discipleship is not a one-time decision but ongoing continuance in\n   His word. How consistent is your engagement with Scripture? Is it shaping\n   your thinking and decisions daily?\n\n3. \"Whosoever committeth sin is the servant of sin\" (v.34). Every man has areas\n   where sin has a stronger pull than he'd like to admit. What sin pattern in\n   your life has the most power over you? Have you brought it to Christ for the\n   freedom He promises in v.36?\n\n4. Jesus said \"I do always those things that please him\" (v.29). That was His\n   daily operating principle. What would it look like for that to be your daily\n   operating principle — in your work, your marriage, your parenting, your\n   private life?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. The accusers brought the woman but not the man — the law required both\n   (Deuteronomy 22:22). Jesus exposed the hypocrisy without saying a word about\n   it. How do you handle situations where you see injustice or hypocrisy in\n   religious or moral settings?\n\n2. Jesus wrote on the ground twice (vv.6,8). We don't know what He wrote. Why\n   do you think John included this detail? What do you imagine He wrote, and\n   what does it tell you about how Jesus handles accusation?\n\n3. \"The truth shall make you free\" (v.32) — but first it often makes you\n   uncomfortable. Is there a truth about yourself, your sin, or your situation\n   that you've been avoiding because facing it feels threatening?\n\n4. Jesus told the religious leaders their father was the devil (v.44) — a\n   stunning statement. He based this on their behavior: they wanted to kill Him\n   (murder) and they rejected truth (lies). What does your behavior reveal about\n   whose influence you're under?\n\n5. \"Before Abraham was, I AM\" (v.58). The crowd picked up stones — they\n   understood exactly what He was claiming. Who do you say Jesus is? Not what\n   you've been taught — what do you personally believe about Him?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 8:1-11 - Opposed by Accusers:\n    https://enduringword.com/media/john-8-opposed-accusers/\n  John 8:12-30 - Opposed by Darkness:\n    https://enduringword.com/media/john-8-opposed-darkness/\n  John 8:31-59 - Opposed by the Devil:\n    https://enduringword.com/media/john-8-opposed-devil/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "9": {"translations": {"ESV": ["As he passed by, he saw a man blind from birth.", "And his disciples asked him, “Rabbi, who sinned, this man or his parents, that he was born blind?”", "Jesus answered, “It was not that this man sinned, or his parents, but that the works of God might be displayed in him.", "We must work the works of him who sent me while it is day; night is coming, when no one can work.", "As long as I am in the world, I am the light of the world.”", "Having said these things, he spit on the ground and made mud with the saliva. Then he anointed the man’s eyes with the mud", "and said to him, “Go, wash in the pool of Siloam” (which means Sent). So he went and washed and came back seeing.", "The neighbors and those who had seen him before as a beggar were saying, “Is this not the man who used to sit and beg?”", "Some said, “It is he.” Others said, “No, but he is like him.” He kept saying, “I am the man.”", "So they said to him, “Then how were your eyes opened?”", "He answered, “The man called Jesus made mud and anointed my eyes and said to me, ‘Go to Siloam and wash.’ So I went and washed and received my sight.”", "They said to him, “Where is he?” He said, “I do not know.”", "They brought to the Pharisees the man who had formerly been blind.", "Now it was a Sabbath day when Jesus made the mud and opened his eyes.", "So the Pharisees again asked him how he had received his sight. And he said to them, “He put mud on my eyes, and I washed, and I see.”", "Some of the Pharisees said, “This man is not from God, for he does not keep the Sabbath.” But others said, “How can a man who is a sinner do such signs?” And there was a division among them.", "So they said again to the blind man, “What do you say about him, since he has opened your eyes?” He said, “He is a prophet.”", "The Jews did not believe that he had been blind and had received his sight, until they called the parents of the man who had received his sight", "and asked them, “Is this your son, who you say was born blind? How then does he now see?”", "His parents answered, “We know that this is our son and that he was born blind.", "But how he now sees we do not know, nor do we know who opened his eyes. Ask him; he is of age. He will speak for himself.”", "(His parents said these things because they feared the Jews, for the Jews had already agreed that if anyone should confess Jesus to be Christ, he was to be put out of the synagogue.", "Therefore his parents said, “He is of age; ask him.”)", "So for the second time they called the man who had been blind and said to him, “Give glory to God. We know that this man is a sinner.”", "He answered, “Whether he is a sinner I do not know. One thing I do know, that though I was blind, now I see.”", "They said to him, “What did he do to you? How did he open your eyes?”", "He answered them, “I have told you already, and you would not listen. Why do you want to hear it again? Do you also want to become his disciples?”", "And they reviled him, saying, “You are his disciple, but we are disciples of Moses.", "We know that God has spoken to Moses, but as for this man, we do not know where he comes from.”", "The man answered, “Why, this is an amazing thing! You do not know where he comes from, and yet he opened my eyes.", "We know that God does not listen to sinners, but if anyone is a worshiper of God and does his will, God listens to him.", "Never since the world began has it been heard that anyone opened the eyes of a man born blind.", "If this man were not from God, he could do nothing.”", "They answered him, “You were born in utter sin, and would you teach us?” And they cast him out.", "Jesus heard that they had cast him out, and having found him he said, “Do you believe in the Son of Man?”", "He answered, “And who is he, sir, that I may believe in him?”", "Jesus said to him, “You have seen him, and it is he who is speaking to you.”", "He said, “Lord, I believe,” and he worshiped him.", "Jesus said, “For judgment I came into this world, that those who do not see may see, and those who see may become blind.”", "Some of the Pharisees near him heard these things, and said to him, “Are we also blind?”", "Jesus said to them, “If you were blind, you would have no guilt; but now that you say, ‘We see,’ your guilt remains."], "KJV": ["And as Jesus passed by, he saw a man which was blind from his birth.", "And his disciples asked him, saying, Master, who did sin, this man, or his parents, that he was born blind?", "Jesus answered, Neither hath this man sinned, nor his parents: but that the works of God should be made manifest in him.", "I must work the works of him that sent me, while it is day: the night cometh, when no man can work.", "As long as I am in the world, I am the light of the world.", "When he had thus spoken, he spat on the ground, and made clay of the spittle, and he anointed the eyes of the blind man with the clay,", "And said unto him, Go, wash in the pool of Siloam, (which is by interpretation, Sent.) He went his way therefore, and washed, and came seeing.", "The neighbours therefore, and they which before had seen him that he was blind, said, Is not this he that sat and begged?", "Some said, This is he: others said, He is like him: but he said, I am he.", "Therefore said they unto him, How were thine eyes opened?", "He answered and said, A man that is called Jesus made clay, and anointed mine eyes, and said unto me, Go to the pool of Siloam, and wash: and I went and washed, and I received sight.", "Then said they unto him, Where is he? He said, I know not.", "They brought to the Pharisees him that aforetime was blind.", "And it was the sabbath day when Jesus made the clay, and opened his eyes.", "Then again the Pharisees also asked him how he had received his sight. He said unto them, He put clay upon mine eyes, and I washed, and do see.", "Therefore said some of the Pharisees, This man is not of God, because he keepeth not the sabbath day. Others said, How can a man that is a sinner do such miracles? And there was a division among them.", "They say unto the blind man again, What sayest thou of him, that he hath opened thine eyes? He said, He is a prophet.", "But the Jews did not believe concerning him, that he had been blind, and received his sight, until they called the parents of him that had received his sight.", "And they asked them, saying, Is this your son, who ye say was born blind? how then doth he now see?", "His parents answered them and said, We know that this is our son, and that he was born blind:", "But by what means he now seeth, we know not; or who hath opened his eyes, we know not: he is of age; ask him: he shall speak for himself.", "These words spake his parents, because they feared the Jews: for the Jews had agreed already, that if any man did confess that he was Christ, he should be put out of the synagogue.", "Therefore said his parents, He is of age; ask him.", "Then again called they the man that was blind, and said unto him, Give God the praise: we know that this man is a sinner.", "He answered and said, Whether he be a sinner or no, I know not: one thing I know, that, whereas I was blind, now I see.", "Then said they to him again, What did he to thee? how opened he thine eyes?", "He answered them, I have told you already, and ye did not hear: wherefore would ye hear it again? will ye also be his disciples?", "Then they reviled him, and said, Thou art his disciple; but we are Moses’ disciples.", "We know that God spake unto Moses: as for this fellow, we know not from whence he is.", "The man answered and said unto them, Why herein is a marvellous thing, that ye know not from whence he is, and yet he hath opened mine eyes.", "Now we know that God heareth not sinners: but if any man be a worshipper of God, and doeth his will, him he heareth.", "Since the world began was it not heard that any man opened the eyes of one that was born blind.", "If this man were not of God, he could do nothing.", "They answered and said unto him, Thou wast altogether born in sins, and dost thou teach us? And they cast him out.", "Jesus heard that they had cast him out; and when he had found him, he said unto him, Dost thou believe on the Son of God?", "He answered and said, Who is he, Lord, that I might believe on him?", "And Jesus said unto him, Thou hast both seen him, and it is he that talketh with thee.", "And he said, Lord, I believe. And he worshipped him.", "And Jesus said, For judgment I am come into this world, that they which see not might see; and that they which see might be made blind.", "And some of the Pharisees which were with him heard these words, and said unto him, Are we blind also?", "Jesus said unto them, If ye were blind, ye should have no sin: but now ye say, We see; therefore your sin remaineth."], "ASV": ["And as he passed by, he saw a man blind from his birth.", "And his disciples asked him, saying, Rabbi, who sinned, this man, or his parents, that he should be born blind?", "Jesus answered, Neither did this man sin, nor his parents: but that the works of God should be made manifest in him.", "We must work the works of him that sent me, while it is day: the night cometh, when no man can work.", "When I am in the world, I am the light of the world.", "When he had thus spoken, he spat on the ground, and made clay of the spittle, and anointed his eyes with the clay,", "and said unto him, Go, wash in the pool of Siloam (which is by interpretation, Sent). He went away therefore, and washed, and came seeing.", "The neighbors therefore, and they that saw him aforetime, that he was a beggar, said, Is not this he that sat and begged?", "Others said, It is he: others said, No, but he is like him. He said, I am [he].", "They said therefore unto him, How then were thine eyes opened?", "He answered, The man that is called Jesus made clay, and anointed mine eyes, and said unto me, Go to Siloam, and wash: so I went away and washed, and I received sight.", "And they said unto him, Where is he? He saith, I know not.", "They bring to the Pharisees him that aforetime was blind.", "Now it was the sabbath on the day when Jesus made the clay, and opened his eyes.", "Again therefore the Pharisees also asked him how he received his sight. And he said unto them, He put clay upon mine eyes, and I washed, and I see.", "Some therefore of the Pharisees said, This man is not from God, because he keepeth not the sabbath. But others said, How can a man that is a sinner do such signs? And there was division among them.", "They say therefore unto the blind man again, What sayest thou of him, in that he opened thine eyes? And he said, He is a prophet.", "The Jews therefore did not believe concerning him, that he had been blind, and had received his sight, until they called the parents of him that had received his sight,", "and asked them, saying, Is this your son, who ye say was born blind? How then doth he now see?", "His parents answered and said, We know that this is our son, and that he was born blind:", "but how he now seeth, we know not; or who opened his eyes, we know not: ask him; he is of age; he shall speak for himself.", "These things said his parents, because they feared the Jews: for the Jews had agreed already, that if any man should confess him [to be] Christ, he should be put out of the synagogue.", "Therefore said his parents, He is of age; ask him.", "So they called a second time the man that was blind, and said unto him, Give glory to God: we know that this man is a sinner.", "He therefore answered, Whether he is a sinner, I know not: one thing I know, that,
