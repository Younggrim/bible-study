 worshipers will worship the Father in spirit and truth, for the Father seeks such people to be his worshipers.", "God is spirit, and the people who worship him must worship in spirit and truth.”", "The woman said to him, “I know that Messiah is coming” (the one called Christ); “whenever he comes, he will tell us everything.”", "Jesus said to her, “I, the one speaking to you, am he.”", "Now at that very moment his disciples came back. They were shocked because he was speaking with a woman. However, no one said, “What do you want?” or “Why are you speaking with her?”", "Then the woman left her water jar, went off into the town and said to the people,", "“Come, see a man who told me everything I ever did. Surely he can’t be the Messiah, can he?”", "So they left the town and began coming to him.", "Meanwhile the disciples were urging him, “Rabbi, eat something.”", "But he said to them, “I have food to eat that you know nothing about.”", "So the disciples began to say to one another, “No one brought him anything to eat, did they?”", "Jesus said to them, “My food is to do the will of the one who sent me and to complete his work.", "Don’t you say, ‘There are four more months and then comes the harvest?’ I tell you, look up and see that the fields are already white for harvest!", "The one who reaps receives pay and gathers fruit for eternal life, so that the one who sows and the one who reaps can rejoice together.", "For in this instance the saying is true, ‘One sows and another reaps.’", "I sent you to reap what you did not work for; others have labored and you have entered into their labor.”", "Now many Samaritans from that town believed in him because of the report of the woman who testified, “He told me everything I ever did.”", "So when the Samaritans came to him, they began asking him to stay with them. He stayed there two days,", "and because of his word many more believed.", "They said to the woman, “No longer do we believe because of your words, for we have heard for ourselves, and we know that this one really is the Savior of the world.”", "After the two days he departed from there to Galilee.", "(For Jesus himself had testified that a prophet has no honor in his own country.)", "So when he came to Galilee, the Galileans welcomed him because they had seen all the things he had done in Jerusalem at the feast (for they themselves had gone to the feast).", "Now he came again to Cana in Galilee where he had made the water wine. In Capernaum there was a certain royal official whose son was sick.", "When he heard that Jesus had come back from Judea to Galilee, he went to him and begged him to come down and heal his son, who was about to die.", "So Jesus said to him, “Unless you people see signs and wonders you will never believe!”", "“Sir,” the official said to him, “come down before my child dies.”", "Jesus told him, “Go home; your son will live.” The man believed the word that Jesus spoke to him, and set off for home.", "While he was on his way down, his slaves met him and told him that his son was going to live.", "So he asked them the time when his condition began to improve, and they told him, “Yesterday at one o’clock in the afternoon the fever left him.”", "Then the father realized that it was the very time Jesus had said to him, “Your son will live,” and he himself believed along with his entire household.", "Jesus did this as his second miraculous sign when he returned from Judea to Galilee."], "WEB": ["Therefore when the Lord knew that the Pharisees had heard that Jesus was making and baptizing more disciples than John", "(although Jesus himself didn’t baptize, but his disciples),", "he left Judea, and departed into Galilee.", "He needed to pass through Samaria.", "So he came to a city of Samaria, called Sychar, near the parcel of ground that Jacob gave to his son, Joseph.", "Jacob’s well was there. Jesus therefore, being tired from his journey, sat down by the well. It was about the sixth hour.", "A woman of Samaria came to draw water. Jesus said to her, “Give me a drink.”", "For his disciples had gone away into the city to buy food.", "The Samaritan woman therefore said to him, “How is it that you, being a Jew, ask for a drink from me, a Samaritan woman?” (For Jews have no dealings with Samaritans.)", "Jesus answered her, “If you knew the gift of God, and who it is who says to you, ‘Give me a drink,’ you would have asked him, and he would have given you living water.”", "The woman said to him, “Sir, you have nothing to draw with, and the well is deep. So where do you get that living water?", "Are you greater than our father, Jacob, who gave us the well, and drank of it himself, as did his children, and his livestock?”", "Jesus answered her, “Everyone who drinks of this water will thirst again,", "but whoever drinks of the water that I will give him will never thirst again; but the water that I will give him will become in him a well of water springing up to eternal life.”", "The woman said to him, “Sir, give me this water, so that I don’t get thirsty, neither come all the way here to draw.”", "Jesus said to her, “Go, call your husband, and come here.”", "The woman answered, “I have no husband.” Jesus said to her, “You said well, ‘I have no husband,’", "for you have had five husbands; and he whom you now have is not your husband. This you have said truly.”", "The woman said to him, “Sir, I perceive that you are a prophet.", "Our fathers worshiped in this mountain, and you Jews say that in Jerusalem is the place where people ought to worship.”", "Jesus said to her, “Woman, believe me, the hour comes, when neither in this mountain, nor in Jerusalem, will you worship the Father.", "You worship that which you don’t know. We worship that which we know; for salvation is from the Jews.", "But the hour comes, and now is, when the true worshipers will worship the Father in spirit and truth, for the Father seeks such to be his worshipers.", "God is spirit, and those who worship him must worship in spirit and truth.”", "The woman said to him, “I know that Messiah comes, he who is called Christ. When he has come, he will declare to us all things.”", "Jesus said to her, “I am he, the one who speaks to you.”", "At this, his disciples came. They marveled that he was speaking with a woman; yet no one said, “What are you looking for?” or, “Why do you speak with her?”", "So the woman left her water pot, and went away into the city, and said to the people,", "“Come, see a man who told me everything that I did. Can this be the Christ?”", "They went out of the city, and were coming to him.", "In the meanwhile, the disciples urged him, saying, “Rabbi, eat.”", "But he said to them, “I have food to eat that you don’t know about.”", "The disciples therefore said to one another, “Has anyone brought him something to eat?”", "Jesus said to them, “My food is to do the will of him who sent me, and to accomplish his work.", "Don’t you say, ‘There are yet four months until the harvest?’ Behold, I tell you, lift up your eyes, and look at the fields, that they are white for harvest already.", "He who reaps receives wages, and gathers fruit to eternal life; that both he who sows and he who reaps may rejoice together.", "For in this the saying is true, ‘One sows, and another reaps.’", "I sent you to reap that for which you haven’t labored. Others have labored, and you have entered into their labor.”", "From that city many of the Samaritans believed in him because of the word of the woman, who testified, “He told me everything that I did.”", "So when the Samaritans came to him, they begged him to stay with them. He stayed there two days.", "Many more believed because of his word.", "They said to the woman, “Now we believe, not because of your speaking; for we have heard for ourselves, and know that this is indeed the Christ, the Savior of the world.”", "After the two days he went out from there and went into Galilee.", "For Jesus himself testified that a prophet has no honor in his own country.", "So when he came into Galilee, the Galileans received him, having seen all the things that he did in Jerusalem at the feast, for they also went to the feast.", "Jesus came therefore again to Cana of Galilee, where he made the water into wine. There was a certain nobleman whose son was sick at Capernaum.", "When he heard that Jesus had come out of Judea into Galilee, he went to him, and begged him that he would come down and heal his son, for he was at the point of death.", "Jesus therefore said to him, “Unless you see signs and wonders, you will in no way believe.”", "The nobleman said to him, “Sir, come down before my child dies.”", "Jesus said to him, “Go your way. Your son lives.” The man believed the word that Jesus spoke to him, and he went his way.", "As he was now going down, his servants met him and reported, saying “Your child lives!”", "So he inquired of them the hour when he began to get better. They said therefore to him, “Yesterday at the seventh hour, the fever left him.”", "So the father knew that it was at that hour in which Jesus said to him, “Your son lives.” He believed, as did his whole house.", "This is again the second sign that Jesus did, having come out of Judea into Galilee."]}, "studyNotes": "John - Chapter 4\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus breaks social barriers by speaking with a Samaritan woman at Jacob's well, offers her living water, reveals Himself as the Messiah, and teaches that true worshippers worship the Father in spirit and in truth.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 4 records two encounters that demonstrate Jesus\ncrossing major cultural boundaries — the Samaritan woman at the well, and the\nhealing of a Roman official's son.\n\nJews and Samaritans: The hostility between Jews and Samaritans ran deep. When\nAssyria conquered the northern kingdom of Israel in 722 BC, they resettled the\nland with foreign peoples who intermarried with remaining Israelites, producing\nthe Samaritans — a mixed race with a mixed religion. Jews considered them\nunclean and avoided all contact. Jesus deliberately went through Samaria (v.4)\nand spoke to a Samaritan woman — breaking two cultural taboos at once (race and\ngender).\n\nJacob's Well: Still exists today near the city of Nablus (ancient Shechem/Sychar).\nIt is approximately 100 feet deep. Jesus sat at this well around noon (the sixth\nhour) — the hottest part of the day, when respectable women did not draw water.\nThe woman's presence at that hour hints at her social isolation.\n\nThe Nobleman's Son: The second miracle in Galilee (v.54) demonstrates faith that\nacts on Jesus' word alone, without requiring His physical presence.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Samaria / Sychar (v.5): Jesus passed through Samaria (the region between Judea and Galilee) and stopped at Jacob's well near the town of Sychar (modern Askar), at the foot of Mount Gerizim.\n- Mount Gerizim (v.20): The Samaritan holy mountain where they built a rival temple. The woman references this in her question about worship.\n- Cana of Galilee (v.46): Jesus returned to Cana where He healed the nobleman's son at a distance — the boy was in Capernaum, about 16 miles away.\n\nKEY VERSES\n------------------------------------\nv.14 — \"But whoever drinks of the water that I will give him will never be\n        thirsty again. The water that I will give him will become in him a spring\n        of water welling up to eternal life.\" (ESV) — Jesus as the source of\n        lasting spiritual satisfaction.\n\nv.23 — \"But the hour is coming, and is now here, when the true worshipers will\n        worship the Father in spirit and truth, for the Father is seeking such\n        people to worship him.\" (ESV) — The nature of true worship.\n\nv.24 — \"God is spirit, and those who worship him must worship in spirit and\n        truth.\" (ESV) — One of the clearest statements about God's nature and\n        the requirement of authentic worship.\n\nv.34 — \"My food is to do the will of him who sent me and to accomplish his\n        work.\" (ESV) — Jesus' consuming purpose — a model for every man's life\n        mission.\n\nv.50 — \"Jesus said to him, 'Go; your son will live.' The man believed the word\n        that Jesus spoke to him and went on his way.\" (ESV) — Faith that acts on\n        Christ's word before seeing the result.\n\nCROSS-REFERENCES\n------------------------------------\nv.4   — Luke 9:51-56 — Jesus' consistent willingness to engage Samaritans.\nv.10  — Isaiah 55:1 — \"Come, all you who are thirsty, come to the waters.\"\nv.14  — John 7:37-38 — \"Streams of living water will flow from within.\"\nv.14  — Revelation 21:6 — \"I will give freely from the spring of the water of life.\"\nv.23  — Psalm 51:6 — \"You desire truth in the inner parts.\"\nv.24  — 2 Corinthians 3:17 — \"Where the Spirit of the Lord is, there is freedom.\"\nv.34  — John 17:4 — \"I have finished the work you gave me to do.\"\nv.34  — Hebrews 10:7 — \"I have come to do your will, O God.\"\nv.35  — Matthew 9:37-38 — \"The harvest is plentiful but the workers are few.\"\nv.50  — Hebrews 11:1 — Faith is being sure of what we hope for, certain of\n        what we do not see.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-4/\n  Guzik examines the cultural significance of Jesus speaking to a Samaritan\n  woman, the meaning of \"living water,\" the woman's five husbands, and the\n  harvest imagery in vv.35-38.\n\nCharles Spurgeon:\n  Sermon: \"The Woman of Samaria\" (MTP Vol. 28, No. 1657)\n  \"Jesus was weary — truly weary, as only a man can be weary. And yet He\n  did not let His weariness become an excuse to neglect a soul. The Son of\n  God sat down at a well and waited for a sinner. That is grace.\"\n  Sermon: \"Spiritual Worship\" on v.24 (MTP Vol. 17, No. 1000)\n  \"God is a Spirit — not confined to temples made with hands, not reached\n  by ritual or ceremony alone. He is reached by the spirit of a man bowing\n  before Him in truth. Your heart is the only temple He truly requires.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.6  — KJV: \"the sixth hour\" / ESV: \"the sixth hour\" — Both identical. In Jewish reckoning, noon. In Roman reckoning, 6 AM. Most scholars favor noon here — explaining Jesus' weariness from travel and the woman's unusual timing (avoiding others).\n\nv.9  — KJV: \"the Jews have no dealings with the Samaritans\" / ESV: \"Jews have no dealings with Samaritans\" — Both equivalent. The Greek could also mean Jews don't use the same vessels as Samaritans (ritual purity concern). The broader social separation is the main point.\n\nv.10 — NET: \"If you had known the gift of God and who it is who\n       said to you, 'Give me some water to drink,' you would have\n       asked him, and he would have given you living water\" —\n       \"living water\" (hydōr zōn) = flowing/spring water (literal)\n       AND eternal life (spiritual). WEB: \"living water.\" The\n       double meaning drives the conversation.\n\nv.14 — KJV: \"a well of water springing up into everlasting life\" / ESV: \"a spring of water welling up to eternal life\" — Greek \"pege\" — Both equivalent. ESV uses \"spring\" and \"welling up\" for more natural English; the image is of an artesian spring — water that flows from within without external effort.\n\nv.23 — NET: \"the true worshipers will worship the Father in\n       spirit and truth\" — \"in spirit and truth\" (en pneumati kai\n       alētheia). WEB: \"in spirit and truth.\" KJV: \"in spirit and\n       in truth.\" Not a physical location (Jerusalem or Gerizim)\n       but an inward orientation and genuine reality.\n\nv.24 — KJV: \"God is a Spirit\" / ESV: \"God is spirit\" — Greek \"pneuma ho theos\" — ESV drops the article \"a\" — God is not one spirit among many but is spirit in His very nature. The KJV's \"a Spirit\" can be slightly misleading; the Greek has no article here.\n  [ASV/NET/WEB]: NET: \"God is spirit, and the people who worship him must\n       worship in spirit and truth\" — \"God is spirit\" (pneuma ho\n       theos) — a definitive statement about God's nature. WEB:\n       \"God is spirit.\" KJV: \"God is a Spirit.\" The absence of the\n       article in Greek argues against \"a spirit\" — God IS spirit\n       by nature.\n\nv.26 — NET: \"I, the one speaking to you, am he\" — Jesus' direct\n       self-identification as Messiah to a Samaritan woman (He\n       rarely stated this so explicitly). WEB: \"I am he, the one\n       who speaks to you.\" KJV: \"I that speak unto thee am he.\"\n       The Greek echoes \"I AM\" (egō eimi).\n\nv.34 — KJV: \"My meat is to do the will\" / ESV: \"My food is to do the will\" — Greek \"broma\" — KJV's \"meat\" means food generally (archaic usage), not specifically flesh. Both convey the same meaning — Jesus' sustenance is obedience to the Father.\n\nv.42 — KJV: \"this is indeed the Christ, the Saviour of the world\" / ESV: \"this is indeed the Savior of the world\" — Greek \"soter tou kosmou\" — ESV omits \"the Christ\" following older manuscripts. Both affirm the universal scope of Jesus' saving work.\n  [ASV/NET/WEB]: NET: \"we know that this one is truly the Savior of the\n       world\" — \"Savior of the world\" (sōtēr tou kosmou) — a title\n       used in the Roman world for Caesar. The Samaritans apply it\n       to Jesus. WEB: \"the Savior of the world.\" A universal claim\n       from outsiders who spent only two days with Him.\n\nv.50 — KJV: \"thy son liveth\" / ESV: \"your son will live\" — Greek \"ho huios sou ze\" (present tense) — Both equivalent. The present tense \"lives\" indicates the healing is already accomplished at the moment Jesus speaks.\n\n\nGLOSSARY\n------------------------------------\nSamaria       — The region between Judea and Galilee, home of the Samaritans.\n               Jews typically avoided it by crossing the Jordan River to travel\n               around it. Jesus deliberately went through it.\n\nSamaritans    — A mixed-race people descended from Israelites who intermarried\n               with Assyrian settlers after 722 BC. They accepted only the\n               Pentateuch (first 5 books of Moses) and worshipped on Mount\n               Gerizim rather than in Jerusalem.\n\nLiving water  — In the literal sense, flowing spring water (as opposed to\n               stagnant cistern water). Jesus uses it metaphorically for the\n               Holy Spirit and eternal life — water that truly satisfies.\n\nJacob's well  — A well dug by the patriarch Jacob, located near Shechem (modern\n               Nablus). Still exists today, approximately 100 feet deep.\n\nSpirit and truth — True worship involves the inner person (spirit) genuinely\n               engaging with God, and truth — worship aligned with who God\n               actually is, not who we imagine Him to be.\n\nNobleman      — Greek \"basilikos\" — a royal official, likely in the service of\n               Herod Antipas. A man of status who humbled himself before Jesus.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus was physically exhausted (v.6) but still engaged the woman at the well.\n   As men, we often use busyness or tiredness as reasons to disengage from the\n   people around us. Who in your life needs your attention even when you're tired?\n\n2. The woman had five failed marriages and was living with a man outside of\n   marriage. Jesus didn't lead with condemnation — He led with an offer of living\n   water. How does Jesus' approach to broken people challenge how you approach\n   people in your life who are living in ways you disagree with?\n\n3. Jesus said His food was to do the will of the Father and finish His work (v.34).\n   What is the driving purpose of your life? What gets you up in the morning?\n   How does it compare to Jesus' singular focus?\n\n4. The nobleman believed Jesus' word and went home before he saw his son healed\n   (v.50). He acted on the word alone. Where in your life is God asking you to\n   trust His word before you see the evidence?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus crossed racial, cultural, and gender barriers to reach one woman. What\n   barriers — social, racial, cultural — do you need to cross to reach people\n   around you with the Gospel?\n\n2. The woman tried to redirect the conversation from her personal life to a\n   theological debate about worship locations (v.20). Do you ever use theological\n   discussion to avoid personal conviction? What is God putting His finger on in\n   your life right now?\n\n3. Jesus said true worshippers worship in spirit and in truth (v.23-24). Evaluate\n   your own worship — is it genuine (spirit) and is it grounded in who God\n   actually is (truth)? Or has it become routine and performance-based?\n\n4. The disciples were surprised Jesus was talking to the woman, but none of them\n   asked why (v.27). They had assumptions about who Jesus should talk to. What\n   assumptions do you carry about who deserves to hear the Gospel?\n\n5. The Samaritans believed because they heard Jesus themselves (v.42) — not just\n   because of the woman's testimony. Are you helping people get to a place where\n   they can encounter Jesus personally, or are you keeping them at arm's length\n   from Him?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 4:1-26 - Revealed as Living Water:\n    https://enduringword.com/media/john-4-revealed-living-water/\n  John 4:27-42 - Revealed As Savior of the World:\n    https://enduringword.com/media/john-4-revealed-savior-world/\n  John 4:43-54 - Revealed as Worth Believing:\n    https://enduringword.com/media/john-4-revealed-worth-believing/\n\nThe Chosen — John 4, The Woman at the Well:\n  https://youtu.be/ordhsDeAt60?si=jn-p8G1Bld1jru7_\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "5": {"translations": {"ESV": ["After this there was a feast of the Jews, and Jesus went up to Jerusalem.", "Now there is in Jerusalem by the Sheep Gate a pool, in Aramaic called Bethesda, which has five roofed colonnades.", "In these lay a multitude of invalids—blind, lame, and paralyzed.", "One man was there who had been an invalid for thirty-eight years.", "When Jesus saw him lying there and knew that he had already been there a long time, he said to him, “Do you want to be healed?”", "The sick man answered him, “Sir, I have no one to put me into the pool when the water is stirred up, and while I am going another steps down before me.”", "Jesus said to him, “Get up, take up your bed, and walk.”", "And at once the man was healed, and he took up his bed and walked. Now that day was the Sabbath.", "So the Jews said to the man who had been healed, “It is the Sabbath, and it is not lawful for you to take up your bed.”", "But he answered them, “The man who healed me, that man said to me, ‘Take up your bed, and walk.’”  a shining light: and ye were willing for a season to rejoice in his light.", "But I have greater witness than that of John: for the works which the Father hath given me to finish, the same works that I do, bear witness of me, that the Father hath sent me.", "And the Father himself, which hath sent me, hath borne witness of me. Ye have neither heard his voice at any time, nor seen his shape.", "And ye have not his word abiding in you: for whom he hath sent, him ye believe not.", "Search the scriptures; for in them ye think ye have eternal life: and they are they which testify of me.", "And ye will not come to me, that ye might have life.", "I receive not honour from men.", "But I know you, that ye have not the love of God in you.", "I am come in my Father’s name, and ye receive me not: if another shall come in his own name, him ye will receive.", "How can ye believe, which receive honour one of another, and seek not the honour that cometh from God only?", "Do not think that I will accuse you to the Father: there is one that accuseth you, even Moses, in whom ye trust.", "For had ye believed Moses, ye would have believed me: for he wrote of me.", "But if ye believe not his writings, how shall ye believe my words?"], "ASV": ["After these things there was a feast of the Jews; and Jesus went up to Jerusalem.", "Now there is in Jerusalem by the sheep [gate] a pool, which is called in Hebrew Bethesda, having five porches.", "In these lay a multitude of them that were sick, blind, halt, withered, [waiting for the moving of the water.]", "[for an angel of the Lord went down at certain seasons into the pool, and troubled the water: whosoever then first after the troubling of the waters stepped in was made whole, with whatsoever disease he was holden.]", "And a certain man was there, who had been thirty and eight years in his infirmity.", "When Jesus saw him lying, and knew that he had been now a long time [in that case], he saith unto him, Wouldest thou be made whole?", "The have neither heard his voice at any time, nor seen his form.", "You don’t have his word living in you; because you don’t believe him whom he sent.", "“You search the Scriptures, because you think that in them you have eternal life; and these are they which testify about me.", "Yet you will not come to me, that you may have life.", "I don’t receive glory from men.", "But I know you, that you don’t have God’s love in yourselves.", "I have come in my Father’s name, and you don’t receive me. If another comes in his own name, you will receive him.", "How can you believe, who receive glory from one another, and you don’t seek the glory that comes from the only God?", "“Don’t think that I will accuse you to the Father. There is one who accuses you, even Moses, on whom you have set your hope.", "For if you believed Moses, you would believe me; for he wrote about me.", "But if you don’t believe his writings, how will you believe my words?”"]}, "studyNotes": "John - Chapter 5\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus heals a man at the Pool of Bethesda on the Sabbath, provoking persecution, and delivers a discourse on His divine authority — \"the Son can do nothing by Himself\" yet has authority to give life and execute judgment.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 5 marks a turning point in John's Gospel — from this\npoint forward, the Jewish religious leaders actively seek to kill Jesus. The\nchapter opens with a healing at the Pool of Bethesda in Jerusalem, which triggers\na Sabbath controversy, which leads to Jesus' most extensive discourse on His\nrelationship with the Father and the witnesses that testify to His identity.\n\nPool of Bethesda: Archaeological excavations in Jerusalem have confirmed the\nexistence of this pool near the Sheep Gate (modern St. Anne's Church area). It\nhad five covered colonnades (porches) and was believed to have healing properties\nwhen the water was stirred. The pool was used by the sick, blind, lame, and\nparalyzed who waited for the water's movement.\n\nThe Sabbath Controversy: Jewish law prohibited carrying objects on the Sabbath.\nWhen Jesus healed the man and told him to carry his mat, the religious leaders\nfocused on the law violation rather than the miracle. Jesus' response — \"My\nFather is working until now, and I am working\" (v.17) — was understood as a\nclaim to equality with God, intensifying their desire to kill Him.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Jerusalem / the Pool of Bethesda (v.2): Located near the Sheep Gate in northeast Jerusalem. The pool had five covered porticoes where the sick gathered. Archaeological remains confirm this five-portico structure.\n- The Temple (implied): Jesus healed on the Sabbath in Jerusalem, provoking the Jewish leaders.\n\nKEY VERSES\n------------------------------------\nv.6  — \"Do you want to be healed?\" (ESV) — Jesus' penetrating question to a man\n        who had been ill 38 years. A question He still asks today.\n\nv.17 — \"My Father is working until now, and I am working.\" (ESV) — Jesus' claim\n        of co-equal activity with God the Father — understood by His hearers as\n        a claim to deity.\n\nv.24 — \"Truly, truly, I say to you, whoever hears my word and believes him who\n        sent me has eternal life. He does not come into judgment, but has passed\n        from death to life.\" (ESV) — The assurance of salvation for the believer.\n\nv.39 — \"You search the Scriptures because you think that in them you have eternal\n        life; and it is they that bear witness about me.\" (ESV) — The entire Old\n        Testament points to Christ.\n\nv.44 — \"How can you believe, when you receive glory from one another and do not\n        seek the glory that comes from the only God?\" (ESV) — The deadly trap of\n        living for human approval.\n\nCROSS-REFERENCES\n------------------------------------\nv.6   — Luke 18:41 — Jesus asks the blind man \"What do you want me to do for you?\"\nv.14  — John 8:11 — \"Go, and from now on sin no more.\"\nv.17  — John 10:30 — \"I and the Father are one.\"\nv.22  — Acts 17:31 — God has appointed a day of judgment through Christ.\nv.24  — Romans 8:1 — \"No condemnation for those in Christ Jesus.\"\nv.28-29 — Daniel 12:2 — \"Many who sleep in the dust will awake.\"\nv.29  — Revelation 20:11-15 — The final resurrection and judgment.\nv.39  — Luke 24:27 — Jesus explains how all Scripture points to Him.\nv.44  — Galatians 1:10 — \"Am I seeking the approval of man or of God?\"\nv.46  — Deuteronomy 18:15 — Moses wrote of the coming Prophet.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-5/\n  Guzik examines the significance of the 38-year illness, the four witnesses\n  Jesus presents (John the Baptist, His works, the Father, and Scripture),\n  and the irony of Moses accusing those who trusted in Moses.\n\nCharles Spurgeon:\n  Sermon: \"Wilt Thou Be Made Whole?\" (MTP Vol. 34, No. 2006)\n  \"Thirty-eight years of suffering — and Jesus asks 'Do you want to be healed?'\n  It seems an unnecessary question. But many men are so accustomed to their\n  condition that they have stopped wanting to be different. Christ asks the\n  question because He requires the will to be engaged.\"\n  Sermon: \"Passed from Death unto Life\" on v.24 (MTP Vol. 10, No. 563)\n  \"Hath everlasting life — not shall have, not may have — hath. Present tense.\n  The moment a man believes, he possesses eternal life. It is not a future\n  reward; it is a present possession.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.2  — KJV: \"by the sheep market a pool\" / ESV: \"by the Sheep Gate a pool\" — Greek \"probatike\" — KJV supplies \"market\"; ESV supplies \"Gate.\" Most modern translations favor \"Sheep Gate\" (a gate in Jerusalem's wall, Nehemiah 3:1) rather than a sheep market.\n  [ASV/NET/WEB]: NET: \"Now there is in Jerusalem by the Sheep Gate a\n       pool called Bethzatha in Aramaic\" — \"Bethzatha\" (NET) vs.\n       \"Bethesda\" (KJV/WEB/ASV). The name varies in manuscripts:\n       Bethesda, Bethzatha, Bethsaida. Archaeological discoveries\n       confirmed a five-porticoed pool north of the temple.\n\nv.3-4 — KJV: includes v.4 about the angel troubling the water / ESV: omits v.4 (placed in footnote) — The phrase about the angel is absent from many older manuscripts. ESV and most modern translations place it in brackets or footnotes. Most scholars consider it a later scribal addition explaining the popular belief about the pool.\n\nv.4  — NET omits v.4 entirely (the angel stirring the water) as\n       not in the earliest manuscripts. KJV includes it. WEB\n       includes it in brackets. ASV omits it. This is one of the\n       most significant textual variants in John — the later\n       addition likely explains the popular belief mentioned in v.7.\n\nv.6  — KJV: \"Wilt thou be made whole?\" / ESV: \"Do you want to be healed?\" — Greek \"hugiēs\" — Both equivalent. KJV's \"whole\" captures the broader sense of complete restoration; ESV's \"healed\" is more specific to physical healing.\n\nv.17 — KJV: \"My Father worketh hitherto, and I work\" / ESV: \"My Father is working until now, and I am working\" — Both equivalent. Jesus claims continuous, uninterrupted co-activity with the Father — including on the Sabbath.\n  [ASV/NET/WEB]: NET: \"My Father is working until now, and I too am working\"\n       — \"My Father\" (not \"our Father\") — Jesus claims a unique\n       relationship. WEB: \"My Father is still working, so I am\n       working, too.\" The Jews understood this as a claim to\n       equality with God (v.18).\n\nv.24 — KJV: \"shall not come into condemnation; but is passed from death unto life\" / ESV: \"does not come into judgment, but has passed from death to life\" — Greek \"krisin\" — KJV uses \"condemnation\"; ESV uses \"judgment.\" Both convey that the believer is exempt from the final verdict.\n  [ASV/NET/WEB]: NET: \"the one who hears my word and believes the one who\n       sent me has eternal life\" — \"has\" (echei) — present tense.\n       Eternal life is a present possession, not just future hope.\n       WEB: \"has eternal life.\" KJV: \"hath everlasting life.\" The\n       present tense is emphatic in all translations.\n\nv.39 — KJV: \"Search the scriptures\" / ESV: \"You search the Scriptures\" — Greek \"eraunate\" — Can be read as a command (imperative) or a statement (indicative). ESV favors the indicative: Jesus is not commanding them to search but pointing out that they already do — yet miss the point.\n  [ASV/NET/WEB]: NET: \"You study the scriptures thoroughly because you think\n       in them you possess eternal life, and it is these same\n       scriptures that testify about me\" — \"study thoroughly\"\n       (eraunate) can be indicative (\"you do search\") or imperative\n       (\"search!\"). NET/ESV take it as indicative (a statement);\n       KJV takes it as imperative (a command).\n\nv.44 — KJV: \"How can ye believe, which receive honour one of another\" / ESV: \"How can you believe, when you receive glory from one another\" — Greek \"doxan\" — KJV uses \"honour\"; ESV uses \"glory.\" Both identify the desire for human approval as a barrier to genuine faith.\n\n\nGLOSSARY\n------------------------------------\nBethesda      — Hebrew/Aramaic name meaning \"house of mercy\" or \"house of grace.\"\n               The pool in Jerusalem where Jesus healed the paralyzed man.\n\nImpotent      — KJV term meaning powerless, unable — referring to those who were\n               physically disabled or chronically ill.\n\nSabbath       — The seventh day of the Jewish week (Saturday), set apart for rest\n               and worship per the fourth commandment (Exodus 20:8-11). Jewish\n               oral law had expanded Sabbath restrictions far beyond Scripture.\n\nQuickeneth    — KJV term meaning \"gives life to\" or \"makes alive.\" Used of both\n               physical resurrection and spiritual regeneration.\n\nCondemnation  — Greek \"krisis\" — judgment, being found guilty. Believers in\n               Christ have passed out of this state permanently (v.24).\n\nDispersed     — Jews living outside of Israel, scattered throughout the Roman\n               Empire and beyond. Also called the Diaspora.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus asked the man \"Do you want to be made whole?\" (v.6). The man's answer\n   was full of excuses — no one to help him, others get there first. Jesus healed\n   him anyway. Are there areas of your life where you've given up wanting to\n   change? What excuses are you hiding behind?\n\n2. After healing the man, Jesus found him in the Temple and said \"sin no more,\n   lest a worse thing come unto thee\" (v.14). Physical healing and spiritual\n   wholeness are connected. Is there a sin pattern in your life that is\n   producing consequences you keep experiencing?\n\n3. Jesus said the religious leaders searched the Scriptures but missed the One\n   the Scriptures pointed to (v.39-40). It's possible to be very familiar with\n   the Bible and still not know Christ personally. How is your Bible reading\n   leading you to a deeper relationship with Jesus, not just more knowledge?\n\n4. \"How can ye believe, which receive honour one of another?\" (v.44). Living for\n   human approval is one of the greatest obstacles to genuine faith. Where in\n   your life are you making decisions based on what others will think rather than\n   what God says?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. The man at the pool had been ill for 38 years. That's a long time to wait.\n   Is there something in your life you've been waiting on God for so long that\n   you've stopped expecting Him to act? How does this story speak to that?\n\n2. Jesus healed the man on the Sabbath, knowing it would cause controversy. He\n   didn't ask permission from the religious establishment. Are there times when\n   doing the right thing will cost you socially or professionally? How do you\n   navigate that?\n\n3. Jesus presents four witnesses to His identity: John the Baptist, His miracles,\n   the Father's voice, and the Scriptures (vv.33-47). Which of these is most\n   compelling to you personally, and why?\n\n4. Verse 44 identifies the desire for human approval as a barrier to faith. In\n   what specific relationships or settings do you find yourself most tempted to\n   seek man's approval over God's? What would it look like to break that pattern?\n\n5. Jesus told the religious leaders that Moses — the very one they trusted —\n   would accuse them (v.45). What is the danger of trusting in religious heritage\n   or tradition rather than in Christ Himself?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 5:1-9 - Opposed by Hopelessness:\n    https://enduringword.com/media/john-5-opposed-hopelessness/\n  John 5:10-18 - Opposed by Religious Tradition:\n    https://enduringword.com/media/john-5-opposed-religious-tradition/\n  John 5:19-47 - Opposed by Unbelief:\n    https://enduringword.com/media/john-5-opposed-unbelief/\n\nThe Chosen — John 5, The Pool of Bethesda:\n  https://youtu.be/JMj1ggINLe4?si=YSIHXJHokVVktIMV\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "6": {"translations": {"ESV": ["After this Jesus went away to the other side of the Sea of Galilee, which is the Sea of Tiberias.", "And a large crowd was following him, because they saw the signs that he was doing on the sick.", "Jesus went up on the mountain, and there he sat down with his disciples.", "Now the Passover, the feast of the Jews, was at hand.", "Lifting up his eyes, then, and seeing that a large crowd was coming toward him, Jesus said to Philip, “Where are we to buy bread, so that these people may eat?”", "He said this to test him, for he himself knew what he would do.", "Philip answered him, “Two hundred denarii worth of bread would not be enough for each of them to get a little.”", "One of his disciples, Andrew, Simon Peter’s brother, said to him,", "“There is a boy here who has five barley loaves and two fish, but what are they for so many?”", "Jesus said, “Have the people sit down.” Now there was much grass in the place. So the men sat down, about five thousand in number.", "Jesus then took the loaves, and when he had given thanks, he distributed them to those who were seated. So also the fish, as much as they wanted.", "And when they had eaten their fill, he told his disciples, “Gather up the leftover fragments, that nothing may be lost.”", "So they gathered them up and filled twelve baskets with fragments from the five barley loaves left by those who had eaten.", "When the people saw the sign that he had done, they said, “This is indeed the Prophet who is to come into the world!”", "Perceiving then that they were about to come and take him by force to make him king, Jesus withdrew again to the mountain by himself.", "When evening came, his disciples went down to the sea,", "got into a boat, and started across the sea to Capernaum. It was now dark, and Jesus had not yet come to them.", "The sea became rough because a strong wind was blowing.", "When they had rowed about three or four miles, they saw Jesus walking on the sea and coming near the boat, and they were frightened.", "But he said to them, “It is I; do not be afraid.”", "Then they were glad to take him into the boat, and immediately the boat was at the land to which they were going.", "On the next day the crowd that remained on the other side of the sea saw that there had been only one boat there, and that Jesus had not entered the boat with his disciples, but that his disciples had gone away alone.", "Other boats from Tiberias came near the place where they had eaten the bread after the Lord had given thanks.", "So when the crowd saw that Jesus was not there, nor his disciples, they themselves got into the boats and went to Capernaum, seeking Jesus.", "When they found him on the other side of the sea, they said to him, “Rabbi, when did you come here?”", "Jesus answered them, “Truly, truly, I say to you, you are seeking me, not because you saw signs, but because you ate your fill of the loaves.", "Do not work for the food that perishes, but for the food that endures to eternal life, which the Son of Man will give to you. For on him God the Father has set his seal.”", "Then they said to him, “What must we do, to be doing the works of God?”", "Jesus answered them, “This is the work of God, that you believe in him whom he has sent.”", "So they said to him, “Then what sign do you do, that we may see and believe you? What work do you perform?", "Our fathers ate the manna in the wilderness; as it is written, ‘He gave them bread from heaven to eat.’”", "Jesus then said to them, “Truly, truly, I say to you, it was not Moses who gave you the bread from heaven, but my Father gives you the true bread from heaven.", "For the bread of God is he who comes down from heaven and gives life to the world.”", "They said to him, “Sir, give us this bread always.”", "Jesus said to them, “I am the bread of life; whoever comes to me shall not hunger, and whoever believes in me shall never thirst.", "But I said to you that you have seen me and yet do not believe.", "All that the Father gives me will come to me, and whoever comes to me I will never cast out.", "For I have come down from heaven, not to do my own will but the will of him who sent me.", "And this is the will of him who sent me, that I should lose nothing of all that he has given me, but raise it up on the last day.", "For this is the will of my Father, that everyone who looks on the Son and believes in him should have eternal life, and I will raise him up on the last day.”", "So the Jews grumbled about him, because he said, “I am the bread that came down from heaven.”", "They said, “Is not this Jesus, the son of Joseph, whose father and mother we know? How does he now say, ‘I have come down from heaven’?”", "Jesus answered them, “Do not grumble among yourselves.", "No one can come to me unless the Father who sent me draws him. And I will raise him up on the last day.", "It is written in the Prophets, ‘And they will all be taught by God.’ Everyone who has heard and learned from the Father comes to me—", "not that anyone has seen the Father except he who is from God; he has seen the Father.", "Truly, truly, I say to you, whoever believes has eternal life.", "I am the bread of life.", "Your fathers ate the manna in the wilderness, and they died.", "This is the bread that comes down from heaven, so that one may eat of it and not die.", "I am the living bread that came down from heaven. If anyone eats of this bread, he will live forever. And the bread that I will give for the life of the world is my flesh.”", "The Jews then disputed among themselves, saying, “How can this man give us his flesh to eat?”", "So Jesus said to them, “Truly, truly, I say to you, unless you eat the flesh of the Son of Man and drink his blood, you have no life in you.", "Whoever feeds on my flesh and drinks my blood has eternal life, and I will raise him up on the last day.", "For my flesh is true food, and my blood is true drink.", "Whoever feeds on my flesh and drinks my blood abides in me, and I in him.", "As the living Father sent me, and I live because of the Father, so whoever feeds on me, he also will live because of me.", "This is the bread that came down from heaven, not like the bread the fathers ate, and died. Whoever feeds on this bread will live forever.”", "Jesus said these things in the synagogue, as he taught at Capernaum.", "When many of his disciples heard it, they said, “This is a hard saying; who can listen to it?”", "But Jesus, knowing in himself that his disciples were grumbling about this, said to them, “Do you take offense at this?", "Then what if you were to see the Son of Man ascending to where he was before?", "It is the Spirit who gives life; the flesh is no help at all. The words that I have spoken to you are spirit and life.", "But there are some of you who do not believe.” (For Jesus knew from the beginning who those were who did not believe, and who it was who would betray him.)", "And he said, “This is why I told you that no one can come to me unless it is granted him by the Father.”", "After this many of his disciples turned back and no longer walked with him.", "So Jesus said to the twelve, “Do you want to go away as well?”", "Simon Peter answered him, “Lord, to whom shall we go? You have the words of eternal life,", "and we have believed, and have come to know, that you are the Holy One of God.”", "Jesus answered them, “Did I not choose you, the twelve? And yet one of you is a devil.”", "He spoke of Judas the son of Simon Iscariot, for he, one of the twelve, was going to betray him."], "KJV": ["After these things Jesus went over the sea of Galilee, which is the sea of Tiberias.", "And a great multitude followed him, because they saw his miracles which he did on them that were diseased.", "And Jesus went up into a mountain, and there he sat with his disciples.", "And the passover, a feast of the Jews, was nigh.", "When Jesus then lifted up his eyes, and saw a great company come unto him, he saith unto Philip, Whence shall we buy bread, that these may eat?", "And this he said to prove him: for he himself knew what he would do.", "Philip answered him, Two hundred pennyworth of bread is not sufficient for them, that every one of them may take a little.", "One of his disciples, Andrew, Simon Peter’s brother, saith unto him,", "There is a lad here, which hath five barley loaves, and two small fishes: but what are they among so many?", "And Jesus said, Make the men sit down. Now there was much grass in the place. So the men sat down, in number about five thousand.", "And Jesus took the loaves; and when he had given thanks, he distributed to the disciples, and the disciples to them that were set down; and likewise of the fishes as much as they would.", "When they were filled, he said unto his disciples, Gather up the fragments that remain, that nothing be lost.", "Therefore they gathered them together, and filled twelve baskets with the fragments of the five barley loaves, which remained over and above unto them that had eaten.", "Then those men, when they had seen the miracle that Jesus did, said, This is of a truth that prophet that should come into the world.", "When Jesus therefore perceived that they would come and take him by force, to make him a king, he departed again into a mountain himself alone.", "And when even was now come, his disciples went down unto the sea,", "And entered into a ship, and went over the sea toward Capernaum. And it was now dark, and Jesus was not come to them.", "And the sea arose by reason of a great wind that blew.", "So when they had rowed about five and twenty or thirty furlongs, they see Jesus walking on the sea, and drawing nigh unto the ship: and they were afraid.", "But he saith unto them, It is I; be not afraid.", "Then they willingly received him into the ship: and immediately the ship was at the land whither they went.", "The day following, when the people which stood on the other side of the sea saw that there was none other boat there, save that one whereinto his disciples were entered, and that Jesus went not with his disciples into the boat, but that his disciples were gone away alone;", "(Howbeit there came other boats from Tiberias nigh unto the place where they did eat bread, after that the Lord had given thanks:)", "When the people therefore saw that Jesus was not there, neither his disciples, they also took shipping, and came to Capernaum, seeking for Jesus.", "And when they had found him on the other side of the sea, they said unto him, Rabbi, when camest thou hither?", "Jesus answered them and said, Verily, verily, I say unto you, Ye seek me, not because ye saw the miracles, but because ye did eat of the loaves, and were filled.", "Labour not for the meat which perisheth, but for that meat which endureth unto everlasting life, which the Son of man shall give unto you: for him hath God the Father sealed.", "Then said they unto him, What shall we do, that we might work the works of God?", "Jesus answered and said unto them, This is the work of God, that ye believe on him whom he hath sent.", "They said therefore unto him, What sign shewest thou then, that we may see, and believe thee? what dost thou work?", "Our fathers did eat manna in the desert; as it is written, He gave them bread from heaven to eat.", "Then Jesus said unto them, Verily, verily, I say unto you, Moses gave you not that bread from heaven; but my Father giveth you the true bread from heaven.", "For the bread of God is he which cometh down from heaven, and giveth life unto the world.", "Then said they unto him, Lord, evermore give us this bread.", "And Jesus said unto them, I am the bread of life: he that cometh to me shall never hunger; and he that believeth on me shall never thirst.", "But I said unto you, That ye also have seen me, and believe not.", "All that the Father giveth me shall come to me; and him that cometh to me I will in no wise cast out.", "For I came down from heaven, not to do mine own will, but the will of him that sent me.", "And this is the Father’s will which hath sent me, that of all which he hath given me I should lose nothing, but should raise it up again at the last day.", "And this is the will of him that sent me, that every one which seeth the Son, and believeth on him, may have everlasting life: and I will raise him up at the last day.", "The Jews then murmured at him, because he said, I am the bread which came down from heaven.", "And they said, Is not this Jesus, the son of Joseph, whose father and mother we know? how is it then that he saith, I came down from heaven?", "Jesus therefore answered and said unto them, Murmur not among yourselves.", "No man can come to me, except the Father which hath sent me draw him: and I will raise him up at the last day.", "It is written in the prophets, And they shall be all taught of God. Every man therefore that hath heard, and hath learned of the Father, cometh unto me.", "Not that any man hath seen the Father, save he which is of God, he hath seen the Father.", "Verily, verily, I say unto you, He that believeth on me hath everlasting life.", "I am that bread of life.", "Your fathers did eat manna in the wilderness, and are dead.", "This is the bread which cometh down from heaven, that a man may eat thereof, and not die.", "I am the living bread which came down from heaven: if any man eat of this bread, he shall live for ever: and the bread that I will give is my flesh, which I will give for the life of the world.", "The Jews therefore strove among themselves, saying, How can this man give us his flesh to eat?", "Then Jesus said unto them, Verily, verily, I say unto you, Except ye eat the flesh of the Son of man eld the signs which he did on them that were sick.", "And Jesus went up into the mountain, and there he sat with his disciples.", "Now the passover, the feast of the Jews, was at hand.", "Jesus therefore lifting up his eyes, and seeing that a great multitude cometh unto him, saith unto Philip, Whence are we to buy bread, that these may eat?", "And this he said to prove him: for he himself knew what he would do.", "Philip answered him, Two hundred shillings` worth of bread is not sufficient for them, that every one may take a little.", "One of his disciples, Andrew, Simon Peter`s brother, saith unto him,", "There is a lad here, who hath five barley loaves, and two fishes: but what are these among so many?", "Jesus said, Make the people sit down. Now there was much grass in the place. So the men sat down, in number about five thousand.", "Jesus therefore took the loaves; and having given thanks, he distributed to them that were set down; likewise also of the fishes as much as they would.", "And when they were filled, he saith unto his disciples, Gather up the broken pieces which remain over, that nothing be lost.", "So they gathered them up, and filled twelve baskets with broken pieces from the five barley loaves, which remained over unto them that had eaten.", "When therefore the people saw the sign which he did, they said, This is of a truth the prophet that cometh into the world.", "Jesus therefore perceiving that they were about to come and take him by force, to make him king, withdrew again into the mountain himself alone.", "And when evening came, his disciples went down unto the sea;", "and they entered into a boat, and were going over the sea unto Capernaum. And it was now dark, and Jesus had not yet come to them.", "And the sea was rising by reason of a great wind that blew.", "When therefore they had rowed about five and twenty or thirty furlongs, they behold Jesus walking on the sea, and drawing nigh unto the boat: and they were afraid.", "But he saith unto them, It is I; be not afraid.", "They were willing therefore to receive him into the boat: and straightway the boat was at the land whither they were going.", "On the morrow the multitude that stood on the other side of the sea saw that there was no other boat there, save one, and that Jesus entered not with his disciples into the boat, but [that] his disciples went away alone", "(howbeit there came boats from Tiberias nigh unto the place where they ate the bread after the Lord had given thanks):", "when the multitude therefore saw that Jesus was not there, neither his disciples, they themselves got into the boats, and came to Capernaum, seeking Jesus.", "And when they found him on the other side of the sea, they said unto him, Rabbi, when camest thou hither?", "Jesus answered them and said, Verily, verily, I say unto you, Ye seek me, not because ye saw signs, but because ye ate of the loaves, and were filled.", "Work not for the food which perisheth, but for the food which abideth unto eternal life, which the Son of man shall give unto you: for him the Father, even God, hath sealed.", "They said therefore unto him, What must we do, that we may work the works of God?", "Jesus answered and said unto them, This is the work of God, that ye believe on him whom he hath sent.", "They said therefore unto him, What then doest thou for a sign, that we may see, and believe thee? what workest thou?", "Our fathers ate the manna in the wilderness; as it is written, He gave them bread out of heaven to eat.", "Jesus therefore said unto them, Verily, verily, I say unto you, It was not Moses that gave you the bread out of heaven; but my Father giveth you the true bread out of heaven.", "For the bread of God is that which cometh down out of heaven, and giveth life unto the world.", "They said therefore unto him, Lord, evermore give us this bread.", "Jesus said unto them. I am the bread of life: he that cometh to me shall not hunger, and he that believeth on me shall never thirst.", lood hath eternal life: and I will raise him up at the last day.", "For my flesh is meat indeed, and my blood is drink indeed.", "He that eateth my flesh and drinketh my blood abideth in me, and I in him.", "As the living Father sent me, and I live because of the Father; so he that eateth me, he also shall live because of me.", "This is the bread which came down out of heaven: not as the fathers ate, and died; he that eateth this bread shall live for ever.", "These things said he in the synagogue, as he taught in Capernaum.", "Many therefore of his disciples, when the heard [this], said, This is a hard saying; who can hear it?", "But Jesus knowing in himself that his disciples murmured at this, said unto them, Doth this cause you to stumble?", "[What] then if ye should behold the Son of man ascending where he was before?", "It is the spirit that giveth life; the flesh profiteth nothing: the words that I have spoken unto you are spirit, are are life.", "But there are some of you that believe not. For Jesus knew from the beginning who they were that believed not, and who it was that should betray him.", "And he said, For this cause have I said unto you, that no man can come unto me, except it be given unto him of the Father.", "Upon this many of his disciples went back, and walked no more with him.", "Jesus said therefore unto the twelve, Would ye also go away?", "Simon Peter answered him, Lord, to whom shall we go? thou hast the words of eternal life.", "And we have believed and know that thou art the Holy One of God.", "Jesus answered them, Did not I choose you the twelve, and one of you is a devil?", "Now he spake of Judas [the son] of Simon Iscariot, for he it was that should betray him, [being] one of the twelve."], "NET": ["After this Jesus went away to the other side of the Sea of Galilee (also called the Sea of Tiberias).", "A large crowd was following him because they were observing the miraculous signs he was performing on the sick.", "So Jesus went on up the mountainside and sat down there with his disciples.", "(Now the Jewish Feast of the Passover was near.)", "Then Jesus, when he looked up and saw that a large crowd was coming to him, said to Philip, “Where can we buy bread so that these people may eat?”", "(Now Jesus said this to test him, for he knew what he was going to do.)", "Philip replied, “200 silver coins worth of bread would not be enough for them, for each one to get a little.”", "One of Jesus’ disciples, Andrew, Simon Peter’s brother, said to him,", "“Here is a boy who has five barley loaves and two fish, but what good are these for so many people?”", "Jesus said, “Have the people sit down.” (Now there was a lot of grass in that place.) So the men sat down, about 5,000 in number.", "Then Jesus took the loaves, and when he had given thanks, he distributed the bread to those who were seated. He then did the same with the fish, as much as they wanted.", "When they were all satisfied, Jesus said to his disciples, “Gather up the broken pieces that are left over, so that nothing is wasted.”", "So they gathered them up and filled 12 baskets with broken pieces from the five barley loaves left over by the people who had eaten.", "Now when the people saw the miraculous sign that Jesus performed, they began to say to one another, “This is certainly the Prophet who is to come into the world.”", "Then Jesus, because he knew they were going to come and seize him by force to make him king, withdrew again up the mountainside alone.", "Now when evening came, his disciples went down to the lake,", "got into a boat, and started to cross the lake to Capernaum. (It had already become dark, and Jesus had not yet come to them.)", "By now a strong wind was blowing and the sea was getting rough.", "Then, when they had rowed about three or four miles, they caught sight of Jesus walking on the lake, approaching the boat, and they were frightened.", "But he said to them, “It is I. Do not be afraid.”", "Then they wanted to take him into the boat, and immediately the boat came to the land where they had been heading.", "The next day the crowd that remained on the other side of the lake realized that only one small boat had been there, and that Jesus had not boarded it with his disciples, but that his disciples had gone away alone.", "Other boats from Tiberias came to shore near the place where they had eaten the bread after the Lord had given thanks.", "So when the crowd realized that neither Jesus nor his disciples were there, they got into the boats and came to Capernaum looking for Jesus.", "When they found him on the other side of the lake, they said to him, “Rabbi, when did you get here?”", "Jesus replied, “I tell you the solemn truth, you are looking for me not because you saw miraculous signs, but because you ate all the loaves of bread you wanted.", "Do not work for the food that disappears, but for the food that remains to eternal life—the food which the Son of Man will give to you. For God the Father has put his seal of approval on him.”", "So then they said to him, “What must we do to accomplish the deeds God requires?”", "Jesus replied, “This is the deed God requires—to believe in the one whom he sent.”", "So they said to him, “Then what miraculous sign will you perform, so that we may see it and believe you? What will you do?", "Our ancestors ate the manna in the wilderness, just as it is written, ‘He gave them bread from heaven to eat.’”", "Then Jesus told them, “I tell you the solemn truth, it is not Moses who has given you the bread from heaven, but my Father is giving you the true bread from heaven.", "For the bread of God is the one who comes down from heaven and gives life to the world.”", "So they said to him, “Sir, give us this bread all the time!”", "Jesus said to them, “I am the bread of life. The one who comes to me will never go hungry, and the one who believes in me will never be thirsty.", "But I told you that you have seen me and still do not believe.", "Everyone whom the Father gives me will come to me, and the one who comes to me I will never send away.", "For I have come down from heaven not to do my own will but the will of the one who sent me.", "Now this is the will of the one who sent me—that I should not lose one person of every one he has given me, but raise them all up at the last day.", "For this is the will of my Father—for everyone who looks on the Son and believes in him to have eternal life, and I will raise him up at the last day.”", "Then the Jews who were hostile to Jesus began complaining about him because he said, “I am the bread that came down from heaven,”", "and they said, “Isn’t this Jesus the son of Joseph, whose father and mother we know? How can he now say, ‘I have come down from heaven’?”", "Jesus replied, “Do not complain about me to one another.", "No one can come to me unless the Father who sent me draws him, and I will raise him up at the last day.", "It is written in the prophets, ‘And they will all be taught by God.’ Everyone who hears and learns from the Father comes to me.", "(Not that anyone has seen the Father except the one who is from God—he has seen the Father.)", "I tell you the solemn truth, the one who believes has eternal life.", "I am the bread of life.", "Your ancestors ate the manna in the wilderness, and they died.", "This is the bread that has come down from heaven, so that a person may eat from it and not die.", "I am the living bread that came down from heaven. If anyone eats from this bread he will live forever. The bread that I will give for the life of the world is my flesh.”", "Then the Jews who were hostile to Jesus began to argue with one another, “How can this man give us his flesh to eat?”", "Jesus said to them, “I tell you the solemn truth, unless you eat the flesh of the Son of Man and drink his blood, you have no life in yourselves.", "The one who eats my flesh and drinks my blood has eternal life, and I will raise him up on the last day.", "For my flesh is true food, and my blood is true drink.", "The one who eats my flesh and drinks my blood resides in me, and I in him.", "Just as the living Father sent me, and I live because of the Father, so the one who consumes me will live because of me.", "This is the bread that came down from heaven; it is not like the bread your ancestors ate, but then later died. The one who eats this bread will live forever.”", "Jesus said these things while he was teaching in the synagogue in Capernaum.", "Then many of his disciples, when they heard these things, said, “This is a difficult saying! Who can understand it?”", "When Jesus was aware that his disciples were complaining about this, he said to them, “Does this cause you to be offended?", "Then what if you see the Son of Man ascending where he was before?", "The Spirit is the one who gives life; human nature is of no help! The words that I have spoken to you are spirit and are life.", "But there are some of you who do not believe.” (For Jesus had already known from the beginning who those were who did not believe, and who it was who would betray him.)", "So Jesus added, “Because of this I told you that no one can come to me unless the Father has allowed him to come.”", "After this many of his disciples quit following him and did not accompany him any longer.", "So Jesus said to the twelve, “You don’t want to go away too, do you?”", "Simon Peter answered him, “Lord, to whom would we go? You have the words of eternal life.", "We have come to believe and to know that you are the Holy One of God!”", "Jesus replied, “Didn’t I choose you, the twelve, and yet one of you is the devil?”", "(Now he said this about Judas son of Simon Iscariot, for Judas, one of the twelve, was going to betray him.)"], "WEB": ["After these things, Jesus went away to the other side of the sea of Galilee, which is also called the Sea of Tiberias.", "A great multitude followed him, because they saw his signs which he did on those who were sick.", "Jesus went up into the ely the boat was at the land where they were going.", "On the next day, the multitude that stood on the other side of the sea saw that there was no other boat there, except the one in which his disciples had embarked, and that Jesus hadn’t entered with his disciples into the boat, but his disciples had gone away alone.", "However boats from Tiberias came near to the place where they ate the bread after the Lord had given thanks.", "When the multitude therefore saw that Jesus wasn’t there, nor his disciples, they themselves got into the boats, and came to Capernaum, seeking Jesus.", "When they found him on the other side of the sea, they asked him, “Rabbi, when did you come here?”", "Jesus answered them, “Most certainly I tell you, you seek me, not because you saw signs, but because you ate of the loaves, and were filled.", "Don’t work for the food which perishes, but for the food which remains to eternal life, which the Son of Man will give to you. For God the Father has sealed him.”", "They said therefore to him, “What must we do, that we may work the works of God?”", "Jesus answered them, “This is the work of God, that you believe in him whom he has sent.”", "They said therefore to him, “What then do you do for a sign, that we may see, and believe you? What work do you do?", "Our fathers ate the manna in the wilderness. As it is written, ‘He gave them bread out of heaven to eat.’”", "Jesus therefore said to them, “Most certainly, I tell you, it wasn’t Moses who gave you the bread out of heaven, but my Father gives you the true bread out of heaven.", "For the bread of God is that which comes down out of heaven, and gives life to the world.”", "They said therefore to him, “Lord, always give us this bread.”", "Jesus said to them, “I am the bread of life. He who comes to me will not be hungry, and he who believes in me will never be thirsty.", "But I told you that you have seen me, and yet you don’t believe.", "All those whom the Father gives me will come to me. He who comes to me I will in no way throw out.", "For I have come down from heaven, not to do my own will, but the will of him who sent me.", "This is the will of my Father who sent me, that of all he has given to me I should lose nothing, but should raise him up at the last day.", "This is the will of the one who sent me, that everyone who sees the Son, and believes in him, should have eternal life; and I will raise him up at the last day.”", "The Jews therefore murmured concerning him, because he said, “I am the bread which came down out of heaven.”", "They said, “Isn’t this Jesus, the son of Joseph, whose father and mother we know? How then does he say, ‘I have come down out of heaven?’”", "Therefore Jesus answered them, “Don’t murmur among yourselves.", "No one can come to me unless the Father who sent me draws him, and I will raise him up in the last day.", "It is written in the prophets, ‘They will all be taught by God.’ Therefore everyone who hears from the Father, and has learned, comes to me.", "Not that anyone has seen the Father, except he who is from God. He has seen the Father.", "Most certainly, I tell you, he who believes in me has eternal life.", "I am the bread of life.", "Your fathers ate the manna in the wilderness, and they died.", "This is the bread which comes down out of heaven, that anyone may eat of it and not die.", "I am the living bread which came down out of heaven. If anyone eats of this bread, he will live forever. Yes, the bread which I will give for the life of the world is my flesh.”", "The Jews therefore contended with one another, saying, “How can this man give us his flesh to eat?”", "Jesus therefore said to them, “Most certainly I tell you, unless you eat the flesh of the Son of Man and drink his blood, you don’t have life in yourselves.", "He who eats my flesh and drinks my blood has eternal life, and I will raise him up at the last day.", "For my flesh is food indeed, and my blood is drink indeed.", "He who eats my flesh and drinks
