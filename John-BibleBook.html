id him? They say unto him, Lord, come and see.", "Jesus wept.", "The Jews therefore said, Behold how he loved him!", "But some of them said, Could not this man, who opened the eyes of him that was blind, have caused that this man also should not die?", "Jesus therefore again groaning in himself cometh to the tomb. Now it was a cave, and a stone lay against it.", "Jesus saith, Take ye away the stone. Martha, the sister of him that was dead, saith unto him, Lord, by this time the body decayeth; for he hath been [dead] four days.", "Jesus saith unto her, Said I not unto thee, that, if thou believedst, thou shouldest see the glory of God?", "So they took away the stone. And Jesus lifted up his eyes, and said, Father, I thank thee that thou heardest me.", "And I knew that thou hearest me always: but because of the multitude that standeth around I said it, that they may believe that thou didst send me.", "And when he had thus spoken, he cried with a loud voice, Lazarus, come forth.", "He that was dead came forth, bound hand and foot with grave-clothes; and his face was bound about with a napkin. Jesus saith unto them, Loose him, and let him go.", "Many therefore of the Jews, who came to Mary and beheld that which he did, believed on him.", "But some of them went away to the Pharisees, and told them the things which Jesus had done.", "The chief priests therefore and the Pharisees gathered a council, and said, What do we? for this man doeth many signs.", "If we let him thus alone, all men will believe on him: and the Romans will come and take away both our place and our nation.", "But a certain one of them, Caiaphas, being high priest that year, said unto them, Ye know nothing at all,", "nor do ye take account that it is expedient for you that one man should die for the people, and that the whole nation perish not.", "Now this he said not of himself: but, being high priest that year, he prophesied that Jesus should die for the nation;", "and not for the nation only, but that he might also gather together into one the children of God that are scattered abroad.", "So from that day forth they took counsel that they might put him to death.", "Jesus therefore walked no more openly among the Jews, but departed thence into the country near to the wilderness, into a city called Ephraim; and there he tarried with the disciples.", "Now the passover of the Jews was at hand: and many went up to Jerusalem out of the country before the passover, to purify themselves.", "They sought therefore for Jesus, and spake one with another, as they stood in the temple, What think ye? That he will not come to the feast?", "Now the chief priests and the Pharisees had given commandment, that, if any man knew where he was, he should show it, that they might take him."], "NET": ["Now a certain man named Lazarus was sick. He was from Bethany, the village where Mary and her sister Martha lived.", "(Now it was Mary who anointed the Lord with perfumed oil and wiped his feet dry with her hair, whose brother Lazarus was sick.)", "So the sisters sent a message to Jesus, “Lord, look, the one you love is sick.”", "When Jesus heard this, he said, “This sickness will not lead to death, but to God’s glory, so that the Son of God may be glorified through it.”", "(Now Jesus loved Martha and her sister and Lazarus.)", "So when he heard that Lazarus was sick, he remained in the place where he was for two more days.", "Then after this, he said to his disciples, “Let us go to Judea again.”", "The disciples replied, “Rabbi, the Jewish leaders were just now trying to stone you to death! Are you going there again?”", "Jesus replied, “Are there not 12 hours in a day? If anyone walks around in the daytime, he does not stumble because he sees the light of this world.", "But if anyone walks around at night, he stumbles because the light is not in him.”", "After he said this, he added, “Our friend Lazarus has fallen asleep. But I am going there to awaken him.”", "Then the disciples replied, “Lord, if he has fallen asleep, he will recover.”", "(Now Jesus had been talking about his death, but they thought he had been talking about real sleep.)", "Then Jesus told them plainly, “Lazarus has died,", "and I am glad for your sake that I was not there, so that you may believe. But let us go to him.”", "So Thomas (called Didymus) said to his fellow disciples, “Let us go too, so that we may die with him.”", "When Jesus arrived, he found that Lazarus had been in the tomb four days already.", "(Now Bethany was less than two miles from Jerusalem,", "so many of the Jewish people of the region had come to Martha and Mary to console them over the loss of their brother.)", "So when Martha heard that Jesus was coming, she went out to meet him, but Mary was sitting in the house.", "Martha said to Jesus, “Lord, if you had been here, my brother would not have died.", "But even now I know that whatever you ask from God, God will grant you.”", "Jesus replied, “Your brother will come back to life again.”", "Martha said, “I know that he will come back to life again in the resurrection at the last day.”", "Jesus said to her, “I am the resurrection and the life. The one who believes in me will live even if he dies,", "and the one who lives and believes in me will never die. Do you believe this?”", "She replied, “Yes, Lord, I believe that you are the Christ, the Son of God who comes into the world.”", "And when she had said this, Martha went and called her sister Mary, saying privately, “The Teacher is here and is asking for you.”", "So when Mary heard this, she got up quickly and went to him.", "(Now Jesus had not yet entered the village, but was still in the place where Martha had come out to meet him.)", "Then the people who were with Mary in the house consoling her saw her get up quickly and go out. They followed her because they thought she was going to the tomb to weep there.", "Now when Mary came to the place where Jesus was and saw him, she fell at his feet and said to him, “Lord, if you had been here, my brother would not have died.”", "When Jesus saw her weeping, and the people who had come with her weeping, he was intensely moved in spirit and greatly distressed.", "He asked, “Where have you laid him?” They replied, “Lord, come and see.”", "Jesus wept.", "Thus the people who had come to mourn said, “Look how much he loved him!”", "But some of them said, “This is the man who caused the blind man to see! Couldn’t he have done something to keep Lazarus from dying?”", "Jesus, intensely moved again, came to the tomb. (Now it was a cave, and a stone was placed across it.)", "Jesus said, “Take away the stone.” Martha, the sister of the deceased, replied, “Lord, by this time the body will have a bad smell because he has been buried four days.”", "Jesus responded, “Didn’t I tell you that if you believe, you would see the glory of God?”", "So they took away the stone. Jesus looked upward and said, “Father, I thank you that you have listened to me.", "I knew that you always listen to me, but I said this for the sake of the crowd standing around here, that they may believe that you sent me.”", "When he had said this, he shouted in a loud voice, “Lazarus, come out!”", "The one who had died came out, his feet and hands tied up with strips of cloth, and a cloth wrapped around his face. Jesus said to them, “Unwrap him and let him go.”", "Then many of the people, who had come with Mary and had seen the things Jesus did, believed in him.", "But some of them went to the Pharisees and reported to them what Jesus had done.", "So the chief priests and the Pharisees called the council together and said, “What are we doing? For this man is performing many miraculous signs.", "If we allow him to go on in this way, everyone will believe in him, and the Romans will come and take away our sanctuary and our nation.”", "Then one of them, Caiaphas, who was high priest that year, said, “You know nothing at all!", "You do not realize that it is more to your advantage to have one man die for the people than for the whole nation to perish.”", "(Now he did not say this on his own, but because he was high priest that year, he prophesied that Jesus was going to die for the Jewish nation,", "and not for the Jewish nation only, but to gather together into one the children of God who are scattered.)", "So from that day they planned together to kill him.", "Thus Jesus no longer went around publicly among the Judeans, but went away from there to the region near the wilderness, to a town called Ephraim, and stayed there with his disciples.", "Now the Jewish Feast of Passover was near, and many people went up to Jerusalem from the rural areas before the Passover to cleanse themselves ritually.", "Thus they were looking for Jesus, and saying to one another as they stood in the temple courts, “What do you think? That he won’t come to the feast?”", "(Now the chief priests and the Pharisees had given orders that anyone who knew where Jesus was should report it, so that they could arrest him.)"], "WEB": ["Now a certain man was sick, Lazarus from Bethany, of the village of Mary and her sister, Martha.", "It was that Mary who had anointed the Lord with ointment, and wiped his feet with her hair, whose brother, Lazarus, was sick.", "The sisters therefore sent to him, saying, “Lord, behold, he for whom you have great affection is sick.”", "But when Jesus heard it, he said, “This sickness is not to death, but for the glory of God, that God’s Son may be glorified by it.”", "Now Jesus loved Martha, and her sister, and Lazarus.", "When therefore he heard that he was sick, he stayed two days in the place where he was.", "Then after this he said to the disciples, “Let’s go into Judea again.”", "The disciples told him, “Rabbi, the Jews were just trying to stone you, and are you going there again?”", "Jesus answered, “Aren’t there twelve hours of daylight? If a man walks in the day, he doesn’t stumble, because he sees the light of this world.", "But if a man walks in the night, he stumbles, because the light isn’t in him.”", "He said these things, and after that, he said to them, “Our friend, Lazarus, has fallen asleep, but I am going so that I may awake him out of sleep.”", "The disciples therefore said, “Lord, if he has fallen asleep, he will recover.”", "Now Jesus had spoken of his death, but they thought that he spoke of taking rest in sleep.", "So Jesus said to them plainly then, “Lazarus is dead.", "I am glad for your sakes that I was not there, so that you may believe. Nevertheless, let’s go to him.”", "Thomas therefore, who is called Didymus, said to his fellow disciples, “Let’s go also, that we may die with him.”", "So when Jesus came, he found that he had been in the tomb four days already.", "Now Bethany was near Jerusalem, about fifteen stadia away.", "Many of the Jews had joined the women around Martha and Mary, to console them concerning their brother.", "Then when Martha heard that Jesus was coming, she went and met him, but Mary stayed in the house.", "Therefore Martha said to Jesus, “Lord, if you would have been here, my brother wouldn’t have died.", "Even now I know that, whatever you ask of God, God will give you.”", "Jesus said to her, “Your brother will rise again.”", "Martha said to him, “I know that he will rise again in the resurrection at the last day.”", "Jesus said to her, “I am the resurrection and the life. He who believes in me will still live, even if he dies.", "Whoever lives and believes in me will never die. Do you believe this?”", "She said to him, “Yes, Lord. I have come to believe that you are the Christ, God’s Son, he who comes into the world.”", "When she had said this, she went away, and called Mary, her sister, secretly, saying, “The Teacher is here, and is calling you.”", "When she heard this, she arose quickly, and went to him.", "Now Jesus had not yet come into the village, but was in the place where Martha met him.", "Then the Jews who were with her in the house, and were consoling her, when they saw Mary, that she rose up quickly and went out, followed her, saying, “She is going to the tomb to weep there.”", "Therefore when Mary came to where Jesus was, and saw him, she fell down at his feet, saying to him, “Lord, if you would have been here, my brother wouldn’t have died.”", "When Jesus therefore saw her weeping, and the Jews weeping who came with her, he groaned in the spirit, and was troubled,", "and said, “Where have you laid him?” They told him, “Lord, come and see.”", "Jesus wept.", "The Jews therefore said, “See how much affection he had for him!”", "Some of them said, “Couldn’t this man, who opened the eyes of him who was blind, have also kept this man from dying?”", "Jesus therefore, again groaning in himself, came to the tomb. Now it was a cave, and a stone lay against it.", "Jesus said, “Take away the stone.” Martha, the sister of him who was dead, said to him, “Lord, by this time there is a stench, for he has been dead four days.”", "Jesus said to her, “Didn’t I tell you that if you believed, you would see God’s glory?”", "So they took away the stone from the place where the dead man was lying. Jesus lifted up his eyes, and said, “Father, I thank you that you listened to me.", "I know that you always listen to me, but because of the multitude standing around I said this, that they may believe that you sent me.”", "When he had said this, he cried with a loud voice, “Lazarus, come out!”", "He who was dead came out, bound hand and foot with wrappings, and his face was wrapped around with a cloth. Jesus said to them, “Free him, and let him go.”", "Therefore many of the Jews, who came to Mary and saw what Jesus did, believed in him.", "But some of them went away to the Pharisees, and told them the things which Jesus had done.", "The chief priests therefore and the Pharisees gathered a council, and said, “What are we doing? For this man does many signs.", "If we leave him alone like this, everyone will believe in him, and the Romans will come and take away both our place and our nation.”", "But a certain one of them, Caiaphas, being high priest that year, said to them, “You know nothing at all,", "nor do you consider that it is advantageous for us that one man should die for the people, and that the whole nation not perish.”", "Now he didn’t say this of himself, but being high priest that year, he prophesied that Jesus would die for the nation,", "and not for the nation only, but that he might also gather together into one the children of God who are scattered abroad.", "So from that day forward they took counsel that they might put him to death.", "Jesus therefore walked no more openly among the Jews, but departed from there into the country near the wilderness, to a city called Ephraim. He stayed there with his disciples.", "Now the Passover of the Jews was at hand. Many went up from the country to Jerusalem before the Passover, to purify themselves.", "Then they sought for Jesus and spoke one with another, as they stood in the temple, “What do you think—that he isn’t coming to the feast at all?”", "Now the chief priests and the Pharisees had commanded that if anyone knew where he was, he should report it, that they might seize him."]}, "studyNotes": "John - Chapter 11\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus raises Lazarus from the dead after four days in the tomb, declaring \"I am the resurrection and the life\" — this greatest sign triggers the Sanhedrin's final plot to kill Him.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: The raising of Lazarus is the seventh and climactic sign\nmiracle in John's Gospel — the most dramatic demonstration of Jesus' power over\ndeath before His own resurrection. It is recorded only in John. The miracle\ndirectly triggered the Sanhedrin's decision to have Jesus killed (v.53), making\nit the event that set the cross in motion.\n\nBethany: A village about 2 miles (15 furlongs) east of Jerusalem on the Mount\nof Olives. The home of Mary, Martha, and Lazarus — a family Jesus clearly loved\nand visited regularly. It was His base of operations during the final week of\nHis ministry.\n\nFour Days Dead: Jewish tradition held that the soul hovered near the body for\nthree days after death, hoping to return. By the fourth day, decomposition was\nundeniable and the soul had departed. Jesus waited deliberately (v.6) — ensuring\nthere could be no question that Lazarus was truly dead.\n\nCaiaphas' Prophecy (vv.49-52): John notes the irony that the high priest\nunknowingly prophesied the substitutionary atonement — one man dying for the\npeople. God used even the scheming of His enemies to declare His redemptive plan.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Bethany (v.1): A village about 2 miles east of Jerusalem on the eastern slope of the Mount of Olives. Home of Lazarus, Mary, and Martha. Jesus raised Lazarus here.\n- Ephraim (v.54): After raising Lazarus, Jesus withdrew to a town called Ephraim near the wilderness — about 15 miles north of Jerusalem.\n- Jerusalem (v.55): The Passover feast was near. The Jews were looking for Jesus, asking \"Will he come to the feast?\"\n\nKEY VERSES\n------------------------------------\nv.4  — \"This illness does not lead to death. It is for the glory of God, so\n        that the Son of God may be glorified through it.\" (ESV) — God's purpose\n        in suffering is often glory, not punishment.\n\nv.25-26 — \"I am the resurrection and the life. Whoever believes in me, though\n        he die, yet shall he live, and everyone who lives and believes in me\n        shall never die. Do you believe this?\" (ESV) — The fifth \"I AM\"\n        statement — the most personal and direct.\n\nv.35 — \"Jesus wept.\" (ESV) — The shortest verse in the Bible. The Son of God\n        weeping at a grave — fully human, fully compassionate.\n\nv.43 — \"Lazarus, come out.\" (ESV) — The voice that commands death itself.\n\nCROSS-REFERENCES\n------------------------------------\nv.4   — Romans 8:28 — All things work together for good for those who love God.\nv.4   — 2 Corinthians 4:17 — Light and momentary troubles achieving eternal glory.\nv.11  — 1 Thessalonians 4:13-14 — Believers who have \"fallen asleep.\"\nv.25  — 1 Corinthians 15:20-22 — Christ the firstfruits of resurrection.\nv.25  — Revelation 1:18 — \"I am the Living One; I was dead, and now I live.\"\nv.35  — Hebrews 4:15 — Jesus sympathizes with our weaknesses.\nv.35  — Isaiah 53:3 — \"A man of sorrows, acquainted with grief.\"\nv.43  — Ezekiel 37:12-14 — God commanding the dead to live — the valley of\n        dry bones.\nv.50  — Isaiah 53:8 — \"He was cut off from the land of the living; for the\n        transgression of my people he was punished.\"\nv.52  — Ephesians 2:14-16 — Christ gathering scattered children into one body.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-11/\n  Guzik examines why Jesus delayed two days, the significance of four days\n  dead, the meaning of \"Jesus wept,\" and Caiaphas' unwitting prophecy.\n\nCharles Spurgeon:\n  Sermon: \"Jesus Wept\" on v.35 (MTP Vol. 35, No. 2091)\n  \"Two words — and yet what a world of meaning. He wept. Not because He\n  did not know what He was about to do. He wept because He felt what they\n  felt. He entered into their grief. The tears of Jesus are the tears of\n  God — and they tell us that God is not indifferent to our sorrow.\"\n  Sermon: \"I Am the Resurrection\" on v.25 (MTP Vol. 20, No. 1157)\n  \"He does not say 'I will give you resurrection' — He says 'I AM the\n  resurrection.' The life is not a gift He bestows from a distance; it is\n  a life that flows from union with Him.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.25 — KJV: \"I am the resurrection, and the life\" / ESV: \"I am the resurrection and the life\" — Both identical. The fifth \"I AM\" statement — Jesus does not merely give resurrection; He IS resurrection.\n  [ASV/NET/WEB]: NET: \"I am the resurrection and the life. The one who\n       believes in me will live even if he dies\" — the fifth \"I AM\"\n       statement. WEB: \"I am the resurrection and the life.\" Jesus\n       doesn't say \"I give resurrection\" but \"I AM resurrection\"\n       — He is the source, not just the agent.\n\nv.33 — KJV: \"he groaned in the spirit, and was troubled\" / ESV: \"he was deeply moved in his spirit and greatly troubled\" — Greek \"embrimaomai\" — A strong word that can mean to snort with anger, to be deeply indignant. Some scholars suggest Jesus was angry at death and its devastation, not merely sad. Both grief and righteous anger at death may be present.\n  [ASV/NET/WEB]: NET: \"he was intensely moved in spirit and greatly\n       distressed\" — \"intensely moved\" (enebrimēsato = snorted\n       with anger/deeply troubled). WEB: \"groaned in the spirit,\n       and was troubled.\" KJV: \"he groaned in the spirit.\" The\n       Greek suggests anger — at death itself, at sin's\n       consequences, at the grief surrounding Him.\n\nv.35 — KJV: \"Jesus wept\" / ESV: \"Jesus wept\" — Greek \"edakrusen\" — Both identical. The word means to shed tears quietly — different from the loud wailing of the mourners (v.33, \"klaio\"). Jesus wept quietly, personally — not performing grief but genuinely feeling it.\n  [ASV/NET/WEB]: NET: \"Jesus wept\" — the shortest verse in English Bibles.\n       WEB: \"Jesus wept.\" KJV: \"Jesus wept.\" Greek edakrysen =\n       shed tears (different from loud wailing, klaio, used of the\n       mourners). Quiet, personal tears. God weeps.\n\nv.39 — KJV: \"Lord, by this time he stinketh: for he hath been dead four days\" / ESV: \"Lord, by this time there will be an odor, for he has been dead four days\" — Both equivalent. KJV's blunt \"stinketh\" captures Martha's visceral objection; ESV softens to \"there will be an odor.\"\n\nv.43 — NET: \"Lazarus, come out!\" — Jesus calls him BY NAME. WEB:\n       \"Lazarus, come out!\" KJV: \"Lazarus, come forth.\" Augustine:\n       \"If He had not said 'Lazarus,' all the dead would have come\n       forth.\" The specific, personal call of sovereign authority.\n\nv.44 — KJV: \"Loose him, and let him go\" / ESV: \"Unbind him, and let him go\" — Greek \"lusate\" — Both equivalent. KJV uses \"loose\"; ESV uses \"unbind.\" The command is to remove the graveclothes — Lazarus was alive but still bound.\n\nv.50 — KJV: \"it is expedient for us, that one man should die for the people\" / ESV: \"it is better for you that one man should die for the people\" — Greek \"sumpherei\" — KJV uses \"expedient\"; ESV uses \"better.\" Caiaphas meant it politically; John means it theologically. The same words carry two entirely different meanings — human scheming and divine providence.\n  [ASV/NET/WEB]: NET: \"it is better for you to have one man die for the\n       people than to have the whole nation perish\" — Caiaphas\n       prophesies unwittingly. WEB: \"it is expedient for us that\n       one man should die for the people.\" KJV: \"that one man\n       should die for the people.\" John notes the irony: the high\n       priest speaks God's truth while plotting murder (v.51).\n\n\nGLOSSARY\n------------------------------------\nBethany       — A village on the eastern slope of the Mount of Olives, about\n               2 miles from Jerusalem. The home of Mary, Martha, and Lazarus.\n\nGraveclothes  — Strips of linen cloth used to wrap a body for burial, along\n               with spices. The face was wrapped separately with a cloth\n               (napkin/sudarium). Lazarus came out still bound in these.\n\nNapkin        — KJV term for the cloth (Greek: soudarion) wrapped around the\n               face of the dead. The same word used for the cloth found in\n               Jesus' empty tomb (John 20:7).\n\nSanhedrin     — The supreme Jewish council of 71 members (70 elders + high\n               priest). They convened to discuss the threat Jesus posed and\n               decided to have Him killed (v.47-53).\n\nCaiaphas      — The high priest from AD 18-36. Son-in-law of Annas. He\n               presided over Jesus' trial. His \"prophecy\" in v.50 was\n               politically motivated but divinely orchestrated.\n\nExpedient     — Advantageous, politically convenient. Caiaphas used this\n               word to justify murder; God used it to describe atonement.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus deliberately waited two days before going to Lazarus (v.6) — even\n   though He loved him. God's delays are not denials. Is there something you've\n   been waiting on God for that feels like abandonment? How does this story\n   reframe that waiting?\n\n2. \"Jesus wept\" (v.35). He wept even knowing He was about to raise Lazarus.\n   He entered fully into the grief of the moment. God is not distant from your\n   pain. He weeps with you. How does knowing that change how you bring your\n   grief to Him?\n\n3. Martha said \"Lord, if thou hadst been here, my brother had not died\" (v.21).\n   Have you ever said something similar to God — \"Where were you? Why didn't\n   you stop this?\" That is an honest prayer. Jesus didn't rebuke Martha for it.\n   What is the \"if you had been here\" prayer of your life right now?\n\n4. Jesus asked Martha \"Believest thou this?\" (v.26) — a direct, personal\n   question about resurrection faith. Not \"do you know this doctrine\" but \"do\n   you believe this for yourself, right now, in the middle of your grief?\"\n   What is your answer to that question today?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus said Lazarus' sickness was \"for the glory of God\" (v.4). He then\n   waited two days, allowing Lazarus to die. What does this tell you about\n   how God sometimes works — allowing painful things to happen for a greater\n   purpose? How do you hold onto faith in those waiting periods?\n\n2. Thomas said \"Let us also go, that we may die with him\" (v.16). It was\n   gloomy and fatalistic — but he went. Imperfect loyalty is still loyalty.\n   Where in your life are you showing up for Christ even when you're afraid\n   or uncertain?\n\n3. Mary and Martha both said the same thing: \"Lord, if thou hadst been here,\n   my brother had not died\" (vv.21,32). But Martha engaged Jesus in theological\n   conversation; Mary fell at His feet weeping. Both responses were valid. How\n   do you tend to respond to God in grief — with questions or with tears?\n   Which do you need more of right now?\n\n4. The religious leaders saw the same miracle and responded by plotting murder\n   (v.53). Miracles don't automatically produce faith — the heart must be\n   willing. What is the condition of your heart toward Jesus? Are you open\n   to what He is showing you, or are you protecting your own position?\n\n5. \"Loose him, and let him go\" (v.44). Lazarus was alive but still bound.\n   Are there areas of your life where you've been made alive in Christ but\n   are still bound by old habits, old identities, old fears? What needs to\n   be loosed?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 11:1-27 - Opposed by Grief:\n    https://enduringword.com/media/john-11-opposed-grief/\n  John 11:28-57 - Opposed by Death:\n    https://enduringword.com/media/john-11-opposed-death/\n\nThe Chosen — John 11, The Raising of Lazarus:\n  https://youtu.be/e-OXgunuz_4?si=ELNjPDHMlhS60XRU\n\nThe Chosen — John 11:\n  https://youtu.be/x9tTdR7WS7E?si=YenB9K6N3Y7lBNQB\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "12": {"translations": {"ESV": ["Six days before the Passover, Jesus therefore came to Bethany, where Lazarus was, whom Jesus had raised from the dead.", "So they gave a dinner for him there. Martha served, and Lazarus was one of those reclining with him at table.", "Mary therefore took a pound of expensive ointment made from pure nard, and anointed the feet of Jesus and wiped his feet with her hair. The house was filled with the fragrance of the perfume.", "But Judas Iscariot, one of his disciples (he who was about to betray him), said,", "“Why was this ointment not sold for three hundred denarii and given to the poor?”", "He said this, not because he cared about the poor, but because he was a thief, and having charge of the moneybag he used to help himself to what was put into it.", "Jesus said, “Leave her alone, so that she may keep it for the day of my burial.", "For the poor you always have with you, but you do not always have me.”", "When the large crowd of the Jews learned that Jesus was there, they came, not only on account of him but also to see Lazarus, whom he had raised from the dead.", "So the chief priests made plans to put Lazarus to death as well,", "because on account of him many of the Jews were going away and believing in Jesus.", "The next day the large crowd that had come to the feast heard that Jesus was coming to Jerusalem.", "So they took branches of palm trees and went out to meet him, crying out, “Hosanna! Blessed is he who comes in the name of the Lord, even the King of Israel!”", "And Jesus found a young donkey and sat on it, just as it is written,", "“Fear not, daughter of Zion; behold, your king is coming, sitting on a donkey’s colt!”", "His disciples did not understand these things at first, but when Jesus was glorified, then they remembered that these things had been written about him and had been done to him.", "The crowd that had been with him when he called Lazarus out of the tomb and raised him from the dead continued to bear witness.", "The reason why the crowd went to meet him was that they heard he had done this sign.", "So the Pharisees said to one another, “You see that you are gaining nothing. Look, the world has gone after him.”", "Now among those who went up to worship at the feast were some Greeks.", "So these came to Philip, who was from Bethsaida in Galilee, and asked him, “Sir, we wish to see Jesus.”", "Philip went and told Andrew; Andrew and Philip went and told Jesus.", "And Jesus answered them, “The hour has come for the Son of Man to be glorified.", "Truly, truly, I say to you, unless a grain of wheat falls into the earth and dies, it remains alone; but if it dies, it bears much fruit.", "Whoever loves his life loses it, and whoever hates his life in this world will keep it for eternal life.", "If anyone serves me, he must follow me; and where I am, there will my servant be also. If anyone serves me, the Father will honor him.", "“Now is my soul troubled. And what shall I say? ‘Father, save me from this hour’? But for this purpose I have come to this hour.", "Father, glorify your name.” Then a voice came from heaven: “I have glorified it, and I will glorify it again.”", "The crowd that stood there and heard it said that it had thundered. Others said, “An angel has spoken to him.”", "Jesus answered, “This voice has come for your sake, not mine.", "Now is the judgment of this world; now will the ruler of this world be cast out.", "And I, when I am lifted up from the earth, will draw all people to myself.”", "He said this to show by what kind of death he was going to die.", "So the crowd answered him, “We have heard from the Law that the Christ remains forever. How can you say that the Son of Man must be lifted up? Who is this Son of Man?”", "So Jesus said to them, “The light is among you for a little while longer. Walk while you have the light, lest darkness overtake you. The one who walks in the darkness does not know where he is going.", "While you have the light, believe in the light, that you may become sons of light.” When Jesus had said these things, he departed and hid himself from them.", "Though he had done so many signs before them, they still did not believe in him,", "so that the word spoken by the prophet Isaiah might be fulfilled: “Lord, who has believed what he heard from us, and to whom has the arm of the Lord been revealed?”", "Therefore they could not believe. For again Isaiah said,", "“He has blinded their eyes and hardened their heart, lest they see with their eyes, and understand with their heart, and turn, and I would heal them.”", "Isaiah said these things because he saw his glory and spoke of him.", "Nevertheless, many even of the authorities believed in him, but for fear of the Pharisees they did not confess it, so that they would not be put out of the synagogue;", "for they loved the glory that comes from man more than the glory that comes from God.", "And Jesus cried out and said, “Whoever believes in me, believes not in me but in him who sent me.", "And whoever sees me sees him who sent me.", "I have come into the world as light, so that whoever believes in me may not remain in darkness.", "If anyone hears my words and does not keep them, I do not judge him; for I did not come to judge the world but to save the world.", "The one who rejects me and does not receive my words has a judge; the word that I have spoken will judge him on the last day.", "For I have not spoken on my own authority, but the Father who sent me has himself given me a commandment—what to say and what to speak.", "And I know that his commandment is eternal life. What I say, therefore, I say as the Father has told me.”"], "KJV": ["Then Jesus six days before the passover came to Bethany, where Lazarus was which had been dead, whom he raised from the dead.", "There they made him a supper; and Martha served: but Lazarus was one of them that sat at the table with him.", "Then took Mary a pound of ointment of spikenard, very costly, and anointed the feet of Jesus, and wiped his feet with her hair: and the house was filled with the odour of the ointment.", "Then saith one of his disciples, Judas Iscariot, Simon’s son, which should betray him,", "Why was not this ointment sold for three hundred pence, and given to the poor?", "This he said, not that he cared for the poor; but because he was a thief, and had the bag, and bare what was put therein.", "Then said Jesus, Let her alone: against the day of my burying hath she kept this.", "For the poor always ye have with you; but me ye have not always.", "Much people of the Jews therefore knew that he was there: and they came not for Jesus’ sake only, but that they might see Lazarus also, whom he had raised from the dead.", "But the chief priests consulted that they might put Lazarus also to death;", "Because that by reason of him many of the Jews went away, and believed on Jesus.", "On the next day much people that were come to the feast, when they heard that Jesus was coming to Jerusalem,", "Took branches of palm trees, and went forth to meet him, and cried, Hosanna: Blessed is the King of Israel that cometh in the name of the Lord.", "And Jesus, when he had found a young ass, sat thereon; as it is written,", "Fear not, daughter of Sion: behold, thy King cometh, sitting on an ass’s colt.", "These things understood not his disciples at the first: but when Jesus was glorified, then remembered they that these things were written of him, and that they had done these things unto him.", "The people therefore that was with him when he called Lazarus out of his grave, and raised him from the dead, bare record.", "For this cause the people also met him, for that they heard that he had done this miracle.", "The Pharisees therefore said among themselves, Perceive ye how ye prevail nothing? behold, the world is gone after him.", "And there were certain Greeks among them that came up to worship at the feast:", "The same came therefore to Philip, which was of Bethsaida of Galilee, and desired him, saying, Sir, we would see Jesus.", "Philip cometh and telleth Andrew: and again Andrew and Philip tell Jesus.", "And Jesus answered them, saying, The hour is come, that the Son of man should be glorified.", "Verily, verily, I say unto you, Except a corn of wheat fall into the ground and die, it abideth alone: but if it die, it bringeth forth much fruit.", "He that loveth his life shall lose it; and he that hateth his life in this world shall keep it unto life eternal.", "If any man serve me, let him follow me; and where I am, there shall also my servant be: if any man serve me, him will my Father honour.", "Now is my soul troubled; and what shall I say? Father, save me from this hour: but for this cause came I unto this hour.", "Father, glorify thy name. Then came there a voice from heaven, saying, I have both glorified it, and will glorify it again.", "The people therefore, that stood by, and heard it, said that it thundered: others said, An angel spake to him.", "Jesus answered and said, This voice came not because of me, but for your sakes.", "Now is the judgment of this world: now shall the prince of this world be cast out.", "And I, if I be lifted up from the earth, will draw all men unto me.", "This he said, signifying what death he should die.", "The people answered him, We have heard out of the law that Christ abideth for ever: and how sayest thou, The Son of man must be lifted up? who is this Son of man?", "Then Jesus said unto them, Yet a little while is the light with you. Walk while ye have the light, lest darkness come upon you: for he that walketh in darkness knoweth not whither he goeth.", "While ye have light, believe in the light, that ye may be the children of light. These things spake Jesus, and departed, and did hide himself from them.", "But though he had done so many miracles before them, yet they believed not on him:", "That the saying of Esaias the prophet might be fulfilled, which he spake, Lord, who hath believed our report? and to whom hath the arm of the Lord been revealed?", "Therefore they could not believe, because that Esaias said again,", "He hath blinded their eyes, and hardened their heart; that they should not see with their eyes, nor understand with their heart, and be converted, and I should heal them.", "These things said Esaias, when he saw his glory, and spake of him.", "Nevertheless among the chief rulers also many believed on him; but because of the Pharisees they did not confess him, lest they should be put out of the synagogue:", "For they loved the praise of men more than the praise of God.", "Jesus cried and said, He that believeth on me, believeth not on me, but on him that sent me.", "And he that seeth me seeth him that sent me.", "I am come a light into the world, that whosoever believeth on me should not abide in darkness.", "And if any man hear my words, and believe not, I judge him not: for I came not to judge the world, but to save the world.", "He that rejecteth me, and receiveth not my words, hath one that judgeth him: the word that I have spoken, the same shall judge him in the last day.", "For I have not spoken of myself; but the Father which sent me, he gave me a commandment, what I should say, and what I should speak.", "And I know that his commandment is life everlasting: whatsoever I speak therefore, even as the Father said unto me, so I speak."], "ASV": ot: and he that walketh in the darkness knoweth not whither he goeth.", "While ye have the light, believe on the light, that ye may become sons of light. These things spake Jesus, and he departed and hid himself from them.", "But though he had done so many signs before them, yet they believed not on him:", "that the word of Isaiah the prophet might be fulfilled, which he spake, Lord, who hath believed our report? And to whom hath the arm of the Lord been revealed?", "For this cause they could not believe, for that Isaiah said again,", "He hath blinded their eyes, and he hardened their heart; Lest they should see with their eyes, and perceive with their heart, And should turn, And I should heal them.", "These things said Isaiah, because he saw his glory; and he spake of him.", "Nevertheless even of the rulers many believed on him; but because of the Pharisees they did not confess [it], lest they should be put out of the synagogue:", "for they loved the glory [that is] of men more than the glory [that is] of God.", "And Jesus cried and said, He that believeth on me, believeth not on me, but on him that sent me.", "And he that beholdeth me beholdeth him that sent me.", "I am come a light into the world, that whosoever believeth on me may not abide in the darkness.", "And if any man hear my sayings, and keep them not, I judge him not: for I came not to judge the world, but to save the world.", "He that rejecteth me, and receiveth not my sayings, hath one that judgeth him: the word that I spake, the same shall judge him in the last day.", "For I spake not from myself; but the Father that sent me, he hath given me a commandment, what I should say, and what I should speak.", "And I know that his commandment is life eternal: the things therefore which I speak, even as the Father hath said unto me, so I speak."], "NET": ["Then, six days before the Passover, Jesus came to Bethany, where Lazarus lived, whom he had raised from the dead.", "So they prepared a dinner for Jesus there. Martha was serving, and Lazarus was among those present at the table with him.", "Then Mary took three quarters of a pound of expensive aromatic oil from pure nard and anointed the feet of Jesus. She then wiped his feet dry with her hair. (Now the house was filled with the fragrance of the perfumed oil.)", "But Judas Iscariot, one of his disciples (the one who was going to betray him) said,", "“Why wasn’t this oil sold for 300 silver coins and the money given to the poor?”", "(Now Judas said this not because he was concerned about the poor, but because he was a thief. As keeper of the money box, he used to steal what was put into it.)", "So Jesus said, “Leave her alone. She has kept it for the day of my burial.", "For you will always have the poor with you, but you will not always have me!”", "Now a large crowd of Judeans learned that Jesus was there, and so they came not only because of him but also to see Lazarus whom he had raised from the dead.", "So the chief priests planned to kill Lazarus too,", "for on account of him many of the Jewish people from Jerusalem were going away and believing in Jesus.", "The next day the large crowd that had come to the feast heard that Jesus was coming to Jerusalem.", "So they took branches of palm trees and went out to meet him. They began to shout, “Hosanna! Blessed is the one who comes in the name of the Lord! Blessed is the king of Israel!”", "Jesus found a young donkey and sat on it, just as it is written,", "“Do not be afraid, people of Zion; look, your king is coming, seated on a donkey’s colt!”", "(His disciples did not understand these things when they first happened, but when Jesus was glorified, then they remembered that these things were written about him and that these things had happened to him.)", "So the crowd who had been with him when he called Lazarus out of the tomb and raised him from the dead were continuing to testify about it.", "Because they had heard that Jesus had performed this miraculous sign, the crowd went out to meet him.", "Thus the Pharisees said to one another, “You see that you can do nothing. Look, the world has run off after him!”", "Now some Greeks were among those who had gone up to worship at the feast.", "So these approached Philip, who was from Bethsaida in Galilee, and requested, “Sir, we would like to see Jesus.”", "Philip went and told Andrew, and they both went and told Jesus.", "Jesus replied, “The time has come for the Son of Man to be glorified.", "I tell you the solemn truth, unless a kernel of wheat falls into the ground and dies, it remains by itself alone. But if it dies, it produces much grain.", "The one who loves his life destroys it, and the one who hates his life in this world guards it for eternal life.", "If anyone wants to serve me, he must follow me, and where I am, my servant will be too. If anyone serves me, the Father will honor him.", "“Now my soul is greatly distressed. And what should I say? ‘Father, deliver me from this hour’? No, but for this very reason I have come to this hour.", "Father, glorify your name.” Then a voice came from heaven, “I have glorified it, and I will glorify it again.”", "The crowd that stood there and heard the voice said that it had thundered. Others said that an angel had spoken to him.", "Jesus said, “This voice has not come for my benefit but for yours.", "Now is the judgment of this world; now the ruler of this world will be driven out.", "And I, when I am lifted up from the earth, will draw all people to myself.”", "(Now he said this to indicate clearly what kind of death he was going to die.)", "Then the crowd responded, “We have heard from the law that the Christ will remain forever. How can you say, ‘The Son of Man must be lifted up’? Who is this Son of Man?”", "Jesus replied, “The light is with you for a little while longer. Walk while you have the light, so that the darkness may not overtake you. The one who walks in the darkness does not know where he is going.", "While you have the light, believe in the light, so that you may become sons of light.” When Jesus had said these things, he went away and hid himself from them.", "Although Jesus had performed so many miraculous signs before them, they still refused to believe in him,", "so that the word of the prophet Isaiah would be fulfilled. He said, “Lord, who has believed our message, and to whom has the arm of the Lord been revealed?”", "For this reason they could not believe because again Isaiah said,", "“He has blinded their eyes and hardened their heart, so that they would not see with their eyes and understand with their heart, and turn to me, and I would heal them.”", "Isaiah said these things because he saw Christ’s glory and spoke about him.", "Nevertheless, even among the rulers many believed in him, but because of the Pharisees they would not confess Jesus to be the Christ, so that they would not be put out of the synagogue.", "For they loved praise from men more than praise from God.", "But Jesus shouted out, “The one who believes in me does not believe in me, but in the one who sent me,", "and the one who sees me sees the one who sent me.", "I have come as a light into the world, so that everyone who believes in me should not remain in darkness.", "If anyone hears my words and does not obey them, I do not judge him. For I have not come to judge the world, but to save the world.", "The one who rejects me and does not accept my words has a judge; the word I have spoken will judge him at the last day.", "For I have not spoken from my own authority, but the Father himself who sent me has commanded me what I should say and what I should speak.", "And I know that his commandment is eternal life. Thus the things I say, I say just as the Father has told me.”"], "WEB": ["Then six days before the Passover, Jesus came to Bethany, where Lazarus was, who had been dead, whom he raised from the dead.", "So they made him a supper there. Martha served, but Lazarus was one of those who sat at the him.”", "Now there were certain Greeks among those that went up to worship at the feast.", "These, therefore, came to Philip, who was from Bethsaida of Galilee, and asked him, saying, “Sir, we want to see Jesus.”", "Philip came and told Andrew, and in turn, Andrew came with Philip, and they told Jesus.", "Jesus answered them, “The time has come for the Son of Man to be glorified.", "Most certainly I tell you, unless a grain of wheat falls into the earth and dies, it remains by itself alone. But if it dies, it bears much fruit.", "He who loves his life will lose it. He who hates his life in this world will keep it to eternal life.", "If anyone serves me, let him follow me. Where I am, there will my servant also be. If anyone serves me, the Father will honor him.", "“Now my soul is troubled. What shall I say? ‘Father, save me from this time?’ But for this cause I came to this time.", "Father, glorify your name!” Then there came a voice out of the sky, saying, “I have both glorified it, and will glorify it again.”", "The multitude therefore, who stood by and heard it, said that it had thundered. Others said, “An angel has spoken to him.”", "Jesus answered, “This voice hasn’t come for my sake, but for your sakes.", "Now is the judgment of this world. Now the prince of this world will be cast out.", "And I, if I am lifted up from the earth, will draw all people to myself.”", "But he said this, signifying by what kind of death he should die.", "The multitude answered him, “We have heard out of the law that the Christ remains forever. How do you say, ‘The Son of Man must be lifted up?’ Who is this Son of Man?”", "Jesus therefore said to them, “Yet a little while the light is with you. Walk while you have the light, that darkness doesn’t overtake you. He who walks in the darkness doesn’t know where he is going.", "While you have the light, believe in the light, that you may become children of light.” Jesus said these things, and he departed and hid himself from them.", "But though he had done so many signs before them, yet they didn’t believe in him,", "that the word of Isaiah the prophet might be fulfilled, which he spoke, “Lord, who has believed our report? To whom has the arm of the Lord been revealed?”", "For this cause they couldn’t believe, for Isaiah said again,", "“He has blinded their eyes and he hardened their heart, lest they should see with their eyes, and perceive with their heart, and would turn, and I would heal them.”", "Isaiah said these things when he saw his glory, and spoke of him.", "Nevertheless even of the rulers many believed in him, but because of the Pharisees they didn’t confess it, so that they wouldn’t be put out of the synagogue,", "for they loved men’s praise more than God’s praise.", "Jesus cried out and said, “Whoever believes in me, believes not in me, but in him who sent me.", "He who sees me sees him who sent me.", "I have come as a light into the world, that whoever believes in me may not remain in the darkness.", "If anyone listens to my sayings, and doesn’t believe, I don’t judge him. For I came not to judge the world, but to save the world.", "He who rejects me, and doesn’t receive my sayings, has one who judges him. The word that I spoke, the same will judge him in the last day.", "For I spoke not from myself, but the Father who sent me, he gave me a commandment, what I should say, and what I should speak.", "I know that his commandment is eternal life. The things therefore which I speak, even as the Father has said to me, so I speak.”"]}, "studyNotes": "John - Chapter 12\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nMary anoints Jesus' feet with costly perfume, He enters Jerusalem to palm branches and \"Hosanna,\" Greeks seek Him, He speaks of His death as a grain of wheat falling into the ground, and the Father's voice thunders from heaven.\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 12 marks the transition from Jesus' public ministry\nto His final week. It contains four significant events: Mary's anointing of Jesus\n(vv.1-8), the Triumphal Entry into Jerusalem (vv.12-19), the arrival of Greeks\nseeking Jesus (vv.20-36), and John's theological summary of Israel's unbelief\n(vv.37-50).\n\nThe Triumphal Entry: Jesus entered Jerusalem on a donkey, fulfilling Zechariah\n9:9. The crowd waved palm branches and shouted \"Hosanna\" — a Hebrew word meaning\n\"Save now!\" (Psalm 118:25-26). They expected a political deliverer; Jesus came\nas a suffering servant. The same crowd would cry \"Crucify Him\" within the week.\n\nThe Greeks Seeking Jesus (vv.20-22): The arrival of Gentiles seeking Jesus\ntriggers His declaration \"The hour is come\" — the moment He had been pointing\ntoward throughout John's Gospel. Their arrival signals that the Gospel is about\nto break beyond Israel to the whole world.\n\nThe Grain of Wheat (v.24): Jesus uses this agricultural image to explain His\ndeath — a seed must die to produce a harvest. His death is not defeat but the\nnecessary path to multiplication.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- Bethany (v.1): Six days before Passover, Jesus was honored with a dinner in Bethany. Mary anointed His feet with costly ointment.\n- Jerusalem (v.12): The triumphal entry — Jesus rode from the Mount of Olives down into Jerusalem while crowds waved palm branches.\n- The Temple (implied): Greeks came to Jerusalem for Passover and sought to see Jesus.\n\nKEY VERSES\n------------------------------------\nv.24 — \"Truly, truly, I say to you, unless a grain of wheat falls into the\n        earth and dies, it remains alone; but if it dies, it bears much\n        fruit.\" (ESV) — The principle of death producing life — the pattern\n        of the cross.\n\nv.25 — \"Whoever loves his life loses it, and whoever hates his life in this\n        world will keep it for eternal life.\" (ESV) — The paradox of\n        discipleship — surrender is the path to true life.\n\nv.32 — \"And I, when I am lifted up from the earth, will draw all people to\n        myself.\" (ESV) — The cross as the great magnet of the Gospel.\n\nv.43 — \"For they loved the glory that comes from man more than the glory that\n        comes from God.\" (ESV) — One of the most convicting diagnoses of the\n        human heart in Scripture.\n\nCROSS-REFERENCES\n------------------------------------\nv.3   — Mark 14:3-9 — The parallel account of Mary's anointing.\nv.7   — John 19:40 — Jesus' body wrapped with spices at burial.\nv.13  — Psalm 118:25-26 — \"Hosanna! Blessed is he who comes in the name of\n        the Lord!\" — the Triumphal Entry psalm.\nv.15  — Zechariah 9:9 — \"Your king comes to you, gentle and riding on a donkey.\"\nv.24  — 1 Corinthians 15:36-38 — The seed analogy for resurrection.\nv.25  — Matthew 16:25 — \"Whoever wants to save his life will lose it.\"\nv.31  — Colossians 2:15 — Christ disarming the powers at the cross.\nv.32  — John 3:14-15 — \"As Moses lifted up the serpent... so must the Son\n        of Man be lifted up.\"\nv.38  — Isaiah 53:1 — \"Who has believed our message?\"\nv.40  — Isaiah 6:9-10 — Seeing but not perceiving — Isaiah's commission.\nv.41  — Isaiah 6:1 — Isaiah saw the Lord's glory — John says he saw Christ's.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-12/\n  Guzik examines Mary's extravagant worship, the Triumphal Entry's fulfillment\n  of prophecy, the grain of wheat principle, and the theological significance\n  of Isaiah 6 being applied to Christ in v.41.\n\nCharles Spurgeon:\n  Sermon: \"The Grain of Wheat\" on v.24 (MTP Vol. 37, No. 2196)\n  \"The corn of wheat must die. There is no other way. And so must you die\n  to self, to sin, to the world — if you are to bring forth fruit. The\n  cross is not just Christ's path; it is the pattern for every disciple.\"\n  Sermon: \"The Praise of Men\" on v.43 (MTP Vol. 9, No. 497)\n  \"They loved the praise of men more than the praise of God. This is the\n  besetting sin of religious people — not gross immorality but the subtle\n  idolatry of reputation. They believed — but they would not confess.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.3  — KJV: \"a pound of ointment of spikenard, very costly\" / ESV: \"a pound of expensive ointment made from pure nard\" — Both equivalent. Spikenard (nard) was an aromatic oil imported from India, extremely expensive. 300 denarii (v.5) = approximately one year's wages for a laborer.\n  [ASV/NET/WEB]: NET: \"Then Mary took three quarters of a pound of\n       expensive aromatic oil — pure nard — and anointed the feet\n       of Jesus\" — \"three quarters of a pound\" (litran = Roman\n       pound, ~12 oz). KJV: \"a pound.\" WEB: \"a pound.\" NET\n       converts to modern measurement. Worth a year's wages (v.5).\n\nv.13 — KJV: \"Hosanna: Blessed is the King of Israel that cometh in the name of the Lord\" / ESV: \"Hosanna! Blessed is he who comes in the name of the Lord, even the King of Israel!\" — Both equivalent. Hebrew/Aramaic \"hoshia na\" — \"Save now!\" Originally a cry for help; by Jesus' time it had become a shout of praise and acclamation.\n\nv.24 — KJV: \"Except a corn of wheat fall into the ground and die\" / ESV: \"unless a grain of wheat falls into the earth and dies\" — Both equivalent. KJV uses archaic \"corn of wheat\"; ESV uses modern \"grain of wheat.\" The agricultural principle is the same.\n  [ASV/NET/WEB]: NET: \"unless a kernel of wheat falls into the ground and\n       dies, it remains by itself alone. But if it dies, it\n       produces much grain\" — \"kernel of wheat\" vs. KJV \"corn of\n       wheat.\" WEB: \"a grain of wheat.\" Jesus' own death as the\n       paradigm for all fruitfulness — death precedes life.\n\nv.25 — KJV: \"He that loveth his life shall lose it; and he that hateth his life\" / ESV: \"Whoever loves his life loses it, and whoever hates his life\" — Greek \"miseo\" — Both equivalent. \"Hates\" is a Semitic idiom for \"loves less\" or \"puts in second place\" — not literal hatred. The meaning: hold your life loosely, not tightly.\n\nv.27 — NET: \"Now my soul is in turmoil. What should I say —\n       'Father, deliver me from this hour'? No, but for this very\n       reason I have come to this hour\" — \"in turmoil\" (tetaraktai\n       = deeply disturbed). WEB: \"Now my soul is troubled.\" KJV:\n       \"Now is my soul troubled.\" John's equivalent of Gethsemane.\n\nv.32 — KJV: \"will draw all men unto me\" / ESV: \"will draw all people to myself\" — Greek \"pantas\" — Both equivalent. \"All men/people\" does not mean every individual without exception but people from all nations — Jew and Gentile alike. The arrival of the Greeks (v.20) is the immediate context.\n  [ASV/NET/WEB]: NET: \"And I, when I am lifted up from the earth, will draw\n       all people to myself\" — \"lifted up\" (hypsōthō) — double\n       meaning: physically lifted on the cross AND exalted in glory.\n       WEB: \"will draw all people to myself.\" KJV: \"will draw all\n       men unto me.\" The cross as magnet.\n\nv.40 — NET: \"He has blinded their eyes and hardened their heart\"\n       — quoting Isaiah 6:10. The theological tension: divine\n       sovereignty and human responsibility. WEB: \"He has blinded\n       their eyes and he hardened their heart.\" NET/ESV attribute\n       the blinding to God; the context shows it follows their\n       choice to reject.\n\nv.43 — KJV: \"they loved the praise of men more than the praise of God\" / ESV: \"they loved the glory that comes from man more than the glory that comes from God\" — Greek \"doxan\" — KJV uses \"praise\"; ESV uses \"glory.\" Both convey the same devastating diagnosis — preferring human approval over divine approval.\n\n\nGLOSSARY\n------------------------------------\nSpikenard     — An aromatic oil extracted from the nard plant, native to the\n               Himalayas. Extremely expensive — imported from India. Used for\n               anointing and perfuming. Mary's pound was worth a year's wages.\n\nHosanna       — Hebrew/Aramaic \"hoshia na\" — \"Save now!\" A cry from Psalm 118:25\n               used as a shout of praise and messianic acclamation.\n\nTriumphal Entry — Jesus' entry into Jerusalem on a donkey, five days before\n               Passover, fulfilling Zechariah 9:9. Celebrated as Palm Sunday.\n\nLifted up     — A double meaning in John: (1) physically lifted up on the cross,\n               (2) exalted/glorified. Jesus uses it to describe both His\n               crucifixion and His glorification.\n\nPrince of this world — A title for Satan — the one who currently exercises\n               influence over the fallen world system. The cross would cast\n               him out (v.31) — his power broken, his accusation silenced.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Mary poured out an entire year's wages on Jesus' feet — an act of extravagant,\n   wasteful-looking worship. Judas called it waste. Jesus called it beautiful.\n   What does extravagant devotion to Christ look like in your life? Is there\n   anything you're holding back from Him?\n\n2. \"He that loveth his life shall lose it\" (v.25). The man who grips his life\n   tightly — his comfort, his reputation, his plans — loses it. The man who\n   holds it loosely gains eternal life. What are you gripping too tightly right\n   now?\n\n3. \"They loved the praise of men more than the praise of God\" (v.43). This is\n   the diagnosis of men who believed but wouldn't confess. Is there an area of\n   your faith you're keeping private because of what others would think? What\n   would it cost you to be more open?\n\n4. The grain of wheat must die to produce fruit (v.24). What in your life needs\n   to die — a habit, an ambition, a relationship pattern, a version of yourself\n   — so that something fruitful can grow?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Judas objected to Mary's \"waste\" of expensive ointment, claiming concern for\n   the poor — but John tells us he was a thief (v.6). How do you discern when\n   someone's objection to generosity or worship is genuine concern vs. a cover\n   for selfish motives? How do you check your own motives?\n\n2. The crowd shouted \"Hosanna\" and waved palms — and within days cried \"Crucify\n   Him.\" What does this tell you about the danger of crowd-driven faith? How do\n   you guard against a faith that rises and falls with the emotional temperature\n   of those around you?\n\n3. The Greeks said \"Sir, we would see Jesus\" (v.21). That is still the deepest\n   need of every person. When people encounter you, do they get closer to seeing\n   Jesus, or further away? What would need to change for your life to be a\n   clearer window to Christ?\n\n4. Jesus said \"Now is my soul troubled\" (v.27) — and then immediately said\n   \"Father, glorify thy name.\" He moved from honest acknowledgment of anguish\n   to surrender to God's purpose. How do you move from honest prayer about your\n   pain to surrender? What does that look like practically?\n\n5. Isaiah saw Christ's glory and spoke of Him (v.41). The entire Old Testament\n   points to Jesus. How does knowing that the whole Bible is about Christ change\n   how you read the Old Testament?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 12:1-19 - Prepared for Burial:\n    https://enduringword.com/media/john-12-prepared-burial/\n  John 12:20-50 - Prepared for Sacrifice:\n    https://enduringword.com/media/john-12-prepared-sacrifice/\n\nThe Chosen — John 12:\n  https://youtu.be/__khPizm4j8?si=Q7ihl4SaOeOcpFDo\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "13": {"translations": {"ESV": ["Now before the Feast of the Passover, when Jesus knew that his hour had come to depart out of this world to the Father, having loved his own who were in the world, he loved them to the end.", "During supper, when the devil had already put it into the heart of Judas Iscariot, Simon’s son, to betray him,", "Jesus, knowing that the Father had given all things into his hands, and that he had come from God and was going back to God,", "rose from supper. He laid aside his outer garments, and taking a towel, tied it around his waist.", "Then he poured water into a basin and began to wash the disciples’ feet and to wipe them with the towel that was wrapped around him.", "He came to Simon Peter, who said to him, “Lord, do you wash my feet?”", "Jesus answered him, “What I am doing you do not understand now, but afterward you will understand.”", "Peter said to him, “You shall never wash my feet.” Jesus answered him, “If I do not wash you, you have no share with me.”", "Simon Peter said to him, “Lord, not my feet only but also my hands and my head!”", "Jesus said to him, “The one who has bathed does not need to wash, except for his feet, but is completely clean. And you are clean, but not every one of you.”", "For he knew who was to betray him; that was why he said,  hast no part with me.", "Simon Peter saith unto him, Lord, not my feet only, but also my hands and my head.", "Jesus saith to him, He that is washed needeth not save to wash his feet, but is clean every whit: and ye are clean, but not all.", "For he knew who should betray him; therefore said he, Ye are not all clean.", "So after he had washed their feet, and had taken his garments, and was set down again, he said unto them, Know ye what I have done to you?", "Ye call me Master and Lord: and ye say well; for so I am.", "If I then, your Lord and Master, have washed your feet; ye also ought to wash one another’s feet.", "For I have given you an example, that ye should do as I have done to you.", "Verily, verily, I say unto you, The servant is not greater than his lord; neither he that is sent greater than he that sent him.", "If ye know these things, happy are ye if ye do them.", "I speak not of you all: I know whom I have chosen: but that the scripture may be fulfilled, He that eateth bread with me hath lifted up his heel against me.", "Now I tell you before it come, that, when it is come to pass, ye may believe that I am he.", "Verily, verily, I say unto you, He that receiveth whomsoever I send receiveth me; and he that receiveth me receiveth him that sent me.", "When Jesus had thus said, he was troubled in spirit, and testified, and said, Verily, verily, I say unto you, that one of you shall betray me.", "Then the disciples looked one on another, doubting of whom he spake.", "Now there was leaning on Jesus’ bosom one of his disciples, whom Jesus loved.", "Simon Peter therefore beckoned to him, that he should ask who it should be of whom he spake.", "He then lying on Jesus’ breast saith unto him, Lord, who is it?", "Jesus answered, He it is, to whom I shall give a sop, when I have dipped it. And when he had dipped the sop, he gave it to Judas Iscariot, the son of Simon.", "And after the sop Satan entered into him. Then said Jesus unto him, That thou doest, do quickly.", "Now no man at the table knew for what intent he spake this unto him.", "For some of them thought, because Judas had the bag, that Jesus had said unto him, Buy those things that we have need of against the feast; or, that he should give something to the poor.", "He then having received the sop went immediately out: and it was night.", "Therefore, when he was gone out, Jesus said, Now is the Son of man glorified, and God is glorified in him.", "If God be glorified in him, God shall also glorify him in himself, and shall straightway glorify him.", "Little children, yet a little while I am with you. Ye shall seek me: and as I said unto the Jews, Whither I go, ye cannot come; so now I say to you.", "A new commandment I give unto you, That ye love one another; as I have loved you, that ye also love one another.", "By this shall all men know that ye are my disciples, if ye have love one to another.", "Simon Peter said unto him, Lord, whither goest thou? Jesus answered him, Whither I go, thou canst not follow me now; but thou shalt follow me afterwards.", "Peter said unto him, Lord, why cannot I follow thee now? I will lay down my life for thy sake.", "Jesus answered him, Wilt thou lay down thy life for my sake? Verily, verily, I say unto thee, The cock shall not crow, till thou hast denied me thrice."], "ASV": ["Now before the feast of the passover, Jesus knowing that his hour was come that he should depart out of this world unto his Father, having loved his own that were in the world, he loved them unto the end.", "And during supper, the devil having already put into the heart of Judas Iscariot, Simon`s [son], to betray him,", "[Jesus], knowing that the Father had given all the things into his hands, and that he came forth from God, and goeth unto God,", "riseth from supper, and layeth aside his garments; and he took a towel, and girded himself.", "Then he poureth water into the basin, and began to wash the disciples` feet, and to wipe them with the towel wherewith
