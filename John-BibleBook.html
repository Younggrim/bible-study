cause Jesus knew that the Father had handed all things over to him, and that he had come from God and was going back to God,", "he got up from the meal, removed his outer clothes, took a towel and tied it around himself.", "He poured water into the washbasin and began to wash the disciples’ feet and to dry them with the towel he had wrapped around himself.", "Then he came to Simon Peter. Peter said to him, “Lord, are you going to wash my feet?”", "Jesus replied, “You do not understand what I am doing now, but you will understand after these things.”", "Peter said to him, “You will never wash my feet!” Jesus replied, “If I do not wash you, you have no share with me.”", "Simon Peter said to him, “Lord, wash not only my feet but also my hands and my head!”", "Jesus replied, “The one who has bathed needs only to wash his feet, but is completely clean. And you disciples are clean, but not every one of you.”", "(For Jesus knew the one who was going to betray him. For this reason he said, “Not every one of you is clean.”)", "So when Jesus had washed their feet and put his outer clothing back on, he took his place at the table again and said to them, “Do you understand what I have done for you?", "You call me ‘Teacher’ and ‘Lord,’ and do so correctly, for that is what I am.", "If I then, your Lord and Teacher, have washed your feet, you too ought to wash one another’s feet.", "For I have given you an example—you should do just as I have done for you.", "I tell you the solemn truth, the slave is not greater than his master, nor is the one who is sent as a messenger greater than the one who sent him.", "If you understand these things, you will be blessed if you do them.", "“What I am saying does not refer to all of you. I know the ones I have chosen. But this is to fulfill the scripture, ‘The one who eats my bread has turned against me.’", "I am telling you this now, before it happens, so that when it happens you may believe that I am he.", "I tell you the solemn truth, whoever accepts the one I send accepts me, and whoever accepts me accepts the one who sent me.”", "When he had said these things, Jesus was greatly distressed in spirit, and testified, “I tell you the solemn truth, one of you will betray me.”", "The disciples began to look at one another, worried and perplexed to know which of them he was talking about.", "One of his disciples, the one Jesus loved, was at the table to the right of Jesus in a place of honor.", "So Simon Peter gestured to this disciple to ask Jesus who it was he was referring to.", "Then the disciple whom Jesus loved leaned back against Jesus’ chest and asked him, “Lord, who is it?”", "Jesus replied, “It is the one to whom I will give this piece of bread after I have dipped it in the dish.” Then he dipped the piece of bread in the dish and gave it to Judas Iscariot, Simon’s son.", "And after Judas took the piece of bread, Satan entered into him. Jesus said to him, “What you are about to do, do quickly.”", "(Now none of those present at the table understood why Jesus said this to Judas.", "Some thought that because Judas had the money box, Jesus was telling him to buy whatever they needed for the feast, or to give something to the poor.)", "Judas took the piece of bread and went out immediately. (Now it was night.)", "When Judas had gone out, Jesus said, “Now the Son of Man is glorified, and God is glorified in him.", "If God is glorified in him, God will also glorify him in himself, and he will glorify him right away.", "Children, I am still with you for a little while. You will look for me, and just as I said to the Jewish religious leaders, ‘Where I am going you cannot come,’ now I tell you the same.", "“I give you a new commandment—to love one another. Just as I have loved you, you also are to love one another.", "Everyone will know by this that you are my disciples—if you have love for one another.”", "Simon Peter said to him, “Lord, where are you going?” Jesus replied, “Where I am going, you cannot follow me now, but you will follow later.”", "Peter said to him, “Lord, why can’t I follow you now? I will lay down my life for you!”", "Jesus answered, “Will you lay down your life for me? I tell you the solemn truth, the rooster will not crow until you have denied me three times!"], "WEB": ["Now before the feast of the Passover, Jesus, knowing that his time had come that he would depart from this world to the Father, having loved his own who were in the world, he loved them to the end.", "During supper, the devil having already put into the heart of Judas Iscariot, Simon’s son, to betray him,", "Jesus, knowing that the Father had given all things into his hands, and that he came from God, and was going to God,", "arose from supper, and laid aside his outer garments. He took a towel, and wrapped a towel around his waist.", "Then he poured water into the basin, and began to wash the disciples’ feet, and to wipe them with the towel that was wrapped around him.", "Then he came to Simon Peter. He said to him, “Lord, do you wash my feet?”", "Jesus answered him, “You don’t know what I am doing now, but you will understand later.”", "Peter said to him, “You will never wash my feet!” Jesus answered him, “If I don’t wash you, you have no part with me.”", "Simon Peter said to him, “Lord, not my feet only, but also my hands and my head!”", "Jesus said to him, “Someone who has bathed only needs to have his feet washed, but is completely clean. You are clean, but not all of you.”", "For he knew him who would betray him, therefore he said, “You are not all clean.”", "So when he had washed their feet, put his outer garment back on, and sat down again, he said to them, “Do you know what I have done to you?", "You call me, ‘Teacher’ and ‘Lord.’ You say so correctly, for so I am.", "If I then, the Lord and the Teacher, have washed your feet, you also ought to wash one another’s feet.", "For I have given you an example, that you also should do as I have done to you.", "Most certainly I tell you, a servant is not greater than his lord, neither one who is sent greater than he who sent him.", "If you know these things, blessed are you if you do them.", "I don’t speak concerning all of you. I know whom I have chosen. But that the Scripture may be fulfilled, ‘He who eats bread with me has lifted up his heel against me.’", "From now on, I tell you before it happens, that when it happens, you may believe that I am he.", "Most certainly I tell you, he who receives whomever I send, receives me; and he who receives me, receives him who sent me.”", "When Jesus had said this, he was troubled in spirit, and testified, “Most certainly I tell you that one of you will betray me.”", "The disciples looked at one another, perplexed about whom he spoke.", "One of his disciples, whom Jesus loved, was at the table, leaning against Jesus’ breast.", "Simon Peter therefore beckoned to him, and said to him, “Tell us who it is of whom he speaks.”", "He, leaning back, as he was, on Jesus’ breast, asked him, “Lord, who is it?”", "Jesus therefore answered, “It is he to whom I will give this piece of bread when I have dipped it.” So when he had dipped the piece of bread, he gave it to Judas, the son of Simon Iscariot.", "After the piece of bread, then Satan entered into him. Then Jesus said to him, “What you do, do quickly.”", "Now no man at the table knew why he said this to him.", "For some thought, because Judas had the money box, that Jesus said to him, “Buy what things we need for the feast,” or that he should give something to the poor.", "Therefore having received that morsel, he went out immediately. It was night.", "When he had gone out, Jesus said, “Now the Son of Man has been glorified, and God has been glorified in him.", "If God has been glorified in him, God will also glorify him in himself, and he will glorify him immediately.", "Little children, I will be with you a little while longer. You will seek me, and as I said to the Jews, ‘Where I am going, you can’t come,’ so now I tell you.", "A new commandment I give to you, that you love one another. Just as I have loved you, you also love one another.", "By this everyone will know that you are my disciples, if you have love for one another.”", "Simon Peter said to him, “Lord, where are you going?” Jesus answered, “Where I am going, you can’t follow now, but you will follow afterwards.”", "Peter said to him, “Lord, why can’t I follow you now? I will lay down my life for you.”", "Jesus answered him, “Will you lay down your life for me? Most certainly I tell you, the rooster won’t crow until you have denied me three times."]}, "studyNotes": "John - Chapter 13\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nAt the Last Supper, Jesus washes His disciples' feet as a model of servant love, identifies Judas as His betrayer, and gives the new commandment: \"Love one another as I have loved you.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 13 opens John's \"Upper Room Discourse\" — chapters\n13-17, the most intimate and extended teaching Jesus gave His disciples. It takes\nplace on the night of His arrest, at the Last Supper. John does not record the\ninstitution of the Lord's Supper (covered in the synoptic Gospels) but instead\nfocuses on the foot washing and the new commandment.\n\nFoot Washing: In first-century Palestine, roads were dusty and people wore\nsandals. Foot washing was the task of the lowest household servant — so menial\nthat Jewish law exempted Jewish slaves from doing it for their masters. For Jesus\n— knowing He was Lord of all, knowing He was about to be glorified — to wash\nHis disciples' feet was an act of breathtaking humility.\n\nJudas: Jesus knew from the beginning who would betray Him (v.11). He washed\nJudas' feet. He gave him the place of honor at the table (the sop was given to\nthe guest of honor). He gave him every opportunity to turn back. Judas chose\nbetrayal anyway.\n\nThe New Commandment (v.34): Jesus calls love for one another \"new\" — not because\nlove was absent from the Old Testament, but because the standard is new: \"as I\nhave loved you.\" The measure of Christian love is the cross.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Upper Room in Jerusalem: The foot washing and Last Supper discourse. Jesus and the disciples are in a large furnished room in Jerusalem on the night before His crucifixion.\n- Jesus tells the disciples He is going to the Father — He is \"going away\" from this earthly place to prepare a place for them.\n\nKEY VERSES\n------------------------------------\nv.1  — \"Having loved his own who were in the world, he loved them to the\n        end.\" (ESV) — The scope and persistence of Christ's love — to the\n        uttermost.\n\nv.14-15 — \"If I then, your Lord and Teacher, have washed your feet, you also\n        ought to wash one another's feet. For I have given you an example,\n        that you also should do just as I have done to you.\" (ESV) — Servant\n        leadership defined.\n\nv.17 — \"If you know these things, blessed are you if you do them.\" (ESV) —\n        Knowledge without obedience produces no blessing.\n\nv.34-35 — \"A new commandment I give to you, that you love one another: just\n        as I have loved you, you also are to love one another. By this all\n        people will know that you are my disciples, if you have love for one\n        another.\" (ESV) — The mark of a true disciple.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Romans 8:38-39 — Nothing can separate us from the love of God.\nv.1   — Hebrews 7:25 — He saves to the uttermost those who come to God through Him.\nv.5   — Luke 22:27 — \"I am among you as one who serves.\"\nv.10  — 1 John 1:9 — Ongoing cleansing for the believer who confesses sin.\nv.14  — Philippians 2:3-7 — The mind of Christ — humility and service.\nv.16  — Matthew 10:24 — \"A student is not above his teacher.\"\nv.18  — Psalm 41:9 — \"Even my close friend, whom I trusted, has lifted up\n        his heel against me.\"\nv.34  — 1 John 4:11 — \"Since God so loved us, we also ought to love one another.\"\nv.34  — John 15:12-13 — \"Love each other as I have loved you.\"\nv.35  — 1 John 3:14 — \"We know that we have passed from death to life, because\n        we love each other.\"\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-13/\n  Guzik examines the cultural significance of foot washing, the meaning of\n  \"clean but not all\" (v.10-11), the identification of Judas, and the\n  \"new\" element of the new commandment.\n\nCharles Spurgeon:\n  Sermon: \"The Servant of Servants\" on vv.4-5 (MTP Vol. 32, No. 1886)\n  \"He laid aside His garments — the garments of His glory — and took a\n  towel. That is the incarnation in miniature. He who was robed in the\n  splendor of heaven wrapped Himself in the towel of a servant. And He\n  washed feet. Not just any feet — the feet of men who would deny Him,\n  betray Him, and flee from Him.\"\n  Sermon: \"The New Commandment\" on v.34 (MTP Vol. 27, No. 1606)\n  \"Love one another as I have loved you. That is the standard — not as\n  you feel like it, not as they deserve it, not as they love you back —\n  as I have loved you. That means to the point of sacrifice.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — KJV: \"he loved them unto the end\" / ESV: \"he loved them to the end\" — Greek \"eis telos\" — Both equivalent. Can mean \"to the end\" (until death) or \"to the uttermost/completely.\" Both meanings are true and likely intended.\n  [ASV/NET/WEB]: NET: \"he loved them to the end\" — \"to the end\" (eis\n       telos) — both temporal (until death) and qualitative (to\n       the uttermost/completely). WEB: \"loved them to the end.\"\n       KJV: \"he loved them unto the end.\" The washing that follows\n       demonstrates the nature of this love.\n\nv.2  — KJV: \"the devil having now put into the heart of Judas\" / ESV: \"when the devil had already put it into the heart of Judas\" — Both equivalent. The devil planted the seed; Judas cultivated it.\n\nv.5  — NET: \"he poured water into the washbasin and began to wash\n       the disciples' feet\" — the Lord of glory performing the\n       slave's task. WEB: \"began to wash the disciples' feet.\"\n       KJV: \"began to wash the disciples' feet.\" All versions\n       preserve the shocking reversal of status.\n\nv.10 — KJV: \"He that is washed needeth not save to wash his feet, but is clean every whit\" / ESV: \"The one who has bathed does not need to wash, except for his feet, but is completely clean\" — Greek \"leloumenos\" (bathed) vs. \"nipsasthai\" (wash) — Two different Greek words for washing. The picture: a person who has bathed (positional cleansing at salvation) only needs foot washing (ongoing cleansing from daily sin).\n\nv.17 — KJV: \"happy are ye if ye do them\" / ESV: \"blessed are you if you do them\" — Greek \"makarioi\" — KJV uses \"happy\"; ESV uses \"blessed.\" \"Blessed\" carries deeper meaning than mere happiness — it is the state of divine favor and spiritual well-being.\n\nv.18 — KJV: \"He that eateth bread with me hath lifted up his heel against me\" / ESV: \"He who ate my bread has lifted his heel against me\" — Both equivalent. An idiom for treachery — like a horse kicking the person who feeds it. From Psalm 41:9.\n\nv.23 — NET: \"One of his disciples, the one Jesus loved, was at\n       the table to the right of Jesus in a place of honor\" — \"the\n       one Jesus loved\" (hon ēgapa ho Iēsous). WEB: \"One of his\n       disciples, whom Jesus loved.\" KJV: \"leaning on Jesus'\n       bosom.\" The unnamed beloved disciple — traditionally John.\n\nv.26 — KJV: \"He it is, to whom I shall give a sop, when I have dipped it\" / ESV: \"It is he to whom I will give this morsel of bread when I have dipped it\" — Greek \"psomion\" — KJV uses \"sop\" (archaic); ESV uses \"morsel of bread.\" A piece of bread dipped in the common dish and given to a guest as a sign of honor.\n\nv.27 — NET: \"What you are about to do, do quickly\" — spoken to\n       Judas. WEB: \"What you do, do quickly.\" KJV: \"That thou\n       doest, do quickly.\" Jesus does not prevent the betrayal —\n       He commands its completion. Sovereign over His own death.\n\nv.34 — KJV: \"A new commandment I give unto you, That ye love one another; as I have loved you\" / ESV: \"A new commandment I give to you, that you love one another: just as I have loved you\" — Both equivalent. The \"newness\" is not the command to love (Leviticus 19:18) but the standard: \"as I have loved you.\" The cross sets a new benchmark.\n  [ASV/NET/WEB]: NET: \"I give you a new commandment — to love one another.\n       Just as I have loved you, you also are to love one another\"\n       — \"new\" (kainēn) = new in quality, not just chronologically.\n       WEB: \"A new commandment I give to you.\" The standard is\n       \"as I have loved you\" — self-sacrificial, unconditional.\n\n\nGLOSSARY\n------------------------------------\nBason         — KJV spelling of \"basin\" — a bowl used for washing. Jesus\n               poured water into a basin to wash the disciples' feet.\n\nGirded        — Wrapped around the waist. Jesus wrapped a towel around Himself\n               as a servant's apron before washing feet.\n\nSop           — A piece of bread dipped in the common dish and given to a guest.\n               Giving the sop to a guest was a sign of honor and friendship.\n               Jesus gave it to Judas — a final act of grace toward His betrayer.\n\nSupper        — The Passover meal (Last Supper). Eaten in the evening, reclining\n               at a low table — hence \"leaning on Jesus' bosom\" (v.23).\n\nDisciple whom Jesus loved — John's self-reference throughout the Gospel. He\n               never names himself but identifies himself by his relationship\n               to Jesus — a model of identity rooted in Christ's love.\n\nNew commandment — Not new in the sense of never before given, but new in its\n               standard: love as Christ loved — sacrificially, unconditionally,\n               to the point of death.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. Jesus washed the feet of the man He knew would betray Him (v.11). He served\n   Judas with the same hands that would be nailed to the cross. Is there someone\n   in your life who has betrayed or hurt you? What would it look like to serve\n   them anyway — not because they deserve it, but because Christ is your model?\n\n2. Peter's first response was refusal — \"Thou shalt never wash my feet\" (v.8).\n   Pride often disguises itself as humility or reverence. Is there an area where\n   your pride is preventing you from receiving what Christ wants to give you —\n   forgiveness, help, correction, grace?\n\n3. \"If ye know these things, happy are ye if ye do them\" (v.17). Knowledge of\n   servant leadership is not the same as practicing it. Where in your life —\n   at home, at work, in your church — are you called to serve in a way that\n   feels beneath you? What is stopping you?\n\n4. \"By this shall all men know that ye are my disciples, if ye have love one\n   to another\" (v.35). The primary evidence of genuine Christianity is not\n   doctrine, not church attendance, not moral behavior — it is love for other\n   believers. How is your love for other Christians? Is it visible enough that\n   outsiders would notice?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus knew He was Lord of all, that all things were in His hands, that He\n   came from God and was going to God (v.3) — and from that position of total\n   security, He washed feet. True humility flows from security, not insecurity.\n   How does knowing who you are in Christ free you to serve others without\n   needing recognition?\n\n2. Peter swung from \"You'll never wash my feet\" to \"Not just my feet but my\n   hands and head too!\" (vv.8-9). He was impulsive and extreme. Do you tend\n   toward stubbornness or impulsiveness in your relationship with God? How\n   does Jesus' patient response to Peter encourage you?\n\n3. Jesus gave Judas the sop — a gesture of honor and friendship — even knowing\n   what Judas was about to do. What does this tell you about how Jesus treats\n   people who are in the process of rejecting Him? How should that shape how\n   you treat people who are hostile to the Gospel?\n\n4. \"A new commandment I give unto you, That ye love one another; as I have\n   loved you\" (v.34). The standard is the cross. Is there a relationship in\n   your life where you are loving at a comfortable level but not at a cross-level?\n   What would cross-level love look like in that relationship?\n\n5. Peter confidently declared he would lay down his life for Jesus (v.37) —\n   and denied Him three times within hours. How do you guard against overconfidence\n   in your own spiritual strength? What does healthy self-awareness look like\n   for a man of faith?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 13:1-17 - Prepared to Serve:\n    https://enduringword.com/media/john-13-prepared-serve/\n  John 13:18-38 - Prepared for Glory:\n    https://enduringword.com/media/john-13-prepared-glory/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "14": {"translations": {"ESV": ["“Let not your hearts be troubled. Believe in God; believe also in me.", "In my Father’s house are many rooms. If it were not so, would I have told you that I go to prepare a place for you?", "And if I go and prepare a place for you, I will come again and will take you to myself, that where I am you may be also.", "And you know the way to where I am going.”", "Thomas said to him, “Lord, we do not know where you are going. How can we know the way?”", "Jesus said to him, “I am the way, and the truth, and the life. No one comes to the Father except through me.", "If you had known me, you would have known my Father also. From now on you do know him and have seen him.”", "Philip said to him, “Lord, show us the Father, and it is enough for us.”", "Jesus said to him, “Have I been with you so long, and you still do not know me, Philip? Whoever has seen me has seen the Father. How can you say, ‘Show us the Father’?", "Do you not believe that I am in the Father and the Father is in me? The words that I say to you I do not speak on my own authority, but the Father who dwells in me does his works.", "Believe me that I am in the Father and the Father is in me, or else believe on account of the works themselves.", "“Truly, truly, I say to you, whoever believes in me will also do the works that I do; and greater works than these will he do, because I am going to the Father.", "Whatever you ask in my name, this I will do, that the Father may be glorified in the Son.", "If you ask me anything in my name, I will do it.", "“If you love me, you will keep my commandments.", "And I will ask the Father, and her’s house are many mansions: if it were not so, I would have told you. I go to prepare a place for you.", "And if I go and prepare a place for you, I will come again, and receive you unto myself; that where I am, there ye may be also.", "And whither I go ye know, and the way ye know.", "Thomas saith unto him, Lord, we know not whither thou goest; and how can we know the way?", "Jesus saith unto him, I am the way, the truth, and the life: no man cometh unto the Father, but by me.", "If ye had known me, ye should have known my Father also: and from henceforth ye know him, and have seen him.", "Philip saith unto him, Lord, shew us the Father, and it sufficeth us.", "Jesus saith unto him, Have I been so long time with you, and yet hast thou not known me, Philip? he that hath seen me hath seen the Father; and how sayest thou then, Shew us the Father?", "Believest thou not that I am in the Father, and the Father in me? the words that I speak unto you I speak not of myself: but the Father that dwelleth in me, he doeth the works.", "Believe me that I am in the Father, and the Father in me: or else believe me for the very works’ sake.", "Verily, verily, I say unto you, He that believeth on me, the works that I do shall he do also; and greater works than these shall he do; because I go unto my Father.", "And whatsoever ye shall ask in my name, that will I do, that the Father may be glorified in the Son.", "If ye shall ask any thing in my name, I will do it.", "If ye love me, keep my commandments.", "And I will pray the Father, and he shall give you another Comforter, that he may abide with you for ever;", "Even the Spirit of truth; whom the world cannot receive, because it seeth him not, neither knoweth him: but ye know him; for he dwelleth with you, and shall be in you.", "I will not leave you comfortless: I will come to you.", "Yet a little while, and the world seeth me no more; but ye see me: because I live, ye shall live also.", "At that day ye shall know that I am in m rit, whom the Father will send in my name, will teach you everything and will cause you to remember everything I said to you.", "“Peace I leave with you; my peace I give to you; I do not give it to you as the world does. Do not let your hearts be distressed or lacking in courage.", "You heard me say to you, ‘I am going away and I am coming back to you.’ If you loved me, you would be glad that I am going to the Father because the Father is greater than I am.", "I have told you now before it happens, so that when it happens you may believe.", "I will not speak with you much longer, for the ruler of this world is coming. He has no power over me,", "but I am doing just what the Father commanded me, so that the world may know that I love the Father. Get up, let us go from here."], "WEB": ["“Don’t let your heart be troubled. Believe in God. Believe also in me.", "In my Father’s house are many homes. If it weren’t so, I would have told you. I am going to prepare a place for you.", "If I go and prepare a place for you, I will come again, and will receive you to myself; that where I am, you may be there also.", "Where I go, you know, and you know the way.”", "Thomas said to him, “Lord, we don’t know where you are going. How can we know the way?”", "Jesus said to him, “I am the way, the truth, and the life. No one comes to the Father, except through me.", "If you had known me, you would have known my Father also. From now on, you know him, and have seen him.”", "Philip said to him, “Lord, show us the Father, and that will be enough for us.”", "Jesus said to him, “Have I been with you such a long time, and do you not know me, Philip? He who has seen me has seen the Father. How do you say, ‘Show us the Father?’", "Don’t you believe that I am in the Father, and the Father in me? The words that I tell you, I speak not from myself; but the Father who lives in me does his works.", "Believe me that I am in the Father, and the Father in me; or else believe me for the very works’ sake.", "Most certainly I tell you, he who believes in me, the works that I do, he will do also; and he will do greater works than these, because I am going to my Father.", "Whatever you will ask in my name, that will I do, that the Father may be glorified in the Son.", "If you will ask anything in my name, I will do it.", "If you love me, keep my commandments.", "I will pray to the Father, and he will give you another Counselor, that he may be with you forever,—", "the Spirit of truth, whom the world can’t receive; for it doesn’t see him, neither knows him. You know him, for he lives with you, and will be in you.", "I will not leave you orphans. I will come to you.", "Yet a little while, and the world will see me no more; but you will see me. Because I live, you will live also.", "In that day you will know that I am in my Father, and you in me, and I in you.", "One who has my commandments, and keeps them, that person is one who loves me. One who loves me will be loved by my Father, and I will love him, and will reveal myself to him.”", "Judas (not Iscariot) said to him, “Lord, what has happened that you are about to reveal yourself to us, and not to the world?”", "Jesus answered him, “If a man loves me, he will keep my word. My Father will love him, and we will come to him, and make our home with him.", "He who doesn’t love me doesn’t keep my words. The word which you hear isn’t mine, but the Father’s who sent me.", "I have said these things to you, while still living with you.", "But the Counselor, the Holy Spirit, whom the Father will send in my name, he will teach you all things, and will remind you of all that I said to you.", "Peace I leave with you. My peace I give to you; not as the world gives, give I to you. Don’t let your heart be troubled, neither let it be fearful.", "You heard how I told you, ‘I go away, and I come to you.’ If you loved me, you would have rejoiced, because I said ‘I am going to my Father;’ for the Father is greater than I.", "Now I have told you before it happens so that, when it happens, you may believe.", "I will no more speak much with you, for the prince of the world comes, and he has nothing in me.", "But that the world may know that I love the Father, and as the Father commanded me, even so I do. Arise, let us go from here."]}, "studyNotes": "John - Chapter 14\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus comforts His disciples with promises of heaven (\"In my Father's house are many mansions\"), declares \"I am the way, the truth, and the life,\" promises the Holy Spirit as Comforter, and offers His peace — \"not as the world gives.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 14 is part of the Upper Room Discourse (chapters\n13-17), spoken on the night of Jesus' arrest. The disciples were troubled —\nJesus had just announced His departure, predicted Peter's denial, and identified\na betrayer. Chapter 14 is Jesus' direct response to their troubled hearts.\n\nThis chapter contains some of the most comforting and theologically rich words\nin all of Scripture: the promise of heaven (vv.1-3), the exclusive claim of\nChrist as the only way to the Father (v.6), the promise of the Holy Spirit as\nComforter (vv.16-17,26), and the gift of Christ's peace (v.27).\n\nThe Holy Spirit (Paraclete): Jesus introduces the Holy Spirit here as the\n\"Comforter\" (Greek: Paraclete — one called alongside to help). The Spirit is\ndescribed as \"another Comforter\" — the same kind as Jesus, meaning the Spirit\nis personal, not a force. He will teach, remind, and abide with believers forever.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Upper Room in Jerusalem: The Upper Room Discourse continues. Jesus speaks to His disciples on the night before the cross.\n- \"My Father's house\" (v.2): Jesus speaks of heaven as a place with \"many mansions\" — a destination He is going to prepare for them.\n- \"Whither I go ye know, and the way ye know\" (v.4): Jesus speaks of His departure from Jerusalem to the Father.\n\nKEY VERSES\n------------------------------------\nv.1  — \"Let not your hearts be troubled. Believe in God; believe also in me.\"\n        (ESV) — A command, not a suggestion. Troubled hearts are addressed by\n        faith.\n\nv.6  — \"I am the way, and the truth, and the life. No one comes to the Father\n        except through me.\" (ESV) — The sixth \"I AM\" statement — the most\n        exclusive claim in the New Testament.\n\nv.15 — \"If you love me, you will keep my commandments.\" (ESV) — Love for\n        Christ is demonstrated through obedience, not just emotion.\n\nv.27 — \"Peace I leave with you; my peace I give to you. Not as the world gives\n        do I give to you. Let not your hearts be troubled, neither let them be\n        afraid.\" (ESV) — Christ's peace is qualitatively different from\n        anything the world offers.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Philippians 4:6-7 — \"Do not be anxious... the peace of God will guard\n        your hearts.\"\nv.2   — 2 Corinthians 5:1 — \"We have a building from God, an eternal house\n        in heaven.\"\nv.6   — Acts 4:12 — \"There is no other name under heaven by which we must\n        be saved.\"\nv.6   — 1 Timothy 2:5 — \"There is one God and one mediator between God and\n        mankind, the man Christ Jesus.\"\nv.13  — Matthew 7:7-8 — \"Ask and it will be given to you.\"\nv.15  — 1 John 5:3 — \"This is love for God: to keep his commands.\"\nv.16  — Acts 2:1-4 — The fulfillment — the Spirit poured out at Pentecost.\nv.17  — 1 Corinthians 2:14 — The natural man cannot receive the Spirit.\nv.26  — John 16:13 — The Spirit guides into all truth.\nv.27  — Philippians 4:7 — The peace that surpasses understanding.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-14/\n  Guzik examines the meaning of \"mansions\" (dwelling places), the exclusive\n  claim of v.6, the nature of the Paraclete, and the meaning of \"greater\n  works\" in v.12.\n\nCharles Spurgeon:\n  Sermon: \"The Way, the Truth, and the Life\" on v.6 (MTP Vol. 20, No. 1176)\n  \"He is the Way — not a way, not one of many ways — the Way. He is the\n  Truth — not a teacher of truth but Truth itself. He is the Life — not\n  a giver of life but Life itself. And no man comes to the Father but by\n  Him. This is not narrow-mindedness; it is the nature of reality.\"\n  Sermon: \"Peace — Perfect Peace\" on v.27 (MTP Vol. 22, No. 1273)\n  \"Not as the world gives. The world's peace is a truce — a temporary\n  ceasefire. Christ's peace is a treaty — permanent, based on the finished\n  work of the cross. It is not the absence of trouble; it is the presence\n  of Christ in the trouble.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.2  — KJV: \"In my Father's house are many mansions\" / ESV: \"In my Father's house are many rooms\" — Greek \"monai\" — KJV's \"mansions\" can mislead; ESV's \"rooms\" is more accurate. The Greek means dwelling places or rooms. The point is not luxury but permanence and personal space — a prepared place.\n  [ASV/NET/WEB]: NET: \"There are many dwelling places in my Father's\n       house\" — \"dwelling places\" (monai) vs. KJV \"mansions\" and\n       WEB \"mansions.\" ASV: \"many mansions.\" The Greek means\n       \"rooms/abiding places\" — not palaces but permanent homes.\n       The Father's house has room for all.\n\nv.6  — KJV: \"I am the way, the truth, and the life: no man cometh unto the Father, but by me\" / ESV: \"I am the way, and the truth, and the life. No one comes to the Father except through me\" — Both equivalent. The Greek uses the definite article before each noun: THE way, THE truth, THE life. This is not one option among many but the exclusive reality.\n  [ASV/NET/WEB]: NET: \"I am the way, and the truth, and the life. No one\n       comes to the Father except through me\" — the sixth \"I AM\"\n       statement. WEB: \"I am the way, the truth, and the life.\"\n       All translations — the most exclusive claim in Scripture.\n       Not a way but THE way.\n\nv.16 — KJV: \"another Comforter\" / ESV: \"another Helper\" — Greek \"allos Parakletos\" — KJV uses \"Comforter\"; ESV uses \"Helper.\" \"Allos\" means \"another of the same kind.\" The Spirit is the same kind of helper Jesus was — personal, present, powerful. \"Paraclete\" = one called alongside to help, advocate, comfort.\n  [ASV/NET/WEB]: NET: \"I will ask the Father, and he will give you another\n       Advocate to be with you forever\" — \"Advocate\" (paraklēton =\n       one called alongside). KJV: \"Comforter.\" WEB: \"Counselor.\"\n       ASV: \"Comforter.\" NET's \"Advocate\" captures the legal/\n       intercessory aspect of the Spirit's work.\n\nv.18 — KJV: \"I will not leave you comfortless\" / ESV: \"I will not leave you as orphans\" — Greek \"orphanous\" — ESV is more literal. The Greek word is \"orphans\" — Jesus promises His disciples will not be abandoned or fatherless.\n\nv.23 — KJV: \"we will come unto him, and make our abode with him\" / ESV: \"we will come to him and make our home with him\" — Greek \"monēn\" — Same root as \"mansions/rooms\" in v.2. KJV uses \"abode\"; ESV uses \"home.\" The Father and Son take up permanent residence in the believer.\n  [ASV/NET/WEB]: NET: \"If anyone loves me, he will obey my word, and my\n       Father will love him, and we will come to him and take up\n       residence with him\" — \"take up residence\" (monēn par' autō\n       poiēsometha = make our dwelling with him). WEB: \"make our\n       home with him.\" KJV: \"make our abode with him.\" The Trinity\n       dwelling WITHIN the believer.\n\nv.27 — KJV: \"Peace I leave with you, my peace I give unto you\" / ESV: \"Peace I leave with you; my peace I give to you\" — Both identical. Greek \"eirēnē\" — not merely the absence of conflict but wholeness, completeness, well-being.\n  [ASV/NET/WEB]: NET: \"Peace I leave with you; my peace I give to you; I do\n       not give it to you as the world gives\" — \"my peace\" (eirēnēn\n       tēn emēn) — not absence of trouble but presence of Christ.\n       WEB: \"my peace I give to you.\" KJV: \"My peace I give unto\n       you.\" A peace the world cannot manufacture or destroy.\n\nv.28 — KJV: \"my Father is greater than I\" / ESV: \"the Father is greater than I\" — Both equivalent. This refers to the Son's voluntary subordination during the Incarnation, not an eternal inferiority of nature. Jesus is equal in essence but submitted in role during His earthly mission (Philippians 2:6-8).\n\n\nGLOSSARY\n------------------------------------\nMansions      — KJV translation of Greek \"monai\" — dwelling places, rooms,\n               abiding places. The emphasis is on permanence and personal\n               preparation, not grandeur.\n\nComforter     — Greek \"Parakletos\" — one called alongside to help. Also\n               translated Helper, Advocate, Counselor. The Holy Spirit in\n               His role as the believer's constant companion and helper.\n\nParaclete     — The Greek term for the Holy Spirit used in John 14-16.\n               Means \"one called alongside\" — an advocate, helper, comforter.\n\nSpirit of truth — One of the Holy Spirit's titles in John. He guides into\n               truth, teaches truth, and testifies to the truth about Jesus.\n\nPeace         — Greek \"eirene\" — not merely the absence of conflict but\n               wholeness, completeness, well-being. Christ's peace is rooted\n               in His finished work, not in circumstances.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. \"Let not your heart be troubled\" (v.1) — this is a command. Anxiety is\n   addressed by a choice to trust. Jesus doesn't say \"don't feel troubled\" —\n   He says \"don't let your heart be troubled.\" What is troubling your heart\n   right now? What would it look like to actively choose trust over anxiety?\n\n2. \"I am the way, the truth, and the life\" (v.6). In a culture that says all\n   paths lead to God, Jesus says there is one way. As a man, how do you hold\n   this conviction with both confidence and compassion — firm in truth, gentle\n   with people?\n\n3. \"If ye love me, keep my commandments\" (v.15). Love for Christ is not\n   primarily a feeling — it is demonstrated through obedience. What commandment\n   of Christ are you currently struggling to keep? What does that struggle\n   reveal about where your love is?\n\n4. \"My peace I give unto you: not as the world giveth\" (v.27). The world's\n   peace requires good circumstances. Christ's peace exists in the middle of\n   bad ones. Are you experiencing His peace right now, or are you dependent\n   on circumstances being right before you feel at peace?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Jesus said \"I go to prepare a place for you\" (v.2). Heaven is a prepared\n   place for prepared people. How much does the reality of heaven shape your\n   daily priorities and decisions? Does eternity feel real to you?\n\n2. Thomas said \"We don't know where you're going, so how can we know the way?\"\n   (v.5). He was honest about his confusion. Are you honest with God about what\n   you don't understand? What questions about faith are you carrying that you\n   haven't brought to Him?\n\n3. Philip said \"Show us the Father and that will be enough\" (v.8). Jesus\n   responded with gentle rebuke — \"Have I been with you so long and you still\n   don't know me?\" After years of following Christ, how well do you actually\n   know Him? Is your relationship growing deeper or staying surface level?\n\n4. Jesus promised \"greater works than these shall he do\" (v.12) — referring\n   to the spread of the Gospel through the church. The \"greater works\" are not\n   bigger miracles but wider reach. How are you participating in the spread of\n   the Gospel? What is your role in the \"greater works\"?\n\n5. \"The prince of this world cometh, and hath nothing in me\" (v.30). Jesus\n   faced the cross with total integrity — Satan had no foothold in Him. What\n   footholds does the enemy have in your life? What needs to be surrendered\n   so that he has nothing in you?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 14:1-14 - Prepared for Departure:\n    https://enduringword.com/media/john-14-prepared-departure/\n  John 14:15-31 - Prepared for the Spirit:\n    https://enduringword.com/media/john-14-prepared-spirit/\n\nPODCAST RESOURCES\n------------------------------------\nDavid Guzik — Enduring Word Podcast:\n  Apple Podcasts: https://podcasts.apple.com/nz/podcast/enduring-word/id1717516011\n\nBibleProject Podcast:\n  https://bibleproject.com/podcast/\n\nPERSONAL NOTES\n------------------------------------\n[Your notes here]\n\n\n========================================\nStudy Notes generated for personal Bible study use.\nTranslations referenced: KJV, ESV, ASV, NET, WEB\nCommentary sources: Enduring Word (enduringword.com), Charles Spurgeon (Public Domain)\n"}, "15": {"translations": {"ESV": ["“I am the true vine, and my Father is the vinedresser.", "Every branch in me that does not bear fruit he takes away, and every branch that does bear fruit he prunes, that it may bear more fruit.", "Already you are clean because of the word that I have spoken to you.", "Abide in me, and I in you. As the branch cannot bear fruit by itself, unless it abides in the vine, neither can you, unless you abide i rmer.", "Every branch in me that doesn’t bear fruit, he takes away. Every branch that bears fruit, he prunes, that it may bear more fruit.", "You are already pruned clean because of the word which I have spoken to you.", "Remain in me, and I in you. As the branch can’t bear fruit by itself, unless it remains in the vine, so neither can you, unless you remain in me.", "I am the vine. You are the branches. He who remains in me, and I in him, the same bears much fruit, for apart from me you can do nothing.", "If a man doesn’t remain in me, he is thrown out as a branch, and is withered; and they gather them, throw them into the fire, and they are burned.", "If you remain in me, and my words remain in you, you will ask whatever you desire, and it will be done for you.", "“In this is my Father glorified, that you bear much fruit; and so you will be my disciples.", "Even as the Father has loved me, I also have loved you. Remain in my love.", "If you keep my commandments, you will remain in my love; even as I have kept my Father’s commandments, and remain in his love.", "I have spoken these things to you, that my joy may remain in you, and that your joy may be made full.", "“This is my commandment, that you love one another, even as I have loved you.", "Greater love has no one than this, that someone lay down his life for his friends.", "You are my friends, if you do whatever I command you.", "No longer do I call you servants, for the servant doesn’t know what his lord does. But I have called you friends, for everything that I heard from my Father, I have made known to you.", "You didn’t choose me, but I chose you, and appointed you, that you should go and bear fruit, and that your fruit should remain; that whatever you will ask of the Father in my name, he may give it to you.", "“I command these things to you, that you may love one another.", "If the world hates you, you know that it has hated me before it hated you.", "If you were of the world, the world would love its own. But because you are not of the world, since I chose you out of the world, therefore the world hates you.", "Remember the word that I said to you: ‘A servant is not greater than his lord.’ If they persecuted me, they will also persecute you. If they kept my word, they will also keep yours.", "But all these things will they do to you for my name’s sake, because they don’t know him who sent me.", "If I had not come and spoken to them, they would not have had sin; but now they have no excuse for their sin.", "He who hates me, hates my Father also.", "If I hadn’t done among them the works which no one else did, they wouldn’t have had sin. But now have they seen and also hated both me and my Father.", "But this happened so that the word may be fulfilled which was written in their law, ‘They hated me without a cause.’", "“When the Counselor has come, whom I will send to you from the Father, the Spirit of truth, who proceeds from the Father, he will testify about me.", "You will also testify, because you have been with me from the beginning."]}, "studyNotes": "John - Chapter 15\nBible Study Notes\n========================================\n\nCHAPTER SUMMARY\n------------------------------------\nJesus teaches the allegory of the Vine and Branches — \"Abide in me and I in you\" — commands His disciples to love one another as He loved them, and warns of the world's hatred because \"they hated me before they hated you.\"\n\nAUTHORSHIP & HISTORICAL BACKGROUND\n------------------------------------\nAuthor: The Apostle John (see Chapter 1 notes for full authorship details).\n\nHistorical Context: Chapter 15 continues the Upper Room Discourse. Jesus uses\nthe image of the vine and branches — deeply familiar to His Jewish audience.\nIsrael was frequently depicted as God's vine in the Old Testament (Psalm 80:8-16,\nIsaiah 5:1-7, Ezekiel 15, Hosea 10:1). Israel had failed as God's vine. Jesus\ndeclares Himself the \"true vine\" — the fulfillment of what Israel was meant to be.\n\nThe Vine and Branches: This is the seventh and final \"I AM\" statement in John's\nGospel. The image is agricultural — a grapevine produces fruit only through\nbranches that remain connected to the vine. Disconnected branches wither and\nare burned. The key word of the chapter is \"abide\" (Greek: meno) — used 11 times.\n\nWorld Hatred (vv.18-27): Jesus transitions from the intimacy of abiding to the\nreality of persecution. The world's hatred of believers is not incidental — it\nflows from the world's hatred of Christ. Disciples should expect opposition, not\nbe surprised by it.\n\nMAP & GEOGRAPHY NOTES\n------------------------------------\n- The Upper Room / en route to Gethsemane: This teaching may have been given in the Upper Room or as they walked from the Upper Room toward the Mount of Olives (cf. 14:31, \"Arise, let us go hence\").\n- The vine imagery reflects the vineyards that covered the Judean hillsides — and possibly the golden vine that adorned the Temple entrance.\n\nKEY VERSES\n------------------------------------\nv.4-5 — \"Abide in me, and I in you... Whoever abides in me and I in him, he\n        it is that bears much fruit, for apart from me you can do\n        nothing.\" (ESV) — The absolute necessity of connection to Christ for\n        fruitful living.\n\nv.11 — \"These things I have spoken to you, that my joy may be in you, and that\n        your joy may be full.\" (ESV) — Obedience and abiding are the path to\n        full joy — not circumstances.\n\nv.13 — \"Greater love has no one than this, that someone lay down his life for\n        his friends.\" (ESV) — The definition of ultimate love — fulfilled at\n        the cross.\n\nv.16 — \"You did not choose me, but I chose you and appointed you that you\n        should go and bear fruit.\" (ESV) — Election and mission together.\n\nCROSS-REFERENCES\n------------------------------------\nv.1   — Isaiah 5:1-7 — The parable of the vineyard — Israel as God's vine.\nv.1   — Psalm 80:8-16 — \"You transplanted a vine from Egypt.\"\nv.2   — Hebrews 12:11 — \"No discipline seems pleasant at the time, but\n        painful. Later on, however, it produces a harvest of righteousness.\"\nv.5   — Philippians 4:13 — \"I can do all things through Christ who strengthens\n        me\" — but only in connection to Him.\nv.7   — Matthew 7:7-8 — \"Ask and it will be given to you.\"\nv.11  — Nehemiah 8:10 — \"The joy of the Lord is your strength.\"\nv.13  — Romans 5:8 — \"While we were still sinners, Christ died for us.\"\nv.16  — Ephesians 1:4 — \"He chose us in him before the creation of the world.\"\nv.18  — 1 John 3:13 — \"Do not be surprised if the world hates you.\"\nv.26  — Acts 2:33 — The Spirit sent from the Father through the Son.\n\nCOMMENTARY REFERENCES\n------------------------------------\nEnduring Word (David Guzik):\n  https://enduringword.com/bible-commentary/john-15/\n  Guzik examines the meaning of \"abide,\" the pruning process (v.2), the\n  nature of fruitlessness and its consequences, and the transition from\n  servants to friends (v.15).\n\nCharles Spurgeon:\n  Sermon: \"Abiding in Christ\" on v.4 (MTP Vol. 22, No. 1288)\n  \"Abide in Me. Not visit Me occasionally. Not come to Me in emergencies.\n  Abide — make your home in Me. The branch does not visit the vine; it\n  lives in the vine. That is the relationship Christ calls us to — not\n  occasional contact but constant connection.\"\n  Sermon: \"Greater Love\" on v.13 (MTP Vol. 26, No. 1546)\n  \"Greater love hath no man than this. And yet Christ had greater love\n  than this — for He laid down His life not for friends but for enemies.\n  He loved us when we were unlovable, when we were hostile, when we were\n  dead in sin. That is the love that surpasses all understanding.\"\n\nTRANSLATION NOTES\n------------------------------------\nv.1  — KJV: \"I am the true vine, and my Father is the husbandman\" / ESV: \"I am the true vine, and my Father is the vinedresser\" — Greek \"geōrgos\" — KJV uses \"husbandman\" (archaic for farmer); ESV uses \"vinedresser\" (one who tends vines). Both refer to the Father as the one who cultivates and prunes.\n  [ASV/NET/WEB]: NET: \"I am the true vine, and my Father is the\n       gardener\" — \"gardener\" (geōrgos = vinedresser/farmer). KJV:\n       \"husbandman.\" WEB: \"farmer.\" The seventh and final \"I AM\"\n       statement with a predicate. The Father tends; the Son\n       supplies life; branches bear fruit.\n\nv.2  — KJV: \"Every branch in me that beareth not fruit he taketh away\" / ESV: \"Every branch in me that does not bear fruit he takes away\" — Greek \"airei\" — Both equivalent. The Greek \"airo\" can mean \"take away\" (remove) OR \"lift up\" (as in lifting a vine off the ground to help it bear fruit). Some scholars favor \"lift up\" — the Father tends even unfruitful branches before removing them. Both readings are possible.\n  [ASV/NET/WEB]: NET: \"He takes away every branch that does not bear fruit\n       in me. He prunes every branch that bears fruit so that it\n       will bear more fruit\" — \"takes away\" (airei) can also mean\n       \"lifts up\" (to get sunlight). WEB: \"every branch in me\n       that doesn't bear fruit, he takes away.\" The interpretation\n       affects one's theology of security.\n\nv.5  — KJV: \"without me ye can do nothing\" / ESV: \"apart from me you can do nothing\" — Greek \"chōris emou\" — Both equivalent. ESV's \"apart from\" emphasizes separation from the vine as the cause of fruitlessness.\n  [ASV/NET/WEB]: NET: \"apart from me you can do nothing\" — absolute\n       dependence. WEB: \"apart from me you can do nothing.\" KJV:\n       \"without me ye can do nothing.\" Not \"less\" or \"not much\"\n       — NOTHING. The vine metaphor demands connection for any\n       spiritual productivity.\n\nv.6  — KJV: \"cast forth as a branch, and is withered; and men gather them, and cast them into the fire\" / ESV: \"he is thrown away like a branch and withers; and the branches are gathered, thrown into the fire, and burned\" — Both equivalent. This verse is debated regarding whether it refers to loss of salvation or to professing believers who were never truly connected.\n\nv.13 — KJV: \"Greater love hath no man than this, that a man lay down his life for his friends\" / ESV: \"Greater love has no one than this, that someone lay down his life for his friends\" — Both equivalent. Jesus said this before the cross — defining what He was about to do.\n  [ASV/NET/WEB]: NET: \"No one has greater love than this — that one lays\n       down his life for his friends\" — the supreme definition of\n       love. WEB: \"Greater love has no one than this, that someone\n       lay down his life for his friends.\" KJV: \"Greater love hath\n       no man than this.\" Jesus is about to demonstrate this\n       definition within hours.\n\nv.16 — KJV: \"I have chosen you, and ordained you\" / ESV: \"I chose you and appointed you\" — Greek \"ethēka\" — KJV uses \"ordained\"; ESV uses \"appointed.\" Both convey that Jesus set them apart for a specific purpose: to go and bear lasting fruit.\n\nv.26 — KJV: \"the Comforter... the Spirit of truth, which proceedeth from the Father\" / ESV: \"the Helper... the Spirit of truth, who proceeds from the Father\" — Greek \"Paraklētos\" — KJV uses \"Comforter\"; ESV uses \"Helper.\" The Spirit testifies about Jesus and empowers believers to testify as well.\n  [ASV/NET/WEB]: NET: \"the Advocate whom I will send you from the Father —\n       the Spirit of truth who goes out from the Father\" — \"goes\n       out\" (ekporeuetai) = proceeds. WEB: \"who proceeds from the\n       Father.\" KJV: \"which proceedeth from the Father.\" This verse\n       became central to the filioque controversy between Eastern\n       and Western churches.\n\n\nGLOSSARY\n------------------------------------\nVine          — The grapevine — a central agricultural image in Israel. God\n               planted Israel as His vine (Psalm 80). Jesus is the \"true vine\"\n               — the fulfillment of what Israel was meant to be.\n\nHusbandman    — KJV term for the vinedresser or farmer who tends the vine.\n               The Father is the one who prunes and cares for the branches.\n\nAbide         — Greek \"meno\" — to remain, stay, dwell, continue. The key word\n               of chapter 15. Abiding in Christ means maintaining continuous,\n               dependent connection — not occasional visits.\n\nPurge/Prune   — To cut back branches to increase fruit production. The Father\n               prunes fruitful branches to make them more fruitful — a painful\n               but purposeful process.\n\nOrdained      — KJV for \"appointed\" — Jesus appointed His disciples for a\n               specific purpose: to go and bear lasting fruit.\n\nParaclete     — The Holy Spirit as Comforter/Advocate (v.26). He testifies\n               about Jesus and empowers believers to testify as well.\n\nPERSONAL REFLECTION & APPLICATION\n------------------------------------\n1. \"Without me ye can do nothing\" (v.5). Not \"without me you can do less\" —\n   nothing. Every good thing in your life flows from connection to Christ.\n   Where are you trying to produce fruit in your own strength — in your\n   marriage, your parenting, your work, your ministry? What would it look\n   like to abide rather than strive?\n\n2. The Father prunes fruitful branches to make them more fruitful (v.2).\n   Pruning is painful — it looks like loss. Is there something in your life\n   right now that feels like loss but might be the Father's pruning? What\n   fruit might He be preparing you to bear?\n\n3. Jesus called His disciples \"friends\" (v.15) — not servants. A servant\n   follows orders without understanding; a friend is brought into the\n   confidence of the master. How does being called a friend of Jesus change\n   how you relate to Him in prayer and in daily life?\n\n4. \"The world hateth you\" (v.19). If you are living like Christ, the world\n   will not always applaud you. Are you experiencing any friction with the\n   world because of your faith? Or has your Christianity become so comfortable\n   that it produces no friction at all?\n\nREFLECTION QUESTIONS\n------------------------------------\n1. Abiding in Christ is the condition for fruitfulness, answered prayer, and\n   full joy (vv.4-11). What does abiding look like practically in your daily\n   life? What habits or disciplines help you stay connected to the vine?\n\n2. The Father prunes even fruitful branches (v.2). This means the most\n   productive seasons of your life may also be the most painful. How do you\n   maintain trust in God's goodness during seasons of pruning?\n\n3. Jesus said \"I have chosen you\" (v.16) — not \"you have chosen me.\" You\n   are in Christ because He pursued you. How does the reality of being chosen\n   by God affect your sense of identity, security, and purpose?\n\n4. \"Greater love hath no man than this, that a man lay down his life for his\n   friends\" (v.13). Jesus defines love by sacrifice. In your closest\n   relationships — marriage, fatherhood, friendship — where are you being\n   called to lay something down for someone else? What is it costing you?\n\n5. The world hated Jesus because He testified that its works were evil (John\n   7:7). If the world doesn't hate you at all, is it possible you've stopped\n   testifying? How do you balance being in the world without being of it?\n\n\nVIDEO RESOURCES\n------------------------------------\nThe Bible Project — John Overview:\n  https://bibleproject.com/explore/video/john/\n\n\nDavid Guzik — Enduring Word Video Series (John):\n  YouTube Playlist: https://www.youtube.com/playlist?list=PL_QIfO0mxbX4zgQH4vuK6q1q7gu8Ok6tz\n  John 15:1-11 - Prepared to Abide:\n    https://enduringword.com/media/john-15-prepared-abide/\n  John 15:12-16:4 - Prepared for Persecution:\n    https://enduringword.com/media/john-15-16-prepared-persecution/\n\nPODCAST RESOURCES\n-------------- lf loveth you, because ye have loved me, and have believed that I came forth from the Father.", "I came out from the Father, and am come into the world: again, I leave the world, and go unto the Father.", "His disciples say, Lo, now speakest thou plainly, and speakest no dark saying.", "Now know we that thou knowest all things, and needest not that any man should ask thee: by this we believe that thou camest forth from God.", "Jesus answered them, Do ye now believe?", "Behold, the hour cometh, yea, is come, that ye shall be scattered, every man to his own, and shall leave me alone: and [yet] I am not alone, because the Father is with me.", "These things have I spoken unto you, that in me ye may have peace. In the world ye have tribulation: but be of good cheer; I have overcome the world."], "NET": ["“I have told you all these things so that you will not fall away.", "They will put you out of the synagogue, yet a time is coming when the one who kills you will think he is offering service to God.", "They will do these things because they have not known the Father or me.", "But I have told you these things so that when their time comes, you will remember that I told you about them. “I did not tell you these things from the beginning because I was with you.", "But now I am going to the one who sent me, and not one of you is asking me, ‘Where are you going?’", "Instead your hearts are filled with sadness because I have said these things to you.", "But I tell you the truth, it is to your advantage that I am going away. For if I do not go away, the Advocate will not come to you, but if I go, I will send him to you.", "And when he comes, he will prove the world wrong concerning sin and righteousness and judgment—", "concerning sin because they do not believe in me;", "concerning righteousness because I am going to the Father and you will see me no longer;", "and concerning judgment because the ruler of this world has been condemned.", "“I have many more things to say to you
