<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json"><meta name="theme-color" content="#3d2b1f">
    <title>Page Not Found — Bible Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="site/style.css?v=14">
    <style>
        .notfound-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            background: linear-gradient(180deg, #faf5ed 0%, #f5ebe0 100%);
        }
        .notfound-card { max-width: 560px; text-align: center; }
        .notfound-eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #c9a96e;
            font-weight: 600;
            margin-bottom: 14px;
        }
        .notfound-card h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.1rem;
            color: #3d2b1f;
            margin-bottom: 14px;
            text-wrap: balance;
        }
        .notfound-verse {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.25rem;
            color: #6b5040;
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .notfound-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .notfound-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 10px;
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .notfound-btn.primary { background: #3d2b1f; color: #faf5ed; }
        .notfound-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(61,43,31,0.25); }
        .notfound-btn.secondary { background: #fff; color: #6b4c3b; border: 1px solid #e0d6c8; }
        .notfound-btn.secondary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <div class="notfound-wrap">
        <div class="notfound-card">
            <p class="notfound-eyebrow">Page Not Found</p>
            <h1>This passage isn't in our library</h1>
            <p class="notfound-verse">"Your word is a lamp to my feet and a light to my path." — Psalm 119:105</p>
            <div class="notfound-actions">
                <a class="notfound-btn primary" href="index.html">Return Home</a>
                <a class="notfound-btn secondary" href="index.html#topical">Topical Studies</a>
                <a class="notfound-btn secondary" href="devotional.html">Today's Devotional</a>
            </div>
        </div>
    </div>
</body>
</html>
