<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json"><meta name="theme-color" content="#3d2b1f">
    <title>Daily Devotional — Bible Study</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="site/style.css">
    <style>
        body { background: #faf5ed; }
        .page-content { margin: 0 auto; max-width: 720px; padding: 24px 20px 100px; }
        .devo-date { font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600; color: #8a7e74; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 8px; }
        .devo-hero { background: linear-gradient(135deg, #3d2b1f 0%, #5c3d6e 50%, #2c6b4f 100%); border-radius: 16px; padding: 40px 28px; text-align: center; margin-bottom: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .devo-hero h1 { font-family: 'Cinzel', serif; font-size: 1.6rem; color: #fff; margin: 0 0 6px; text-shadow: 1px 1px 4px rgba(0,0,0,0.4); }
        .devo-hero .devo-ref { font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; color: #f0c865; letter-spacing: 0.5px; }
        .devo-card { background: #fff; border: 1px solid #e8e0d6; border-radius: 14px; padding: 28px 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        .devo-card h2 { font-family: 'Cinzel', serif; font-size: 1rem; margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }
        .devo-card h2 i { font-size: 0.9rem; }
        .devo-card p { font-size: 0.92rem; color: #3d342e; line-height: 1.85; margin: 0; }
        .devo-verse-text { font-family: 'Merriweather', serif; font-style: italic; font-size: 1.05rem; color: #3d2b1f; line-height: 2; border-left: 3px solid #8b3a2a; padding-left: 18px; margin: 0; }
        .devo-section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: #fff; }
        .icon-scripture { background: #8b3a2a; }
        .icon-reflect { background: #4a5a8a; }
        .icon-prayer { background: #2c6b4f; }
        .icon-apply { background: #5c3d6e; }
        @media (max-width: 768px) { .devo-hero { padding: 28px 18px; } .devo-hero h1 { font-size: 1.3rem; } .devo-card { padding: 22px 18px; } }
    </style>
</head>
<body>
    <main class="page-content" style="margin-top:20px;">
        <p class="devo-date" id="devoDate"></p>
        <div class="devo-hero">
            <h1>Daily Devotional</h1>
            <p class="devo-ref" id="devoRef"></p>
        </div>

        <div class="devo-card">
            <h2><span class="devo-section-icon icon-scripture"><i class="fas fa-book-open"></i></span> Today's Scripture</h2>
            <p class="devo-verse-text" id="devoText"></p>
        </div>

        <div class="devo-card">
            <h2><span class="devo-section-icon icon-reflect"><i class="fas fa-lightbulb"></i></span> Reflection</h2>
            <p id="devoReflection"></p>
        </div>

        <div class="devo-card">
            <h2><span class="devo-section-icon icon-prayer"><i class="fas fa-hands-praying"></i></span> Prayer Prompt</h2>
            <p id="devoPrayer"></p>
        </div>

        <div class="devo-card">
            <h2><span class="devo-section-icon icon-apply"><i class="fas fa-shoe-prints"></i></span> Apply It</h2>
            <p id="devoApplication"></p>
        </div>

        <div class="devo-nav">
        </div>
    </main>
    <script src="site/script.js"></script>
    <script>
    (function() {
        var devotionals = [];
        var currentIndex = 0;
        var ESV_PROXY = 'https://esv-proxy.cloudflare-dust598.workers.dev';

        function getDayIndex() {
            // Start date: Jul 22, 2026 = index 0
            var start = new Date(2026, 6, 22); // month is 0-indexed
            var now = new Date();
            now.setHours(0,0,0,0);
            start.setHours(0,0,0,0);
            var diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            if (diff < 0) diff = 0;
            return diff;
        }

        function formatDate() {
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('en-US', options);
        }

        function render(index) {
            var d = devotionals[index];
            if (!d) return;
            document.getElementById('devoDate').textContent = formatDate();
            document.getElementById('devoRef').textContent = d.verse;
            document.getElementById('devoReflection').textContent = d.reflection;
            document.getElementById('devoPrayer').textContent = d.prayer;
            document.getElementById('devoApplication').textContent = d.application;
            currentIndex = index;

            // Fetch actual ESV text for the verse
            var textEl = document.getElementById('devoText');
            textEl.innerHTML = '<em style="color:#8a7e74;font-size:0.88rem;">Loading scripture...</em>';
            fetch(ESV_PROXY + '/?q=' + encodeURIComponent(d.verse))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.passages && data.passages[0]) {
                        textEl.innerHTML = data.passages[0];
                    } else {
                        textEl.textContent = d.text;
                    }
                })
                .catch(function() {
                    textEl.textContent = d.text;
                });
        }

        fetch('devotionals.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                devotionals = data;
                var todayIndex = getDayIndex();
                if (todayIndex >= devotionals.length) todayIndex = devotionals.length - 1;
                render(todayIndex);
            })
            .catch(function() {
                document.getElementById('devoText').textContent = 'Unable to load devotional. Please try again.';
            });
    })();
    </script>
</body>
</html>
